# S7-Step5 / Phase 8.6: Staging config profile.
#
# Merged on top of config/base.toml via:
#   export TV_ENVIRONMENT=staging
#   figment picks up config/staging.toml automatically
#
# Staging runs the FULL stack (WebSocket → QuestDB → Grafana → Telegram)
# against Dhan's sandbox endpoints. No real orders ever placed. This is
# the dress rehearsal environment for the May 1 AWS go-live.
#
# Differences vs base.toml:
#   - Dhan URLs point at sandbox.dhan.co (orders simulated at Rs 100)
#   - dry_run = true (extra belt on top of mode = sandbox)
#   - sandbox_only_until pushed to 2099-12-31 so staging can NEVER accidentally
#     flip to Live — a stale staging binary running in prod would
#     still fail at boot
#   - capital = 10_000 (no real money involved but smaller number
#     catches any "are you sure this is staging?" operator glance)
#   - logging level = debug for richer observability during dress rehearsal
#   - api port = 3002 so a local dev can run prod + staging simultaneously

[strategy]
config_path = "config/strategies.toml"
capital = 10000.0
dry_run = true
mode = "sandbox"
# Staging can NEVER flip to Live — 2099 cutoff makes accidental
# promotion mechanically impossible even if dry_run = false gets
# flipped in a future misedit.
sandbox_only_until = "2099-12-31"

[dhan]
# Dhan sandbox endpoints — orders simulate at fixed Rs 100.
rest_api_base_url = "https://sandbox.dhan.co/v2"
# WebSocket still uses the live feed URL (sandbox WS = live WS)
# but we rely on dry_run to block order submission.

[logging]
level = "debug"
format = "json"

[api]
# Different port so staging + prod can coexist on the same machine.
port = 3002

[feeds]
# Enable the Groww second feed on staging for the tonight's dry-run.
# Dhan (feed #1) stays ON; Groww (feed #2) is flipped ON here ONLY for staging
# per the operator-locked per-feed enable/disable contract
# (.claude/rules/project/groww-second-feed-scope-2026-06-19.md §2). Groww is a
# SEPARATE, isolated live-feed lane (default-OFF in base.toml) that cannot crash
# Dhan — deploying staging with this flag is the dry-run. Live-feed-only per §33
# (no Groww historical/backtest pull).
dhan_enabled = true
groww_enabled = true
