# =============================================================================
# tickvault — Production Configuration Override
# =============================================================================
# Layer on top of base.toml. Only settings that DIFFER from dev go here.
# Secrets come from AWS SSM Parameter Store (/tickvault/prod/...).
# Deploy: config/base.toml + config/production.toml merged via figment.
# =============================================================================

[strategy]
# CRITICAL: dry_run = false enables REAL order placement
dry_run = false

[risk]
max_daily_loss_percent = 2.0
max_position_lots = 50
auto_halt_on_error = true

[dhan]
# Production uses the same Dhan API — no sandbox
sandbox_base_url = ""

[websocket]
# Production: infinite retries (0 = never give up)
reconnect_max_attempts = 0

[network]
# Static IP verification mandatory for order APIs (SEBI April 2026)
ip_verification_enabled = true
ip_check_interval_secs = 300

[valkey]
# Valkey AUTH password.
#
# Status: NOT YET WIRED IN PRODUCTION (2026-04-25).
# `ValkeyPool::new` is currently called only from storage unit tests; no
# code path in `crates/app/src/main.rs` constructs a Valkey client at boot.
# When Valkey is wired up, the password MUST be fetched from AWS SSM via
# `tickvault_core::auth::secret_manager::fetch_valkey_password()` (path
# `/tickvault/prod/valkey/password`), NOT read from this TOML file.
# The empty default below is safe today because no client uses it.
# See `crates/common/src/constants.rs::SSM_VALKEY_SERVICE` and the
# future-wiring ratchet `test_valkey_wiring_in_main_must_use_ssm`
# in `crates/core/src/auth/secret_manager.rs`.
password = ""

[logging]
# Production: JSON structured output, no pretty printing
level = "info"
format = "json"

[api]
host = "0.0.0.0"
port = 3001

[notification]
# Enable SNS SMS alerts in production for CRITICAL events
sns_enabled = true
