# =============================================================================
# tickvault — Production Configuration Override
# =============================================================================
# Layer on top of base.toml. Only settings that DIFFER from dev go here.
# Secrets come from AWS SSM Parameter Store (/tickvault/prod/...).
# Deploy: config/base.toml + config/production.toml merged via figment.
# =============================================================================

[strategy]
# ---------------------------------------------------------------------------
# PRODUCTION CUTOVER — DATA-ONLY phase (no order placement). 2026-06-30.
# ---------------------------------------------------------------------------
# We are cutting over to PRODUCTION Dhan endpoints (api.dhan.co) with full
# IP + auth verification ON, but NO real orders are placed yet. This is the
# 3-month no-orders data-pull / monitoring phase per the operator data-pull
# lock (.claude/rules/project/daily-universe-scope-expansion-2026-05-27.md §6
# Quote: "for the next three months no real orders").
#
# How "prod data, no orders" is achieved (verified against the source, NOT
# guessed — see config.rs TradingMode + engine.rs place_order):
#   - mode = "live"  → selects api.dhan.co semantics AND turns ON the static-IP
#                      + auth boot gates (both are gated on `mode.is_live()` in
#                      crates/app/src/main.rs; sandbox/paper SKIP IP+auth).
#   - dry_run = true → OmsEngine::place_order returns a simulated PAPER-* order
#                      at the TOP of the function (engine.rs ~line 208), BEFORE
#                      any live HTTP path, so NOT A SINGLE real order can leave.
# This is the only combination that yields prod endpoints + IP/auth ON + zero
# orders. (sandbox/paper modes would skip IP/auth and hit sandbox.dhan.co.)
#
# BOOT-GATE TIMING (operator must know): two source-level date gates
# (config.rs::validate earliest = 2026-07-01, and check_sandbox_window vs
# base.toml `sandbox_only_until` = 2026-06-30) FORBID `mode = "live"` until
# the sandbox window has fully passed. `sandbox_only_until` expires 2026-06-30
# (today), and live trading is permitted from 2026-07-01. So this config
# becomes bootable on/after 2026-07-01 — which is exactly when the data-pull
# phase begins. Deploying this PR earlier than 2026-07-01 will fail-fast at
# boot with a "SANDBOX GUARD" error by design; that is the intended fail-closed
# safety, not a bug. (These gates live in crates/*/src/*.rs and are out of
# scope for this config-only PR.)
mode = "live"
dry_run = true

[risk]
max_daily_loss_percent = 2.0
max_position_lots = 50
auto_halt_on_error = true

[dhan]
# Production REST endpoint — PROD Dhan, explicitly pinned here so a future
# base.toml edit can never silently leak a sandbox URL into prod. The base
# already points rest_api_base_url at https://api.dhan.co/v2; we restate it
# to make the prod cutover self-documenting and override-proof.
rest_api_base_url = "https://api.dhan.co/v2"
# Production uses the live Dhan API only — clear the sandbox URL so no sandbox
# endpoint is ever reachable from a prod boot.
sandbox_base_url = ""

[websocket]
# Production: infinite retries (0 = never give up)
reconnect_max_attempts = 0

[network]
# Static IP verification mandatory for order APIs (SEBI April 2026)
ip_verification_enabled = true
ip_check_interval_secs = 300

# [valkey] section removed in #O4 (2026-05-24) — Valkey removed from
# the runtime. The dual-instance lock moved to AWS SSM Parameter Store
# in PR #764 (/tickvault/<env>/instance-lock).

[logging]
# Production: JSON structured output, no pretty printing
level = "info"
format = "json"

[api]
host = "0.0.0.0"
port = 3001

[notification]
# Enable SNS SMS alerts in production for CRITICAL events
sns_enabled = true
