# =============================================================================
# tickvault — Production Configuration Override (the ONLY real env)
# =============================================================================
# Layer on top of base.toml. base.toml + production.toml are the ONLY env
# configs (dev/staging configs were retired in the single-prod-env
# consolidation, operator 2026-06-30). TV_ENVIRONMENT=prod selects this file
# AND the /tickvault/prod/... SSM secret prefix.
# Deploy: config/base.toml + config/production.toml merged via figment.
# =============================================================================

[strategy]
# LOCKED dry_run=true — NO real orders (single-prod-env consolidation, operator
# 2026-06-30); flipping to live is a separate deliberate change. This is still
# the data-pull phase. The OMS engine (crates/trading/src/oms/engine.rs) returns
# BEFORE any live HTTP order call while dry_run==true.
dry_run = true
# Belt-and-suspenders defense-in-depth (mirrors the retired staging.toml): even
# if a future misedit flips mode=live, this far-future cutoff makes accidental
# real-money promotion mechanically impossible at boot
# (StrategyConfig::check_sandbox_window panics on mode=Live before this date).
sandbox_only_until = "2099-12-31"

[risk]
max_daily_loss_percent = 2.0
max_position_lots = 50
auto_halt_on_error = true

[dhan]
# Production REST endpoint — PROD Dhan, explicitly pinned here so a future
# base.toml edit can never silently leak a sandbox URL into prod. The base
# already points rest_api_base_url at https://api.dhan.co/v2; we restate it
# to make the prod cutover self-documenting and override-proof.
rest_api_base_url = "https://api.dhan.co/v2"
# Production uses the live Dhan API only — clear the sandbox URL so no sandbox
# endpoint is ever reachable from a prod boot.
sandbox_base_url = ""

[websocket]
# Production: infinite retries (0 = never give up)
reconnect_max_attempts = 0

[network]
# Static IP verification mandatory for order APIs (SEBI April 2026)
ip_verification_enabled = true
ip_check_interval_secs = 300

# [valkey] section removed in #O4 (2026-05-24) — Valkey removed from
# the runtime. The dual-instance lock moved to AWS SSM Parameter Store
# in PR #764 (/tickvault/<env>/instance-lock).

[logging]
# Production: JSON structured output, no pretty printing
level = "info"
format = "json"

[api]
host = "0.0.0.0"
port = 3001

[notification]
# Enable SNS SMS alerts in production for CRITICAL events.
# NOTE: with sns_enabled=true, prod must have /tickvault/prod/sns/phone-number
# populated in SSM (operator is populating /tickvault/prod/* manually).
sns_enabled = true

[feeds]
# 2026-07-13 operator directive: Dhan live WS feed removed from runtime; Dhan
# retained for REST pulls only (spot_1m_rest / option_chain_1m / historical).
# Groww is the live feed. (Supersedes the 2026-06-30 both-feeds lock; the
# Dhan REST retained surface is brought up WITHOUT the WS lane by
# crates/app/src/dhan_rest_stack.rs when dhan_enabled = false.)
# Neither feed places orders — dry_run=true above gates all order placement.
dhan_enabled = false
groww_enabled = true
