# ---------------------------------------------------------------------------
# Strategy Configuration — tickvault
# ---------------------------------------------------------------------------
#
# Each [[strategy]] defines an independent trading strategy with:
#   - Entry conditions (AND logic: all must be true)
#   - Exit conditions (OR logic: any triggers exit)
#   - ATR-based stop-loss and target calculation
#   - Optional trailing stop
#   - Optional confirmation ticks (debounce false signals)
#
# Available indicator fields:
#   rsi, macd_line, macd_signal, macd_histogram, ema_fast, ema_slow,
#   sma, vwap, bollinger_upper, bollinger_middle, bollinger_lower,
#   atr, supertrend, adx, obv, last_traded_price, volume, day_high, day_low
#
# Available operators: gt, gte, lt, lte, cross_above, cross_below
#
# IMPORTANT: This is a PAPER TRADING system. No real orders are placed.
# All signals are simulated and logged for analysis.
# ---------------------------------------------------------------------------

# Optional: override default indicator parameters
# [indicator_params]
# ema_fast_period = 12
# ema_slow_period = 26
# macd_signal_period = 9
# rsi_period = 14
# sma_period = 20
# atr_period = 14
# adx_period = 14
# supertrend_multiplier = 3.0
# bollinger_multiplier = 2.0

# ---------------------------------------------------------------------------
# Example strategy: RSI Mean Reversion (disabled — no security_ids)
# Uncomment and add security_ids to activate.
# ---------------------------------------------------------------------------

# [[strategy]]
# name = "rsi_mean_reversion"
# security_ids = []
# position_size_fraction = 0.1
# stop_loss_atr_multiplier = 2.0
# target_atr_multiplier = 3.0
# confirmation_ticks = 0
# trailing_stop_enabled = false
# trailing_stop_atr_multiplier = 1.5
#
# [[strategy.entry_long]]
# field = "rsi"
# operator = "lt"
# threshold = 30.0
#
# [[strategy.entry_short]]
# field = "rsi"
# operator = "gt"
# threshold = 70.0
#
# [[strategy.exit]]
# field = "rsi"
# operator = "gt"
# threshold = 50.0
