[dhan]
websocket_url = "wss://api-feed.dhan.co"
order_update_websocket_url = "wss://api-order-update.dhan.co"
rest_api_base_url = "https://api.dhan.co/v2"
sandbox_base_url = "https://sandbox.dhan.co/v2"
auth_base_url = "https://auth.dhan.co"
instrument_csv_url = "https://images.dhan.co/api-data/api-scrip-master-detailed.csv"
instrument_csv_fallback_url = "https://images.dhan.co/api-data/api-scrip-master.csv"
max_instruments_per_connection = 5000
max_websocket_connections = 5

[questdb]
host = "tv-questdb"
http_port = 9000
pg_port = 8812
ilp_port = 9009

[partition_retention]
retention_days = 90

# [valkey] section DELETED in #O4 (2026-05-24). Valkey removed from
# the runtime; the dual-instance lock moved to AWS SSM Parameter Store
# in PR #764.

# [prometheus] section DELETED in #O5 (2026-05-30). Prometheus container
# removed in #O3; the /metrics exporter (observability.rs, port 9091) is
# independent and stays for CloudWatch scraping.

[websocket]
ping_interval_secs = 10
pong_timeout_secs = 10
max_consecutive_pong_failures = 2
reconnect_initial_delay_ms = 500
reconnect_max_delay_ms = 60000
reconnect_max_attempts = 0
subscription_batch_size = 100
# Phase 0 Item 6 (operator-locked 2026-05-13): reduced from 10000ms to 2000ms.
# Under Phase 0 LEAN MVP (1 main-feed conn) the stagger is a no-op. Under
# legacy / Wave 5 scopes (up to 5 conns) 2s × 4 staggers = 8s startup delay,
# still safely under Dhan's burst-rate thresholds while shrinking boot
# time from 40s to 8s. See `topic-PHASE-0-LEAN-LOCKED.md` §10.
connection_stagger_ms = 2000

[network]
request_timeout_ms = 10000
websocket_connect_timeout_ms = 10000
retry_initial_delay_ms = 100
retry_max_delay_ms = 30000
retry_max_attempts = 5

[token]
refresh_before_expiry_hours = 1
token_validity_hours = 24

[risk]
max_daily_loss_percent = 2.0
max_position_size_lots = 50

[strategy]
config_path = "config/strategies.toml"
capital = 1000000.0
dry_run = true
mode = "sandbox"
sandbox_only_until = "2026-06-30"

[logging]
level = "info"
format = "json"
log_to_stdout = false

[instrument]
daily_download_time = "08:00:00"
csv_cache_directory = "/app/data/instrument-cache"
csv_cache_filename = "api-scrip-master-detailed.csv"
csv_download_timeout_secs = 120
build_window_start = "09:00:00"
build_window_end = "15:30:00"

[api]
host = "0.0.0.0"
port = 3001
allowed_origins = ["http://localhost:3000", "http://localhost:3001"]
# PR #7d (2026-05-19): `auto_open_portal` flag retired with the
# /portal/* frontend deletion. Grafana / QuestDB Console / Prometheus
# are still auto-opened at boot by `infra::DASHBOARD_SERVICES`.

[subscription]
# Phase 0 LEAN MVP (operator lock 2026-05-15) — 222 SIDs ONLY.
# 4 IDX_I (NIFTY=13, BANKNIFTY=25, SENSEX=51, INDIA VIX=21) in Ticker mode +
# 218 NSE_EQ F&O underlying stocks in Quote mode. NO derivatives, NO greeks,
# NO depth-20, NO depth-200, NO movers pipeline, NO Phase 2 dispatcher.
#
# Scope is the SOURCE OF TRUTH for the WS subscription per
# `.claude/rules/project/daily-universe-scope-expansion-2026-05-27.md`
# (supersedes the 2026-05-15 4-SID lock). GO-LIVE 2026-05-28: `daily_universe`
# is the operator-locked production scope — ~250 SIDs (all NSE indices + 1 BSE
# SENSEX + unique F&O underlying spots), Quote mode, fail-closed §4. The
# 2-WebSocket lock (1 main-feed + 1 order-update) is UNCHANGED. The only other
# legal value is `indices_4_only` (the retired 4-SID scope, kept for rollback).
# Adding a new scope requires operator re-approval recorded in the rule file.
scope = "daily_universe"
feed_mode = "Full"
subscribe_stock_equities = true
stock_atm_strikes_above = 25
stock_atm_strikes_below = 25
stock_default_atm_fallback_enabled = true
# Phase 0 lock — depth-20 stays defined but NEVER spawns per the 2-WS rule.
# Scope = `indices_underlyings_only` would already gate this off, but
# belt-and-suspenders default-off prevents a future scope flip from
# accidentally re-enabling depth.
enable_twenty_depth = false
twenty_depth_max_instruments = 50

[notification]
telegram_api_base_url = "https://api.telegram.org"
send_timeout_ms = 10000
sns_enabled = false
# Telegram UX Overhaul (2026-07-07) kill switch #1: one incident = one
# live-edited Telegram bubble for WS lifecycle storms. Set false to revert
# to byte-identical legacy per-event dispatch (no code change needed).
episode_mode = true
# Kill switch #2: LOW/MEDIUM digest window (seconds) during market hours.
# Clamped to [60, 3600] at load; 60 == legacy 60s coalescing behavior.
digest_window_secs = 900
# Boot bubble (2026-07-09): ONE consolidated live-edited boot checklist
# bubble per boot. Set false to revert to the legacy per-event boot spray
# (WS episodes are untouched either way). Note: the bubble also requires
# episode_mode = true — turning episode_mode off reverts BOTH the WS
# episode bubbles AND the boot bubble to legacy dispatch.
boot_bubble = true

[observability]
metrics_bind_addr = "127.0.0.1"
metrics_port = 9091
otlp_endpoint = "http://tv-jaeger:4317"
metrics_enabled = true
tracing_enabled = false

[historical]
enabled = true
lookback_days = 90
request_timeout_secs = 30
max_retries = 3
request_delay_ms = 500

[greeks]
enabled = true
fetch_interval_secs = 60
risk_free_rate = 0.10
dividend_yield = 0.0
iv_solver_max_iterations = 50
iv_solver_tolerance = 1e-8

[index_constituency]
enabled = true
download_timeout_secs = 30
max_concurrent_downloads = 5
inter_batch_delay_ms = 0

[infrastructure]
auto_start_docker = true

# Pluggable market-data feed selection (Groww second feed, operator lock
# 2026-06-19 — .claude/rules/project/groww-second-feed-scope-2026-06-19.md).
# Dhan = feed #1 (default ON, UNCHANGED). Groww = feed #2 (default OFF,
# opt-in). Run Dhan-only (today's default), Groww-only, or both.
[feeds]
dhan_enabled = true
groww_enabled = false
# Groww NATIVE-RUST SHADOW client (PR-R1 of the parity migration, operator
# "go" 2026-07-04 — groww-second-feed-scope-2026-06-19.md §35). Default OFF.
# When true, the native Rust client runs ALONGSIDE the Python sidecar (same
# watch set) and writes its own NDJSON capture file
# (data/groww/rust-live-ticks.ndjson) for the exact per-tick parity comparer.
# No shared-table writes, no strategy/order wiring, no sidecar changes.
groww_native_shadow = false

# Groww multi-connection AUTO-SCALE ladder (operator authorization 2026-07-03,
# §34 of .claude/rules/project/groww-second-feed-scope-2026-06-19.md).
# enabled = false (the default) keeps the single-connection sidecar path
# byte-identical. Tier A ceiling = 10 connections (Monday); raising
# target_connections beyond the current tier requires the §34.2 gate evidence.
[feeds.groww.scale]
enabled = false
target_connections = 10
instruments_per_conn = 1000
ladder = [1, 2, 5, 10]
gate_hold_minutes = 15
gate_max_cpu_pct = 70.0
gate_min_disk_free_pct = 20.0
gate_max_capture_lag_ms = 30000
rollback_hold_base_minutes = 10
advance_window_ist = ["09:20", "14:30"]
# Cap-probe mode (PR-3): exactly 2 conns x 600 instruments + a
# per-conn-vs-per-account verdict, then hold at 2. Scale-test harness only.
probe_mode = false
# Weekend SMOKE mode (PR-3): when the market is CLOSED, exercise the full
# scale machinery with tick gates honestly SKIPPED (labelled SMOKE).
# No effect while the market is open. Scale-test harness only.
weekend_smoke = false

# [movers] section retired in PR #2 (2026-05-18) alongside the deleted
# movers pipeline. Under the 4-IDX_I-only universe top-N gainers/losers/
# most-active queries are meaningless.

[features]
hotpath_async_writers = true
phase2_emit_guard = true
# stock_movers_full_universe + option_movers_5s retired in PR #2
# (2026-05-18) alongside the deleted movers pipeline.
previous_close_persist = true
ws_main_sleep_until_open = true
ws_depth_ou_sleep_until_open = true
fast_boot_60s_deadline = true
tick_gap_detector_60s_coalesce = true
audit_tables_enabled = true
telegram_bucket_coalescer = true
market_open_self_test = true
realtime_guarantee_score = true
# PR #4 (2026-05-19): depth_dynamic_top_volume + depth_dynamic_pipeline_v2
# flags retired alongside the 20/200-level depth WebSocket pipelines per
# the 4-IDX_I LOCKED_UNIVERSE operator lock
# (.claude/rules/project/websocket-connection-scope-lock.md).
# PR-D (2026-05-26): historical_fetch_enabled retired alongside the
# deleted Dhan historical fetch chain.

# PR #4 (2026-05-19): [depth_20.dynamic] and [depth_200.dynamic] sections
# retired with the pipelines they configured.

# PR #517 (Wave-5 TF reduction) — 9 TFs. Retired the 12 sub-15-minute
# non-canonical TFs (2m/3m/4m/6m/7m/8m/9m/10m/11m/12m/13m/14m). Re-add
# only after Groww-API drill-down backtests prove signal value, AND only
# together with: cascade RAM engine entry + matview DDL entry + Tf enum
# variant + symmetry ratchet update (see plan §K-L6/L7/L8 + PR #517).
[engine.timeframes]
list = [
  "1m", "5m", "15m", "30m",
  "1h", "2h", "3h", "4h",
  "1d",
]

[in_mem.tick_storage]
per_instrument_capacity = 5000

# --------------------------------------------------------------------
# Option-chain config sections REMOVED 2026-06-28.
# The entire option_chain REST subsystem (and its
# `[option_chain_minute_snapshot]` config + the `[option_chain]` PR-stub)
# was deleted per operator directive 2026-06-28 ("drop the option chain
# entire implementations and its table also"). It was disabled since
# 2026-06-02 (no Dhan Option Chain Data API entitlement) with no live
# consumer; its QuestDB table was dropped 2026-06-23.
# --------------------------------------------------------------------

# ===========================================================================
# PR #1 (AWS-lifecycle 14-PR sequence) — CONTRACT STUB section.
# The [cross_verify] doc-stub below defines config shape for PR #9
# (cross_verify module). No Rust consumer reads it yet (no struct field).
# ===========================================================================

[cross_verify]
# Operator-locked 2026-05-18:
#   - 15:31 IST: 1-minute buffer after market close so final 15:29 bar settles.
#   - 08:05 IST: morning 1d cross-check; alert-only, does NOT block trading.
#   - Zero-tolerance OHLCV match required (per historical-candles-cross-verify.md).
intraday_run_ist          = "15:31:00"
morning_run_ist           = "08:05:00"
timeframes_intraday       = ["1m", "5m", "15m"]   # 1h dropped — operator narrowed 2026-05-18
tolerance_price           = 0.0
tolerance_volume          = 0.0
block_trading_on_mismatch = false                  # alert-only per operator lock
# Subjects of cross-verify — all 4 main feed SIDs
[[cross_verify.subjects]]
security_id = 13
name        = "NIFTY"
segment     = "IDX_I"

[[cross_verify.subjects]]
security_id = 25
name        = "BANKNIFTY"
segment     = "IDX_I"

[[cross_verify.subjects]]
security_id = 51
name        = "SENSEX"
segment     = "IDX_I"

[[cross_verify.subjects]]
security_id = 21
name        = "INDIA VIX"
segment     = "IDX_I"

# ===========================================================================
# Dual-feed daily scoreboard (operator directive 2026-07-10 — run Dhan +
# Groww live for a month, everything tracked/captured/blame-attributed).
# PR-A is aggregation-only: reads ws_event_audit + ticks, writes the
# feed_scoreboard_daily / feed_episode_audit forensic tables at 15:45 IST
# and sends the daily Telegram scorecard. Safe-on; `enabled = false` is
# the whole-subsystem rollback switch.
# ===========================================================================
[scoreboard]
enabled                 = true
telegram_enabled        = true
coverage_detail_rows    = true   # per-instrument detail rows (populated by PR-4)
presence_fold_enabled   = true   # hot-path presence fold (lands in PR-4)
groww_lag_enabled       = true   # Groww lag histograms (land in PR-3)
trigger_secs_of_day_ist = 56700  # 15:45:00 IST

# Daily BruteX↔TickVault Groww 1-minute cross-verification (default OFF —
# flip enabled = true once the BruteX producer publishes daily CSVs to
# s3://tv-prod-cold/crossverify/groww/<date>/). Cold path only; reads live
# candles_1m (feed='groww') vs the BruteX CSVs, writes forensic tables +
# one Telegram summary. Runbook:
# .claude/rules/project/brutex-crossverify-error-codes.md
[brutex_crossverify]
enabled                  = false
telegram_enabled         = true
bucket                   = "tv-prod-cold"
prefix                   = "crossverify/groww"
trigger_secs_of_day_ist  = 57000    # 15:50:00 IST
deadline_secs_of_day_ist = 57900    # 16:05:00 IST S3 wall-clock cap
repoll_interval_secs     = 120      # empty-prefix re-poll cadence
max_object_bytes         = 5242880  # 5 MiB per CSV object
max_keys                 = 2000     # listed-key cap per day
fetch_attempts_per_object = 3
price_tolerance_paise    = 0        # exact match (inclusive <= compare)
compare_volume           = false    # groww live volume is always 0

# ===========================================================================
# Per-minute spot 1m REST pipeline (operator grant 2026-07-12 — PR-2, the
# SPOT half). Every trading-day minute close in [09:16:00, 15:30:00] IST,
# fetch the just-closed minute's official 1m OHLCV for the 3 IDX_I spot
# indices (NIFTY 13 / BANKNIFTY 25 / SENSEX 51) via Dhan POST
# /v2/charts/intraday and persist to the spot_1m_rest table. Cold path;
# the WS candle pipeline is untouched. An ABSENT section = disabled
# (fail-safe); `enabled = false` is the rollback switch.
# ===========================================================================
[spot_1m_rest]
enabled = true

# ===========================================================================
# Per-minute option-chain REST pipeline (operator grant 2026-07-12 — PR-3,
# the OPTION-CHAIN half). When enabled: a day-start expirylist warmup pins
# each underlying's CURRENT expiry, then every session minute — sequenced
# right after the spot leg — the FULL current-expiry option chain for the
# 3 underlyings is pulled via POST /v2/optionchain and persisted to the
# option_chain_1m table. Cold path; the WS pipeline is untouched.
# DEFAULT-OFF pending the live entitlement probe (the account had no
# Option Chain Data-API entitlement in June 2026 — DH-902/806 class).
# While disabled, probe_and_report = true runs ONE boot-time expirylist
# probe and reports the verdict via Telegram; the pipeline NEVER auto-runs
# — the operator flips `enabled = true` after an entitled verdict.
# ===========================================================================
[option_chain_1m]
enabled = false  # pending live entitlement probe
probe_and_report = true
