[dhan]
websocket_url = "wss://api-feed.dhan.co"
order_update_websocket_url = "wss://api-order-update.dhan.co"
rest_api_base_url = "https://api.dhan.co/v2"
sandbox_base_url = "https://sandbox.dhan.co/v2"
auth_base_url = "https://auth.dhan.co"
instrument_csv_url = "https://images.dhan.co/api-data/api-scrip-master-detailed.csv"
instrument_csv_fallback_url = "https://images.dhan.co/api-data/api-scrip-master.csv"
max_instruments_per_connection = 5000
max_websocket_connections = 5

[questdb]
host = "tv-questdb"
http_port = 9000
pg_port = 8812
ilp_port = 9009

[partition_retention]
retention_days = 90

# [valkey] section DELETED in #O4 (2026-05-24). Valkey removed from
# the runtime; the dual-instance lock moved to AWS SSM Parameter Store
# in PR #764.

# [prometheus] section DELETED in #O5 (2026-05-30). Prometheus container
# removed in #O3; the /metrics exporter (observability.rs, port 9091) is
# independent and stays for CloudWatch scraping.

[websocket]
ping_interval_secs = 10
pong_timeout_secs = 10
max_consecutive_pong_failures = 2
reconnect_initial_delay_ms = 500
reconnect_max_delay_ms = 60000
reconnect_max_attempts = 0
subscription_batch_size = 100
# Phase 0 Item 6 (operator-locked 2026-05-13): reduced from 10000ms to 2000ms.
# Under Phase 0 LEAN MVP (1 main-feed conn) the stagger is a no-op. Under
# legacy / Wave 5 scopes (up to 5 conns) 2s × 4 staggers = 8s startup delay,
# still safely under Dhan's burst-rate thresholds while shrinking boot
# time from 40s to 8s. See `topic-PHASE-0-LEAN-LOCKED.md` §10.
connection_stagger_ms = 2000

[network]
request_timeout_ms = 10000
websocket_connect_timeout_ms = 10000
retry_initial_delay_ms = 100
retry_max_delay_ms = 30000
retry_max_attempts = 5

[token]
refresh_before_expiry_hours = 1
token_validity_hours = 24

[risk]
max_daily_loss_percent = 2.0
max_position_size_lots = 50

[strategy]
config_path = "config/strategies.toml"
capital = 1000000.0
dry_run = true
mode = "sandbox"
sandbox_only_until = "2026-06-30"

[logging]
level = "info"
format = "json"
log_to_stdout = false

[instrument]
daily_download_time = "08:00:00"
csv_cache_directory = "/app/data/instrument-cache"
csv_cache_filename = "api-scrip-master-detailed.csv"
csv_download_timeout_secs = 120
build_window_start = "09:00:00"
build_window_end = "15:30:00"

[api]
host = "0.0.0.0"
port = 3001
allowed_origins = ["http://localhost:3000", "http://localhost:3001"]
# PR #7d (2026-05-19): `auto_open_portal` flag retired with the
# /portal/* frontend deletion. Grafana / QuestDB Console / Prometheus
# are still auto-opened at boot by `infra::DASHBOARD_SERVICES`.

[subscription]
# Phase 0 LEAN MVP (operator lock 2026-05-15) — 222 SIDs ONLY.
# 4 IDX_I (NIFTY=13, BANKNIFTY=25, SENSEX=51, INDIA VIX=21) in Ticker mode +
# 218 NSE_EQ F&O underlying stocks in Quote mode. NO derivatives, NO greeks,
# NO depth-20, NO depth-200, NO movers pipeline, NO Phase 2 dispatcher.
#
# Scope is the SOURCE OF TRUTH for the WS subscription per
# `.claude/rules/project/daily-universe-scope-expansion-2026-05-27.md`
# (supersedes the 2026-05-15 4-SID lock). GO-LIVE 2026-05-28: `daily_universe`
# is the operator-locked production scope — ~250 SIDs (all NSE indices + 1 BSE
# SENSEX + unique F&O underlying spots), Quote mode, fail-closed §4. The
# 2-WebSocket lock (1 main-feed + 1 order-update) is UNCHANGED. The only other
# legal value is `indices_4_only` (the retired 4-SID scope, kept for rollback).
# Adding a new scope requires operator re-approval recorded in the rule file.
scope = "daily_universe"
feed_mode = "Full"
subscribe_stock_equities = true
stock_atm_strikes_above = 25
stock_atm_strikes_below = 25
stock_default_atm_fallback_enabled = true
# Phase 0 lock — depth-20 stays defined but NEVER spawns per the 2-WS rule.
# Scope = `indices_underlyings_only` would already gate this off, but
# belt-and-suspenders default-off prevents a future scope flip from
# accidentally re-enabling depth.
enable_twenty_depth = false
twenty_depth_max_instruments = 50

[notification]
telegram_api_base_url = "https://api.telegram.org"
send_timeout_ms = 10000
sns_enabled = false

[observability]
metrics_bind_addr = "127.0.0.1"
metrics_port = 9091
otlp_endpoint = "http://tv-jaeger:4317"
metrics_enabled = true
tracing_enabled = false

[historical]
enabled = true
lookback_days = 90
request_timeout_secs = 30
max_retries = 3
request_delay_ms = 500

[greeks]
enabled = true
fetch_interval_secs = 60
risk_free_rate = 0.10
dividend_yield = 0.0
iv_solver_max_iterations = 50
iv_solver_tolerance = 1e-8

[index_constituency]
enabled = true
download_timeout_secs = 30
max_concurrent_downloads = 5
inter_batch_delay_ms = 0

[infrastructure]
auto_start_docker = true

# [movers] section retired in PR #2 (2026-05-18) alongside the deleted
# movers pipeline. Under the 4-IDX_I-only universe top-N gainers/losers/
# most-active queries are meaningless.

[features]
hotpath_async_writers = true
phase2_emit_guard = true
# stock_movers_full_universe + option_movers_5s retired in PR #2
# (2026-05-18) alongside the deleted movers pipeline.
previous_close_persist = true
ws_main_sleep_until_open = true
ws_depth_ou_sleep_until_open = true
fast_boot_60s_deadline = true
tick_gap_detector_60s_coalesce = true
audit_tables_enabled = true
telegram_bucket_coalescer = true
market_open_self_test = true
realtime_guarantee_score = true
# PR #4 (2026-05-19): depth_dynamic_top_volume + depth_dynamic_pipeline_v2
# flags retired alongside the 20/200-level depth WebSocket pipelines per
# the 4-IDX_I LOCKED_UNIVERSE operator lock
# (.claude/rules/project/websocket-connection-scope-lock.md).
# PR-D (2026-05-26): historical_fetch_enabled retired alongside the
# deleted Dhan historical fetch chain.

# PR #4 (2026-05-19): [depth_20.dynamic] and [depth_200.dynamic] sections
# retired with the pipelines they configured.

# PR #517 (Wave-5 TF reduction) — 9 TFs. Retired the 12 sub-15-minute
# non-canonical TFs (2m/3m/4m/6m/7m/8m/9m/10m/11m/12m/13m/14m). Re-add
# only after Groww-API drill-down backtests prove signal value, AND only
# together with: cascade RAM engine entry + matview DDL entry + Tf enum
# variant + symmetry ratchet update (see plan §K-L6/L7/L8 + PR #517).
[engine.timeframes]
list = [
  "1m", "5m", "15m", "30m",
  "1h", "2h", "3h", "4h",
  "1d",
]

[in_mem.tick_storage]
per_instrument_capacity = 5000

# --------------------------------------------------------------------
# Option-chain minute-snapshot pipeline (2026-05-16, BRUTEX feeder)
# --------------------------------------------------------------------
# Three-times-per-minute Dhan REST fetch of the option chain (current
# expiry) for the configured underlyings. Staggered slots respect
# Dhan's "1 unique request per 3 seconds" rate limit.
#
# Strategy reads the freshest snapshot from a bounded RAM cache; it
# NEVER awaits the fetch. Hard halt + Critical Telegram when cache
# age exceeds `cache_max_stale_secs`.
#
# Design doc:
# .claude/plans/friday-may-15-mega/topic-OPTION-CHAIN-MINUTE-SNAPSHOT.md
[option_chain_minute_snapshot]
enabled = false                    # 2026-06-02: DISABLED per operator. The Dhan account lacks the Option Chain Data API entitlement, so /v2/optionchain/expirylist returns 404 every minute (NIFTY/BANKNIFTY/SENSEX) and pages [HIGH]. Spot tick capture is unaffected. Re-enable once the account has the Option Chain Data API. (Was true 2026-05-25.)
cache_max_stale_secs = 300         # 5 min hard halt threshold
strike_window_atm_each_side = 25   # ATM ± 25 strikes cached per underlying
fetch_retry_max_attempts = 2       # same-minute retries per underlying

[[option_chain_minute_snapshot.underlyings]]
symbol      = "SENSEX"
security_id = 51
segment     = "IDX_I"
slot_sec    = 49           # 2026-05-26: bumped from :50 → :49 to widen S→B→N spacing to 5s. The previous 3s spacing sat right at Dhan's "1 unique request per 3 seconds" rate-limit boundary and produced ~1 DH-904 429 every 5 minutes (see live logs 2026-05-26). 5s spacing eliminates the rate-limit hits with no change to the 50s overall cadence.

[[option_chain_minute_snapshot.underlyings]]
symbol      = "BANKNIFTY"
security_id = 25
segment     = "IDX_I"
slot_sec    = 54

[[option_chain_minute_snapshot.underlyings]]
symbol      = "NIFTY"
security_id = 13
segment     = "IDX_I"
slot_sec    = 59

# ===========================================================================
# PR #1 (AWS-lifecycle 14-PR sequence) — CONTRACT STUB sections.
#
# These two sections define the configuration shape for PR #8 (option_chain
# module) and PR #9 (cross_verify module). No Rust consumer reads them yet
# — the current `ApplicationConfig` struct has no fields for them, so they
# are silently ignored by the TOML parser (deny_unknown_fields is NOT set).
#
# When PR #8 lands, it adds `#[serde] struct OptionChainConfig` and wires
# it via `ApplicationConfig::option_chain: OptionChainConfig`. Same for PR #9.
#
# See:
# - docs/architecture/option-chain-z-plus-heart-piece.md §7 + §8
# - docs/architecture/aws-indices-only-locked-architecture.md §14
# - .claude/plans/aws-lifecycle/THE-FINAL-PLAN.md §5 (14-PR sequence)
# ===========================================================================

[option_chain]
# Operator-locked 2026-05-18: 50-60s cadence window. Strategy fail-closes
# if cache age exceeds `max_cache_age_secs`.
cadence_secs            = 50
max_cycle_latency_secs  = 60   # alarm if cycle exceeds this
max_cache_age_secs      = 60   # strategy fail-closed threshold
fetch_timeout_secs      = 5
retry_count             = 1
backoff_ladder_secs     = [10, 20, 40, 80]   # DH-904 backoff per dhan-annexure-enums rule 11
verify_ltp_tolerance_pct = 0.005             # 0.5% LTP-vs-WS tolerance (OPTION-CHAIN-04)
stale_cycles_before_telegram = 3
expirylist_refresh_ist  = "15:31:00"          # daily Thursday rollover detection

# 3 underlyings (NIFTY/BANKNIFTY/SENSEX). INDIA VIX has NO option chain.
[[option_chain.underlyings]]
security_id = 13
name        = "NIFTY"
segment     = "IDX_I"

[[option_chain.underlyings]]
security_id = 25
name        = "BANKNIFTY"
segment     = "IDX_I"

[[option_chain.underlyings]]
security_id = 51
name        = "SENSEX"
segment     = "IDX_I"

[cross_verify]
# Operator-locked 2026-05-18:
#   - 15:31 IST: 1-minute buffer after market close so final 15:29 bar settles.
#   - 08:05 IST: morning 1d cross-check; alert-only, does NOT block trading.
#   - Zero-tolerance OHLCV match required (per historical-candles-cross-verify.md).
intraday_run_ist          = "15:31:00"
morning_run_ist           = "08:05:00"
timeframes_intraday       = ["1m", "5m", "15m"]   # 1h dropped — operator narrowed 2026-05-18
tolerance_price           = 0.0
tolerance_volume          = 0.0
block_trading_on_mismatch = false                  # alert-only per operator lock
# Subjects of cross-verify — all 4 main feed SIDs
[[cross_verify.subjects]]
security_id = 13
name        = "NIFTY"
segment     = "IDX_I"

[[cross_verify.subjects]]
security_id = 25
name        = "BANKNIFTY"
segment     = "IDX_I"

[[cross_verify.subjects]]
security_id = 51
name        = "SENSEX"
segment     = "IDX_I"

[[cross_verify.subjects]]
security_id = 21
name        = "INDIA VIX"
segment     = "IDX_I"
