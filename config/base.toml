[dhan]
websocket_url = "wss://api-feed.dhan.co"
order_update_websocket_url = "wss://api-order-update.dhan.co"
rest_api_base_url = "https://api.dhan.co/v2"
sandbox_base_url = "https://sandbox.dhan.co/v2"
auth_base_url = "https://auth.dhan.co"
instrument_csv_url = "https://images.dhan.co/api-data/api-scrip-master-detailed.csv"
instrument_csv_fallback_url = "https://images.dhan.co/api-data/api-scrip-master.csv"
max_instruments_per_connection = 5000
max_websocket_connections = 5

[questdb]
host = "tv-questdb"
http_port = 9000
pg_port = 8812
ilp_port = 9009

[partition_retention]
# Hot partition retention: partitions older than this are detached daily at 16:30 IST.
# Set to 0 to disable auto-detach. SEBI requires 5-year retention (via S3 cold storage).
retention_days = 90

[valkey]
host = "tv-valkey"
port = 6379
max_connections = 16
# Valkey AUTH password.
#
# Status: NOT YET WIRED IN PRODUCTION (2026-04-25).
# `ValkeyPool::new` is currently called only from storage unit tests; no
# code path in `crates/app/src/main.rs` constructs a Valkey client at boot.
# When Valkey is wired up (e.g. for idempotency tracking, token caching,
# or strategy state), the password MUST be fetched from AWS SSM via
# `tickvault_core::auth::secret_manager::fetch_valkey_password()`
# (path `/tickvault/<env>/valkey/password`), NOT read from this TOML file.
# Per `.claude/rules/project/rust-code.md`: "always real AWS, never mocks".
#
# This empty default is therefore safe today — no client uses it. It
# remains here so the figment loader can deserialize the [valkey] section
# without errors. The source-scan ratchet
# `test_valkey_pool_new_uses_ssm_when_wired` (in middleware.rs) blocks
# any future wiring that bypasses the SSM fetch.
password = ""

[prometheus]
host = "tv-prometheus"
port = 9090

[websocket]
ping_interval_secs = 10
pong_timeout_secs = 10
max_consecutive_pong_failures = 2
reconnect_initial_delay_ms = 500
reconnect_max_delay_ms = 60000
# 0 = infinite retries (never give up). App lifecycle controls shutdown.
# Non-zero = hard limit (used for testing). CRITICAL alert fires every 10 failures.
reconnect_max_attempts = 0
subscription_batch_size = 100
connection_stagger_ms = 10000

[network]
request_timeout_ms = 10000
websocket_connect_timeout_ms = 10000
retry_initial_delay_ms = 100
retry_max_delay_ms = 30000
retry_max_attempts = 5

[token]
refresh_before_expiry_hours = 1
token_validity_hours = 24

[risk]
max_daily_loss_percent = 2.0
max_position_size_lots = 50

[strategy]
config_path = "config/strategies.toml"
capital = 1000000.0
dry_run = true  # SAFETY: never place real orders — paper trading only
# Trading mode: "paper" (local sim) | "sandbox" (Dhan DevPortal) | "live" (real orders)
# paper  = zero HTTP to Dhan order APIs, PAPER-{counter} IDs
# sandbox = HTTP to sandbox.dhan.co, fills at ₹100, no static IP needed
# live   = HTTP to api.dhan.co, real exchange, static IP required
mode = "sandbox"
# S6-Step4: Sandbox-only enforcement until this date (YYYY-MM-DD).
# If today_ist <= this date AND mode = "live", boot panics. Set to a past
# date to disable. Default 2026-06-30 per Parthiban "no real orders until
# June end". Hard boot gate — protects real money during the validation
# period.
sandbox_only_until = "2026-06-30"

[logging]
level = "info"
format = "json"
# Disable stdout logging to prevent IntelliJ console OOM.
# Logs always go to data/logs/app.YYYY-MM-DD.log (7-day rotation).
# Set to true for docker runs where stdout is the only log sink.
log_to_stdout = false

[instrument]
daily_download_time = "08:00:00"
csv_cache_directory = "/app/data/instrument-cache"
csv_cache_filename = "api-scrip-master-detailed.csv"
csv_download_timeout_secs = 120
build_window_start = "09:00:00"
build_window_end = "15:30:00"

[api]
host = "0.0.0.0"
port = 3001
allowed_origins = ["http://localhost:3000", "http://localhost:3001"]

[subscription]
feed_mode = "Full"
subscribe_index_derivatives = true
subscribe_stock_derivatives = true
subscribe_display_indices = true
subscribe_stock_equities = true
stock_atm_strikes_above = 25
stock_atm_strikes_below = 25
stock_default_atm_fallback_enabled = true
# 20-level depth: separate WS endpoint (wss://depth-api-feed.dhan.co).
# Does NOT use main feed connection slots — separate endpoint, separate connections.
enable_twenty_depth = true
twenty_depth_max_instruments = 50

[notification]
telegram_api_base_url = "https://api.telegram.org"
send_timeout_ms = 10000
sns_enabled = false

[observability]
metrics_port = 9091
otlp_endpoint = "http://tv-jaeger:4317"
metrics_enabled = true
# Jaeger removed from docker-compose (saves 2.5GB RAM, per AWS budget).
# CloudWatch Logs replaces distributed tracing. Re-enable when Jaeger is deployed.
tracing_enabled = false

[historical]
enabled = true
lookback_days = 90
request_timeout_secs = 30
max_retries = 3
request_delay_ms = 500

[greeks]
enabled = true
fetch_interval_secs = 60
risk_free_rate = 0.10
dividend_yield = 0.0
iv_solver_max_iterations = 50
iv_solver_tolerance = 1e-8

[index_constituency]
enabled = true
download_timeout_secs = 30
max_concurrent_downloads = 5
inter_batch_delay_ms = 0

[infrastructure]
# Auto-start Docker services on boot (docker compose up -d).
# On Mac: launches Docker Desktop if not running, then docker compose up -d.
# On AWS: docker daemon is always running, just starts containers.
# Safe: probes first — if services already running, skips immediately.
auto_start_docker = true

# Plan item E1 (2026-04-22): 6-bucket movers tracker filters + cadence.
# See crates/common/src/config.rs::MoversConfig for field semantics.
[movers]
stocks_min_volume = 0
indices_min_volume = 0
index_futures_min_volume = 1
stock_futures_min_volume = 1
index_options_min_volume = 1
index_options_min_oi = 100     # Suppresses deep-OTM noise on options leaderboard
stock_options_min_volume = 1
stock_options_min_oi = 100
snapshot_cadence_secs = 5      # In-memory recompute (humans poll at 1 Hz)
persistence_cadence_secs = 1   # QuestDB write cadence (~134 rows/sec)
top_n = 20
