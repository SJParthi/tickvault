# =============================================================================
# tickvault — cargo-audit Configuration
# =============================================================================
# Centralizes the advisory ignore list so both `cargo audit` and
# `cargo deny check advisories` see the same set. Each entry's full
# reason + upstream-release condition for removal lives in deny.toml.
#
# When removing an ignore here, also remove it from deny.toml.
#
# 2026-04-22 cleanup: 4 entries removed after PR #323 landed the
# aws-lc-sys / aws-lc-rs / rustls-webpki / rand bumps on main:
#   - RUSTSEC-2026-0044 / 0048 → fixed by aws-lc-sys 0.40.0
#   - RUSTSEC-2026-0049 → fixed by rustls-webpki 0.103.13
#   - RUSTSEC-2026-0097 → fixed by rand 0.9.4
#
# 2026-05-23 cleanup: 3 entries removed after the AWS SDK crates were
# switched off their legacy `rustls` feature (which pulled rustls 0.21
# via aws-smithy-http-client's `legacy-rustls-ring`) and onto the modern
# `default-https-client` feature (rustls 0.23 + aws-lc-rs). The vulnerable
# rustls-webpki 0.101.7 is no longer in the lockfile:
#   - RUSTSEC-2026-0098 (URI name-constraint) — chain removed
#   - RUSTSEC-2026-0099 (wildcard name-constraint) — chain removed
#   - RUSTSEC-2026-0104 (CRL-parse panic) — chain removed
# =============================================================================

[advisories]
ignore = [
    # 2026-06-22 — RUSTSEC-2026-0185 (quinn-proto 0.11.14, HIGH 7.5, QUIC remote
    # memory exhaustion). UNREACHABLE in our binary: quinn/quinn-proto are pulled
    # ONLY by reqwest's optional `http3` feature, which we do NOT enable (reqwest
    # features = json/rustls/charset/http2/query, default-features = false). It is
    # a phantom Cargo.lock entry — never compiled, so the QUIC stream-reassembly
    # code can never run. `cargo tree -i quinn-proto -e normal,build` = empty.
    # Removal condition: drop this once the lock is bumped to quinn-proto >= 0.11.15
    # in a maintenance sweep (the bump needs `cargo update`, blocked by the local
    # hook; a follow-up carries it). Full reason mirrored in deny.toml.
    "RUSTSEC-2026-0185",
]

