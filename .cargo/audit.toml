# =============================================================================
# tickvault — cargo-audit Configuration
# =============================================================================
# Centralizes the advisory ignore list so both `cargo audit` and
# `cargo deny check advisories` see the same set. Each entry's full
# reason + upstream-release condition for removal lives in deny.toml.
#
# When removing an ignore here, also remove it from deny.toml.
# EXCEPTION — audit-only ignores: cargo-audit scans the RAW Cargo.lock,
# cargo-deny scans the RESOLVED feature graph. An advisory on a phantom
# lockfile entry (optional dep of a disabled feature) is flagged ONLY by
# cargo-audit; listing it in deny.toml triggers `advisory-not-detected`.
# Such entries live here alone, marked AUDIT-ONLY (see RUSTSEC-2026-0185).
#
# 2026-04-22 cleanup: 4 entries removed after PR #323 landed the
# aws-lc-sys / aws-lc-rs / rustls-webpki / rand bumps on main:
#   - RUSTSEC-2026-0044 / 0048 → fixed by aws-lc-sys 0.40.0
#   - RUSTSEC-2026-0049 → fixed by rustls-webpki 0.103.13
#   - RUSTSEC-2026-0097 → fixed by rand 0.9.4
#
# 2026-05-23 cleanup: 3 entries removed after the AWS SDK crates were
# switched off their legacy `rustls` feature (which pulled rustls 0.21
# via aws-smithy-http-client's `legacy-rustls-ring`) and onto the modern
# `default-https-client` feature (rustls 0.23 + aws-lc-rs). The vulnerable
# rustls-webpki 0.101.7 is no longer in the lockfile:
#   - RUSTSEC-2026-0098 (URI name-constraint) — chain removed
#   - RUSTSEC-2026-0099 (wildcard name-constraint) — chain removed
#   - RUSTSEC-2026-0104 (CRL-parse panic) — chain removed
# =============================================================================

[advisories]
ignore = [
    # 2026-07-07 — RUSTSEC-2026-0204 (crossbeam-epoch 0.9.18, `fmt::Pointer`
    # invalid pointer dereference for `Atomic`/`Shared` when the underlying
    # pointer is invalid, e.g. `Atomic::null`). TRANSITIVE-ONLY: pulled via
    # criterion → rayon → crossbeam-deque (dev/bench chain) and
    # metrics-exporter-prometheus → metrics-util (internals). tickvault code
    # never invokes `fmt` on `Atomic`/`Shared` — no direct crossbeam-epoch
    # usage. Real fix = bump the lock to crossbeam-epoch >= 0.9.20, blocked
    # on operator approval (`cargo update` is BANNED per CLAUDE.md); a
    # follow-up maintenance sweep carries the targeted bump. Full reason
    # mirrored in deny.toml.
    "RUSTSEC-2026-0204",
    # 2026-07-07 — RUSTSEC-2026-0185 (quinn-proto 0.11.14, remote memory
    # exhaustion via unbounded out-of-order stream reassembly; high 7.5).
    # AUDIT-ONLY IGNORE, deliberately ABSENT from deny.toml: quinn-proto is
    # a PHANTOM lockfile entry — pulled only by reqwest's `http3` feature,
    # which tickvault does NOT enable. `cargo tree -i quinn-proto` prints
    # nothing (not in the resolved graph), so cargo-deny never sees it and
    # emits `advisory-not-detected` if this ID is listed there. cargo-audit,
    # however, scans the RAW Cargo.lock and flags it regardless of feature
    # resolution — hence this entry lives ONLY here. Do NOT "clean up" this
    # ignore based on cargo-deny output (that removal is exactly what broke
    # the 2026-07-07 Security & Audit run). Remove only when the lockfile
    # pins quinn-proto >= 0.11.15 (targeted bump, needs operator approval —
    # `cargo update` is BANNED per CLAUDE.md) or reqwest drops the entry.
    "RUSTSEC-2026-0185",
    # 2026-07-07 — RUSTSEC-2026-0204 (crossbeam-epoch 0.9.18, transitive:
    # criterion/rayon dev-only + metrics-util prod via metrics-exporter-prometheus).
    # UNREACHABLE here: the invalid pointer deref exists only in the fmt::Pointer
    # impl for Atomic/Shared when formatting an invalid pointer — neither rayon
    # nor metrics-util Pointer-formats these types, so the vulnerable path is
    # never exercised. Fixed upstream in >= 0.9.20; the lock-only bump needs
    # operator approval (`cargo update` banned) — tracked for the next
    # operator-approved dependency pass. Full reason mirrored in deny.toml.
    "RUSTSEC-2026-0204",
]

