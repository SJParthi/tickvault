# =============================================================================
# tickvault — Prometheus Configuration
# =============================================================================
# Scrapes all tv-* services. Recording & alert rules in ./rules/
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Route alerts to Alertmanager (→ Telegram).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["tv-alertmanager:9093"]

# Load recording rules and alert rules
rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Application metrics (exposed by tickvault via metrics-exporter-prometheus)
  # App runs on the host (IntelliJ / cargo run), not inside Docker.
  # host.docker.internal resolves to the Docker host on both macOS and Linux
  # (Linux requires extra_hosts in docker-compose.yml).
  # NOTE: This target shows DOWN when the Rust app is not running — that is EXPECTED.
  # The app's Prometheus metrics exporter binds to 0.0.0.0:9091 at boot (config/base.toml).
  - job_name: "tickvault"
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          service: "tickvault"

  # Prometheus self-monitoring
  - job_name: "tv-prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # QuestDB metrics
  - job_name: "tv-questdb"
    static_configs:
      - targets: ["tv-questdb:9003"]
        labels:
          service: "questdb"
    metrics_path: "/metrics"

  # Wave 7-A removed (per .claude/rules/project/aws-budget.md):
  #   tv-traefik         -> AWS ALB free tier replaces HTTPS termination
  #   tv-valkey          -> valkey-exporter sidecar removed (not queried)
  #   Loki / Alloy       -> CloudWatch Logs replaces log aggregation
  #   Jaeger             -> CloudWatch Logs replaces distributed tracing

  # Grafana metrics
  - job_name: "tv-grafana"
    static_configs:
      - targets: ["tv-grafana:3000"]
        labels:
          service: "grafana"
    metrics_path: "/metrics"
