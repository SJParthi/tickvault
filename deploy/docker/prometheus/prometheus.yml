# =============================================================================
# dhan-live-trader — Prometheus Configuration
# =============================================================================
# Scrapes all dlt-* services. Recording & alert rules in ./rules/
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Route alerts to Alertmanager (→ Telegram).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["dlt-alertmanager:9093"]

# Load recording rules and alert rules
rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Application metrics (exposed by dhan-live-trader via metrics-exporter-prometheus)
  # App runs on the host (IntelliJ / cargo run), not inside Docker.
  # host.docker.internal resolves to the Docker host on both macOS and Linux
  # (Linux requires extra_hosts in docker-compose.yml).
  # NOTE: This target shows DOWN when the Rust app is not running — that is EXPECTED.
  # The app's Prometheus metrics exporter binds to 0.0.0.0:9091 at boot (config/base.toml).
  - job_name: "dlt-application"
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          service: "dhan-live-trader"

  # Prometheus self-monitoring
  - job_name: "dlt-prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # QuestDB metrics
  - job_name: "dlt-questdb"
    static_configs:
      - targets: ["dlt-questdb:9003"]
        labels:
          service: "questdb"
    metrics_path: "/metrics"

  # Traefik metrics (via dedicated metrics entrypoint)
  - job_name: "dlt-traefik"
    static_configs:
      - targets: ["dlt-traefik:8082"]
        labels:
          service: "traefik"

  # Loki REMOVED — saves RAM (per AWS budget). CloudWatch Logs replaces.
  # Alloy REMOVED — log collector not needed without Loki.
  # Jaeger REMOVED — distributed tracing disabled. CloudWatch Logs replaces.

  # Grafana metrics
  - job_name: "dlt-grafana"
    static_configs:
      - targets: ["dlt-grafana:3000"]
        labels:
          service: "grafana"
    metrics_path: "/metrics"

  # Valkey metrics (via redis_exporter sidecar on :9121)
  - job_name: "dlt-valkey"
    static_configs:
      - targets: ["dlt-valkey-exporter:9121"]
        labels:
          service: "valkey"
    metrics_path: "/metrics"
