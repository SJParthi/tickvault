# =============================================================================
# dhan-live-trader — Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Application metrics (exposed by dhan-live-trader via metrics-exporter-prometheus)
  - job_name: "dlt-application"
    static_configs:
      - targets: ["dlt-app:9091"]
        labels:
          service: "dhan-live-trader"

  # Prometheus self-monitoring
  - job_name: "dlt-prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # QuestDB metrics
  - job_name: "dlt-questdb"
    static_configs:
      - targets: ["dlt-questdb:9003"]
        labels:
          service: "questdb"
    metrics_path: "/metrics"
