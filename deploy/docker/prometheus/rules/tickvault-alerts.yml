# =============================================================================
# tickvault — Prometheus Alerting & Recording Rules
# =============================================================================
# Recording rules pre-compute expensive queries. Alert rules fire to
# Prometheus Alertmanager (if configured) or are scraped by Grafana.
# =============================================================================

groups:
  # -- Recording Rules (pre-aggregations for dashboard performance) -----------
  - name: tv-recording-rules
    interval: 15s
    rules:
      - record: dlt:tick_rate:1m
        expr: rate(tv_ticks_processed_total[1m])

      - record: dlt:tick_latency_p50:1m
        expr: histogram_quantile(0.50, rate(tv_tick_processing_duration_ns_bucket[1m]))

      - record: dlt:tick_latency_p95:1m
        expr: histogram_quantile(0.95, rate(tv_tick_processing_duration_ns_bucket[1m]))

      - record: dlt:tick_latency_p99:1m
        expr: histogram_quantile(0.99, rate(tv_tick_processing_duration_ns_bucket[1m]))

      - record: dlt:traefik_request_rate:5m
        expr: sum(rate(traefik_entrypoint_requests_total[5m])) by (entrypoint)

      - record: dlt:traefik_error_rate:5m
        expr: sum(rate(traefik_entrypoint_requests_total{code=~"5.."}[5m])) by (entrypoint)

  # -- Zero-touch dashboard recording rules ----------------------------------
  # Pre-aggregate the expensive queries that the 5 Grafana dashboards use.
  # Each dashboard refresh gets O(1) reads instead of recomputing rates over
  # a multi-minute window. Saves ~30-50ms per panel at p99.
  - name: tv-dashboard-recording-rules
    interval: 30s
    rules:
      # Operator-health tick throughput panel
      - record: tv:ticks_per_minute:1m
        expr: rate(tv_ticks_processed_total[1m]) * 60

      # Trading-flow order-latency panel (nanosecond histogram → ms)
      - record: tv:order_latency_p99_ms:5m
        expr: histogram_quantile(0.99, rate(tv_order_placement_duration_ns_bucket[5m])) / 1e6

      - record: tv:order_latency_p95_ms:5m
        expr: histogram_quantile(0.95, rate(tv_order_placement_duration_ns_bucket[5m])) / 1e6

      # Auth-health token-remaining panel (seconds → hours)
      - record: tv:token_hours_remaining
        expr: tv_token_remaining_seconds / 3600

      # Depth-flow aggregate health — 1 if every expected pool is up
      - record: tv:depth_20_pool_healthy
        expr: (tv_depth_20_connections_active == bool 4)

      - record: tv:depth_200_pool_healthy
        expr: (tv_depth_200_connections_active == bool 4)

      # Data-lifecycle aggregates
      - record: tv:candles_per_minute:1m
        expr: rate(tv_candles_emitted_total[1m]) * 60

      - record: tv:dedup_per_minute:5m
        expr: rate(tv_dedup_filter_total[5m]) * 60

      # Valkey error rate (auth-health + data-lifecycle dashboards)
      - record: tv:valkey_errors_per_minute:1m
        expr: rate(tv_valkey_errors_total[1m]) * 60

      # QuestDB free disk in GB (data-lifecycle panel)
      - record: tv:questdb_disk_free_gb
        expr: tv_questdb_disk_free_bytes / 1073741824

  # -- Alert Rules -------------------------------------------------------------
  - name: tv-infrastructure-alerts
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} target is DOWN"
          description: "{{ $labels.instance }} (job={{ $labels.job }}) has been unreachable for 2+ minutes."

      - alert: PrometheusHighMemory
        expr: process_resident_memory_bytes{job="tv-prometheus"} > 1073741824
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus RSS > 1GB"
          description: "Prometheus is using {{ $value | humanize1024 }}B of memory."

      - alert: PrometheusTSDBCompactionsFailing
        expr: increase(prometheus_tsdb_compactions_failed_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus TSDB compaction failures"
          description: "Prometheus has had {{ $value }} compaction failures in the last hour."

      - alert: LokiHighIngestionRate
        expr: rate(loki_distributor_bytes_received_total[5m]) > 10485760
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki ingestion rate > 10MB/s"
          description: "Loki is ingesting {{ $value | humanize1024 }}B/s, which may cause ingestion limits to be hit."

      - alert: ServiceFlapping
        expr: changes(up[15m]) > 2
        for: 0m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.job }} is flapping (restarting)"
          description: "{{ $labels.instance }} (job={{ $labels.job }}) has restarted {{ $value }} times in the last 15 minutes. Container may be crash-looping."

  - name: tickvault-alerts
    rules:
      - alert: ApplicationDown
        expr: up{job="tickvault"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "tickvault is DOWN"
          description: "The trading application has been unreachable for 1+ minute."

      - alert: WebSocketDisconnected
        expr: tv_websocket_connections_active == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "All WebSocket connections lost"
          description: "No active feed connections. Market data is stale."

      - alert: HighTickLatency
        expr: dlt:tick_latency_p99:1m > 1000000
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Tick processing p99 latency > 1ms"
          description: "p99 tick processing latency is {{ $value }}ns, exceeding 1ms budget."

      - alert: PipelineStopped
        expr: tv_pipeline_active == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Tick pipeline is STOPPED"
          description: "The tick processing pipeline has been inactive for 1+ minute."

      - alert: HighParseErrorRate
        expr: rate(tv_parse_errors_total[5m]) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Parse error rate > 1/sec"
          description: "Binary frame parse errors averaging {{ $value }}/sec over 5 minutes."

      - alert: HighStorageErrorRate
        expr: rate(tv_storage_errors_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "QuestDB storage errors detected"
          description: "Tick persistence is failing at {{ $value }}/sec. Check QuestDB connectivity."

      - alert: TickBufferActive
        expr: tv_tick_buffer_size > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Tick ring buffer is holding data (QuestDB may be down)"
          description: "{{ $value }} ticks buffered in memory. QuestDB connection likely broken."

      - alert: TickDiskSpillActive
        expr: tv_ticks_spilled_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Ticks spilling to disk — ring buffer full"
          description: "{{ $value }} ticks spilled to disk. QuestDB has been down for 5+ minutes."

      - alert: CandleBufferActive
        expr: tv_candle_buffer_size > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Candle ring buffer is holding data (QuestDB may be down)"
          description: "{{ $value }} candles buffered in memory."

      - alert: CandleDiskSpillActive
        expr: tv_candles_spilled_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Candles spilling to disk — ring buffer full"
          description: "{{ $value }} candles spilled to disk. QuestDB down for 27+ minutes."

      - alert: DepthBufferActive
        expr: tv_depth_buffer_size > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Depth ring buffer is holding data (QuestDB may be down)"
          description: "{{ $value }} depth snapshots buffered in memory."

      - alert: DepthDiskSpillActive
        expr: tv_depth_spilled_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Depth data spilling to disk — ring buffer full"
          description: "{{ $value }} depth snapshots spilled to disk."

      - alert: NoTicksReceived
        expr: dlt:tick_rate:1m == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No ticks received for 5 minutes"
          description: "Tick processing rate has been zero for 5 minutes during market hours."

      - alert: HighHistoricalFetchErrors
        expr: increase(tv_historical_api_errors_total[10m]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Historical candle fetch errors detected"
          description: "{{ $value }} historical API errors in the last 10 minutes. Some instruments may have missing candle data."

      - alert: HighWebSocketReconnectRate
        expr: rate(tv_websocket_reconnections_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frequent WebSocket reconnections"
          description: "WebSocket reconnecting at {{ $value }}/sec. Network instability or Dhan server issues."

      - alert: HighTraefik4xxRate
        expr: sum(rate(traefik_entrypoint_requests_total{code=~"4.."}[5m])) / (sum(rate(traefik_entrypoint_requests_total[5m])) + 1e-10) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik 4xx error rate above 10%"
          description: "More than 10% of requests are returning 4xx client errors."

      - alert: HighJunkTickRate
        expr: rate(tv_junk_ticks_filtered_total[5m]) > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High junk tick rate detected"
          description: "{{ $value }}/sec junk ticks filtered. Possible feed corruption or instrument mismatch."

      - alert: HighCrossedMarketRate
        expr: rate(tv_crossed_market_total[5m]) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Crossed market ticks detected"
          description: "{{ $value }}/sec crossed-market conditions. Market data integrity may be degraded."

      - alert: HighDedupFilterRate
        expr: rate(tv_dedup_filtered_total[5m]) / (rate(tv_ticks_processed_total[5m]) + 1e-10) > 0.50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Over 50% ticks are duplicates"
          description: "Dedup filter rate is {{ $value | humanizePercentage }}. Possible duplicate subscriptions or feed issue."

      # C2: Spill file growth — QuestDB likely down, ticks spilling to disk
      - alert: TickSpillFilesGrowing
        expr: tv_spill_files_total_bytes > 100000000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Tick spill files > 100 MB"
          description: "Tick spill files total {{ $value | humanize1024 }}B. QuestDB may be down — data safe on disk but investigate."

      # C3: QuestDB liveness — SELECT 1 failed
      - alert: QuestDbDown
        expr: tv_questdb_alive == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "QuestDB is not responding"
          description: "QuestDB liveness check (SELECT 1) failed for 2+ minutes. Ticks are buffering in memory/disk."

      # C4: CPU spike — sustained high CPU usage
      - alert: HighCpuUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage > 90% sustained for 5 minutes"
          description: "Process CPU usage is {{ $value | humanizePercentage }}. Possible infinite loop or resource exhaustion."

      # C2: Tick drops — catastrophic (disk spill also failed)
      - alert: TicksDropped
        expr: tv_ticks_dropped_total > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "TICKS PERMANENTLY LOST"
          description: "{{ $value }} ticks dropped — both ring buffer and disk spill failed. IMMEDIATE investigation required."

      # C3: Broadcast lag — cold-path persistence fell behind tick producer
      # tokio broadcast channel dropped oldest ticks (capacity 65536).
      # These ticks are PERMANENTLY LOST — they never reached ring buffer or disk.
      - alert: BroadcastLagTickLoss
        expr: tv_ticks_permanently_lost > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "TICKS PERMANENTLY LOST — broadcast channel lag"
          description: "{{ $value }} ticks lost due to cold-path persistence lagging behind tick producer. Broadcast channel (capacity 65536) dropped oldest ticks. Check tick persistence consumer performance."

      # Circuit breaker opened — Dhan API failures exceeded threshold
      - alert: CircuitBreakerOpen
        expr: tv_circuit_breaker_state == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "OMS circuit breaker OPEN — order API calls halted"
          description: "Dhan API consecutive failures exceeded threshold. All order submissions blocked until recovery."

      # Phase 2 (OMS) — metrics not yet emitted, alert will be inert until then
      - alert: HighOrderRejectionRate
        expr: rate(tv_orders_rejected_total[5m]) / (rate(tv_orders_placed_total[5m]) + 1e-10) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Order rejection rate > 10%"
          description: "More than 10% of placed orders are being rejected."

      # Token expiry — refresh at 23h, warn at 1h remaining
      - alert: TokenExpiryWarning
        expr: tv_token_remaining_seconds < 3600
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "JWT token expires in < 1 hour"
          description: "Token has {{ $value }}s remaining. Auto-refresh should trigger at 23h mark."

      - alert: TokenExpiryCritical
        expr: tv_token_remaining_seconds < 600
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "JWT token expires in < 10 minutes"
          description: "Token has {{ $value }}s remaining. Immediate renewal needed or trading will halt."

      # Zero ticks for 30 seconds during market hours (more aggressive than NoTicksReceived)
      - alert: ZeroTicksBurst
        expr: increase(tv_ticks_processed_total[30s]) == 0 and tv_pipeline_active == 1
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "No ticks received for 30 seconds while pipeline is active"
          description: "Tick flow stopped while pipeline is running. Check WebSocket connections and Dhan feed status."

      # Memory usage — process RSS
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="tickvault"} > 2147483648
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Application memory > 2GB"
          description: "Process RSS is {{ $value | humanize1024 }}B. Possible memory leak."

      # Valkey (cache) down
      - alert: ValkeyDown
        expr: up{job="tv-valkey"} == 0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Valkey cache is DOWN"
          description: "Valkey is unreachable. App continues without cache (degraded performance)."

      # Alloy (log collector) down — explains empty Logs dashboard
      - alert: AlloyDown
        expr: up{job="tv-alloy"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Alloy log collector is DOWN"
          description: "Alloy is not scraping logs. Grafana Logs dashboard will be empty."

      # 20-level depth connection down (per underlying)
      - alert: Depth20Disconnected
        expr: tv_depth_20lvl_connection_active == 0 and on() tv_pipeline_active == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "20-level depth connection DOWN: {{ $labels.underlying }}"
          description: "20-level depth WebSocket for {{ $labels.underlying }} disconnected for 2+ minutes while pipeline is active."

      # 200-level depth connection down (per underlying)
      - alert: Depth200Disconnected
        expr: tv_depth_200lvl_connection_active == 0 and on() tv_pipeline_active == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "200-level depth connection DOWN: {{ $labels.underlying }}"
          description: "200-level depth WebSocket for {{ $labels.underlying }} disconnected for 2+ minutes while pipeline is active."

      # Zero depth frames for 60 seconds
      - alert: NoDepthFrames
        expr: increase(tv_depth_20lvl_frames_total[60s]) == 0 and tv_depth_20lvl_connection_active == 1
        for: 60s
        labels:
          severity: warning
        annotations:
          summary: "No 20-level depth frames received for 60 seconds"
          description: "Depth connection is active but no frames arriving. Possible subscription issue."

      # Deep depth data loss — rows dropped on flush failure
      - alert: DeepDepthDataLoss
        expr: tv_deep_depth_dropped_total > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "DEEP DEPTH DATA PERMANENTLY LOST"
          description: "{{ $value }} deep depth rows dropped. DeepDepthWriter flush failed."

      # Depth frames dropped due to send timeout
      - alert: DepthFramesDropped
        expr: rate(tv_depth_frames_dropped_total[5m]) > 0
        for: 60s
        labels:
          severity: warning
        annotations:
          summary: "Depth frames being dropped (send timeout)"
          description: "{{ $value }} depth frames/sec dropped. Tick processor may be overloaded."

      # Depth rebalancer not running while pipeline is active
      - alert: DepthRebalancerDown
        expr: tv_depth_rebalancer_active == 0 and tv_pipeline_active == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Depth rebalancer is not running"
          description: "Depth subscriptions are static. ATM strike changes will not trigger rebalance."

      # Trading pipeline loop stalled (no heartbeat for 30+ seconds)
      - alert: TradingPipelineStalled
        expr: time() - tv_trading_pipeline_heartbeat > 30 and tv_pipeline_active == 1
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Trading pipeline loop stalled"
          description: "No heartbeat from trading pipeline for 30+ seconds. Possible deadlock."

      # Trading pipeline lagging behind tick producer
      - alert: TradingPipelineLagging
        expr: rate(tv_trading_pipeline_ticks_lagged_total[5m]) > 0
        for: 60s
        labels:
          severity: warning
        annotations:
          summary: "Trading pipeline lagging behind tick stream"
          description: "{{ $value }} ticks/sec lost to broadcast lag. Signals may be missed."

      # Daily P&L approaching max loss limit (2% of capital)
      - alert: DailyPnlWarning
        expr: (tv_realized_pnl + tv_unrealized_pnl) < -15000
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Daily P&L exceeds -15K warning threshold"
          description: "Combined P&L is {{ $value }}. Max daily loss limit is 2% of capital."

      - alert: DailyPnlCritical
        expr: (tv_realized_pnl + tv_unrealized_pnl) < -18000
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Daily P&L approaching max loss — HALT IMMINENT"
          description: "Combined P&L is {{ $value }}. Auto-halt triggers at -20K (2% of 10L capital)."

      # Order placement latency SLA breach
      - alert: HighOrderLatency
        expr: histogram_quantile(0.99, rate(tv_order_placement_duration_ns_bucket[5m])) > 100000000
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Order placement p99 latency > 100ms"
          description: "Order API call p99 is {{ $value }}ns. SLA target is 100ms."

      # Valkey cache error rate
      - alert: HighValkeyErrorRate
        expr: rate(tv_valkey_errors_total[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Valkey cache errors > 1/sec"
          description: "Cache error rate is {{ $value }}/sec. Check Valkey connectivity."

      # WebSocket backpressure — frames queuing
      - alert: WebSocketBackpressure
        expr: rate(tv_ws_backpressure_timeout_total[5m]) > 0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "WebSocket frame send timeouts detected"
          description: "{{ $value }} send timeouts/sec. Tick processor may be overloaded."

      # L2: Tick persistence stalled — ticks being processed but nothing persisted
      - alert: TickPersistenceStalled
        expr: rate(tv_ticks_persisted_total[5m]) == 0 and rate(tv_ticks_processed_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Tick persistence stalled — processing but not writing to QuestDB"
          description: "Ticks are being processed but zero ticks persisted for 5 minutes. Check QuestDB connection."

      # L2: 200-level depth stuck in reset loop (Dhan Ticket #5519522)
      - alert: Depth200ResetLoop
        expr: tv_depth_200lvl_consecutive_resets > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "200-level depth stuck in reset loop: {{ $labels.label }}"
          description: "{{ $labels.label }} has {{ $value }} consecutive TCP resets. Dhan server rejecting all connection attempts."

      # L2: Tick data loss — received vs persisted reconciliation gap
      - alert: TickDataLoss
        expr: (tv_ticks_processed_total - tv_ticks_persisted_total - tv_storage_errors_total) > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Tick reconciliation gap detected"
          description: "{{ $value }} ticks processed but not persisted. Possible silent data loss in pipeline."

      # L2: Canary tick stale during market hours
      - alert: CanaryTickStale
        expr: (time() - tv_ws_canary_last_tick_epoch_secs) > 15 and tv_pipeline_active == 1
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "Canary tick stale: {{ $labels.underlying }}"
          description: "{{ $labels.underlying }} has not received a tick for {{ $value }}s while pipeline is active. End-to-end feed may be broken."

      # L5: API request latency SLA
      - alert: HighApiLatency
        expr: histogram_quantile(0.99, rate(tv_api_request_duration_ms_bucket[5m])) > 500
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latency > 500ms"
          description: "API request p99 latency is {{ $value }}ms. Check QuestDB or downstream services."

      # SEBI rate limiter denying orders
      - alert: RateLimiterDenying
        expr: rate(tv_rate_limiter_denied_total[5m]) > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "SEBI rate limiter blocking orders"
          description: "{{ $value }} orders/sec denied by rate limiter. Regulatory compliance at risk."

      # =========================================================================
      # Phase 8-expansion alerts — defense-in-depth when Loki profile is OFF
      # =========================================================================

      # Token renewal repeatedly failing — DH-901 loop
      - alert: TokenRenewalFailureBurst
        expr: increase(tv_token_renewal_failures_total[1h]) >= 3
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Token renewal failed 3+ times in 1h"
          description: "{{ $value }} token renewal failures in the last hour. DH-901 path hit — token rotation loop. Runbook: .claude/rules/dhan/authentication.md"

      # Auth circuit breaker opened — trading halt imminent or active
      - alert: AuthCircuitBreakerOpen
        expr: tv_auth_circuit_breaker_state == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Auth circuit breaker OPEN"
          description: "The auth circuit breaker flipped to OPEN — trading is halted until manual recovery. Runbook: .claude/rules/dhan/authentication.md"

      # Public IP drift detected — static IP policy violation risk
      - alert: IpMismatchDetected
        expr: tv_ip_mismatch_total > 0
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Static IP mismatch ({{ $value }} events)"
          description: "Host public IP differs from the registered Dhan static IP. Orders will be rejected from unregistered IPs after 2026-04-01 enforcement date. Runbook: .claude/rules/dhan/authentication.md (see rule 7)"

      # Cross-segment security_id collision count drift
      - alert: InstrumentRegistryCollisionDrift
        expr: tv_instrument_registry_cross_segment_collisions > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cross-segment security_id collisions > 5"
          description: "Dhan reuses security_id across segments. Two collisions (NIFTY id=13 vs ABB, BANKNIFTY id=25 vs ADANIENT) are expected. {{ $value }} indicates new collisions — investigate whether a new underlying was added. Runbook: .claude/rules/project/security-id-uniqueness.md"
