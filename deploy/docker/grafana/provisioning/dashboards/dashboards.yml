# =============================================================================
# tickvault — Grafana Dashboard Provisioning
# =============================================================================
# Auto-loads JSON dashboards from /var/lib/grafana/dashboards.
# Reloads every 10 seconds. File is ALWAYS source of truth.
# =============================================================================

apiVersion: 1

providers:
  - name: "tv-dashboards"
    orgId: 1
    folder: "tickvault"
    type: file
    disableDeletion: false
    editable: false
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
