# =============================================================================
# dhan-live-trader — Grafana Datasource Provisioning
# =============================================================================
# Auto-configures Prometheus, Loki, and Jaeger on first boot.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://dlt-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://dlt-loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: "\"trace_id\":\"(\\w+)\""
          name: TraceID
          url: "$${__value.raw}"

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://dlt-jaeger:16686
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true

  # QuestDB via PostgreSQL wire protocol (port 8812).
  # Credentials injected from docker-compose environment (sourced from AWS SSM).
  # Use this for tick data, instrument metadata, and order audit queries.
  # NOTE: QuestDB's PG wire protocol has limited pg_catalog support.
  # Grafana's PostgreSQL datasource works for SELECT queries and time-series panels.
  - name: QuestDB
    uid: questdb
    type: postgres
    access: proxy
    url: dlt-questdb:8812
    database: qdb
    user: $DLT_QUESTDB_PG_USER
    secureJsonData:
      password: $DLT_QUESTDB_PG_PASSWORD
    editable: false
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1200
      timescaledb: false
