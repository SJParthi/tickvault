# =============================================================================
# tickvault — Grafana Datasource Provisioning
# =============================================================================
# Auto-configures Prometheus and QuestDB on first boot.
# Loki + Jaeger REMOVED — saves 2.5GB RAM (per AWS budget).
# CloudWatch Logs replaces distributed tracing/log aggregation.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://tv-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # QuestDB via PostgreSQL wire protocol (port 8812).
  # Credentials injected from docker-compose environment (sourced from AWS SSM).
  # Use this for tick data, instrument metadata, and order audit queries.
  # NOTE: QuestDB's PG wire protocol has limited pg_catalog support.
  # Grafana's PostgreSQL datasource works for SELECT queries and time-series panels.
  - name: QuestDB
    uid: questdb
    type: postgres
    access: proxy
    url: tv-questdb:8812
    database: qdb
    user: $TV_QUESTDB_PG_USER
    secureJsonData:
      password: $TV_QUESTDB_PG_PASSWORD
    editable: false
    jsonData:
      database: qdb
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1200
      timescaledb: false
