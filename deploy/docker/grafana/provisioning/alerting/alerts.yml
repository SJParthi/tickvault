          description: "tv_tick_gap_summary_total rate > 100/min sustained for 1 min. Either the coalesce task is mis-spawning (multiple instances?) or the entire universe is silent (Dhan outage). Investigate via tail data/logs/errors.jsonl.* | jq 'select(.code == \"WS-GAP-06\")'."
