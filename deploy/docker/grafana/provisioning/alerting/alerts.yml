      # PR-D 2026-05-02: depth-dynamic set size below expected → WARN
      # Fires when the new all-5-dynamic depth pipeline (PR-C1
      # depth_dynamic_pipeline_v2) produces a `next_set` smaller than
      # the configured pool capacity for sustained 5+ min. Indicates
      # the upstream `movers_1m` cohort is starved of NSE_FNO rows
      # (most-likely upstream MOVERS-02 writer failure). Operator
      # follows MOVERS-02 runbook + checks
      # `tv_movers_writer_dropped_total{stage="append"}`.
      # 2026-05-02 — depth-dynamic pipeline_v2 liveness alert.
      # Fires if the heartbeat counter doesn't increment for 5+ min
      # during market hours, i.e. the orchestrator is dead. Distinct
      # from `tv-depth-dynamic-set-size-low` which fires on stale
      # cohort data — this one fires on dead orchestrator.
      #
      # 2026-05-02 (hostile-bug-hunt HIGH fix): the heartbeat counter
      # only increments during market hours (09:00-15:30 IST), so
      # off-hours the metric is naturally flat. Without a market-hours
      # gate the alert would fire every night/weekend. We solve this
      # via PromQL `hour()` — a Prometheus built-in returning UTC hour.
      # Market hours 09:00-15:30 IST = 03:30-10:00 UTC. Restrict the
      # alert to UTC hour ∈ {3, 4, 5, 6, 7, 8, 9} which covers the
      # full IST trading day plus a 30-min cushion either side. Outside
      # this window the `unless` clause silences the alert entirely.
      # Switched `noDataState` from Alerting → OK so a Prometheus
      # restart (no data for the lookback window) doesn't false-positive.
      - uid: tv-depth-dynamic-pipeline-stalled
        title: "PR-D: Depth-dynamic pipeline stalled (no heartbeat)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: |-
                sum by (feed) (increase(tv_depth_dynamic_heartbeat_total[5m]))
                  unless on() (hour() < 3 or hour() > 9)
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Depth-dynamic pipeline orchestrator stalled"
          description: "tv_depth_dynamic_heartbeat_total has not incremented for 5+ min during market hours — the depth_dynamic_pipeline_v2 orchestrator is dead. Check tokio panic backtraces in data/logs/errors.jsonl.* and the JoinHandle panic watchdog (DEPTH-DYN-V2 logs). Operator MUST restart the app."
        labels:
          severity: critical

      - uid: tv-depth-dynamic-set-size-low
        title: "PR-D: Depth-dynamic set size below capacity"
