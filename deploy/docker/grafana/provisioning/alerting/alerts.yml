        for: 5m
        annotations:
          summary: "Depth-dynamic set size below capacity for 5+ min"
          description: "tv_depth_dynamic_set_size < 5 (lower than depth-200 pool capacity) for 5+ min during market hours. Likely upstream movers_1m writer failure (follow MOVERS-02 runbook). Check tv_movers_writer_dropped_total{stage='append'} and movers_unified_pipeline logs."
