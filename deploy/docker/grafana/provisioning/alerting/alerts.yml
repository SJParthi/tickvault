# =============================================================================
# tickvault — Grafana Alerting Provisioning
# =============================================================================
# Auto-configures alert rules and notification policies.
# Defines the `grafana-default-email` contact point explicitly because
# Grafana 13+ requires every receiver referenced in `policies` to be
# defined here (v12 accepted the implicit built-in default; v13 errors out
# with "receiver 'grafana-default-email' does not exist" and refuses to
# start the provisioning module → container crash-restart loop).
#
# Telegram contact point: configured via Grafana API by setup-observability.sh
# ONLY when credentials exist in AWS SSM. This prevents Grafana from crash-looping
# when Telegram credentials are missing or empty (e.g., after Docker Desktop restart).
# =============================================================================

apiVersion: 1

# -- Contact Points -----------------------------------------------------------
# Provides the `grafana-default-email` receiver referenced by `policies`
# below. The address is a deliberately invalid placeholder — alerts are
# routed to Telegram via setup-observability.sh, not email. SMTP is not
# configured, so this receiver never actually sends mail. Its sole purpose
# is to satisfy Grafana 13's strict provisioning validation.
contactPoints:
  - orgId: 1
    name: grafana-default-email
    receivers:
      - uid: grafana-default-email-receiver
        type: email
        settings:
          addresses: alerts@tickvault.local
          singleEmail: false
        disableResolveMessage: false

# -- Notification Policies ----------------------------------------------------
# Uses Grafana's built-in default receiver. setup-observability.sh upgrades
# this to the Telegram contact point when credentials are available.
policies:
  - orgId: 1
    receiver: grafana-default-email
    group_by: ["grafana_folder", "alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

# -- Alert Rules ---------------------------------------------------------------
groups:
  - orgId: 1
    name: tv-infrastructure
    folder: tickvault
    interval: 1m
    rules:
      - uid: tv-target-down
        title: "Service Target Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "up == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "{{ $labels.job }} target is DOWN"
          description: "The Prometheus target {{ $labels.instance }} (job={{ $labels.job }}) has been down for more than 2 minutes."
        labels:
          severity: critical

      - uid: tv-high-error-rate
        title: "High Traefik Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "sum(rate(traefik_entrypoint_requests_total{code=~\"5..\"}[5m])) / sum(rate(traefik_entrypoint_requests_total[5m])) > 0.05"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Traefik 5xx error rate above 5%"
          description: "More than 5% of Traefik requests are returning 5xx errors over the last 5 minutes."
        labels:
          severity: warning

  - orgId: 1
    name: tickvault
    folder: tickvault
    interval: 1m
    rules:
      - uid: tickvault-down
        title: "Application Down"
        # Boot sequence is ~37s (CryptoProvider → Config → SSM → JWT → DDL →
        # universe build → WebSocket pool). Scrape interval is 15s. Old
        # `for: 1m` + `noDataState: Alerting` fired during every cold start
        # before the first successful scrape landed. 5 minutes is the smallest
        # window that covers a clean boot + 1-2 missed scrapes without paging
        # the operator on every restart.
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "up{job=\"tickvault\"} == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "tickvault application is DOWN"
          description: "The main trading application has been unreachable for more than 5 minutes. Immediate action required."
        labels:
          severity: critical

      - uid: tv-pipeline-stopped
        title: "Pipeline Stopped"
        # Pipeline-active==0 by itself is NOT a fault: on weekends, holidays,
        # and outside 09:15-15:30 IST the WebSocket pool is intentionally not
        # started ("WebSocket pool skipped — non-trading day" / off-hours boot
        # path), so tv_pipeline_active stays 0 by design. The alert should
        # only fire when WS connections ARE up (so we expect ticks to flow)
        # but the pipeline isn't moving them. Mirrors the gating used by
        # tv-no-ticks / tv-depth-* in tickvault-alerts.yml
        # (`... and tv_pipeline_active == 1`).
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "tv_pipeline_active == 0 and tv_websocket_connections_active > 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Tick processing pipeline is STOPPED"
          description: "WebSocket connections are active but the tick pipeline is inactive for 2+ minutes. Investigate the pipeline task."
        labels:
          severity: critical

      - uid: tv-no-ticks
        title: "No Ticks Received"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(tv_ticks_processed_total[5m]) == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "No ticks received for 5 minutes"
          description: "Tick processing rate has been zero for 5+ minutes. Market data feed may be dead."
        labels:
          severity: critical

      - uid: tv-high-parse-errors
        title: "High Parse Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(tv_parse_errors_total[5m]) > 1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "Parse error rate above 1/sec"
          description: "Binary frame parse errors are sustained above 1/sec. Feed data may be corrupted."
        labels:
          severity: warning

      - uid: tv-high-storage-errors
        title: "High Storage Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(tv_storage_errors_total[5m]) > 0.1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "QuestDB storage errors detected"
          description: "Tick persistence is failing. Check QuestDB connectivity and disk space."
        labels:
          severity: warning

      - uid: tv-high-reconnect-rate
        title: "Frequent WebSocket Reconnections"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(tv_websocket_reconnections_total[5m]) > 0.1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "WebSocket reconnecting frequently"
          description: "WebSocket connections are reconnecting at a high rate. Network or Dhan server instability."
        labels:
          severity: warning

      - uid: tv-websocket-disconnect
        title: "WebSocket Disconnected"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "tv_websocket_connections_active == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "All WebSocket connections lost"
          description: "No active WebSocket connections to Dhan feed for 2+ minutes. Market data is stale."
        labels:
          severity: critical

  # -- Loki-based log alerts (GAP-1 fix: ERROR logs → Telegram) ---------------
  - orgId: 1
    name: tv-log-alerts
    folder: tickvault
    interval: 1m
    rules:
      - uid: tv-error-logs
        title: "Application ERROR Logs Detected"
        # Three changes vs the previous version:
        #   1. Use Loki's parsed `level` label (`| json | level=~"ERROR|FATAL"`)
        #      instead of a raw substring match on the JSON line. The old
        #      `|~ "\"level\":\"(ERROR|FATAL)\""` regex was correct in spirit
        #      but fragile against any future field whose value contains the
        #      literal token `"level":"ERROR"` (e.g. a serialized error
        #      object). Parsing the JSON makes the match unambiguous.
        #   2. WARN-level retries (auth transient backoff, etc.) are NOT
        #      matched — only true ERROR/FATAL.
        #   3. `for: 3m` (was 1m, originally 0m). Rationale: the count window
        #      is `[2m]`, so ERROR lines from a PRIOR (now-exited) tickvault
        #      process age out of the count within 2 minutes. Requiring the
        #      condition to hold for 3 consecutive minutes makes it
        #      mechanically impossible for stale-from-prior-run logs to page
        #      after a fresh boot. Genuine sustained errors still alert —
        #      they just need to be present for 3 minutes (already implied
        #      by "sustained" semantics). Operator-observed false positive
        #      on 2026-04-26 20:28 IST: clean boot at 20:27:44, alert fired
        #      at 20:28 from a prior run's residual ERROR lines still in the
        #      2m Loki window. JSONL sink + summary_writer were both empty
        #      for the live process — confirming this was a stale-window
        #      artifact, not a real error.
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: loki
            model:
              expr: "count_over_time({job=\"tv-docker\", container=\"tickvault\"} | json | level=~\"ERROR|FATAL\" [2m])"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "ERROR/FATAL logs detected in tickvault"
          description: "Application produced ERROR or FATAL logs sustained for 3+ minutes (window: last 2 minutes). WARN-level transient retries are excluded. Stale logs from a prior process cannot trigger this alert — the count window is shorter than the for-duration. Check Grafana Logs dashboard for details."
        labels:
          severity: critical

  # ----------------------------------------------------------------------
  # E2: Zero-tick-loss alert group
  # ----------------------------------------------------------------------
  #
  # Alerts for the A2/A3/A4/A5 work. Each rule is linked to a specific
  # metric catalogued in crates/common/tests/metrics_catalog.rs. If you
  # delete a metric here, the catalog test will fail at push time and
  # remind you to update Grafana + code together.
  - orgId: 1
    name: tv-zero-tick-loss
    folder: tickvault
    interval: 1m
    rules:
      # Any write to the dead-letter queue is a CRITICAL data-integrity
      # incident — both the ring buffer and disk spill failed.
      - uid: tv-dlq-non-zero
        title: "A2: Dead-letter queue has ticks"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "increase(tv_dlq_ticks_total[5m])"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "CRITICAL: ticks lost to DLQ — zero-tick-loss guarantee breached"
          description: "tv_dlq_ticks_total incremented. Both ring buffer AND disk spill failed for at least one tick. Investigate storage subsystem immediately. See data/spill/dlq-*.ndjson for audit trail."
        labels:
          severity: critical

      # Session 8: backfill channel dropped a gap request. This means the
      # tick gap tracker detected an ERROR-level gap, published to the
      # gap_backfill channel, and the channel was full or closed. A
      # dropped request means the gap WILL NOT be backfilled — it's a real
      # data integrity concern. Investigate why the backfill worker is not
      # draining (Dhan REST rate-limited? Worker task panicked?).
      - uid: tv-backfill-gaps-dropped
        title: "Session 8: Backfill gap request dropped"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "increase(tv_backfill_gaps_dropped_total[5m])"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "Backfill channel dropped a gap request"
          description: "tv_backfill_gaps_dropped_total increased. The tick gap tracker detected an ERROR-level gap but the backfill channel was full or closed, so the gap will NOT be backfilled. Check tv_backfill_gaps_published_total to confirm the worker is draining. Investigate Dhan REST rate-limit status and backfill worker task health."
        labels:
          severity: critical

      # Session 8: sandbox gate blocked a live order. This should NEVER
      # happen during the sandbox window (before 2026-07-01 UTC). If it
      # does, a caller code path is trying to place live orders when it
      # should not — investigate which strategy / which call site.
      - uid: tv-sandbox-gate-blocked
        title: "Session 8: Sandbox gate blocked a live-order attempt"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "increase(tv_sandbox_gate_blocks_total[5m])"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "Sandbox gate blocked a live-order attempt"
          description: "tv_sandbox_gate_blocks_total increased. The sandbox enforcement guard in OMS engine.rs refused a live order request. Before 2026-07-01 UTC this is a bug in the calling strategy — orders should never reach the live path during the sandbox window. After 2026-07-01 UTC this alert becomes irrelevant and should be removed."
        labels:
          severity: warning

      # A4: Early-warning alert — any tick spilled to disk means ring buffer
      # overflowed. By itself this is not a data-loss event (the tick is still
      # on disk and will be replayed), but it signals a prolonged QuestDB
      # outage and must be investigated immediately. DLQ (the critical alert
      # above) fires only if disk ALSO fails — this is the canary before that.
      - uid: tv-tick-spillover-active
        title: "A4: Ring buffer spilled to disk — QuestDB outage active"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "increase(tv_ticks_spilled_total[5m])"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "Ring buffer overflow — ticks now writing to disk spill"
          description: "tv_ticks_spilled_total increased. QuestDB is down or the write path is blocked long enough to fill the in-memory ring buffer (600K ticks). Ticks are safe on disk and will replay on reconnect, but you have minutes, not hours, before disk fills. Check docker ps tv-questdb, docker logs tv-questdb, and consider restarting the QuestDB container."
        labels:
          severity: critical

      # Spill directory free space below 500 MB — warning.
      - uid: tv-spill-disk-low-warn
        title: "A2: Tick spill disk < 500 MB"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "tv_spill_disk_available_mb"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [500] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Tick spill directory has < 500MB free"
          description: "tv_spill_disk_available_mb below the warning threshold. A prolonged QuestDB outage may exhaust disk and cause DLQ writes."
        labels:
          severity: warning

      # Spill directory free space below 100 MB — critical.
      - uid: tv-spill-disk-low-critical
        title: "A2: Tick spill disk < 100 MB"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "tv_spill_disk_available_mb"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [100] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "CRITICAL: Tick spill directory has < 100MB free"
          description: "tv_spill_disk_available_mb below the CRITICAL threshold. Next outage will cause tick loss via DLQ. Free disk space IMMEDIATELY."
        labels:
          severity: critical

      # Pool watchdog declared the pool degraded for > 60 s.
      - uid: tv-pool-degraded
        title: "A4: WebSocket pool fully degraded"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "tv_pool_degraded_seconds"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [60] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "CRITICAL: ALL WebSocket connections down > 60s"
          description: "tv_pool_degraded_seconds > 60 — the pool watchdog (A4) has declared the entire WebSocket pool degraded. No market data flowing. Check Dhan server status, token validity, and network reachability. At 300s the process will self-halt for supervisor restart."
        labels:
          severity: critical

      # S4-T4: Order update WebSocket down > 60s — CRITICAL
      # Fill confirmations can be silently lost during this window.
      - uid: tv-order-update-ws-down
        title: "S4-T4: Order update WebSocket down > 60s"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "tv_order_update_ws_active"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
