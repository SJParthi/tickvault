# =============================================================================
# dhan-live-trader — Grafana Alerting Provisioning
# =============================================================================
# Auto-configures alert rules and notification policies.
# Uses Grafana's built-in default contact point so provisioning never fails.
#
# Telegram contact point: configured via Grafana API by setup-observability.sh
# ONLY when credentials exist in AWS SSM. This prevents Grafana from crash-looping
# when Telegram credentials are missing or empty (e.g., after Docker Desktop restart).
# =============================================================================

apiVersion: 1

# -- Notification Policies ----------------------------------------------------
# Uses Grafana's built-in default receiver. setup-observability.sh upgrades
# this to the Telegram contact point when credentials are available.
policies:
  - orgId: 1
    receiver: grafana-default-email
    group_by: ["grafana_folder", "alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

# -- Alert Rules ---------------------------------------------------------------
groups:
  - orgId: 1
    name: dlt-infrastructure
    folder: dhan-live-trader
    interval: 1m
    rules:
      - uid: dlt-target-down
        title: "Service Target Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "up == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "{{ $labels.job }} target is DOWN"
          description: "The Prometheus target {{ $labels.instance }} (job={{ $labels.job }}) has been down for more than 2 minutes."
        labels:
          severity: critical

      - uid: dlt-high-error-rate
        title: "High Traefik Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "sum(rate(traefik_entrypoint_requests_total{code=~\"5..\"}[5m])) / sum(rate(traefik_entrypoint_requests_total[5m])) > 0.05"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Traefik 5xx error rate above 5%"
          description: "More than 5% of Traefik requests are returning 5xx errors over the last 5 minutes."
        labels:
          severity: warning

  - orgId: 1
    name: dlt-application
    folder: dhan-live-trader
    interval: 1m
    rules:
      - uid: dlt-app-down
        title: "Application Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "up{job=\"dlt-application\"} == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "dhan-live-trader application is DOWN"
          description: "The main trading application has been unreachable for more than 1 minute. Immediate action required."
        labels:
          severity: critical

      - uid: dlt-pipeline-stopped
        title: "Pipeline Stopped"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "dlt_pipeline_active == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "Tick processing pipeline is STOPPED"
          description: "The pipeline has been inactive for 1+ minute. No ticks are being processed."
        labels:
          severity: critical

      - uid: dlt-no-ticks
        title: "No Ticks Received"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(dlt_ticks_processed_total[5m]) == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "No ticks received for 5 minutes"
          description: "Tick processing rate has been zero for 5+ minutes. Market data feed may be dead."
        labels:
          severity: critical

      - uid: dlt-high-parse-errors
        title: "High Parse Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(dlt_parse_errors_total[5m]) > 1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "Parse error rate above 1/sec"
          description: "Binary frame parse errors are sustained above 1/sec. Feed data may be corrupted."
        labels:
          severity: warning

      - uid: dlt-high-storage-errors
        title: "High Storage Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(dlt_storage_errors_total[5m]) > 0.1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "QuestDB storage errors detected"
          description: "Tick persistence is failing. Check QuestDB connectivity and disk space."
        labels:
          severity: warning

      - uid: dlt-high-reconnect-rate
        title: "Frequent WebSocket Reconnections"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(dlt_websocket_reconnections_total[5m]) > 0.1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "WebSocket reconnecting frequently"
          description: "WebSocket connections are reconnecting at a high rate. Network or Dhan server instability."
        labels:
          severity: warning

      - uid: dlt-websocket-disconnect
        title: "WebSocket Disconnected"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "dlt_websocket_connections_active == 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "All WebSocket connections lost"
          description: "No active WebSocket connections to Dhan feed for 2+ minutes. Market data is stale."
        labels:
          severity: critical

  # -- Loki-based log alerts (GAP-1 fix: ERROR logs → Telegram) ---------------
  - orgId: 1
    name: dlt-log-alerts
    folder: dhan-live-trader
    interval: 1m
    rules:
      - uid: dlt-error-logs
        title: "Application ERROR Logs Detected"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: loki
            model:
              expr: "count_over_time({job=\"dlt-docker\", container=\"dlt-app\"} |~ \"(?i)(ERROR|PANIC|FATAL)\" [2m])"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "ERROR/PANIC/FATAL logs detected in dlt-app"
          description: "Application produced ERROR-level logs in the last 2 minutes. Check Grafana Logs dashboard for details."
        labels:
          severity: critical

  # ----------------------------------------------------------------------
  # E2: Zero-tick-loss alert group
  # ----------------------------------------------------------------------
  #
  # Alerts for the A2/A3/A4/A5 work. Each rule is linked to a specific
  # metric catalogued in crates/common/tests/metrics_catalog.rs. If you
  # delete a metric here, the catalog test will fail at push time and
  # remind you to update Grafana + code together.
  - orgId: 1
    name: dlt-zero-tick-loss
    folder: dhan-live-trader
    interval: 1m
    rules:
      # Any write to the dead-letter queue is a CRITICAL data-integrity
      # incident — both the ring buffer and disk spill failed.
      - uid: dlt-dlq-non-zero
        title: "A2: Dead-letter queue has ticks"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "increase(dlt_dlq_ticks_total[5m])"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "CRITICAL: ticks lost to DLQ — zero-tick-loss guarantee breached"
          description: "dlt_dlq_ticks_total incremented. Both ring buffer AND disk spill failed for at least one tick. Investigate storage subsystem immediately. See data/spill/dlq-*.ndjson for audit trail."
        labels:
          severity: critical

      # Spill directory free space below 500 MB — warning.
      - uid: dlt-spill-disk-low-warn
        title: "A2: Tick spill disk < 500 MB"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "dlt_spill_disk_available_mb"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [500] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Tick spill directory has < 500MB free"
          description: "dlt_spill_disk_available_mb below the warning threshold. A prolonged QuestDB outage may exhaust disk and cause DLQ writes."
        labels:
          severity: warning

      # Spill directory free space below 100 MB — critical.
      - uid: dlt-spill-disk-low-critical
        title: "A2: Tick spill disk < 100 MB"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "dlt_spill_disk_available_mb"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [100] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "CRITICAL: Tick spill directory has < 100MB free"
          description: "dlt_spill_disk_available_mb below the CRITICAL threshold. Next outage will cause tick loss via DLQ. Free disk space IMMEDIATELY."
        labels:
          severity: critical

      # Pool watchdog declared the pool degraded for > 60 s.
      - uid: dlt-pool-degraded
        title: "A4: WebSocket pool fully degraded"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "dlt_pool_degraded_seconds"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [60] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "CRITICAL: ALL WebSocket connections down > 60s"
          description: "dlt_pool_degraded_seconds > 60 — the pool watchdog (A4) has declared the entire WebSocket pool degraded. No market data flowing. Check Dhan server status, token validity, and network reachability. At 300s the process will self-halt for supervisor restart."
        labels:
          severity: critical

      # Pool watchdog fired a halt (process exit expected).
      - uid: dlt-pool-halted
        title: "A4: WebSocket pool halted (process restart expected)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "increase(dlt_pool_halts_total[5m])"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "A4 FATAL: pool halt fired — supervisor should restart dlt-app"
          description: "dlt_pool_halts_total incremented. The pool has been fully down for >300s and the watchdog requested a halt. If the app doesn't come back within 2 min, Dhan is likely unreachable or the account/token is locked. Check docker logs dlt-app."
        labels:
          severity: critical
