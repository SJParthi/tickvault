        annotations:
          summary: "tv_candle_cascade_lag_total rising — 1s seal pipeline backing up"
          description: "rate(tv_candle_cascade_lag_total[5m]) > 0 for 1m. The 28-TF cascade fanout is dropping sealed 1s bars because the queue is at capacity. Check tv_candle_cascade_ticks_processed_total rate vs tv_candle_cascade_bars_sealed_total rate to identify the bottleneck. Runbook: .claude/rules/project/wave-5-error-codes.md (CASCADE — TBD; for now inspect cascade.rs:53 metric constants and engine_map.rs hot path)."
        labels:
          severity: high

      # Phase 3 9-box closure: cascade supervisor respawned the task.
      # tv_candle_cascade_respawn_total increments when the cascade task
      # exits unexpectedly (panic / unexpected return) and the
      # supervisor respawns it. Should be 0 in steady state.
      - uid: tv-candle-cascade-respawn
        title: "Phase 3 cascade supervisor respawn — task exited unexpectedly"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 86400, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'increase(tv_candle_cascade_respawn_total[24h])'
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 86400, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 86400, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.0] }
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "tv_candle_cascade_respawn_total > 0 in last 24h"
          description: "The cascade supervisor (cascade.rs:182+) respawned the 28-TF fanout task. Repeated respawns indicate a panic loop. Inspect data/logs/errors.jsonl.* for the panic backtrace immediately preceding the respawn event."
        labels:
          severity: high

  # ===========================================================================
  # tv-subsystem-memory — Wave-5 in-memory-store plan §AA, L18 / L121–L130
  #
  # Replaces the legacy `MEMORY_RSS_ALERT_MB > 1024` single-process alert
  # (retired in PR #504a per L122 / BUG-C2): the in-memory-store design
  # exceeds 1 GB by design, so the legacy threshold paged instantly with
  # zero diagnostic signal. The two alerts below provide:
  #
  #   1. Per-component breach detection — operator sees which component
  #      blew its budget, not just "RSS too high".
  #   2. Sampler-stale detection — if the sampler tokio task hangs or
  #      panics, the gauge values would freeze at last-known and silently
  #      mislead the operator. The heartbeat alert catches that within 60s.
  #
  # Both alerts are GATED by `tv_market_hours_active == 1` (L129) so they
  # only page during 09:00–15:30 IST. Outside-market drift is routed to
  # the daily summary, not Telegram (audit-findings Rule 4 + 11).
  # ===========================================================================
  - orgId: 1
    name: tv-subsystem-memory
    folder: tickvault
    interval: 1m
    rules:
      # L18 (revised) + L124 + L129: per-component RSS estimate breach.
      # Threshold 1.5e9 bytes (~1.43 GiB) is the per-component ceiling
      # for the largest design components (`bar_storage`, `tick_storage`).
      # The `unless absent_over_time(...)` clause filters out components
      # that have not yet had a source registered (L124 NaN-init); the
      # `and on() tv_market_hours_active == 1` gate suppresses pages
      # outside market hours.
      - uid: tv-rss-per-subsystem-high
        title: "L18 — per-subsystem memory exceeds budget"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "(tv_subsystem_memory_estimated_bytes > 1.5e9) unless absent_over_time(tv_subsystem_memory_estimated_bytes[5m]) and on() tv_market_hours_active == 1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Per-subsystem memory > 1.5 GB on at least one component"
          description: "tv_subsystem_memory_estimated_bytes{component=...} exceeded 1.5 GB during market hours. Inspect /metrics for the offending {component} label and follow the Wave-5 in-memory-store runbook (.claude/plans/active-plan-in-memory-store-aws-instance.md §M). The legacy MEMORY_RSS_ALERT_MB single-process gauge was retired 2026-05-08 per L122."
        labels:
          severity: high

      # L125: sampler heartbeat freshness. If the sampler task hangs the
      # heartbeat gauge stops advancing and `time() - heartbeat` grows
      # without bound. Threshold 30s = 3× the 10s sampler cadence.
      # Quiet-hours gate matches L129 — outside market hours we don't
      # care if the sampler dropped a tick.
      - uid: tv-subsystem-memory-sampler-stale
        title: "L125 — subsystem memory sampler stale (>30s no update)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "(time() - tv_subsystem_memory_sampler_last_update_seconds > 30) and on() tv_market_hours_active == 1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "L125: subsystem memory sampler not advancing (>30s)"
          description: "The subsystem_memory sampler task in crates/app/src/subsystem_memory.rs has not refreshed tv_subsystem_memory_sampler_last_update_seconds for >30s. Likely cause: sampler task panicked (check data/logs/errors.jsonl.*) or sources mutex poisoned. Per-component gauge values are STALE and MUST NOT be trusted until this clears."
        labels:
          severity: high

  # ===========================================================================
  # Wave 6 Sub-PR #1 item 1.4j — aggregator master-switch alerts
  #
  # Pages the operator if the multi-TF aggregator (1.4d master switch) goes
  # silent during market hours. Without this alert a silent failure of the
  # `global_seal_sender()` lookup or the subscriber task would mean shadow
  # tables stop populating, the operator notices the absence only via
  # post-market cross-verify (too late). Gated by tv_market_hours_active==1
  # so pre-market / post-market silence is normal and silent.
  # ===========================================================================
  - orgId: 1
    name: tv-aggregator-master-switch
    folder: tickvault
    interval: 1m
    rules:
      - uid: tv-aggregator-no-seals-during-market
        title: "Wave 6 — aggregator emitted zero seals for 5m during market hours"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "(increase(tv_aggregator_seals_emitted_total[5m]) == 0) and on() tv_market_hours_active == 1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Wave 6 master switch: zero seals emitted in last 5m during market hours"
          description: "The Wave 6 multi-TF aggregator subscriber task (master switch, item 1.4d merged in #578) emitted zero sealed candles for 5 consecutive minutes during 09:15-15:30 IST. Likely causes (in order): (1) global_seal_sender() returns None — the seal-writer task failed to construct at boot, see ERROR log at startup; (2) broadcast::recv() hit Closed and the subscriber task exited (look for 'broadcast closed, exiting' info log); (3) every try_send is hitting full mpsc (check tv_seal_mpsc_dropped_total). Runbook: .claude/rules/project/wave-6-error-codes.md::AGGREGATOR-HB-01."
        labels:
          severity: high
          wave: "6"

      # Wave 6 Sub-PR #1 item 1.4l — companion alert for the
      # tv_seal_mpsc_dropped_total counter (one of the 3 drop series
      # in the 'Aggregator drops & lag (5m)' panel, 1.4k). Fires when
      # the writer task fell behind the subscriber task by enough that
      # > 100 seals were dropped in the last minute. The seal is NOT
      # lost (caught by the shadow seal writer ring → spill → DLQ
      # cascade), but the producer-side drop is a strong signal that
      # the consumer is slowing down — the operator needs to know.
      - uid: tv-aggregator-mpsc-drop-storm
        title: "Wave 6 — aggregator seal mpsc drop storm (>100/min)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "(increase(tv_seal_mpsc_dropped_total[1m]) > 100) and on() tv_market_hours_active == 1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "Wave 6: > 100 seal mpsc drops in last 1m during market hours"
          description: "The producer-side mpsc channel between the multi-TF aggregator subscriber task (1.4d) and the seal-writer task (1.4b) is overflowing. > 100 sealed candles dropped in the last 1 min. The seal-writer's three-tier rescue (ring → spill → DLQ) catches dropped seals AT THE WRITER SIDE — but this counter measures PRODUCER-SIDE drops, where the mpsc try_send returned Err because the writer task couldn't keep up. Likely causes: (1) QuestDB ILP backpressure (check tv_questdb_disconnected_seconds + BOOT-01 runbook), (2) seal_ring saturated and spilling (check tv_seal_ring_spilled_total). Runbook: .claude/rules/project/wave-6-error-codes.md::AGGREGATOR-DROP-01."
        labels:
          severity: high
          wave: "6"

      # Wave 6 Sub-PR #1 item 1.4n — companion alert for the
      # tv_aggregator_tick_lag_total counter (broadcast::recv() returned
      # Lagged because the subscriber fell behind the producer). > 100
      # lag events in 1m during market hours is a strong signal that
      # the subscriber loop is starving — under normal load with the
      # broadcast channel sized for the live tick rate this should
      # NEVER happen. If it does, ticks are being SKIPPED at the
      # broadcast boundary and shadow seals will under-count.
      - uid: tv-aggregator-broadcast-lag-storm
        title: "Wave 6 — aggregator broadcast lag storm (>100/min)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "(increase(tv_aggregator_tick_lag_total[1m]) > 100) and on() tv_market_hours_active == 1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "Wave 6: > 100 aggregator broadcast lag events in last 1m during market hours"
          description: "The Wave 6 multi-TF aggregator subscriber task fell behind the fast_tick_broadcast producer enough that > 100 frames were dropped at the broadcast boundary in the last 1 min during 09:15-15:30 IST. Note: the LEGACY tick pipeline subscribes to the SAME broadcast channel, so trading is NOT affected (this is purely shadow-table coverage loss). Likely cause: subscriber task's consume_tick + try_send path is too slow per tick — investigate hot-path budget (audit-findings Rule 3 + Wave 6 §1.6 DHAT bench). Runbook: .claude/rules/project/wave-6-error-codes.md::AGGREGATOR-DROP-01."
        labels:
          severity: high
          wave: "6"

      # Wave 6 Sub-PR #1 item 1.4o — companion alert for the
      # tv_aggregator_late_ticks_discarded_total counter (4th drop
      # class: tick arrived AFTER its bucket sealed, must be discarded
      # per AGGREGATOR-LATE-01 runbook). Late ticks are EXPECTED at
      # IST midnight cascade rollover (small bursts), so the threshold
      # is sustained 60/min for 5m — that filters routine boundary
      # noise but catches real clock-drift / slow-consumer scenarios.
      - uid: tv-aggregator-late-tick-sustained
        title: "Wave 6 — aggregator late-tick rate > 60/min sustained 5m"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "(increase(tv_aggregator_late_ticks_discarded_total[5m]) > 300) and on() tv_market_hours_active == 1"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Wave 6: > 60 late ticks/min sustained 5m during market hours"
          description: "tv_aggregator_late_ticks_discarded_total counted > 300 events in the last 5 minutes (= sustained > 60/min). Per AGGREGATOR-LATE-01 runbook, late-tick bursts at IST midnight cascade rollover are expected and short; a sustained 5-minute rate above 60/min indicates either (1) clock drift between Dhan WebSocket and our host (check tv_host_clock_skew_seconds + BOOT-03 runbook), or (2) the consumer pipeline is slow enough that ticks queue past their bucket-seal deadline. Runbook: .claude/rules/project/wave-6-error-codes.md::AGGREGATOR-LATE-01."
        labels:
          severity: high
          wave: "6"
