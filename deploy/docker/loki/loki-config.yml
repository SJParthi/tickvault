# =============================================================================
# tickvault — Loki Configuration (single-node, dev mode)
# =============================================================================
# Phase 3 of active-plan.md. Re-added under `profile: logs` in docker-compose
# so it only starts when the operator explicitly opts in via
# `docker-compose --profile logs up -d`. Default stack is unaffected.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  instance_addr: 127.0.0.1

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h  # 30 days
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_query_series: 500
  max_query_parallelism: 2

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# Log-pattern alert rules — Phase 3.2. Fire when error signatures spike,
# when a novel signature appears, or when flush errors storm. Routes
# through Alertmanager -> existing NotificationService webhook so the
# zero-touch chain works end-to-end.
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-tmp
  alertmanager_url: http://tv-alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true
