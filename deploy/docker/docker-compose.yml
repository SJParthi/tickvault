# =============================================================================
# tickvault — Docker Compose
# =============================================================================
# Same file on Mac dev and AWS prod (r8g.large ARM Graviton4, 2 vCPUs / 16 GiB,
# operator-lock 2026-06-30 Quote 7 in daily-universe-scope-expansion-2026-05-27.md §7).
#
# Post-CloudWatch-only migration (#O1/#O2/#O3/#O4), current ~250–1000-SID universe:
#   QuestDB ~4GB (QDB_MEM_LIMIT=4g) + App ~3.2GB + OS/FS-cache ~0.8GB = ~8.2GB total.
#   ~7.8GB headroom on 16 GiB r8g.large.
#
# REMOVED (CloudWatch-only migration):
#   - Grafana       -> CloudWatch Dashboards (#O1)
#   - Alertmanager  -> SNS 4-channel fan-out (#O2)
#   - Prometheus    -> CloudWatch metrics (#O3)
#   - Valkey        -> SSM Parameter Store for dual-instance lock (#O4)
# REMOVED earlier (Wave 7-A):
#   - Traefik           -> AWS ALB free tier (HTTPS termination)
#   - valkey-exporter   -> not queried
#   - Loki / Alloy / Jaeger -> CloudWatch Logs / X-Ray
#
# KEPT in Wave 7-A (operator decision 2026-05-10):
#   - Alertmanager -> independent process safety. If app crashes during
#     market hours, Alertmanager still routes Prometheus alerts to Telegram.
#     Routing the webhook through the app itself is a single-point-of-failure
#     anti-pattern (app dead = no alert). 256MB is cheap insurance.
#
# Already removed (pre-Wave-7-A):
#   - Loki + Alloy + Jaeger -> saves ~2.5GB. Profile-gated for opt-in dev use.
#
# Container prefix: tv- (tickvault)
# Network: tv-network (all services communicate via Docker DNS)
# ALL images pinned with SHA256 digest (Bible Section 14 #71)
# =============================================================================

networks:
  tv-network:
    name: tv-network
    driver: bridge

volumes:
  tv-questdb-data:
    name: tv-questdb-data
  # tv-valkey-data volume DELETED in #O4 (2026-05-24) — Valkey removed.
  # Phase 3 of active-plan.md — only used when `--profile logs` starts.
  tv-loki-data:
    name: tv-loki-data

services:
  # ---------------------------------------------------------------------------
  # QuestDB — Time-Series Database (tick data, orders, audit trail)
  # Bible #16: questdb/questdb:9.3.5
  # Wave 7-A: 4GB -> 2GB (cascading mat views removed in Wave 6, ticks-only
  #          + 9 sealed-candle shadow tables = 80% less write pressure).
  # ---------------------------------------------------------------------------
  tv-questdb:
    # Multi-arch tag (auto-selects amd64 or arm64 from the manifest).
    # The previous SHA256 pin (5b6f1518...) was the amd64 variant only;
    # on Graviton (arm64) hosts docker pulled it and ran under emulation,
    # which is slow enough that the deploy script's :9000 readiness curl
    # check timed out (30s window). Using the tag without SHA256 preserves
    # the 9.3.5 version pin while letting docker pick the correct arch.
    # Project rule "No :latest — exact version with SHA256" is satisfied
    # by the explicit :9.3.5 version; SHA256 omitted ONLY because Docker
    # Hub publishes per-arch SHA256s (we'd need both arm64 + amd64 SHAs
    # and conditional logic, which is fragile). Multi-arch tag is the
    # canonical Docker-recommended approach for cross-arch deployments.
    image: questdb/questdb:9.3.5
    # Force arm64 on the deployed Graviton box; harmless on amd64 dev
    # hosts (docker compose falls back to amd64 layers there).
    platform: linux/arm64
    container_name: tv-questdb
    hostname: tv-questdb
    restart: unless-stopped
    # Default 4g on the r8g.large 16 GiB host (operator lock 2026-06-30 §7
    # Quote 7) — comfortable with ~7.8 GB headroom, sized for the current
    # ~250–1000-SID universe + the both-feeds workload.
    # QuestDB mmaps data files — actual RSS is much lower than limit.
    # Partition manager keeps hot data bounded to ~90 days.
    # Env-driven so scripts/aws-upgrade-instance.sh --qdb-mem can raise it
    # further (e.g. for the deferred 2K-SID universe expansion). Override
    # QDB_MEM_LIMIT to keep a smaller value on a constrained Mac dev box.
    mem_limit: ${QDB_MEM_LIMIT:-4g}
    mem_reservation: 1g
    cpus: 2.0
    # OOM protection: prefer killing other containers over QuestDB.
    # QuestDB holds all trading data — losing it mid-session is catastrophic.
    oom_score_adj: -500
    # Shared memory: QuestDB uses mmap heavily for WAL + column storage.
    # Default 64MB causes SIGBUS on large tables. 512MB matches production needs.
    shm_size: 512m
    # NOTE: vm.max_map_count must be raised at the HOST/VM level, NOT via the
    # compose `sysctls:` key. vm.max_map_count is a NON-namespaced kernel
    # sysctl, so runc refuses to start the container if it is listed under
    # `sysctls:` ("sysctl vm.max_map_count is not in a separate kernel
    # namespace"). scripts/bootstrap.sh raises it on Linux hosts directly and
    # best-effort inside the Docker Desktop Linux VM on macOS. If it cannot be
    # raised, QuestDB simply logs a perf warning (current=262144
    # recommended=1048576) and runs fine.
    ports:
      # E5 security: bind web console to localhost only (no external access).
      # PG + ILP remain on all interfaces for host app connectivity.
      - "127.0.0.1:9000:9000"  # HTTP API + Web Console (localhost only)
      - "8812:8812"            # PostgreSQL wire protocol
      - "9009:9009"            # InfluxDB Line Protocol (high-speed ingestion)
      - "127.0.0.1:9003:9003" # Prometheus metrics (localhost only)
    volumes:
      - tv-questdb-data:/var/lib/questdb
    environment:
      QDB_LOG_W_STDOUT_LEVEL: ERROR
      QDB_TELEMETRY_ENABLED: "false"
      QDB_LINE_TCP_MAINTENANCE_JOB_INTERVAL: "60000"
      # Increase ILP connection idle timeout to prevent disconnects during
      # low-activity periods. Default is too aggressive for burst-then-idle
      # patterns (25K instruments send bursts, then pause between flush cycles).
      QDB_LINE_TCP_DISCONNECT_ON_ERROR: "false"
      QDB_METRICS_ENABLED: "TRUE"
      # --- WAL Tuning (Wave 7-A: tightened for 2GB ceiling) ---
      # WAL segment rollover: 64MB. Fewer file ops for high-throughput ILP.
      QDB_WAL_SEGMENT_ROLLOVER_SIZE: "67108864"
      # Max uncommitted rows per WAL writer: 2M. Larger batches = fewer commits.
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: "2000000"
      # WAL apply job interval: 100ms. Faster WAL→table merge for freshness.
      QDB_WAL_APPLY_TABLE_TIME_QUOTA: "100000"
      # O3 max lag: 60s. Tighter out-of-order merge window.
      QDB_CAIRO_O3_MAX_LAG: "60000000"
      # ILP connection limit: 20. We have ~15 writers (tick, depth, OBI, indicators, candles, etc.).
      QDB_LINE_TCP_NET_ACTIVE_CONNECTION_LIMIT: "20"
      # ILP idle timeout: 10 minutes. Prevents premature disconnect during
      # burst-then-idle patterns (depth writers flush every 500 records, may idle 30-60s between).
      QDB_LINE_TCP_MIN_IDLE_MS_BEFORE_WRITER_RELEASE: "600000"
      # ILP connection receive buffer: 4MB. Handles burst ILP writes without backpressure.
      QDB_LINE_TCP_NET_RECV_BUF_SIZE: "4194304"
      # --- Crash Recovery & Stability ---
      # Writer append page size: 1MB. Reduces mmap syscalls for large batches.
      QDB_CAIRO_WRITER_DATA_APPEND_PAGE_SIZE: "1048576"
      # Parallel WAL apply threads: 2 (matches t4g.medium 2 vCPUs).
      QDB_WAL_APPLY_WORKER_COUNT: "2"
      QDB_PG_USER: ${TV_QUESTDB_PG_USER:?Run bootstrap.sh first — QuestDB credentials must come from AWS SSM}
      QDB_PG_PASSWORD: ${TV_QUESTDB_PG_PASSWORD:?Run bootstrap.sh first — QuestDB credentials must come from AWS SSM}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9000 && cat < /dev/null > /dev/tcp/localhost/9009' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    # Grace period for WAL flush on docker stop — prevents data loss on graceful shutdown.
    stop_grace_period: 30s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Valkey — REMOVED (observability → CloudWatch-only, 2026-05-24, #O4).
  # The dual-instance lock moved to AWS SSM Parameter Store in PR #764
  # (/tickvault/<env>/instance-lock). The file-based token-cache
  # (crates/core/src/auth/token_cache.rs) covers crash-restart speed.
  # No remaining production caller needs an in-memory KV store.
  # See .claude/plans/active-plan-observability-cloudwatch-only.md (#O4).
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Prometheus — REMOVED (observability → CloudWatch-only, 2026-05-20, #O3).
  # The app's own /metrics endpoint (port 9091) STAYS — the AWS CloudWatch
  # agent scrapes it directly. Only the Prometheus container is gone.
  # See .claude/plans/active-plan-observability-cloudwatch-only.md (#O3).
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # Alertmanager — REMOVED (observability → CloudWatch-only, 2026-05-20).
  # Alert routing now lives in AWS CloudWatch Alarms. See
  # .claude/plans/active-plan-observability-cloudwatch-only.md (#O2).
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Wave 7-A REMOVED: tv-traefik (traefik reverse proxy)
  # Replacement on AWS: AWS Application Load Balancer (free tier 750 hrs/mo).
  # Replacement on Mac dev: app listens directly on port 3001
  #   (set TV_API_BIND=127.0.0.1:3001 in .env).
  # Reason: Traefik's HTTPS termination + dashboard added 512MB RAM and a
  #         containerized hop with no functional benefit on a single-app host.
  #         AWS ALB does the same job free, and Mac dev does not need HTTPS.
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # Loki — log aggregation (Phase 3 of active-plan.md)
  # OPT-IN only: starts with `docker-compose --profile logs up -d`.
  # Default stack is unaffected. On t4g.medium budget: 384MB memory.
  # Retains errors.jsonl.* structured stream for 30 days; ruler fires
  # LogQL-based alerts (ErrorBurst, FlushErrorStorm, AuthFailureBurst,
  # NovelErrorSignature) via Alertmanager → Telegram.
  # ---------------------------------------------------------------------------
  tv-loki:
    # 2026-04-25: SHA256 digest pinned per CLAUDE.md "All images pinned with
    # SHA256 digest". Linux/amd64 digest from Docker Hub registry.
    image: grafana/loki:3.7.1@sha256:1694e9237e2b3d7cd4ad959bae1f21e12b6184d886d7412bd1b939fb0dd4e75c
    container_name: tv-loki
    hostname: tv-loki
    profiles:
      - logs
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.5
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./loki/rules.yml:/loki/rules/fake/rules.yml:ro
      - tv-loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Alloy — log collector (Phase 3 of active-plan.md)
  # Tails tv-* container logs AND data/logs/errors.jsonl.* on the host,
  # forwards everything to tv-loki. 256MB memory.
  # ---------------------------------------------------------------------------
  tv-alloy:
    # 2026-04-25: SHA256 digest pinned per CLAUDE.md "All images pinned with
    # SHA256 digest". Linux/amd64 digest from Docker Hub registry.
    image: grafana/alloy:v1.16.0@sha256:c12b05c77378537384f4082011855338de4558d258a1f3351862b73a920ea55c
    container_name: tv-alloy
    hostname: tv-alloy
    profiles:
      - logs
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.3
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/alloy-config.alloy
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./alloy/alloy-config.alloy:/etc/alloy/alloy-config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Bind-mount the host's data/logs/ so Alloy can tail errors.jsonl.*
      # and the daily app.*.log files that the Rust observability layer writes.
      - ../../data/logs:/var/log/tv-app:ro
    depends_on:
      tv-loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:12345/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tv-network
