# =============================================================================
# tickvault — Docker Compose
# =============================================================================
# ALL versions from Tech Stack Bible V6. Same file on Mac and AWS c7i.xlarge.
# Target: c7i.xlarge (4 vCPUs, 8GB RAM) — 1yr reserved ~₹6,400/mo
# Memory budget: QuestDB 4GB + App 1GB + Valkey 256MB + Prometheus 512MB
#   + Grafana 256MB + Traefik 128MB + OS 1GB = ~7.2GB (fits in 8GB)
# Loki + Alloy + Jaeger REMOVED — saves ~2.5GB RAM.
# Container prefix: tv- (tickvault)
# Network: tv-network (all services communicate via Docker DNS)
# ALL images pinned with SHA256 digest (Bible Section 14 #71)
# =============================================================================

networks:
  tv-network:
    name: tv-network
    driver: bridge

volumes:
  tv-questdb-data:
    name: tv-questdb-data
  tv-valkey-data:
    name: tv-valkey-data
  tv-grafana-data:
    name: tv-grafana-data
  tv-prometheus-data:
    name: tv-prometheus-data
  # Phase 3 of active-plan.md — only used when `--profile logs` starts.
  tv-loki-data:
    name: tv-loki-data

services:
  # ---------------------------------------------------------------------------
  # QuestDB — Time-Series Database (tick data, orders, audit trail)
  # Bible #16: questdb/questdb:9.3.2
  # ---------------------------------------------------------------------------
  tv-questdb:
    image: questdb/questdb:9.3.5@sha256:5b6f1518296b45aa9ba049382b11b15cfb71e39d8b9dd5634683184bbd97bf0b
    container_name: tv-questdb
    hostname: tv-questdb
    restart: unless-stopped
    # Memory: 4GB fits c7i.xlarge (8GB total) and Mac dev (48GB).
    # QuestDB mmaps data files — actual RSS is much lower than limit.
    # Partition manager keeps hot data bounded to ~90 days.
    mem_limit: 4g
    mem_reservation: 2g
    cpus: 2.0
    # OOM protection: prefer killing other containers over QuestDB.
    # QuestDB holds all trading data — losing it mid-session is catastrophic.
    oom_score_adj: -500
    # Shared memory: QuestDB uses mmap heavily for WAL + column storage.
    # Default 64MB causes SIGBUS on large tables. 2GB matches production needs.
    shm_size: 512m
    ports:
      # E5 security: bind web console to localhost only (no external access).
      # PG + ILP remain on all interfaces for host app connectivity.
      - "127.0.0.1:9000:9000"  # HTTP API + Web Console (localhost only)
      - "8812:8812"            # PostgreSQL wire protocol
      - "9009:9009"            # InfluxDB Line Protocol (high-speed ingestion)
      - "127.0.0.1:9003:9003" # Prometheus metrics (localhost only)
    volumes:
      - tv-questdb-data:/var/lib/questdb
    environment:
      QDB_LOG_W_STDOUT_LEVEL: ERROR
      QDB_TELEMETRY_ENABLED: "false"
      QDB_LINE_TCP_MAINTENANCE_JOB_INTERVAL: "60000"
      # Increase ILP connection idle timeout to prevent disconnects during
      # low-activity periods. Default is too aggressive for burst-then-idle
      # patterns (25K instruments send bursts, then pause between flush cycles).
      QDB_LINE_TCP_DISCONNECT_ON_ERROR: "false"
      QDB_METRICS_ENABLED: "TRUE"
      # --- WAL Tuning (Phase B: 100-500GB future-proof) ---
      # WAL segment rollover: 64MB (default 16MB). Fewer file ops for high-throughput ILP.
      QDB_WAL_SEGMENT_ROLLOVER_SIZE: "67108864"
      # Max uncommitted rows per WAL writer: 2M (default 500K). Larger batches = fewer commits.
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: "2000000"
      # WAL apply job interval: 100ms (default 300ms). Faster WAL→table merge for freshness.
      QDB_WAL_APPLY_TABLE_TIME_QUOTA: "100000"
      # O3 max lag: 60s (default 300s). Tighter out-of-order merge window.
      QDB_CAIRO_O3_MAX_LAG: "60000000"
      # ILP connection limit: 20 (default 10). We have ~15 writers (tick, depth, OBI, indicators, candles, etc.).
      QDB_LINE_TCP_NET_ACTIVE_CONNECTION_LIMIT: "20"
      # ILP idle timeout: 10 minutes (default 5 min = 300000ms). Prevents premature disconnect
      # during burst-then-idle patterns (depth writers flush every 500 records, may idle 30-60s between).
      QDB_LINE_TCP_MIN_IDLE_MS_BEFORE_WRITER_RELEASE: "600000"
      # ILP connection receive buffer: 4MB (default 1MB). Handles burst ILP writes without backpressure.
      QDB_LINE_TCP_NET_RECV_BUF_SIZE: "4194304"
      # --- Crash Recovery & Stability ---
      # Writer append page size: 1MB (default 256KB). Reduces mmap syscalls for large batches.
      QDB_CAIRO_WRITER_DATA_APPEND_PAGE_SIZE: "1048576"
      # Parallel WAL apply threads: 4 (match CPU count). Faster WAL→table merge.
      # WAL workers: 2 (matches c7i.large vCPUs). Mac has more but 2 is sufficient.
      QDB_WAL_APPLY_WORKER_COUNT: "2"
      QDB_PG_USER: ${TV_QUESTDB_PG_USER:?Run bootstrap.sh first — QuestDB credentials must come from AWS SSM}
      QDB_PG_PASSWORD: ${TV_QUESTDB_PG_PASSWORD:?Run bootstrap.sh first — QuestDB credentials must come from AWS SSM}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9000 && cat < /dev/null > /dev/tcp/localhost/9009' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    # Grace period for WAL flush on docker stop — prevents data loss on graceful shutdown.
    stop_grace_period: 30s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Valkey — Cache (state, lookups, session data)
  # Bible #18: valkey/valkey:9.0.2-alpine
  # ---------------------------------------------------------------------------
  tv-valkey:
    image: valkey/valkey:9.0.3-alpine@sha256:f741f6f4080be5f2bc213f31206a608bee5369ab617a03d6970b800ee60a00c5
    container_name: tv-valkey
    hostname: tv-valkey
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.5
    ports:
      - "6379:6379"
    volumes:
      - tv-valkey-data:/data
    command: >
      valkey-server
      --requirepass ${TV_VALKEY_PASSWORD:-tv-dev-only}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Valkey Exporter — Prometheus metrics for Valkey/Redis
  # Exports Valkey INFO stats as Prometheus metrics on :9121/metrics.
  # Bible: oliver006/redis_exporter:v1.67.0
  # ---------------------------------------------------------------------------
  tv-valkey-exporter:
    image: oliver006/redis_exporter:v1.82.0@sha256:4b467f718ea9f62fe47b87ce39039ebeedff7764c40fde2a129913484fff716f
    container_name: tv-valkey-exporter
    hostname: tv-valkey-exporter
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    environment:
      - REDIS_ADDR=redis://tv-valkey:6379
      - REDIS_PASSWORD=${TV_VALKEY_PASSWORD:-tv-dev-only}
    depends_on:
      tv-valkey:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9121/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # Bible #28: prom/prometheus:v3.9.1
  # ---------------------------------------------------------------------------
  tv-prometheus:
    image: prom/prometheus:v3.11.2@sha256:3674db04d3640d2157de57f8679dbe8dbc10a673e6d63ec58d9430e34abbfe68
    container_name: tv-prometheus
    hostname: tv-prometheus
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # E5 security: bind to localhost only (no external access to metrics).
      - "127.0.0.1:9090:9090"
    volumes:
      - tv-prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      # NOTE: --web.console.libraries and --web.console.templates removed.
      # Prometheus v3.x no longer bundles console templates (we use Grafana).
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Alertmanager — Alert Routing (Prometheus → Telegram)
  # Forwards Prometheus alerts to Telegram via webhook receiver.
  # Pinned: prom/alertmanager:v0.28.1
  # ---------------------------------------------------------------------------
  tv-alertmanager:
    image: prom/alertmanager:v0.32.0@sha256:fe1f57b89ec7b94928746e61d9924cafd3674c688e3c7c3ad9600d8ef5da6cf9
    container_name: tv-alertmanager
    hostname: tv-alertmanager
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Loki + Alloy + Jaeger — REMOVED for c7i.large (4GB) memory budget.
  # Saves ~2.5GB RAM. Logs available via: docker logs tickvaultlication
  # Tracing available via: Prometheus metrics (tv_tick_processing_duration_ns)
  # Re-enable on c7i.xlarge+ by uncommenting these services.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards & Visualization
  # Bible #27: grafana/grafana-oss:12.3.3
  # ---------------------------------------------------------------------------
  tv-grafana:
    image: grafana/grafana-oss:12.3.3@sha256:9e1e77ade304069aee3196e9a4f210830e96e80ce9a2640891eccc324b152faf
    container_name: tv-grafana
    hostname: tv-grafana
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.5
    ports:
      - "3000:3000"
    volumes:
      - tv-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${TV_GRAFANA_ADMIN_USER:?Run bootstrap.sh first — Grafana credentials must come from AWS SSM}
      GF_SECURITY_ADMIN_PASSWORD: ${TV_GRAFANA_ADMIN_PASSWORD:?Run bootstrap.sh first — Grafana credentials must come from AWS SSM}
      # E5 security fix: anonymous users get Viewer role (not Admin).
      # Admin access requires SSM-sourced credentials above.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: "Asia/Kolkata"
      # QuestDB credentials for Grafana PostgreSQL datasource provisioning
      TV_QUESTDB_PG_USER: ${TV_QUESTDB_PG_USER:?Run bootstrap.sh first — QuestDB credentials must come from AWS SSM}
      TV_QUESTDB_PG_PASSWORD: ${TV_QUESTDB_PG_PASSWORD:?Run bootstrap.sh first — QuestDB credentials must come from AWS SSM}
    depends_on:
      tv-prometheus:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      # Use wget (always available in Grafana Alpine image; curl may not exist)
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Traefik — Reverse Proxy & Load Balancer
  # Bible #79: traefik:v3.6.8
  # ---------------------------------------------------------------------------
  tv-traefik:
    image: traefik:v3.6.14@sha256:e08f2a770aee6b838b4c1be5fe25569a653b1592e4673a240414bc8bc4ad0aaa
    container_name: tv-traefik
    hostname: tv-traefik
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"        # HTTP
      - "443:443"      # HTTPS
      - "8080:8080"    # Traefik Dashboard
      - "8082:8082"    # Prometheus metrics
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tv-network


  # ---------------------------------------------------------------------------
  # Loki — log aggregation (Phase 3 of active-plan.md)
  # OPT-IN only: starts with `docker-compose --profile logs up -d`.
  # Default stack is unaffected. On c7i.xlarge budget: 384MB memory.
  # Retains errors.jsonl.* structured stream for 30 days; ruler fires
  # LogQL-based alerts (ErrorBurst, FlushErrorStorm, AuthFailureBurst,
  # NovelErrorSignature) via Alertmanager → Telegram.
  # ---------------------------------------------------------------------------
  tv-loki:
    # 2026-04-25: SHA256 digest pinned per CLAUDE.md "All images pinned with
    # SHA256 digest". Linux/amd64 digest from Docker Hub registry.
    image: grafana/loki:3.7.1@sha256:1694e9237e2b3d7cd4ad959bae1f21e12b6184d886d7412bd1b939fb0dd4e75c
    container_name: tv-loki
    hostname: tv-loki
    profiles:
      - logs
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.5
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./loki/rules.yml:/loki/rules/fake/rules.yml:ro
      - tv-loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tv-network

  # ---------------------------------------------------------------------------
  # Alloy — log collector (Phase 3 of active-plan.md)
  # Tails tv-* container logs AND data/logs/errors.jsonl.* on the host,
  # forwards everything to tv-loki. 256MB memory.
  # ---------------------------------------------------------------------------
  tv-alloy:
    # 2026-04-25: SHA256 digest pinned per CLAUDE.md "All images pinned with
    # SHA256 digest". Linux/amd64 digest from Docker Hub registry.
    image: grafana/alloy:v1.16.0@sha256:c12b05c77378537384f4082011855338de4558d258a1f3351862b73a920ea55c
    container_name: tv-alloy
    hostname: tv-alloy
    profiles:
      - logs
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.3
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/alloy-config.alloy
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./alloy/alloy-config.alloy:/etc/alloy/alloy-config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Bind-mount the host's data/logs/ so Alloy can tail errors.jsonl.*
      # and the daily app.*.log files that the Rust observability layer writes.
      - ../../data/logs:/var/log/tv-app:ro
    depends_on:
      tv-loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:12345/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tv-network
