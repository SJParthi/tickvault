# =============================================================================
# dhan-live-trader — Docker Compose
# =============================================================================
# ALL versions from Tech Stack Bible V6. Same file on Mac and AWS.
# Container prefix: dlt- (dhan-live-trader)
# Network: dlt-network (all services communicate via Docker DNS)
# ALL images pinned with SHA256 digest (Bible Section 14 #71)
# =============================================================================

networks:
  dlt-network:
    name: dlt-network
    driver: bridge

volumes:
  dlt-questdb-data:
    name: dlt-questdb-data
  dlt-valkey-data:
    name: dlt-valkey-data
  dlt-grafana-data:
    name: dlt-grafana-data
  dlt-prometheus-data:
    name: dlt-prometheus-data
  dlt-loki-data:
    name: dlt-loki-data

services:
  # ---------------------------------------------------------------------------
  # QuestDB — Time-Series Database (tick data, orders, audit trail)
  # Bible #16: questdb/questdb:9.3.2
  # ---------------------------------------------------------------------------
  dlt-questdb:
    image: questdb/questdb:9.3.2@sha256:f8802d6ffa8c855fc3f9f69e86aaabcc4ee4d921e6755af4690b0b0290036517
    container_name: dlt-questdb
    hostname: dlt-questdb
    restart: unless-stopped
    ports:
      - "9000:9000"    # HTTP API + Web Console
      - "8812:8812"    # PostgreSQL wire protocol
      - "9009:9009"    # InfluxDB Line Protocol (high-speed ingestion)
      - "9003:9003"    # Prometheus metrics (min HTTP server)
    volumes:
      - dlt-questdb-data:/var/lib/questdb
    environment:
      QDB_LOG_W_STDOUT_LEVEL: ERROR
      QDB_TELEMETRY_ENABLED: "false"
      QDB_LINE_TCP_MAINTENANCE_JOB_INTERVAL: "60000"
      QDB_METRICS_ENABLED: "TRUE"
      QDB_PG_USER: ${DLT_QUESTDB_PG_USER:?Run bootstrap.sh first — QuestDB credentials must come from AWS SSM}
      QDB_PG_PASSWORD: ${DLT_QUESTDB_PG_PASSWORD:?Run bootstrap.sh first — QuestDB credentials must come from AWS SSM}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dlt-network

  # ---------------------------------------------------------------------------
  # Valkey — Cache (state, lookups, session data)
  # Bible #18: valkey/valkey:9.0.2-alpine
  # ---------------------------------------------------------------------------
  dlt-valkey:
    image: valkey/valkey:9.0.2-alpine@sha256:68677f85c863830af7836ff07c4a13b7f085ebeff62f4dedb71499ca27d229f2
    container_name: dlt-valkey
    hostname: dlt-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dlt-valkey-data:/data
    command: >
      valkey-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dlt-network

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # Bible #28: prom/prometheus:v3.9.1
  # ---------------------------------------------------------------------------
  dlt-prometheus:
    image: prom/prometheus:v3.9.1@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702
    container_name: dlt-prometheus
    hostname: dlt-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - dlt-prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dlt-network

  # ---------------------------------------------------------------------------
  # Loki — Log Aggregation
  # Bible #30: grafana/loki:3.6.6
  # ---------------------------------------------------------------------------
  dlt-loki:
    image: grafana/loki:3.6.6@sha256:434c7effbd66dbf69c2665fe4b2125549ecf7b45039ac28595d4034031cf47ce
    container_name: dlt-loki
    hostname: dlt-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - dlt-loki-data:/loki
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    command: ["-config.file=/etc/loki/loki-config.yml"]
    # Loki 3.6.6 uses a minimal scratch image with no shell — cannot run CMD-SHELL.
    # Healthcheck runs from host via curl in verify script. Dependent services
    # use service_started condition instead of service_healthy.
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "--version"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dlt-network

  # ---------------------------------------------------------------------------
  # Alloy — Log Collector (replaces Promtail, which is BANNED)
  # Bible #30: grafana/alloy:v1.8.0
  # ---------------------------------------------------------------------------
  dlt-alloy:
    image: grafana/alloy:v1.8.0@sha256:f54686e56a48f108779997ce87c4d9dc37df0e011802fb138b73c7ac31208108
    container_name: dlt-alloy
    hostname: dlt-alloy
    restart: unless-stopped
    ports:
      - "12345:12345"  # Alloy UI
    volumes:
      - ./alloy/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy"]
    depends_on:
      dlt-loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:12345/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dlt-network

  # ---------------------------------------------------------------------------
  # Jaeger v2 — Distributed Tracing (v1 is BANNED — EOL Dec 2025)
  # Bible #29: jaegertracing/jaeger:2.15.0
  # ---------------------------------------------------------------------------
  dlt-jaeger:
    image: jaegertracing/jaeger:2.15.0@sha256:a5221e8464fe7c3d77c9fb368dfc24771bfb02bf136f00b23ba374f1eac9c2bf
    container_name: dlt-jaeger
    hostname: dlt-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Internal metrics (Prometheus)
      - "13133:13133"  # Healthcheck (healthcheckv2 extension)
    volumes:
      - ./jaeger/jaeger-config.yml:/etc/jaeger/config.yml:ro
    command: ["--config", "/etc/jaeger/config.yml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/health/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dlt-network

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards & Visualization
  # Bible #27: grafana/grafana-oss:12.3.3
  # ---------------------------------------------------------------------------
  dlt-grafana:
    image: grafana/grafana-oss:12.3.3@sha256:9e1e77ade304069aee3196e9a4f210830e96e80ce9a2640891eccc324b152faf
    container_name: dlt-grafana
    hostname: dlt-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dlt-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${DLT_GRAFANA_ADMIN_USER:?Run bootstrap.sh first — Grafana credentials must come from AWS SSM}
      GF_SECURITY_ADMIN_PASSWORD: ${DLT_GRAFANA_ADMIN_PASSWORD:?Run bootstrap.sh first — Grafana credentials must come from AWS SSM}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      # Telegram credentials for Grafana alert contact point (provisioned in alerts.yml).
      # Fetched from AWS SSM by setup-observability.sh. Grafana expands $VAR in provisioning YAML.
      # Uses :- (optional) — stack starts even if Telegram not in SSM; Rust-side alerts unaffected.
      DLT_TELEGRAM_BOT_TOKEN: ${DLT_TELEGRAM_BOT_TOKEN:-}
      DLT_TELEGRAM_CHAT_ID: ${DLT_TELEGRAM_CHAT_ID:-}
    depends_on:
      dlt-prometheus:
        condition: service_healthy
      dlt-loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dlt-network

  # ---------------------------------------------------------------------------
  # Traefik — Reverse Proxy & Load Balancer
  # Bible #79: traefik:v3.6.8
  # ---------------------------------------------------------------------------
  dlt-traefik:
    image: traefik:v3.6.8@sha256:90099f8948c828ecf0ababd711a4359a2443eba12261c1df2f548a3b1d815938
    container_name: dlt-traefik
    hostname: dlt-traefik
    restart: unless-stopped
    ports:
      - "80:80"        # HTTP
      - "443:443"      # HTTPS
      - "8080:8080"    # Traefik Dashboard
      - "8082:8082"    # Prometheus metrics
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dlt-network

