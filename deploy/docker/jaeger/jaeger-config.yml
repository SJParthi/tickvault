# =============================================================================
# tickvault — Jaeger v2 Configuration
# =============================================================================
# Jaeger v2 is built on OpenTelemetry Collector. This config defines the
# OTLP receiver, in-memory storage, and the Jaeger UI extension.
#
# Bible #29: jaegertracing/jaeger:2.15.0 (v1 is BANNED — EOL Dec 2025)
#
# Receives traces via:
#   - OTLP gRPC on :4317
#   - OTLP HTTP on :4318
#
# UI accessible on :16686
# Internal metrics on :8888 (Prometheus format)
# Healthcheck on :13133
# =============================================================================

service:
  extensions: [jaeger_storage, jaeger_query, healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
  telemetry:
    resource:
      service.name: jaeger
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
    logs:
      level: warn

extensions:
  jaeger_storage:
    backends:
      main_store:
        memory:
          max_traces: 50000
  jaeger_query:
    storage:
      traces: main_store
    ui:
      config_file: ""
  healthcheckv2:
    use_v2: true
    http:
      endpoint: "0.0.0.0:13133"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

exporters:
  jaeger_storage_exporter:
    trace_storage: main_store
