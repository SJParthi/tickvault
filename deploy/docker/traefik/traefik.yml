# =============================================================================
# tickvault — Traefik Static Configuration
# =============================================================================
# Reverse proxy for routing. Dashboard enabled for dev only.
# Dynamic routing defined in ./dynamic/services.yml
# =============================================================================

api:
  dashboard: true
  insecure: true  # Dev only — dashboard on :8080 without auth

ping: {}

# Expose Prometheus metrics from Traefik itself
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  metrics:
    address: ":8082"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: tv-network
    watch: true
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

log:
  level: WARN
  format: json

accessLog:
  format: json
  filters:
    statusCodes:
      - "400-599"
