# =============================================================================
# tickvault — Traefik Dynamic Configuration (File Provider)
# =============================================================================
# Routes all tv-* services through Traefik. Each service gets a path-based
# route so everything is accessible through a single entry point.
#
# Access pattern:  http://localhost/<service>
# Direct access:   Still works via individual ports (9000, 3000, etc.)
# =============================================================================

http:
  # -- Routers ----------------------------------------------------------------
  routers:
    # Grafana: http://localhost/grafana (basicAuth protected)
    grafana:
      rule: "PathPrefix(`/grafana`)"
      service: grafana
      entryPoints: [web]
      middlewares: [dev-basic-auth, grafana-stripprefix]

    # Prometheus: http://localhost/prometheus (basicAuth protected)
    prometheus:
      rule: "PathPrefix(`/prometheus`)"
      service: prometheus
      entryPoints: [web]
      middlewares: [dev-basic-auth, prometheus-stripprefix]

    # QuestDB Console: http://localhost/questdb (basicAuth protected)
    questdb:
      rule: "PathPrefix(`/questdb`)"
      service: questdb
      entryPoints: [web]
      middlewares: [dev-basic-auth, questdb-stripprefix]

    # Jaeger UI: http://localhost/jaeger (basicAuth protected)
    jaeger:
      rule: "PathPrefix(`/jaeger`)"
      service: jaeger
      entryPoints: [web]
      middlewares: [dev-basic-auth, jaeger-stripprefix]

    # Application API: http://localhost/api (basicAuth protected)
    # Health endpoint exposed without auth for monitoring tools (Prometheus, Docker health check)
    app-health:
      rule: "PathPrefix(`/health`)"
      service: app
      entryPoints: [web]
      priority: 70

    # All other app routes: /api/*, /portal/* — protected with basicAuth
    app-api:
      rule: "PathPrefix(`/api`) || PathPrefix(`/portal`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-basic-auth]
      priority: 68

    # Alloy UI: http://localhost/alloy
    alloy:
      rule: "PathPrefix(`/alloy`)"
      service: alloy
      entryPoints: [web]
      middlewares: [alloy-stripprefix]

  # -- Services ---------------------------------------------------------------
  services:
    grafana:
      loadBalancer:
        servers:
          - url: "http://tv-grafana:3000"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://tv-prometheus:9090"

    questdb:
      loadBalancer:
        servers:
          - url: "http://tv-questdb:9000"

    jaeger:
      loadBalancer:
        servers:
          - url: "http://tv-jaeger:16686"

    # App runs on the host (IntelliJ / cargo run), not inside Docker.
    # host.docker.internal resolves to the Docker host on both macOS and Linux.
    app:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3001"

    alloy:
      loadBalancer:
        servers:
          - url: "http://tv-alloy:12345"

  # -- Middlewares -------------------------------------------------------------
  middlewares:
    grafana-stripprefix:
      stripPrefix:
        prefixes: ["/grafana"]

    prometheus-stripprefix:
      stripPrefix:
        prefixes: ["/prometheus"]

    questdb-stripprefix:
      stripPrefix:
        prefixes: ["/questdb"]

    jaeger-stripprefix:
      stripPrefix:
        prefixes: ["/jaeger"]

    alloy-stripprefix:
      stripPrefix:
        prefixes: ["/alloy"]

    # BasicAuth for dev-mode dashboard protection.
    # Credentials: admin / tv-dev-2026 (htpasswd bcrypt).
    # Override via TV_TRAEFIK_BASIC_AUTH env var in production.
    # Generate new hash: htpasswd -nB admin
    dev-basic-auth:
      basicAuth:
        users:
          - "admin:$2y$05$YJHzDHRFfG1S.j.Jl0wMhOK3fLUf3m3HqmIVV3Dd0RZoFQq3lKqWy"
