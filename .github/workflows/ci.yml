# =============================================================================
# dhan-live-trader — CI Pipeline (6 Stages)
# =============================================================================
# Runs on every push to main/develop and every PR.
# All 6 stages must pass. Failure = build is RED. No merging.
#
# Stages:
#   1. Compile    — cargo build --release
#   2. Lint       — cargo fmt --check + cargo clippy -D warnings
#   3. Test       — cargo test --workspace
#   4. Security   — cargo deny check (advisories, licenses, bans, sources)
#   5. Perf       — cargo bench (if benchmarks exist) (parallel after test)
#   6. Coverage   — cargo tarpaulin (enforce thresholds) (parallel after test)
#
# Security: All actions pinned to SHA. No mutable tags.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Least-privilege: read-only by default
permissions:
  contents: read

# Cancel stale runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- Stage 1: Compile ----
  compile:
    name: "Stage 1 — Compile"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Build (release)
        run: cargo build --release --workspace

  # ---- Stage 2: Lint ----
  lint:
    name: "Stage 2 — Lint"
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::perf

  # ---- Stage 3: Test ----
  test:
    name: "Stage 3 — Test"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Run tests
        run: cargo test --workspace

  # ---- Stage 4: Security (parallel after test) ----
  security:
    name: "Stage 4 — Security"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-deny

      - name: Supply chain check (CVEs + licenses + bans + sources + duplicates)
        run: cargo deny check

  # ---- Stage 5: Performance (parallel after test) ----
  performance:
    name: "Stage 5 — Performance"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Run benchmarks (if any exist)
        run: |
          BENCH_FILES=$(find . -path "*/benches/*.rs" -type f 2>/dev/null | head -1)
          if [ -n "$BENCH_FILES" ]; then
            cargo bench --workspace
          else
            echo "No benchmark files found — skipping."
          fi

  # ---- Stage 6: Coverage (parallel after test) ----
  coverage:
    name: "Stage 6 — Coverage"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@0e89f6b1568a820d57d5f00f4913ab2f19727afd # cargo-tarpaulin

      - name: Run coverage (99% minimum enforced)
        run: cargo tarpaulin --workspace --fail-under 99 --out Xml --output-dir target/tarpaulin

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: target/tarpaulin/
          retention-days: 30
