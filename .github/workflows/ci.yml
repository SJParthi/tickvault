# =============================================================================
# dhan-live-trader — CI Pipeline (6 Stages)
# =============================================================================
# Runs on every push to main/develop and every PR.
# All 6 stages must pass. Failure = build is RED. No merging.
#
# Stages:
#   1. Compile    — cargo build --release
#   2. Lint       — cargo fmt --check + cargo clippy -D warnings
#   3. Test       — cargo test --workspace
#   4. Security   — cargo deny check (advisories, licenses, bans, sources)
#   5. Perf       — cargo bench (if benchmarks exist) (parallel after test)
#   6. Coverage   — cargo llvm-cov (enforce 99% threshold) (parallel after test)
#
# Security: All actions pinned to SHA. No mutable tags.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Least-privilege: read-only by default
permissions:
  contents: read

# Cancel stale runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- Commit Lint (parallel, no deps) ----
  commit-lint:
    name: "Commit Lint"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate conventional commit messages
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PATTERN='^(Merge|Revert) |^(feat|fix|refactor|test|docs|chore|perf|security)(\([a-z0-9_/-]+\))?: .+'
          FAILED=0
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "BAD: $msg"
              FAILED=1
            fi
          done < <(git log "$BASE".."$HEAD" --format='%s')
          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Commit messages must follow: <type>(<scope>): <description>"
            echo "Valid types: feat, fix, refactor, test, docs, chore, perf, security"
            exit 1
          fi
          echo "All commit messages follow conventional format."

  # ---- Stage 1: Compile ----
  compile:
    name: "Stage 1 — Compile"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Build (release)
        run: cargo build --release --workspace

  # ---- Stage 2: Lint ----
  lint:
    name: "Stage 2 — Lint"
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (warnings = errors + trading safety lints)
        run: |
          cargo clippy --workspace --all-targets -- \
            -D warnings \
            -W clippy::perf \
            -W clippy::arithmetic_side_effects \
            -W clippy::indexing_slicing \
            -W clippy::as_conversions

      - name: Check docs compile (warnings = errors)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      - name: Run doc tests
        run: cargo test --doc --workspace

      - name: Install typos-cli
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # typos-cli
        with:
          tool: typos-cli

      - name: Spell check (typos)
        run: typos .

  # ---- Stage 3: Test ----
  test:
    name: "Stage 3 — Test"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Run tests
        run: cargo test --workspace

  # ---- Stage 4: Security (parallel after test) ----
  security:
    name: "Stage 4 — Security"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-deny

      - name: Supply chain check (CVEs + licenses + bans + sources + duplicates)
        run: cargo deny check

  # ---- Stage 5: Performance (parallel after test) ----
  performance:
    name: "Stage 5 — Performance"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Run benchmarks (if any exist)
        run: |
          BENCH_FILES=$(find . -path "*/benches/*.rs" -type f 2>/dev/null | head -1)
          if [ -n "$BENCH_FILES" ]; then
            cargo bench --workspace
          else
            echo "No benchmark files found — skipping."
          fi

  # ---- Stage 6: Coverage (parallel after test) ----
  coverage:
    name: "Stage 6 — Coverage"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov

      - name: Run coverage (workspace — 99% threshold)
        run: cargo llvm-cov --workspace --fail-under-lines 99

      - name: Generate coverage report (lcov + JSON)
        run: |
          cargo llvm-cov --workspace --lcov --output-path target/llvm-cov/lcov.info
          cargo llvm-cov --workspace --json --output-path target/llvm-cov/coverage.json

      - name: Per-crate coverage gate
        run: bash scripts/coverage-gate.sh target/llvm-cov/coverage.json

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: target/llvm-cov/
          retention-days: 30
