# =============================================================================
# dhan-live-trader — CI Pipeline (Optimized: 3 Jobs)
# =============================================================================
# Runs on every push to main and every PR — but ONLY for code changes.
# All checks must pass. Failure = build is RED. No merging.
#
# Cost optimization: Heavy jobs (Build, Security) SKIP on draft PRs.
# Coverage & Perf runs ONLY on push to main (post-merge) to save CI minutes.
# Mark PR as "Ready for Review" to trigger full CI before merge.
# Commit Lint always runs on PRs (lightweight).
#
# Jobs:
#   1. Build & Verify — compile + fmt + clippy + docs + typos + machete + test
#   2. Security & Audit — cargo deny + cargo audit (PARALLEL with Job 1 — no build needed)
#   3. Coverage & Perf — llvm-cov + bench + DHAT (push to main only, after Job 1)
#   + Commit Lint (PR only, lightweight, parallel)
#
# Checks preserved (all 14):
#   cargo build --release, binary size gate, cargo fmt, clippy (strict),
#   clippy (trading safety), cargo doc, doc tests, typos, cargo machete,
#   cargo test, cargo deny, cargo audit, benchmarks + budget gate,
#   DHAT zero-alloc, llvm-cov 99% gate
#
# Security: All actions pinned to SHA. No mutable tags.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'fuzz/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/**'
      - 'deny.toml'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'crates/**'
      - 'fuzz/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/**'
      - 'deny.toml'
      - '.github/workflows/*.yml'

# Least-privilege: read-only by default
permissions:
  contents: read

# Cancel stale runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- Commit Lint (PR only, lightweight, parallel) ----
  commit-lint:
    name: "Commit Lint"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate conventional commit messages
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PATTERN='^(Merge|Revert) |^(feat|fix|refactor|test|docs|chore|perf|security)(\([a-z0-9_/-]+\))?: .+'
          FAILED=0
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "BAD: $msg"
              FAILED=1
            fi
          done < <(git log "$BASE".."$HEAD" --format='%s')
          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Commit messages must follow: <type>(<scope>): <description>"
            echo "Valid types: feat, fix, refactor, test, docs, chore, perf, security"
            exit 1
          fi
          echo "All commit messages follow conventional format."

  # ---- Job 1: Build & Verify (compile + lint + test — one runner) ----
  # Skip on draft PRs to save CI minutes — runs when PR is marked ready.
  # Smart skip: detects whether Rust source code actually changed. If only
  # config/scripts/docs changed, skips the heavy build/clippy/test steps
  # (saves ~8 min CI time + budget). Pattern-scan guards still run always.
  build-and-verify:
    name: "Build & Verify"
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect Rust source changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          RUST_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'crates/**' 'Cargo.toml' 'Cargo.lock' 'deny.toml' 'scripts/**' | head -1)
          if [ -n "$RUST_CHANGED" ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "Rust source files changed — full build pipeline"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
            echo "No Rust source changes — skipping heavy build/clippy/test"
          fi

      - name: Install Rust toolchain
        if: steps.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        if: steps.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          cache-on-failure: true

      # ---- Stage 1: Compile (skip if no Rust changes) ----
      - name: Build (release)
        if: steps.changes.outputs.rust == 'true'
        run: cargo build --release --workspace

      - name: Binary size gate (<15MB scratch Docker constraint)
        if: steps.changes.outputs.rust == 'true'
        run: bash scripts/binary-size-gate.sh

      # ---- Stage 2: Lint (skip if no Rust changes) ----
      - name: Check formatting
        if: steps.changes.outputs.rust == 'true'
        run: cargo fmt --all -- --check

      - name: Run clippy (warnings = errors)
        if: steps.changes.outputs.rust == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::perf

      - name: Run clippy (trading safety lints)
        if: steps.changes.outputs.rust == 'true'
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::arithmetic_side_effects \
            -W clippy::indexing_slicing \
            -W clippy::as_conversions \
            2>&1 | tee /tmp/clippy-trading.txt
          if grep -q 'warning:' /tmp/clippy-trading.txt; then
            echo "::warning::Trading safety lints (indexing/as_conversions) — promote to -D after cleanup"
          fi

      - name: Check docs compile (warnings = errors)
        if: steps.changes.outputs.rust == 'true'
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      - name: Run doc tests
        if: steps.changes.outputs.rust == 'true'
        run: cargo test --doc --workspace

      - name: Install typos-cli
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # typos-cli
        with:
          tool: typos-cli

      - name: Spell check (typos)
        run: typos .

      - name: Install cargo-machete
        if: steps.changes.outputs.rust == 'true'
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-machete
        with:
          tool: cargo-machete

      - name: Unused dependency check (warn only — Phase 1 deps declared ahead of use)
        if: steps.changes.outputs.rust == 'true'
        run: |
          cargo machete 2>&1 | tee /tmp/machete.txt || true
          if grep -q 'unused dependencies' /tmp/machete.txt; then
            echo "::warning::Unused dependencies found — cleanup when crate code is complete"
          fi

      # ---- Stage 2b: Data Integrity (pattern scans — always run) ----
      - name: Data integrity guard (price precision preservation)
        run: |
          chmod +x .claude/hooks/data-integrity-guard.sh
          .claude/hooks/data-integrity-guard.sh .

      - name: Pub fn test guard (every public function has a test)
        run: |
          chmod +x .claude/hooks/pub-fn-test-guard.sh
          .claude/hooks/pub-fn-test-guard.sh . all

      - name: Financial test guard (price/money functions need boundary tests)
        run: |
          chmod +x .claude/hooks/financial-test-guard.sh
          .claude/hooks/financial-test-guard.sh .

      # ---- Stage 3: Test (skip if no Rust changes) ----
      - name: Run tests
        if: steps.changes.outputs.rust == 'true'
        run: cargo test --workspace 2>&1 | tee /tmp/test-output.txt

      - name: Upload test output on failure
        if: failure() && steps.changes.outputs.rust == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-output
          path: /tmp/test-output.txt
          retention-days: 7

  # ---- Job 2: Security & Audit (parallel — no build artifacts needed) ----
  security-and-audit:
    name: "Security & Audit"
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-deny

      - name: Supply chain check (CVEs + licenses + bans + sources + duplicates)
        run: cargo deny check

      - name: Install cargo-audit
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-audit
        with:
          tool: cargo-audit

      - name: Audit (yanked crates check)
        run: |
          cargo audit --deny yanked 2>&1 | tee /tmp/audit-yanked.txt || true
          if grep -qi 'yanked\|warning' /tmp/audit-yanked.txt; then
            echo "::warning::Yanked crate(s) detected — update Cargo.lock"
            cat /tmp/audit-yanked.txt
          fi

      - name: Audit advisories (warn only — CVEs already checked by cargo deny)
        run: |
          cargo audit 2>&1 | tee /tmp/audit.txt || true
          if grep -q 'warning\|vulnerability' /tmp/audit.txt; then
            echo "::warning::Security advisories found — review and update dependencies"
          fi

  # ---- Job 3: Coverage & Performance (push to main only — saves ~10 min per PR) ----
  coverage-and-perf:
    name: "Coverage & Perf"
    needs: build-and-verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      # ---- Performance ----
      - name: Run benchmarks (if any exist)
        run: |
          BENCH_FILES=$(find . -path "*/benches/*.rs" -type f 2>/dev/null | head -1)
          if [ -n "$BENCH_FILES" ]; then
            cargo bench --workspace
          else
            echo "No benchmark files found — skipping."
          fi

      - name: Benchmark budget gate (latency budgets + regression check)
        run: bash scripts/bench-gate.sh

      - name: DHAT zero-allocation check (HARD FAIL for hot-path crates)
        run: |
          # Hot-path crates MUST have DHAT tests once they exist — no silent skip
          HOT_CRATES="core trading"
          DHAT_MISSING=""
          DHAT_FOUND=false

          for crate in $HOT_CRATES; do
            if grep -r 'dhat' "crates/$crate/" --include='*.rs' -q 2>/dev/null; then
              DHAT_FOUND=true
            else
              DHAT_MISSING="$DHAT_MISSING $crate"
            fi
          done

          if [ "$DHAT_FOUND" = "true" ]; then
            echo "Running DHAT tests (HARD FAIL — zero allocations on hot path)"
            cargo test --workspace -- --test-threads=1 dhat
          fi

          if [ -n "$DHAT_MISSING" ]; then
            echo "::warning::DHAT tests missing for hot-path crates:$DHAT_MISSING — add dhat assertions before production"
          fi

      # ---- Coverage ----
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov@0.6.16

      - name: Run coverage (workspace — collect JSON + LCOV)
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --json --output-path target/llvm-cov/coverage.json 2>&1 || {
            echo "::error::cargo llvm-cov failed — dumping environment info"
            cargo llvm-cov --version
            rustc --version
            exit 1
          }
          cargo llvm-cov report --lcov --output-path target/llvm-cov/lcov.info

      - name: Enforce workspace coverage threshold (HARD FAIL)
        run: |
          COV_PCT=$(python3 -c "
          import json, sys
          data = json.load(open('target/llvm-cov/coverage.json'))
          totals = data['data'][0]['totals']['lines']
          pct = (totals['covered'] / totals['count'] * 100) if totals['count'] > 0 else 0
          print(f'{pct:.1f}')
          ")
          THRESHOLD=95.0
          echo "Workspace line coverage: ${COV_PCT}% (threshold: ${THRESHOLD}%)"
          if python3 -c "import sys; sys.exit(0 if float('$COV_PCT') >= $THRESHOLD else 1)"; then
            echo "Coverage meets ${THRESHOLD}% target"
          else
            echo "BLOCKED: Coverage ${COV_PCT}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Enforce per-crate coverage thresholds (HARD FAIL)
        run: bash scripts/coverage-gate.sh target/llvm-cov/coverage.json

      - name: Coverage summary (PR annotation)
        if: always()
        run: |
          python3 -c "
          import json, re
          data = json.load(open('target/llvm-cov/coverage.json'))
          totals = data['data'][0]['totals']['lines']
          ws_pct = (totals['covered'] / totals['count'] * 100) if totals['count'] > 0 else 0
          # Per-crate breakdown
          crate_lines = {}
          for entry in data.get('data', []):
              for f in entry.get('files', []):
                  m = re.match(r'crates/([^/]+)/', f.get('filename', ''))
                  if m:
                      c = m.group(1)
                      s = f.get('summary', {}).get('lines', {})
                      if c not in crate_lines:
                          crate_lines[c] = {'count': 0, 'covered': 0}
                      crate_lines[c]['count'] += s.get('count', 0)
                      crate_lines[c]['covered'] += s.get('covered', 0)
          print('## Coverage Report')
          print(f'**Workspace: {ws_pct:.1f}%** (threshold: 60.0%)')
          print('')
          print('| Crate | Coverage | Threshold | Status |')
          print('|-------|----------|-----------|--------|')
          # Read per-crate thresholds
          crate_thresholds = {}
          default_thr = 60.0
          in_crates = False
          try:
              with open('quality/crate-coverage-thresholds.toml') as tf:
                  for tl in tf:
                      tl = tl.strip()
                      if tl == '[crates]':
                          in_crates = True; continue
                      if tl.startswith('[') and tl != '[crates]':
                          in_crates = False; continue
                      if in_crates and '=' in tl:
                          k, v = tl.split('=', 1)
                          crate_thresholds[k.strip()] = float(v.strip())
          except Exception:
              pass
          for name in sorted(crate_lines):
              i = crate_lines[name]
              pct = (i['covered'] / i['count'] * 100) if i['count'] > 0 else 100.0
              thr = crate_thresholds.get(name, default_thr)
              status = ':white_check_mark:' if pct >= thr else ':x:'
              print(f'| {name} | {pct:.1f}% | {thr}% | {status} |')
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: target/llvm-cov/
          retention-days: 30
