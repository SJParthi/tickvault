name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  # Post-merge catch-up 2026-07-04: a merge performed by github-actions[bot]
  # (the enable-auto-merge job merging via GITHUB_TOKEN) SUPPRESSES the
  # push-triggered run on the merge commit — GitHub never fires push workflows
  # for GITHUB_TOKEN-caused events (proven live: merge commit aafa226 of
  # PR #1392 got ZERO post-merge runs). workflow_dispatch is the documented
  # EXCEPTION to that suppression rule, so postmerge-catchup.yml dispatches
  # this workflow on main whenever main HEAD has no run. A dispatched run on
  # main MUST behave exactly like a push-to-main run (full battery incl.
  # Coverage & Perf + the ratchet artifact) — see the all-green and
  # concurrency expressions below.
  workflow_dispatch:

permissions:
  contents: read

# Merge-gate hardening 2026-07-04: PR runs stay cancel-in-progress (a new push
# supersedes the old run), but push-to-main runs are NEVER cancelled — rapid
# back-to-back merges used to cancel the post-merge Coverage/DHAT gates
# entirely (observed cancelled main runs 09:46–12:47 IST on 2026-07-03, so
# those commits' post-merge gates never ran at all). Group push runs by SHA so
# every main commit gets its own full run. workflow_dispatch runs (the
# post-merge catch-up path) are grouped by SHA too — they stand in for the
# suppressed push run and must never be cancelled either.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name != 'pull_request' && github.sha || 'pr' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # NOTE: we intentionally do NOT set `RUSTFLAGS: "-D warnings"` at the
  # env level. That would make every rustc warning across the workspace
  # fatal (including in test builds), and there are ~24 pre-existing
  # warnings that need a dedicated cleanup pass. The project's per-crate
  # `#![cfg_attr(not(test), deny(...))]` in lib.rs already enforces the
  # strictest lints on prod code. Once the cleanup PR lands, set this
  # to "-D warnings" and tighten clippy back up.

jobs:
  # -------------------------------------------------------------------------
  # Local-Runtime Branch Guard — the `local-runtime` branch is ONE-WAY
  # (operator directive 2026-07-04: "it should be merged entirely from all
  # different branches to this branch alone"). main → local-runtime merges
  # are performed by local-branch-sync.yml; local-runtime → main is FORBIDDEN
  # because the branch carries local-only overlay commits (local feed flags,
  # Docker resource bumps, the local runbook) that must never reach prod.
  # This guard FAILS any PR whose head branch is `local-runtime` (or a
  # `local-runtime/*` prefix) so All Green — and therefore auto-merge — can
  # never go green for it. Honest envelope: the guard keys on the HEAD
  # BRANCH NAME; renaming the branch bypasses it (a rename is a deliberate
  # operator act, not an accident — the accident class this blocks is
  # opening/merging a PR from the real local-runtime branch).
  # -------------------------------------------------------------------------
  local-runtime-block:
    name: "Local-Runtime Branch Guard"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Reject PRs from the one-way local-runtime branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${HEAD_REF}" == "local-runtime" || "${HEAD_REF}" == local-runtime/* ]]; then
            echo "::error::local-runtime is one-way (main → local-runtime only). \
          It carries local-only overlay commits that must never merge to main. \
          PR generally-useful changes from a normal feature branch instead."
            exit 1
          fi
          echo "Head branch '${HEAD_REF}' is not local-runtime — OK."

  # -------------------------------------------------------------------------
  # Commit Lint — conventional-commit format check on PR commits
  # -------------------------------------------------------------------------
  commit-lint:
    name: "Commit Lint"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Verify every commit on the PR follows conventional format
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          pattern='^(feat|fix|refactor|test|docs|chore|perf|security|ci|build|style|bench|revert)(\([a-z0-9_/,-]+\))?: .+'
          failed=0
          # --no-merges: merge commits (e.g. GitHub "Update Branch") use the
          # auto-generated `Merge branch ...` subject which is not authored by
          # a human and is outside the conventional-commits spec. Skipping them
          # matches the behaviour of commitlint/husky configs everywhere.
          for sha in $(git log --no-merges --format=%H "$base..$head"); do
            subject=$(git log -1 --format=%s "$sha")
            author_email=$(git log -1 --format=%ae "$sha")
            # Skip commits authored by Dependabot. Dependabot uses its own
            # `deps(<group>)(deps): bump ...` format with two scopes that no
            # human-authored project follows. We trust the bot's signature
            # and squash-merge with a project-conformant title at merge time
            # (see scripts/merge-dependabot-pr.sh and the README for the
            # squash-title format the bot's PR description provides).
            if [[ "$author_email" == "49699333+dependabot[bot]@users.noreply.github.com" ]] \
                || [[ "$author_email" == "support@dependabot.com" ]]; then
              echo "::notice::Skipping commit-lint for Dependabot commit $sha (subject: $subject)"
              continue
            fi
            if ! [[ "$subject" =~ $pattern ]]; then
              echo "::error::Commit $sha does not follow conventional format: $subject"
              failed=1
            fi
          done
          exit $failed

  # -------------------------------------------------------------------------
  # Design-First Wall — no implementation change (crates/*/src/**.rs) may land
  # without an APPROVED plan referencing the changed crate. Runs the SAME hook
  # the local pre-push gate uses (.claude/hooks/plan-gate.sh), so a push that
  # bypassed local hooks (--no-verify, a web edit, a fork) is still caught.
  # See .claude/rules/project/design-first-wall.md.
  # -------------------------------------------------------------------------
  design-first-wall:
    name: "Design-First Wall"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Enforce design-first wall (plan-gate)
        shell: bash
        env:
          # The hook's documented base-ref override (L6): use the exact PR base
          # commit for the ${BASE}...HEAD changed-file diff — no reliance on
          # origin/main ref resolution inside the runner.
          PLAN_GATE_BASE: ${{ github.event.pull_request.base.sha }}
          CLAUDE_PROJECT_DIR: ${{ github.workspace }}
        run: bash .claude/hooks/plan-gate.sh "${{ github.workspace }}"

  # -------------------------------------------------------------------------
  # Deploy Lint — the SSM `--parameters 'commands=[ ... ]'` block in the deploy
  # workflows is a SINGLE-QUOTED runner string; a literal apostrophe inside it
  # closes the quote early and a following `(` then fails the whole deploy with
  # "syntax error near unexpected token `('" (regression: CI run 27210316913,
  # 2026-06-09). This guard fails the build if that ever reappears.
  # -------------------------------------------------------------------------
  deploy-lint:
    name: "Deploy Lint (SSM quoting)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Validate SSM commands[] quoting in deploy workflows
        shell: bash
        run: bash scripts/validate-deploy-ssm-quoting.sh "${{ github.workspace }}"

  # -------------------------------------------------------------------------
  # Build & Verify — fmt + clippy + lib tests per crate.
  #
  # Split fmt + clippy (fast, one runner) from per-crate `cargo nextest run
  # -p <crate>` so the 7,250-test workspace parallelizes across 6 runners
  # instead of serializing on one. Each crate finishes inside the runner's
  # 60-minute budget even on a cold cache.
  # -------------------------------------------------------------------------
  build-and-verify:
    name: "Build & Verify"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain 1.95.0
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # SHA-pinned (was @stable, supply-chain hardening 2026-04-25)
        with:
          toolchain: '1.95.0'
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-and-verify-fmt-clippy
          cache-on-failure: true

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (workspace, libs + bins only)
        # NOTE: we deliberately do NOT pass `--all-targets` or
        # `-D warnings` here. Test code legitimately uses `eprintln!`
        # (calibration output) and there are ~24 pre-existing lib
        # warnings scheduled for a follow-up cleanup pass. Prod code is
        # still protected via `#![cfg_attr(not(test), deny(...))]` in
        # each crate's lib.rs.
        run: cargo clippy --workspace --no-deps

  # -------------------------------------------------------------------------
  # Test — one job per crate, parallel. Matrix + fail-fast: false so a
  # failure in one crate surfaces the failure signal without cancelling
  # the others.
  #
  # Runs the FULL per-crate suite (unit + integration tests), NOT just
  # `--lib`. 2026-06-02: the prior `--lib`-only gate let integration test
  # targets in `crates/*/tests/` rot silently — they only ran in the
  # post-merge Coverage & Perf job, which sat chronically RED for days
  # (10 stale integration targets, fixed in #988). Integration tests are
  # CI-safe by design: QuestDB/Docker/timing-dependent ones are `#[ignore]`d
  # (run manually) and the rest exercise disconnected/spill paths via
  # `new_disconnected()`, so they need no service container. Running them
  # here catches the rot at PR time instead of days later post-merge.
  # -------------------------------------------------------------------------
  test:
    name: "Test (${{ matrix.crate }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        crate: [common, storage, core, trading, api, app]
        # Crates that define the `daily_universe_fetcher` feature must be
        # tested WITH it enabled — otherwise the entire daily-universe
        # subsystem (CSV downloader/parser/extractors + the warm-resubscribe
        # snapshot) is #[cfg]-excluded and its --lib unit tests run vacuously
        # (false-OK, charter Rule 11). These `include` entries merge a
        # `features` arg into the matching crate job; crates without an entry
        # get an empty `features` string.
        include:
          - crate: core
            features: "--features daily_universe_fetcher"
          - crate: storage
            features: "--features daily_universe_fetcher"
          - crate: app
            features: "--features daily_universe_fetcher"
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain 1.95.0
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # SHA-pinned (was @stable, supply-chain hardening 2026-04-25)
        with:
          toolchain: '1.95.0'

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-${{ matrix.crate }}
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo nextest run -p tickvault-${{ matrix.crate }} (lib + integration, profile=ci)
        # Full per-crate suite — unit (lib) AND integration (tests/) targets.
        # `#[ignore]`d tests (QuestDB/Docker/timing-dependent) are skipped by
        # nextest, exactly as in the post-merge Coverage & Perf job.
        # Profile `ci` (.config/nextest.toml) caps per-test wall-clock
        # at 90 s so runaway tests fail fast. Flaky tests get 1 retry
        # before being marked FAIL.
        run: cargo nextest run -p tickvault-${{ matrix.crate }} ${{ matrix.features }} --no-fail-fast --profile ci

  # -------------------------------------------------------------------------
  # Security & Audit — delegated to security-audit.yml workflow.
  # Kept as a required check so branch protection continues to match; the
  # actual audit job lives in security-audit.yml to stay modular.
  # -------------------------------------------------------------------------
  security-and-audit:
    name: "Security & Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain 1.95.0
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # SHA-pinned (was @stable, supply-chain hardening 2026-04-25)
        with:
          toolchain: '1.95.0'

      # Prebuilt binaries via taiki-e/install-action (seconds) instead of
      # `cargo install --locked` from source (observed 30-65+ min stalls on
      # fresh runners during crates.io/network degradation, 2026-07-03).
      # Pinned by full commit SHA (repo convention) + exact tool versions
      # (both verified present in the v2.82.7 manifests; no ^/~ ranges).
      - name: Install cargo-audit + cargo-deny (prebuilt, pinned)
        id: install-audit-tools
        continue-on-error: true
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7 SHA-pinned
        with:
          tool: cargo-audit@0.22.2,cargo-deny@0.19.9

      # Fallback: if the prebuilt fetch ever fails (GitHub release asset
      # outage, checksum mismatch), fall back to the original from-source
      # install so the job never gets weaker — only faster on the happy path.
      - name: Install cargo-audit + cargo-deny (from-source fallback)
        if: steps.install-audit-tools.outcome == 'failure'
        run: |
          cargo install --locked cargo-audit
          cargo install --locked cargo-deny

      - name: cargo deny check
        run: cargo deny check

      - name: cargo audit
        run: cargo audit --deny yanked

  # -------------------------------------------------------------------------
  # Coverage & Perf — runs on PRs AND on push-to-main (merge-gate hardening
  # 2026-07-04). Runs cargo-llvm-cov and enforces
  # the ratcheted per-crate floors in quality/crate-coverage-thresholds.toml
  # (floors only move up; 100% is the target, not the current floor).
  # NOTE: "ratcheted per-crate floors" must stay CONTIGUOUS on one line —
  # the B7 honesty ratchet crates/storage/tests/coverage_claim_honesty_guard.rs
  # does a literal substring check on this file (proven: run 28692694701's
  # Test (storage) failed when a reflow split the phrase across lines).
  #
  # HISTORY: this job was `if: github.event_name == 'push'` (post-merge only)
  # until 2026-07-04. That let coverage-floor breaches MERGE and turn main red
  # (proven: main run 28675492296 — storage 90.90% < 91.2% floor, breached by
  # PRs that were already merged). It now runs pre-merge on every PR and feeds
  # the All Green fan-in gate. The push-to-main run is KEPT so the ratchet
  # artifact continues to be produced on main. A workflow_dispatch run on main
  # (the post-merge catch-up for GITHUB_TOKEN-suppressed bot merges,
  # 2026-07-04) runs this job too — no `if:` gate excludes it — so a
  # dispatched catch-up run produces the same coverage ratchet artifact a
  # push run would have.
  # -------------------------------------------------------------------------
  coverage-and-perf:
    name: "Coverage & Perf"
    needs: build-and-verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain 1.95.0 + llvm-tools
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # SHA-pinned (was @stable, supply-chain hardening 2026-04-25)
        with:
          toolchain: '1.95.0'
          components: llvm-tools-preview

      - name: Cache cargo + llvm-cov build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-coverage
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov

      - name: Run coverage (workspace, JSON output)
        run: |
          cargo llvm-cov clean --workspace
          # DHAT zero-alloc tests (dhat_instrument_registry / dhat_token_handle /
          # dhat_tick_persistence) assert EXACT heap-allocation counts. Under
          # llvm-cov the coverage instrumentation ITSELF adds allocations, so
          # those assertions fail (exit 101) and abort the whole coverage run —
          # this is why "Coverage & Perf" was RED on main for days and never
          # produced coverage.json. DHAT-vs-coverage is a known incompatibility.
          # Skip the dhat_* tests HERE only; they STILL run + enforce zero-alloc
          # in the normal Test (core)/Test (storage) jobs, so the guarantee holds.
          #
          # cargo-llvm-cov does NOT create parent directories for
          # --output-path: once the api env-race was fixed (#1072) and the
          # test phase finally passed, report generation failed with
          # "failed to create file target/llvm-cov/coverage.json: No such
          # file or directory" (main run 27248515406). The chronic test
          # failure had masked this second bug for days. Create the dir
          # AFTER `clean` (which removes coverage artifacts).
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --no-fail-fast --json \
            --output-path target/llvm-cov/coverage.json \
            -- --skip dhat_

      - name: Enforce per-crate coverage thresholds
        run: bash scripts/coverage-gate.sh target/llvm-cov/coverage.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/llvm-cov/coverage.json
          retention-days: 14

  # -------------------------------------------------------------------------
  # Repo Guards — runs the self-contained local guard scripts SERVER-SIDE
  # (merge-gate hardening 2026-07-04). Before this job, the 15+-script local
  # hook battery ran ONLY on developer machines: a `git push --no-verify`, a
  # web-UI edit, or a Cowork push bypassed banned-pattern / data-integrity /
  # O(1)-dedup / boot-symmetry scanning entirely (only plan-gate + the secret
  # scanner had server-side twins).
  #
  # Only the PURE SOURCE-SCAN guards run here — the ratchet guards
  # (test-count, pub-fn-test "all" mode, financial-test) depend on gitignored
  # local baseline files and would establish a fresh baseline (vacuous pass)
  # on every CI checkout, and the diff-based guards (pub-fn-wiring) scan the
  # staged diff which is empty on a clean checkout. Each script wired below
  # was verified to exit 0 from a fresh checkout of main on 2026-07-04.
  # The dhan-locked-facts gate is a cargo test that already runs inside
  # Test (common), so it is not duplicated here.
  # -------------------------------------------------------------------------
  repo-guards:
    name: "Repo Guards"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # 2026-07-05: guards that the hot-path filter paths inside the two
      # scanners below always match REAL files — a rename can never blind
      # them again (the pre-fix filters referenced crates/websocket/,
      # crates/oms/ and core/src/ticker/, none of which exist).
      - name: Hot-path scanner self-test (zero-match guard)
        shell: bash
        run: bash .claude/hooks/hot-path-scanner-selftest.sh "$GITHUB_WORKSPACE"

      - name: Banned pattern scan (full workspace)
        shell: bash
        run: |
          set -euo pipefail
          ALL_RS=$(find crates -name '*.rs' -not -path '*/target/*' | tr '\n' ' ')
          bash .claude/hooks/banned-pattern-scanner.sh "$GITHUB_WORKSPACE" $ALL_RS

      - name: Data integrity guard (price precision, IST timestamp rules)
        shell: bash
        run: bash .claude/hooks/data-integrity-guard.sh "$GITHUB_WORKSPACE"

      - name: O(1) latency + dedup scanner
        shell: bash
        run: |
          set -euo pipefail
          ALL_RS=$(find crates -name '*.rs' -not -path '*/target/*' | tr '\n' ' ')
          bash .claude/hooks/dedup-latency-scanner.sh "$GITHUB_WORKSPACE" $ALL_RS

      - name: Boot symmetry + state-machine wiring guard (S6-G3+G4)
        shell: bash
        run: bash .claude/hooks/boot-symmetry-guard.sh

      # 2026-07-07 Telegram UX overhaul (judge final contract, Module 5):
      # the telegram-webhook Lambda's house-style formatters are unit-tested
      # server-side so a Lambda regression cannot ship silently. Added to
      # the EXISTING Repo Guards job on purpose — no new job, the All Green
      # `needs:` list is unchanged.
      - name: Telegram Lambda house-style unit tests
        shell: bash
        run: make lambda-test

      # QuestDB console lambda suites + deploy-gate scenario harness
      # (2026-07-06 shell-hang fix; simplified in the 2026-07-08 closure
      # pass). Before this step the console lambda Python suites ran in NO CI
      # lane — a PR reverting the B4 r3 handler fix merged with every check
      # green. Both suites are stdlib-only (<1s) and run unconditionally
      # inside this already-All-Green-gated job (a step in an existing needed
      # job, NOT a new job — merge-gate-lock §5 forbids a PR-relevant job
      # outside all-green's needs list). The harness self-extracts the
      # console smoke-gate step from terraform-apply.yml and drives its
      # decision tree end-to-end through stubbed terraform/aws/curl/sleep;
      # it ABORTS loudly if the gate step is deleted or renamed. Honest
      # residual: a `continue-on-error:` added to the gate step is NOT
      # caught (the harness executes the step's script, not its YAML
      # attributes), and nothing ratchets this ci.yml step's own existence.
      - name: QuestDB console lambda unit tests (back + front)
        shell: bash
        run: |
          set -euo pipefail
          for d in deploy/aws/lambda/questdb-console-proxy deploy/aws/lambda/questdb-console-front; do
            echo "== ${d} =="
            (cd "$d" && python3 -m unittest test_handler -v)
          done
          echo "== questdb-console-gate-matrix.sh (terraform-apply.yml console smoke-gate scenarios) =="
          bash scripts/questdb-console-gate-matrix.sh

  # -------------------------------------------------------------------------
  # All Green — the single merge choke point (merge-gate hardening 2026-07-04).
  #
  # WHY: on 2026-07-03 three PRs (#1387, #1388, #1382) merged seconds BEFORE
  # their Test (storage) job failed, because only 4 checks were
  # branch-protection-required and auto-merge armed at PR open. This fan-in
  # job needs EVERY PR-relevant job in this workflow and fails unless every
  # one of them succeeded. Branch protection requires "All Green" (plus the
  # original 4), so nothing can merge while any part of the suite is red,
  # pending, or cancelled.
  #
  # Adding a new job to this workflow? Add it to the `needs:` list below —
  # a job not listed here does NOT gate merges.
  #
  # GUARD CHOICE — `!cancelled()`, NOT `always()` (fixed 2026-07-04, same day):
  # with `always()`, All Green also executed inside a run that was CANCELLED
  # by the PR concurrency group (a newer event superseding an older run —
  # proven live on PR #1392: the PR-open run was superseded by the
  # ready-for-review run seconds later, and the superseded run's All Green
  # stamped a misleading RED on the SHA with every need `cancelled`).
  # `!cancelled()` keeps the essential property — All Green still RUNS when
  # upstream jobs merely FAIL, so it reports the red verdict — but SKIPS when
  # the whole run was cancelled, leaving the verdict to the superseding run.
  # Safety: a skipped All Green can never arm auto-merge (enable-auto-merge
  # requires result == 'success'), and a cancelled run also leaves
  # Build & Verify / Security & Audit / etc. in `cancelled` state, which
  # blocks required checks — a cancelled suite can never read as mergeable.
  # -------------------------------------------------------------------------
  all-green:
    name: "All Green"
    needs:
      - local-runtime-block
      - commit-lint
      - design-first-wall
      - deploy-lint
      - build-and-verify
      - test
      - security-and-audit
      - coverage-and-perf
      - repo-guards
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify every needed job succeeded
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import json, os, sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          event = os.environ["EVENT_NAME"]

          # Jobs that are PR-only by design (their own `if:` skips them on
          # push-to-main). A 'skipped' result for these is legitimate ONLY on
          # push events and on workflow_dispatch runs (the post-merge catch-up
          # dispatcher fires this workflow on main to stand in for a
          # bot-merge-suppressed push run — same non-PR semantics); on a
          # pull_request event they MUST have run.
          PR_ONLY_JOBS = {"commit-lint", "design-first-wall", "local-runtime-block"}
          NON_PR_EVENTS = {"push", "workflow_dispatch"}

          failed = []
          for job, meta in sorted(needs.items()):
              result = meta.get("result")
              if result == "success":
                  continue
              if result == "skipped" and event in NON_PR_EVENTS and job in PR_ONLY_JOBS:
                  continue
              # Everything else — failure, cancelled, or an unexpected skip —
              # fails the gate. 'skipped' counts as FAILURE on pull_request
              # events so a silently-skipped job can never fake green.
              failed.append(f"{job}={result}")

          if failed:
              print("::error::All Green FAILED — non-success needed jobs: "
                    + ", ".join(failed))
              sys.exit(1)
          print(f"All Green: every needed job succeeded (event={event}).")
          PYEOF

  # -------------------------------------------------------------------------
  # Enable Auto-Merge — armed ONLY after All Green succeeds (merge-gate
  # hardening 2026-07-04). This replaces the at-open arming that lived in
  # auto-merge.yml: arming at PR open meant the merge fired the instant the
  # (then only 4) required checks passed, while Test/Coverage were still
  # running. Arming here, strictly AFTER the full suite is green, means even
  # a branch-protection misconfiguration cannot merge a red PR through this
  # bot path.
  #
  # SECURITY (preserved verbatim from auto-merge.yml / PR #1390 — do NOT
  # weaken): the PR must originate from a branch in THIS repository, not a
  # fork. `github.head_ref` is fully attacker-controlled on a fork PR — a
  # stranger could fork this PUBLIC repo, push a branch named
  # `claude/anything`, open a PR, and have the bot arm auto-merge. The
  # `head.repo.full_name == github.repository` check makes same-repo origin
  # the non-negotiable requirement; the actor / claude-branch clauses only
  # further narrow WITHIN same-repo. Draft PRs are never armed.
  # -------------------------------------------------------------------------
  enable-auto-merge:
    name: "Enable Auto-Merge"
    needs: all-green
    if: >-
      github.event_name == 'pull_request' &&
      needs.all-green.result == 'success' &&
      github.event.pull_request.draft != true &&
      github.event.pull_request.head.repo.full_name == github.repository && (
      github.actor == 'dependabot[bot]' ||
      github.actor == 'renovate[bot]' ||
      github.actor == 'SJParthi' ||
      startsWith(github.head_ref, 'claude/')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
