# =============================================================================
# dhan-live-trader — CI Pipeline (Optimized: 3 Jobs)
# =============================================================================
# Runs on every push to main/develop and every PR — but ONLY for code changes.
# All checks must pass. Failure = build is RED. No merging.
#
# Jobs:
#   1. Build & Verify — compile + fmt + clippy + docs + typos + machete + test
#   2. Security & Audit — cargo deny + cargo audit (parallel after Job 1)
#   3. Coverage & Perf — llvm-cov + bench + DHAT (parallel after Job 1)
#   + Commit Lint (PR only, lightweight, parallel)
#
# Checks preserved (all 14):
#   cargo build --release, binary size gate, cargo fmt, clippy (strict),
#   clippy (trading safety), cargo doc, doc tests, typos, cargo machete,
#   cargo test, cargo deny, cargo audit, benchmarks + budget gate,
#   DHAT zero-alloc, llvm-cov 99% gate
#
# Security: All actions pinned to SHA. No mutable tags.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/**'
      - 'deny.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/**'
      - 'deny.toml'
      - '.github/workflows/ci.yml'

# Least-privilege: read-only by default
permissions:
  contents: read

# Cancel stale runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- Commit Lint (PR only, lightweight, parallel) ----
  commit-lint:
    name: "Commit Lint"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate conventional commit messages
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PATTERN='^(Merge|Revert) |^(feat|fix|refactor|test|docs|chore|perf|security)(\([a-z0-9_/-]+\))?: .+'
          FAILED=0
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "BAD: $msg"
              FAILED=1
            fi
          done < <(git log "$BASE".."$HEAD" --format='%s')
          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Commit messages must follow: <type>(<scope>): <description>"
            echo "Valid types: feat, fix, refactor, test, docs, chore, perf, security"
            exit 1
          fi
          echo "All commit messages follow conventional format."

  # ---- Job 1: Build & Verify (compile + lint + test — one runner) ----
  build-and-verify:
    name: "Build & Verify"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      # ---- Stage 1: Compile ----
      - name: Build (release)
        run: cargo build --release --workspace

      - name: Binary size gate (<15MB scratch Docker constraint)
        run: bash scripts/binary-size-gate.sh

      # ---- Stage 2: Lint ----
      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::perf

      - name: Run clippy (trading safety lints — arithmetic overflow = HARD FAIL)
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::arithmetic_side_effects \
            -W clippy::indexing_slicing \
            -W clippy::as_conversions \
            2>&1 | tee /tmp/clippy-trading.txt
          if grep -q 'warning:' /tmp/clippy-trading.txt; then
            echo "::warning::Trading safety lints (indexing/as_conversions) — promote to -D after cleanup"
          fi

      - name: Check docs compile (warnings = errors)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      - name: Run doc tests
        run: cargo test --doc --workspace

      - name: Install typos-cli
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # typos-cli
        with:
          tool: typos-cli

      - name: Spell check (typos)
        run: typos .

      - name: Install cargo-machete
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-machete
        with:
          tool: cargo-machete

      - name: Unused dependency check (warn only — Phase 1 deps declared ahead of use)
        run: |
          cargo machete 2>&1 | tee /tmp/machete.txt || true
          if grep -q 'unused dependencies' /tmp/machete.txt; then
            echo "::warning::Unused dependencies found — cleanup when crate code is complete"
          fi

      # ---- Stage 3: Test ----
      - name: Run tests
        run: cargo test --workspace 2>&1 | tee /tmp/test-output.txt

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-output
          path: /tmp/test-output.txt
          retention-days: 7

  # ---- Job 2: Security & Audit (parallel after build-and-verify) ----
  security-and-audit:
    name: "Security & Audit"
    needs: build-and-verify
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-deny

      - name: Supply chain check (CVEs + licenses + bans + sources + duplicates)
        run: cargo deny check

      - name: Install cargo-audit
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-audit
        with:
          tool: cargo-audit

      - name: Audit (yanked crates — hard block)
        run: cargo audit --deny yanked

      - name: Audit advisories (warn only — CVEs already checked by cargo deny)
        run: |
          cargo audit 2>&1 | tee /tmp/audit.txt || true
          if grep -q 'warning\|vulnerability' /tmp/audit.txt; then
            echo "::warning::Security advisories found — review and update dependencies"
          fi

  # ---- Job 3: Coverage & Performance (parallel after build-and-verify) ----
  coverage-and-perf:
    name: "Coverage & Perf"
    needs: build-and-verify
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.93.1"
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      # ---- Performance ----
      - name: Run benchmarks (if any exist)
        run: |
          BENCH_FILES=$(find . -path "*/benches/*.rs" -type f 2>/dev/null | head -1)
          if [ -n "$BENCH_FILES" ]; then
            cargo bench --workspace
          else
            echo "No benchmark files found — skipping."
          fi

      - name: Benchmark budget gate (latency budgets + regression check)
        run: bash scripts/bench-gate.sh

      - name: DHAT zero-allocation check (if dhat tests exist)
        run: |
          DHAT_TESTS=$(grep -r 'dhat' crates/ --include='*.rs' -l 2>/dev/null | head -1)
          if [ -n "$DHAT_TESTS" ]; then
            cargo test --workspace -- --test-threads=1 dhat
          else
            echo "No DHAT tests found — skipping."
          fi

      # ---- Coverage ----
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov

      - name: Run coverage (workspace — collect JSON + LCOV)
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --json --output-path target/llvm-cov/coverage.json
          cargo llvm-cov report --lcov --output-path target/llvm-cov/lcov.info

      - name: Enforce workspace coverage threshold (HARD FAIL)
        run: |
          COV_PCT=$(python3 -c "
          import json, sys
          data = json.load(open('target/llvm-cov/coverage.json'))
          totals = data['data'][0]['totals']['lines']
          pct = (totals['covered'] / totals['count'] * 100) if totals['count'] > 0 else 0
          print(f'{pct:.1f}')
          ")
          THRESHOLD=60.0
          echo "Workspace line coverage: ${COV_PCT}% (threshold: ${THRESHOLD}%)"
          if python3 -c "import sys; sys.exit(0 if float('$COV_PCT') >= $THRESHOLD else 1)"; then
            echo "Coverage meets ${THRESHOLD}% target"
          else
            echo "BLOCKED: Coverage ${COV_PCT}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Enforce per-crate coverage thresholds (HARD FAIL)
        run: bash scripts/coverage-gate.sh target/llvm-cov/coverage.json

      - name: Coverage summary (PR annotation)
        if: always()
        run: |
          python3 -c "
          import json, re
          data = json.load(open('target/llvm-cov/coverage.json'))
          totals = data['data'][0]['totals']['lines']
          ws_pct = (totals['covered'] / totals['count'] * 100) if totals['count'] > 0 else 0
          # Per-crate breakdown
          crate_lines = {}
          for entry in data.get('data', []):
              for f in entry.get('files', []):
                  m = re.match(r'crates/([^/]+)/', f.get('filename', ''))
                  if m:
                      c = m.group(1)
                      s = f.get('summary', {}).get('lines', {})
                      if c not in crate_lines:
                          crate_lines[c] = {'count': 0, 'covered': 0}
                      crate_lines[c]['count'] += s.get('count', 0)
                      crate_lines[c]['covered'] += s.get('covered', 0)
          print('## Coverage Report')
          print(f'**Workspace: {ws_pct:.1f}%** (threshold: 60.0%)')
          print('')
          print('| Crate | Coverage | Threshold | Status |')
          print('|-------|----------|-----------|--------|')
          # Read per-crate thresholds
          crate_thresholds = {}
          default_thr = 60.0
          in_crates = False
          try:
              with open('quality/crate-coverage-thresholds.toml') as tf:
                  for tl in tf:
                      tl = tl.strip()
                      if tl == '[crates]':
                          in_crates = True; continue
                      if tl.startswith('[') and tl != '[crates]':
                          in_crates = False; continue
                      if in_crates and '=' in tl:
                          k, v = tl.split('=', 1)
                          crate_thresholds[k.strip()] = float(v.strip())
          except Exception:
              pass
          for name in sorted(crate_lines):
              i = crate_lines[name]
              pct = (i['covered'] / i['count'] * 100) if i['count'] > 0 else 100.0
              thr = crate_thresholds.get(name, default_thr)
              status = ':white_check_mark:' if pct >= thr else ':x:'
              print(f'| {name} | {pct:.1f}% | {thr}% | {status} |')
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: target/llvm-cov/
          retention-days: 30
