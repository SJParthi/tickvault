name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
jobs:
  commit-lint:
    name: "Commit Lint"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: exit 0
  build-and-verify:
    name: "Build & Verify"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: exit 0
  security-and-audit:
    name: "Security & Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: exit 0
  coverage-and-perf:
    name: "Coverage & Perf"
    needs: build-and-verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: exit 0
