# terraform-apply.yml — auto-fire `terraform apply` when AWS infra changes land on main.
#
# Why this exists (operator-charter-forever.md §C "100% no manual inputs"):
#   Before this workflow, every infra change required the operator to type
#   `terraform apply` on their Mac. The charter forbids manual typing. This
#   workflow closes that gap: on push to main when `deploy/aws/terraform/**`
#   changes, GitHub Actions runs `terraform plan` (always) + `terraform apply`
#   (only on main push, only outside market hours). Outputs go to Telegram
#   via existing SNS routing.
#
# Triggers:
#   - Pull request → `terraform plan` only (safe review)
#   - Push to main with infra path filter → plan + apply (fully automated)
#   - workflow_dispatch → on-demand operator override (e.g. emergency apply)
#   - schedule 10:20 UTC = 15:50 IST Mon–Fri → POST-CLOSE RETRY. When a merge
#     lands during market hours, the push-triggered apply is BLOCKED by the
#     market-hours guard below and the infra change would otherwise silently
#     never deploy (e.g. run #175: PR #1308's Lambda change blocked at 06:10
#     UTC, apply skipped forever). This mirrors deploy-aws-after-close.yml's
#     10:16 UTC re-fire for the app. The scheduled run does the normal
#     preflight + plan, then applies ONLY if `terraform plan -detailed-exitcode`
#     returns 2 (changes pending). Exit 0 → the no-drift job logs
#     "no drift, nothing to apply" and the run exits green (no false-OK).
#     10:20 UTC is safely past the guard's 10:15 UTC edge — the guard itself
#     is unchanged and passes naturally.
#   - schedule 10:50 + 11:35 UTC Mon–Fri → SCHEDULER-DROP retries (2026-07-02
#     incident): GitHub's cron scheduler DROPPED the single 10:20 UTC slot
#     today (repo-wide ~09:40–10:30 UTC drop window; dropped slots never
#     queue — they are silently skipped), so a market-hours-blocked apply
#     stayed stranded a further day. Two staggered retries give three
#     independent daily chances. Each firing is idempotent: apply runs ONLY
#     when `terraform plan -detailed-exitcode` returns 2; exit 0 → the
#     no-drift job logs "no drift, nothing to apply" and the run is green.
#     Terraform runs on GitHub runners against AWS APIs, so the 16:30 IST EC2
#     auto-stop is irrelevant to these slots. HONEST ENVELOPE: cron redundancy
#     REDUCES but cannot ELIMINATE GitHub scheduler risk — the scheduler is an
#     external system and can drop any or all slots.
#
# Auth precedence (try in order):
#   1. OIDC role via secrets.AWS_TERRAFORM_ROLE_ARN (preferred, set after first run)
#   2. Long-lived keys via secrets.AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
#      (bootstrap only — delete after first successful OIDC run)
#
# Concurrency: serial — never two terraform apply at once. DynamoDB lock
# provides a second layer of defense.

name: terraform-apply

on:
  pull_request:
    paths:
      - 'deploy/aws/terraform/**'
      - '.github/workflows/terraform-apply.yml'
  push:
    branches: [main]
    paths:
      - 'deploy/aws/terraform/**'
      - '.github/workflows/terraform-apply.yml'
  schedule:
    # 10:20 UTC = 15:50 IST Mon–Fri — post-close retry for market-hours-blocked
    # applies (just past the guard's 09:00-15:45 IST / 03:30-10:15 UTC band).
    # 10:50 UTC = 16:20 IST + 11:35 UTC = 17:05 IST — scheduler-drop retries
    # (2026-07-02 — see header; plan-gated apply makes extras free no-ops).
    - cron: '20 10 * * 1-5'
    - cron: '50 10 * * 1-5'
    - cron: '35 11 * * 1-5'
  workflow_dispatch:
    inputs:
      confirm_market_hours:
        description: 'Apply during market hours? Type "yes" to override the guard.'
        required: false
        default: 'no'
      skip_apply:
        description: 'Plan only, skip apply even on main. Type "yes" to skip.'
        required: false
        default: 'no'

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false # never interrupt a running apply

permissions:
  id-token: write   # OIDC for AWS role assumption
  contents: read
  pull-requests: write # so plan output can be posted as PR comment

env:
  TF_VAR_aws_region: ap-south-1
  TF_VAR_operator_cidr: "0.0.0.0/0" # CI runs from GH IPs; SSH SG is locked by separate operator override
  TF_VAR_operator_email: "sjparthi93@gmail.com" # registered alert destination
  TF_VAR_ami_id: ami-0fa0340d4a8bdd6ee
  # Operator portal: opt prod IN via CI (the terraform variable default stays
  # false, so local/other applies are unaffected). This creates the portal
  # Lambda + Function URL on the next apply.
  TF_VAR_enable_operator_control_lambda: "true"
  # B4 QuestDB console: opt prod IN the same way (variable default stays
  # false). Creates the console API-GW + front/back Lambdas + the SG-to-SG
  # 9000 ingress on the next apply.
  TF_VAR_enable_questdb_console: "true"
  # B9 deploy provenance: the git SHA of the repo tree this plan/apply runs
  # from — surfaces as the operator-portal footer "portal <sha7>" and the
  # terraform output portal_git_sha. Workflow-level env so BOTH the plan
  # and apply jobs see the same value.
  TF_VAR_portal_git_sha: ${{ github.sha }}
  AWS_REGION: ap-south-1
  TF_DIR: deploy/aws/terraform

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 0: preflight — check whether bootstrap secrets exist.
  #
  # The operator-charter one-time bootstrap (BOOTSTRAP-ONE-TIME.md) is
  # mathematically required by AWS IAM: a third party (GitHub Actions)
  # cannot self-authorize. Until the operator pastes either
  # AWS_TERRAFORM_ROLE_ARN (OIDC, preferred) or AWS_ACCESS_KEY_ID +
  # AWS_SECRET_ACCESS_KEY (bootstrap), this workflow CANNOT talk to AWS.
  #
  # Pre-bootstrap state: this job exits 0 with a friendly skip message,
  # downstream jobs do not run, the PR check passes. Post-bootstrap:
  # downstream jobs activate automatically — no workflow edit needed.
  # ─────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight — check bootstrap secrets
    runs-on: ubuntu-24.04
    outputs:
      bootstrap_ready: ${{ steps.check.outputs.bootstrap_ready }}
    steps:
      - name: Check whether AWS bootstrap secrets are configured
        id: check
        env:
          OIDC_ROLE: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -n "${OIDC_ROLE}" ] || [ -n "${ACCESS_KEY}" ]; then
            echo "bootstrap_ready=true" >> $GITHUB_OUTPUT
            echo "✅ Bootstrap secrets present — terraform plan + apply will run."
          else
            echo "bootstrap_ready=false" >> $GITHUB_OUTPUT
            echo "::notice::AWS bootstrap secrets not yet configured — skipping terraform plan + apply."
            echo "::notice::Follow deploy/aws/terraform/BOOTSTRAP-ONE-TIME.md (40 sec) to enable automation."
            echo ""
            echo "Skipped jobs: terraform-plan, guard-market-hours, terraform-apply, notify."
            echo "This is the EXPECTED state for a fresh repo. Workflow exits 0."
          fi

  # ─────────────────────────────────────────────────────────────────
  # Job 1: terraform plan — runs on EVERY trigger (post-bootstrap), gates Job 2
  # ─────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-24.04
    needs: preflight
    if: needs.preflight.outputs.bootstrap_ready == 'true'
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC if available, else access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tv-github-terraform-plan-${{ github.run_id }}

      - name: Resolve AWS account id
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "Using AWS account ${ACCOUNT_ID}"

      - name: Bootstrap S3 state backend + DynamoDB lock (idempotent)
        run: bash scripts/aws-bootstrap-state-backend.sh "${{ steps.aws_account.outputs.account_id }}" "${{ env.AWS_REGION }}"

      - name: terraform fmt -check
        run: terraform -chdir=${{ env.TF_DIR }} fmt -check -recursive

      # AWS rejects non-ASCII in security-group RULE descriptions (issue #229 —
      # an em-dash in main.tf's B4 ingress description hard-failed apply).
      # Guard: scan ingress/egress blocks in all .tf files for non-ASCII
      # description values. Variable/output/alarm descriptions are unaffected.
      - name: ASCII-only SG rule descriptions
        run: |
          perl -ne '
            $in = 1 if /^\s*(dynamic\s+")?(ingress|egress)"?\s*\{/;
            if ($in) {
              $d += () = /\{/g; $d -= () = /\}/g;
              if (/^\s*description\s*=/ && /[^\x00-\x7F]/) { print "$ARGV:$.: non-ASCII in SG rule description: $_"; $bad = 1 }
              if ($d <= 0) { $in = 0; $d = 0 }
            }
            close ARGV if eof;
            END { exit($bad ? 1 : 0) }
          ' ${{ env.TF_DIR }}/*.tf

      - name: terraform init (with S3 backend)
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=tv-terraform-state-${{ steps.aws_account.outputs.account_id }}" \
            -backend-config="key=dlt/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=tv-terraform-locks" \
            -backend-config="encrypt=true"

      - name: terraform validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: terraform plan
        id: plan
        run: |
          set +e
          terraform -chdir=${{ env.TF_DIR }} plan -detailed-exitcode -no-color -out=tfplan
          EXIT_CODE=$?
          echo "exitcode=${EXIT_CODE}" >> $GITHUB_OUTPUT
          # 0 = no changes, 1 = error, 2 = changes pending
          if [ "${EXIT_CODE}" -eq 1 ]; then
            echo "::error::terraform plan failed"
            exit 1
          fi
          echo "Plan exit code: ${EXIT_CODE} (0=no-changes, 2=changes-pending)"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-${{ github.sha }}
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

      - name: Post plan summary on PR
        if: github.event_name == 'pull_request'
        run: |
          echo "Plan exit code: ${{ steps.plan.outputs.exitcode }} (0=no-changes, 2=changes-pending)"
          # PR comment posting could be wired here via gh CLI; left as TODO
          # to avoid pulling in an extra action. Plan output is in the job log.

  # ─────────────────────────────────────────────────────────────────
  # Job 2: market-hours guard — blocks apply during 09:00-15:45 IST Mon-Fri
  # ─────────────────────────────────────────────────────────────────
  guard-market-hours:
    name: Market-hours guard
    runs-on: ubuntu-24.04
    needs: [preflight, terraform-plan]
    if: needs.preflight.outputs.bootstrap_ready == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    steps:
      - name: Check current IST time against market window
        run: |
          # No-deploy band 09:00-15:45 IST = 03:30-10:15 UTC (operator lock
          # 2026-06-03 — kept consistent with deploy-aws.yml: no prod mutation,
          # app OR infra, during 09:00 till 3.45 pm IST).
          UTC_HOUR=$(date -u +%H)
          UTC_MINUTE=$(date -u +%M)
          UTC_DOW=$(date -u +%u)  # 1=Mon, 7=Sun
          UTC_TIME_NUM=$((10#$UTC_HOUR * 100 + 10#$UTC_MINUTE))

          echo "UTC time: $UTC_HOUR:$UTC_MINUTE (day $UTC_DOW), numeric $UTC_TIME_NUM"

          if [ "$UTC_DOW" -le 5 ] && [ "$UTC_TIME_NUM" -ge 330 ] && [ "$UTC_TIME_NUM" -lt 1015 ]; then
            if [ "${{ github.event.inputs.confirm_market_hours }}" = "yes" ]; then
              echo "WARNING: applying infra changes during market hours with explicit override"
            else
              echo "::error::BLOCK: applying infra changes during 09:00-15:45 IST is forbidden."
              echo "Re-run via workflow_dispatch with confirm_market_hours=yes if this is a critical fix."
              exit 1
            fi
          else
            echo "OK: outside the 09:00-15:45 IST no-deploy band, apply can proceed"
          fi

  # ─────────────────────────────────────────────────────────────────
  # Job 3: terraform apply — only on push to main or workflow_dispatch
  # ─────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-24.04
    needs: [preflight, terraform-plan, guard-market-hours]
    if: |
      needs.preflight.outputs.bootstrap_ready == 'true' && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_apply != 'yes') ||
        (github.event_name == 'schedule' && needs.terraform-plan.outputs.plan_exitcode == '2')
      )
    environment: prod
    outputs:
      instance_id: ${{ steps.outputs.outputs.instance_id }}
      elastic_ip: ${{ steps.outputs.outputs.elastic_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC if available, else access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tv-github-terraform-apply-${{ github.run_id }}

      - name: Resolve AWS account id
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: ${{ env.TF_DIR }}/

      - name: terraform init (with S3 backend)
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=tv-terraform-state-${{ steps.aws_account.outputs.account_id }}" \
            -backend-config="key=dlt/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=tv-terraform-locks" \
            -backend-config="encrypt=true"

      - name: terraform apply
        # Re-plan + apply on THIS runner instead of applying the saved tfplan.
        # WHY: the Lambda resources use `data "archive_file"` which builds the
        # .zip on whichever runner evaluates it. The plan job built the zips on
        # the PLAN runner and uploaded only `tfplan` (not the zips), so
        # `apply tfplan` on this separate runner failed with
        # `reading ZIP file (./.budget-killswitch.zip): no such file or
        # directory` (terraform-apply #40/#43/#46). Re-evaluating here rebuilds
        # the zips locally. archive_file is deterministic, and apply only runs
        # after the plan job already passed + the market-hours guard, so a
        # same-commit re-plan is safe and idempotent.
        run: terraform -chdir=${{ env.TF_DIR }} apply -auto-approve -no-color

      - name: Capture outputs
        id: outputs
        run: |
          INSTANCE_ID=$(terraform -chdir=${{ env.TF_DIR }} output -raw instance_id 2>/dev/null || echo "")
          EIP=$(terraform -chdir=${{ env.TF_DIR }} output -raw elastic_ip 2>/dev/null || echo "")
          BUDGET=$(terraform -chdir=${{ env.TF_DIR }} output -raw monthly_budget_name 2>/dev/null || echo "")
          echo "instance_id=${INSTANCE_ID}" >> $GITHUB_OUTPUT
          echo "elastic_ip=${EIP}" >> $GITHUB_OUTPUT
          echo "monthly_budget_name=${BUDGET}" >> $GITHUB_OUTPUT
          echo "INSTANCE_ID=${INSTANCE_ID}"
          echo "ELASTIC_IP=${EIP}"

      - name: Send ready-made operator-portal link to Telegram
        # Zero-touch: if the portal is enabled, generate the device key in SSM
        # (once), then DM the operator a single tappable link with the key in
        # the URL fragment (#key=...). The fragment never reaches the server;
        # the operator opens it and is unlocked with no typing. The key is
        # NEVER printed to the Actions log — only published to the private
        # SNS->Telegram channel.
        run: |
          set +e
          URL=$(terraform -chdir=${{ env.TF_DIR }} output -raw operator_portal_url 2>/dev/null)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "operator portal disabled — nothing to publish"; exit 0
          fi
          SECRET_NAME="/tickvault/prod/operator/control-secret"
          if ! aws ssm get-parameter --name "$SECRET_NAME" --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            KEY=$(openssl rand -base64 30 | tr -d '\n')
            echo "::add-mask::${KEY}"
            aws ssm put-parameter --name "$SECRET_NAME" --type SecureString \
              --value "$KEY" --region ${{ env.AWS_REGION }} >/dev/null
            echo "generated a new operator device key (stored in SSM SecureString)"
          else
            KEY=$(aws ssm get-parameter --name "$SECRET_NAME" --with-decryption \
              --query Parameter.Value --output text --region ${{ env.AWS_REGION }})
            echo "::add-mask::${KEY}"
          fi
          LINK="${URL}#key=${KEY}"
          aws sns publish --region ${{ env.AWS_REGION }} \
            --topic-arn "arn:aws:sns:${{ env.AWS_REGION }}:${{ steps.aws_account.outputs.account_id }}:tv-prod-alerts" \
            --subject "Operator portal ready" \
            --message "Your tickvault operator portal is live. Tap to open (your key is baked in — do NOT forward this message): ${LINK}" >/dev/null
          echo "✅ Published the ready-made portal link to Telegram (key NOT shown here)."
          echo "Operator portal URL (key sent privately via Telegram): ${URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: "Deploy gate: console shell GET / must return 200 within 5s"
        # B4 r3 (2026-07-06): GET / had NEVER returned 200 in the console's
        # lifetime — QuestDB answers / with an UNFRAMED keep-alive 301 that
        # never closes the socket, hanging the back lambda's read until the
        # 12s timeout -> front 504 (evidence:
        # deploy/aws/lambda/questdb-console-proxy/repro-evidence.md,
        # committed with the fix). The back lambda now rewrites
        # '/' -> '/index.html'. This gate asserts the fixed contract
        # END-TO-END (API-GW -> front device-key auth -> back VPC relay ->
        # box:9000): GET / must be HTTP 200 within 5 seconds. HARD FAIL on
        # any other outcome, with ONE honest exception: 000/504/503 while
        # the EC2 box is VERIFIABLY not running (auto-stop window) is the
        # console working correctly — that case SKIPS LOUDLY. (Each of
        # 000/503/504 on a RUNNING box gets ONE 90s grace re-probe before
        # FATAL — box OS boot / QuestDB start/restart windows; see the
        # running arm below — but a pass there still requires a genuine
        # 200 + shell HTML, never a skip.)
        # Fixer round 6 (2026-07-06, TOCTOU): "verifiably not running" means
        # not running at BOTH a pre-probe AND a post-probe EC2 state sample —
        # a running->stopped transition across the probe window fails CLOSED
        # (the failed probes were made against a running box); and the 90s
        # grace arm re-samples state AFTER its sleep so a mid-grace auto-stop
        # re-enters the loud skip instead of a stale 'box IS running' FATAL.
        # NOTE (fixer
        # round 1, 2026-07-06): a STOPPED box manifests as CODE=000 here,
        # never a fast 503 — the stopped instance keeps its ENI/private IP
        # and silently DROPS packets (no RST), so the back lambda's connect
        # blocks its full 12s socket timeout (proxy handler.py
        # _TIMEOUT_SECS=12 -> upstream_timeout -> front 504 at ~12s) while
        # this gate's curl is capped at 5s. A fast 503 needs a connection
        # REFUSAL = box RUNNING with QuestDB down. Any of 000/504/503 with
        # the box RUNNING, or an unknown box state, still FAILS (audit
        # Rule 11: no false-OK). 3 attempts absorb front+VPC-back cold start;
        # EACH attempt is hard-capped at 5s, so the pre-fix behavior (504
        # after ~12s) can physically never pass. GET not HEAD: HEAD / is 405
        # (repro §8). Secret hygiene: SSM read + ::add-mask:: + header-FILE
        # (umask 077 mktemp) — the bearer never appears in argv or logs.
        run: |
          set -euo pipefail
          # Console-disabled skip vs transient output-read failure (fixer
          # round 1, 2026-07-06 — audit Rule 11): only the KNOWN disabled
          # shape (output is null / not found — enable_questdb_console=false)
          # may skip. Any OTHER terraform-output failure (state lock, backend
          # hiccup, creds) FAILS CLOSED instead of masquerading as disabled.
          set +e
          QURL=$(terraform -chdir=${{ env.TF_DIR }} output -raw questdb_console_url 2>/tmp/qurl-err.txt)
          QURL_RC=$?
          set -e
          if [ "$QURL_RC" -ne 0 ]; then
            if grep -qiE 'is null|not found|no outputs found|unsupported value for raw output' /tmp/qurl-err.txt; then
              echo "questdb console disabled — shell smoke gate SKIPPED (nothing deployed to gate)"
              exit 0
            fi
            echo "FATAL: terraform output questdb_console_url failed for a NON-disabled reason — failing closed. terraform stderr:"
            cat /tmp/qurl-err.txt || true
            exit 1
          fi
          if [ -z "$QURL" ] || [ "$QURL" = "null" ]; then
            echo "questdb console disabled — shell smoke gate SKIPPED (nothing deployed to gate)"
            exit 0
          fi
          TOK=$(aws ssm get-parameter --name /tickvault/prod/operator/control-secret \
            --with-decryption --query Parameter.Value --output text --region ${{ env.AWS_REGION }})
          echo "::add-mask::${TOK}"
          HDR="$(umask 077 && mktemp)"
          printf 'Authorization: Bearer %s\n' "$TOK" > "$HDR"
          trap 'rm -f "$HDR"' EXIT
          # Fixer round 6 (2026-07-06, TOCTOU): sample the box state BEFORE
          # the probes as well as after. The 16:30 IST auto-stop cron
          # (daily-universe lock §7, stop cron 11:00 UTC) can flip the box
          # running->stopping DURING the ~21s probe window or the 90s grace
          # sleep. A single post-probe sample allowed two stale-state bugs:
          # (a) a genuine running-box regression probed at ~16:29 IST was
          # converted into the auto-stop SKIP when the stop landed before
          # the sample (false-OK, audit Rule 11), and (b) the grace-arm
          # FATAL asserted 'the box IS running' from a PRE-sleep sample
          # after a mid-grace stop (false-FATAL, misdirected triage). The
          # skip arm now requires the box to be not-running at BOTH samples
          # (a running->stopped transition across the probe window fails
          # CLOSED with an honest ambiguity message), and the grace arm
          # re-samples after its sleep.
          IID=$(terraform -chdir=${{ env.TF_DIR }} output -raw instance_id 2>/dev/null || echo "")
          box_state() {
            if [ -n "$IID" ]; then
              aws ec2 describe-instances --instance-ids "$IID" --region ${{ env.AWS_REGION }} \
                --query 'Reservations[0].Instances[0].State.Name' --output text 2>/dev/null || echo unknown
            else
              echo unknown
            fi
          }
          STATE_PRE=$(box_state)
          CODE=000
          for i in 1 2 3; do
            CODE=$(curl -sS -o /tmp/qdb-shell.body -w '%{http_code}' --max-time 5 \
              -H @"$HDR" "${QURL%/}/" || true)
            CODE=${CODE:-000}
            echo "attempt $i: GET / -> ${CODE}"
            [ "$CODE" = "200" ] && break
            sleep 3
          done
          if [ "$CODE" = "200" ]; then
            grep -qi '<!DOCTYPE html' /tmp/qdb-shell.body \
              || { echo "FATAL: GET / gave 200 but the body is not the console shell HTML"; exit 1; }
            echo "✅ console shell smoke: GET / == 200 within 5s through the proxy (unframed-301 hang class gated)"
            echo "✅ QuestDB console shell smoke passed (GET / = 200 ≤5s)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          STATE=$(box_state)
          # Stopped-box reachability truth (fixer round 1, 2026-07-06): the
          # loud auto-stop-window skip must cover 000 and 504 as well as 503.
          # A stopped box CANNOT produce a fast 503 through this stack — its
          # ENI keeps the private IP and DROPS packets (no RST), so the back
          # lambda's connect blocks the full 12s _TIMEOUT_SECS and maps to
          # upstream_timeout (front 504 ~12s), while this curl caps at 5s ->
          # CODE=000 on every attempt. 'pending' = box still BOOTING (QuestDB
          # not up yet — also expected 000). Without this arm, every
          # off-window apply (nights/weekends/the 17:05 IST post-stop drift
          # retry) would hard-fail AFTER a successful terraform apply. All
          # three codes with the box RUNNING, or an unverifiable state, still
          # FAIL CLOSED (each of 000/503/504 on a running box only after the
          # ONE 90s grace re-probe in the running arm below).
          case "$CODE" in
            000|503|504)
              case "$STATE" in
                stopped|stopping|pending)
                  # Fixer round 6 (2026-07-06): the skip may only forgive
                  # probes that were made against a not-running box. If the
                  # PRE-probe sample said running, the failed probes were
                  # made while the box WAS running and the not-running state
                  # here is the 16:30 IST auto-stop landing AFTER them — a
                  # possible genuine regression must not be converted into
                  # this skip (audit Rule 11: no false-OK). The box is no
                  # longer probeable, so fail closed and let the next
                  # in-window apply decide. STATE_PRE=unknown (a transient
                  # describe-instances failure) still skips — loudly, with
                  # both samples printed — because red-failing every
                  # off-window apply on an EC2-API hiccup is a worse trade
                  # than the compound coincidence (API hiccup + regression +
                  # the 1-2min stop window) this leaves open.
                  if [ "$STATE_PRE" = "running" ]; then
                    echo "FATAL: console GET / -> '${CODE}' and the box transitioned running->${STATE} ACROSS the probe window (pre-probe sample: running) — the failed probes were made while the box WAS running, so this may be a genuine shell regression caught just before the 16:30 IST auto-stop. Failing closed (audit Rule 11: no false-OK); the box is no longer probeable — verify on the next in-window apply."
                    exit 1
                  fi
                  # Fixer round 8 (2026-07-07): name the window honestly.
                  # 'pending' is the START transition (box still BOOTING per
                  # the round-1 comment above — the 08:30 IST auto-start or
                  # an operator manual start), NOT the 16:30 IST auto-stop
                  # window; labelling it "auto-stop window" misdirected the
                  # triage of an 08:30-IST apply. Skip DECISION unchanged —
                  # message accuracy only. Pinned by gate-matrix-r7.sh
                  # scenarios E (stopped keeps the auto-stop wording) + L
                  # (pending names the start transition) — a merge-time pin
                  # since round 9 (2026-07-07): ci.yml's Repo Guards step
                  # "QuestDB console lambda unit tests (back + front)" runs
                  # the harness on every PR (it feeds All Green), so a
                  # wording regression here — or deleting/renaming this gate
                  # step, which the harness's extractor fails on — goes red
                  # BEFORE merge. (Rounds 7-8 the harness was manual-run-only
                  # and this "Pinned by" was an unenforced claim.)
                  if [ "$STATE" = "pending" ]; then
                    WINDOW="start transition — box booting"
                  else
                    WINDOW="auto-stop window"
                  fi
                  echo "⚠ SKIP (loud): console GET / -> '${CODE}' with the box ${STATE} (pre-probe sample: ${STATE_PRE}, post-probe sample: ${STATE}; ${WINDOW}, 08:30–16:30 IST schedule) — a not-running box cannot serve the shell (stopped box = 5s curl timeout = 000, never a fast 503); shell smoke re-runs on the next in-window apply" | tee -a "$GITHUB_STEP_SUMMARY"
                  exit 0 ;;
                running)
                  # Fixer round 5 (2026-07-06): running + fast 503 (the front's
                  # box_unreachable / generic-503 mapping) is NOT only a
                  # SG/bind/back-lambda regression — it is ALSO the transient
                  # signature of a RUNNING box whose QuestDB container is not
                  # (yet) listening on :9000. Two real windows: (a) the box
                  # auto-starts at 08:30 IST (daily-universe lock §7, start
                  # cron 03:00 UTC) with the QuestDB container up ~30-120s
                  # later, and the market-hours guard blocks applies only
                  # 03:30-10:15 UTC — so a push/dispatch apply at 08:30-09:00
                  # IST lands in that gap; (b) deploy-aws-after-close's 10:16
                  # UTC app deploy runs `docker compose up -d`, which
                  # RECREATES the QuestDB container on an image/config bump
                  # (multi-second-to-minute :9000 downtime) overlapping this
                  # workflow's first scheduled slot at 10:20 UTC. The initial
                  # 3-attempt/~21s budget cannot bridge either window, so
                  # before declaring FATAL, re-probe ONCE after 90s. Still
                  # fail-closed: the grace pass requires a genuine 200 + the
                  # console shell HTML; a real regression persists past 90s
                  # and still fails (~90s later).
                  # Fixer round 7 (2026-07-06): the grace re-probe now covers
                  # 000/504 as well as 503. The round-5 claim that "no
                  # start-up window produces 000/504 on a running box whose
                  # ENI is answering" hid the real window in its qualifier:
                  # on EVERY start (the 08:30 IST auto-start, or an operator
                  # manual start colliding with a scheduled slot), EC2 flips
                  # the state to 'running' within seconds while the guest
                  # OS/network stack takes ~30-90s to come up — during that
                  # phase the attached ENI silently DROPS SYNs (no RST; the
                  # same mechanics as the stopped-box comment above), the
                  # back lambda's connect blocks its full 12s timeout ->
                  # front 504, and this gate's 5s-capped curl reads CODE=000
                  # with box_state()=running. BOTH state samples can say
                  # 'running' during that window ('pending' lasts only
                  # seconds), and the start-side TOCTOU twin
                  # (STATE_PRE=pending/stopped, box starts mid-probe-window,
                  # post-sample running) lands here too — so gating the
                  # grace on STATE_PRE would still miss the both-samples-
                  # running boot case. Fail-closed is preserved: a genuine
                  # shell-hang regression (the unframed-301 class) persists
                  # past the grace and still FATALs. HONEST RESIDUAL: an OS
                  # boot slower than the ~111s probe+grace budget still
                  # false-FATALs — bounded and disclosed; the alternative
                  # (skipping on running+000) would launder the exact
                  # regression class this gate exists to catch.
                  CODE_PRE="$CODE"
                  echo "running box + '${CODE}' — possible start/restart transient window (08:30 IST auto-start OS/QuestDB boot, or docker-compose container recreate); ONE grace re-probe in 90s"
                  sleep 90
                  CODE=$(curl -sS -o /tmp/qdb-shell.body -w '%{http_code}' --max-time 5 \
                    -H @"$HDR" "${QURL%/}/" || true)
                  CODE=${CODE:-000}
                  echo "grace re-probe: GET / -> ${CODE} (pre-grace: ${CODE_PRE})"
                  if [ "$CODE" = "200" ]; then
                    grep -qi '<!DOCTYPE html' /tmp/qdb-shell.body \
                      || { echo "FATAL: grace re-probe gave 200 but the body is not the console shell HTML"; exit 1; }
                    echo "✅ console shell smoke: GET / == 200 on the 90s grace re-probe (box OS / QuestDB was transiently starting or restarting — not a regression)"
                    echo "✅ QuestDB console shell smoke passed (GET / = 200 on the 90s grace re-probe — box/QuestDB was starting/restarting)" >> "$GITHUB_STEP_SUMMARY"
                    exit 0
                  fi
                  # Fixer round 6 (2026-07-06): the 90s sleep can span the
                  # 16:30 IST auto-stop — the 10:50 UTC scheduled retry
                  # slot starts at 16:20 IST and init+plan+apply+publish
                  # can put this arm at ~16:27-16:29 IST. A box that
                  # auto-stops mid-grace re-probes as 000 (its stopped ENI
                  # drops packets), and the old code fell through to the
                  # FATAL below asserting 'the box IS running' from the
                  # PRE-sleep sample — a false-FATAL with misdirected
                  # triage. Re-sample AFTER the sleep: a mid-grace stop
                  # re-enters the loud not-running skip. Fixer round 7
                  # honesty (2026-07-06): the skip wording must NOT claim
                  # the pre-grace failure "proved QuestDB-not-listening" —
                  # the front returns the SAME fast 503 for a back-lambda
                  # crash (front handler.py maps back_function_error /
                  # back_invoke_failed through its generic 503 arm), so a
                  # pre-grace fast 503 is merely CONSISTENT WITH a
                  # listen-layer transient OR a back-lambda invoke failure,
                  # and the two are indistinguishable once the box has
                  # stopped and cannot be probed further. The compound
                  # window (grace arm + mid-grace auto-stop + a crash-class
                  # regression — or, for a pre-grace 000/504, a HANG-class
                  # regression, per the round-10 note below) is accepted as
                  # narrower than red-failing every mid-grace auto-stop.
                  # Fixer round 10 (2026-07-07, message accuracy only — skip
                  # DECISION unchanged): the cause enumeration is now PER
                  # pre-grace code. The old single message listed the
                  # 503-specific causes for ANY code, so a pre-grace 000/504
                  # (this 5s-capped curl reading the back lambda's 12s hang)
                  # named an inapplicable cause (a back-lambda invoke failure
                  # yields the front's FAST 503, never 000) and OMITTED the
                  # one cause the terminal FATAL below itself assigns to
                  # 000/504 — the unframed-response shell-hang class. A
                  # hang-class regression spanning the grace sleep into the
                  # auto-stop still exits 0 (the accepted compound window),
                  # but the message now points triage at the right classes.
                  # Pinned by gate-matrix-r7.sh scenarios D (503 wording) +
                  # M (000 wording, added round 10).
                  STATE=$(box_state)
                  case "$STATE" in
                    stopped|stopping)
                      if [ "$CODE_PRE" = "503" ]; then
                        PRE_CAUSES="QuestDB-not-listening / a booting OS OR a back-lambda invoke failure (the front maps back_function_error/back_invoke_failed to the same fast 503)"
                      else
                        PRE_CAUSES="a booting OS/ENI still dropping SYNs, a QuestDB response slower than the back lambda's 12s timeout, OR the unframed-response shell-hang class (the class the terminal FATAL assigns to 000/504; a back-lambda invoke failure is NOT a candidate — it yields a FAST 503, never 000/504)"
                      fi
                      echo "⚠ SKIP (loud): grace re-probe -> '${CODE}' but the box auto-stopped MID-GRACE (post-sleep state: ${STATE}) — the pre-grace '${CODE_PRE}' on a then-running box is consistent with ${PRE_CAUSES} (indistinguishable once the box stopped); a not-running box cannot serve the shell — shell smoke re-runs on the next in-window apply" | tee -a "$GITHUB_STEP_SUMMARY"
                      exit 0 ;;
                  esac
                  echo "FATAL: console GET / -> '${CODE}' past the 90s grace re-probe (pre-grace: '${CODE_PRE}') with box state '${STATE}' at the final sample. 000/504 past the grace = the unframed-response shell-hang class (or — residual, disclosed — an OS boot slower than the ~111s probe+grace budget); 503 past the grace = SG/bind regression, a back-lambda crash (front maps back_function_error/back_invoke_failed to the same fast 503), OR QuestDB down/restarting >90s — check the QuestDB container via docker compose on the box"; exit 1 ;;
                *)
                  echo "FATAL: console GET / -> '${CODE}' and box state could not be verified (state='${STATE}') — failing closed"; exit 1 ;;
              esac ;;
          esac
          echo "FATAL: console shell GET / returned '${CODE}' (box state: ${STATE}) — deploy gate FAILED. Body head:"
          head -c 300 /tmp/qdb-shell.body || true
          exit 1

      - name: Publish QuestDB console URL to Telegram
        # B4: mirrors the portal-link publish above. No key is minted here —
        # the console reuses the SAME control-secret; the one-click 90s link
        # is minted live by the portal's 🗄 button, and the console's own
        # login page accepts the device key directly. The bare URL is not a
        # secret (device-key gated inside the handler).
        run: |
          set +e
          QURL=$(terraform -chdir=${{ env.TF_DIR }} output -raw questdb_console_url 2>/dev/null)
          if [ -z "$QURL" ] || [ "$QURL" = "null" ]; then
            echo "questdb console disabled — nothing to publish"; exit 0
          fi
          aws sns publish --region ${{ env.AWS_REGION }} \
            --topic-arn "arn:aws:sns:${{ env.AWS_REGION }}:${{ steps.aws_account.outputs.account_id }}:tv-prod-alerts" \
            --subject "QuestDB console ready" \
            --message "Your QuestDB console is live (read-only, device-key gated): ${QURL} — one-click open via the portal's 🗄 button, or paste your device key on its login page." >/dev/null
          echo "✅ Published the QuestDB console link to Telegram."
          echo "QuestDB console URL: ${QURL}" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────
  # Job 3b: scheduled retry found no drift — skip green, but LOUDLY.
  # Per audit-findings Rule 11 ("no false-OK"): a silent skip is
  # indistinguishable from a stranded change, so the no-drift case
  # logs its verdict explicitly instead of just not running apply.
  # ─────────────────────────────────────────────────────────────────
  no-drift:
    name: Post-close retry — no drift
    runs-on: ubuntu-24.04
    needs: [preflight, terraform-plan]
    if: |
      github.event_name == 'schedule' &&
      needs.preflight.outputs.bootstrap_ready == 'true' &&
      needs.terraform-plan.outputs.plan_exitcode == '0'
    steps:
      - name: Log no-drift verdict
        run: |
          echo "no drift, nothing to apply — terraform plan exit 0, main's infra is already live."
          {
            echo "## Post-close scheduled retry"
            echo ""
            echo "ℹ️ no drift, nothing to apply (terraform plan -detailed-exitcode returned 0)."
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────
  # Job 4: notify Telegram (via SNS) — success + failure paths
  # ─────────────────────────────────────────────────────────────────
  notify:
    name: Notify Telegram via SNS
    runs-on: ubuntu-24.04
    needs: [preflight, terraform-plan, terraform-apply]
    if: |
      always() && needs.preflight.outputs.bootstrap_ready == 'true' && (
        github.event_name == 'push' || github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'schedule' && needs.terraform-apply.result != 'skipped')
      )
    steps:
      - name: Configure AWS credentials (OIDC if available, else access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tv-github-terraform-notify-${{ github.run_id }}

      - name: Resolve account id
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Notify on success
        if: needs.terraform-apply.result == 'success'
        run: |
          aws sns publish \
            --region ${{ env.AWS_REGION }} \
            --topic-arn "arn:aws:sns:${{ env.AWS_REGION }}:${{ steps.aws_account.outputs.account_id }}:tv-prod-alerts" \
            --subject "Terraform apply OK" \
            --message "commit=${{ github.sha }} actor=${{ github.actor }} instance_id=${{ needs.terraform-apply.outputs.instance_id }} elastic_ip=${{ needs.terraform-apply.outputs.elastic_ip }} run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Notify on failure
        if: needs.terraform-apply.result == 'failure' || needs.terraform-plan.result == 'failure'
        run: |
          aws sns publish \
            --region ${{ env.AWS_REGION }} \
            --topic-arn "arn:aws:sns:${{ env.AWS_REGION }}:${{ steps.aws_account.outputs.account_id }}:tv-prod-alerts" \
            --subject "Terraform apply FAILED" \
            --message "commit=${{ github.sha }} actor=${{ github.actor }} plan=${{ needs.terraform-plan.result }} apply=${{ needs.terraform-apply.result }} run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
