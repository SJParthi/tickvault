# terraform-apply.yml — auto-fire `terraform apply` when AWS infra changes land on main.
#
# Why this exists (operator-charter-forever.md §C "100% no manual inputs"):
#   Before this workflow, every infra change required the operator to type
#   `terraform apply` on their Mac. The charter forbids manual typing. This
#   workflow closes that gap: on push to main when `deploy/aws/terraform/**`
#   changes, GitHub Actions runs `terraform plan` (always) + `terraform apply`
#   (only on main push, only outside market hours). Outputs go to Telegram
#   via existing SNS routing.
#
# Triggers:
#   - Pull request → `terraform plan` only (safe review)
#   - Push to main with infra path filter → plan + apply (fully automated)
#   - workflow_dispatch → on-demand operator override (e.g. emergency apply)
#   - schedule 10:20 UTC = 15:50 IST Mon–Fri → POST-CLOSE RETRY. When a merge
#     lands during market hours, the push-triggered apply is BLOCKED by the
#     market-hours guard below and the infra change would otherwise silently
#     never deploy (e.g. run #175: PR #1308's Lambda change blocked at 06:10
#     UTC, apply skipped forever). This mirrors deploy-aws-after-close.yml's
#     10:16 UTC re-fire for the app. The scheduled run does the normal
#     preflight + plan, then applies ONLY if `terraform plan -detailed-exitcode`
#     returns 2 (changes pending). Exit 0 → the no-drift job logs
#     "no drift, nothing to apply" and the run exits green (no false-OK).
#     10:20 UTC is safely past the guard's 10:15 UTC edge — the guard itself
#     is unchanged and passes naturally.
#   - schedule 10:50 + 11:35 UTC Mon–Fri → SCHEDULER-DROP retries (2026-07-02
#     incident): GitHub's cron scheduler DROPPED the single 10:20 UTC slot
#     today (repo-wide ~09:40–10:30 UTC drop window; dropped slots never
#     queue — they are silently skipped), so a market-hours-blocked apply
#     stayed stranded a further day. Two staggered retries give three
#     independent daily chances. Each firing is idempotent: apply runs ONLY
#     when `terraform plan -detailed-exitcode` returns 2; exit 0 → the
#     no-drift job logs "no drift, nothing to apply" and the run is green.
#     Terraform runs on GitHub runners against AWS APIs, so the 16:30 IST EC2
#     auto-stop is irrelevant to these slots. HONEST ENVELOPE: cron redundancy
#     REDUCES but cannot ELIMINATE GitHub scheduler risk — the scheduler is an
#     external system and can drop any or all slots.
#
# Auth precedence (try in order):
#   1. OIDC role via secrets.AWS_TERRAFORM_ROLE_ARN (preferred, set after first run)
#   2. Long-lived keys via secrets.AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
#      (bootstrap only — delete after first successful OIDC run)
#
# Concurrency: serial — never two terraform apply at once. DynamoDB lock
# provides a second layer of defense.

name: terraform-apply

on:
  pull_request:
    paths:
      - 'deploy/aws/terraform/**'
      - '.github/workflows/terraform-apply.yml'
  push:
    branches: [main]
    paths:
      - 'deploy/aws/terraform/**'
      - '.github/workflows/terraform-apply.yml'
  schedule:
    # 10:20 UTC = 15:50 IST Mon–Fri — post-close retry for market-hours-blocked
    # applies (just past the guard's 09:00-15:45 IST / 03:30-10:15 UTC band).
    # 10:50 UTC = 16:20 IST + 11:35 UTC = 17:05 IST — scheduler-drop retries
    # (2026-07-02 — see header; plan-gated apply makes extras free no-ops).
    - cron: '20 10 * * 1-5'
    - cron: '50 10 * * 1-5'
    - cron: '35 11 * * 1-5'
  workflow_dispatch:
    inputs:
      confirm_market_hours:
        description: 'Apply during market hours? Type "yes" to override the guard.'
        required: false
        default: 'no'
      skip_apply:
        description: 'Plan only, skip apply even on main. Type "yes" to skip.'
        required: false
        default: 'no'

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false # never interrupt a running apply

permissions:
  id-token: write   # OIDC for AWS role assumption
  contents: read
  pull-requests: write # so plan output can be posted as PR comment

env:
  TF_VAR_aws_region: ap-south-1
  TF_VAR_operator_cidr: "0.0.0.0/0" # CI runs from GH IPs; SSH SG is locked by separate operator override
  TF_VAR_operator_email: "sjparthi93@gmail.com" # registered alert destination
  TF_VAR_ami_id: ami-0fa0340d4a8bdd6ee
  # Operator portal: opt prod IN via CI (the terraform variable default stays
  # false, so local/other applies are unaffected). This creates the portal
  # Lambda + Function URL on the next apply.
  TF_VAR_enable_operator_control_lambda: "true"
  # B4 QuestDB console: opt prod IN the same way (variable default stays
  # false). Creates the console API-GW + front/back Lambdas + the SG-to-SG
  # 9000 ingress on the next apply.
  TF_VAR_enable_questdb_console: "true"
  AWS_REGION: ap-south-1
  TF_DIR: deploy/aws/terraform

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 0: preflight — check whether bootstrap secrets exist.
  #
  # The operator-charter one-time bootstrap (BOOTSTRAP-ONE-TIME.md) is
  # mathematically required by AWS IAM: a third party (GitHub Actions)
  # cannot self-authorize. Until the operator pastes either
  # AWS_TERRAFORM_ROLE_ARN (OIDC, preferred) or AWS_ACCESS_KEY_ID +
  # AWS_SECRET_ACCESS_KEY (bootstrap), this workflow CANNOT talk to AWS.
  #
  # Pre-bootstrap state: this job exits 0 with a friendly skip message,
  # downstream jobs do not run, the PR check passes. Post-bootstrap:
  # downstream jobs activate automatically — no workflow edit needed.
  # ─────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight — check bootstrap secrets
    runs-on: ubuntu-24.04
    outputs:
      bootstrap_ready: ${{ steps.check.outputs.bootstrap_ready }}
    steps:
      - name: Check whether AWS bootstrap secrets are configured
        id: check
        env:
          OIDC_ROLE: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -n "${OIDC_ROLE}" ] || [ -n "${ACCESS_KEY}" ]; then
            echo "bootstrap_ready=true" >> $GITHUB_OUTPUT
            echo "✅ Bootstrap secrets present — terraform plan + apply will run."
          else
            echo "bootstrap_ready=false" >> $GITHUB_OUTPUT
            echo "::notice::AWS bootstrap secrets not yet configured — skipping terraform plan + apply."
            echo "::notice::Follow deploy/aws/terraform/BOOTSTRAP-ONE-TIME.md (40 sec) to enable automation."
            echo ""
            echo "Skipped jobs: terraform-plan, guard-market-hours, terraform-apply, notify."
            echo "This is the EXPECTED state for a fresh repo. Workflow exits 0."
          fi

  # ─────────────────────────────────────────────────────────────────
  # Job 1: terraform plan — runs on EVERY trigger (post-bootstrap), gates Job 2
  # ─────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-24.04
    needs: preflight
    if: needs.preflight.outputs.bootstrap_ready == 'true'
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC if available, else access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tv-github-terraform-plan-${{ github.run_id }}

      - name: Resolve AWS account id
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "Using AWS account ${ACCOUNT_ID}"

      - name: Bootstrap S3 state backend + DynamoDB lock (idempotent)
        run: bash scripts/aws-bootstrap-state-backend.sh "${{ steps.aws_account.outputs.account_id }}" "${{ env.AWS_REGION }}"

      - name: terraform fmt -check
        run: terraform -chdir=${{ env.TF_DIR }} fmt -check -recursive

      - name: terraform init (with S3 backend)
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=tv-terraform-state-${{ steps.aws_account.outputs.account_id }}" \
            -backend-config="key=dlt/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=tv-terraform-locks" \
            -backend-config="encrypt=true"

      - name: terraform validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: terraform plan
        id: plan
        run: |
          set +e
          terraform -chdir=${{ env.TF_DIR }} plan -detailed-exitcode -no-color -out=tfplan
          EXIT_CODE=$?
          echo "exitcode=${EXIT_CODE}" >> $GITHUB_OUTPUT
          # 0 = no changes, 1 = error, 2 = changes pending
          if [ "${EXIT_CODE}" -eq 1 ]; then
            echo "::error::terraform plan failed"
            exit 1
          fi
          echo "Plan exit code: ${EXIT_CODE} (0=no-changes, 2=changes-pending)"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-${{ github.sha }}
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

      - name: Post plan summary on PR
        if: github.event_name == 'pull_request'
        run: |
          echo "Plan exit code: ${{ steps.plan.outputs.exitcode }} (0=no-changes, 2=changes-pending)"
          # PR comment posting could be wired here via gh CLI; left as TODO
          # to avoid pulling in an extra action. Plan output is in the job log.

  # ─────────────────────────────────────────────────────────────────
  # Job 2: market-hours guard — blocks apply during 09:00-15:45 IST Mon-Fri
  # ─────────────────────────────────────────────────────────────────
  guard-market-hours:
    name: Market-hours guard
    runs-on: ubuntu-24.04
    needs: [preflight, terraform-plan]
    if: needs.preflight.outputs.bootstrap_ready == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    steps:
      - name: Check current IST time against market window
        run: |
          # No-deploy band 09:00-15:45 IST = 03:30-10:15 UTC (operator lock
          # 2026-06-03 — kept consistent with deploy-aws.yml: no prod mutation,
          # app OR infra, during 09:00 till 3.45 pm IST).
          UTC_HOUR=$(date -u +%H)
          UTC_MINUTE=$(date -u +%M)
          UTC_DOW=$(date -u +%u)  # 1=Mon, 7=Sun
          UTC_TIME_NUM=$((10#$UTC_HOUR * 100 + 10#$UTC_MINUTE))

          echo "UTC time: $UTC_HOUR:$UTC_MINUTE (day $UTC_DOW), numeric $UTC_TIME_NUM"

          if [ "$UTC_DOW" -le 5 ] && [ "$UTC_TIME_NUM" -ge 330 ] && [ "$UTC_TIME_NUM" -lt 1015 ]; then
            if [ "${{ github.event.inputs.confirm_market_hours }}" = "yes" ]; then
              echo "WARNING: applying infra changes during market hours with explicit override"
            else
              echo "::error::BLOCK: applying infra changes during 09:00-15:45 IST is forbidden."
              echo "Re-run via workflow_dispatch with confirm_market_hours=yes if this is a critical fix."
              exit 1
            fi
          else
            echo "OK: outside the 09:00-15:45 IST no-deploy band, apply can proceed"
          fi

  # ─────────────────────────────────────────────────────────────────
  # Job 3: terraform apply — only on push to main or workflow_dispatch
  # ─────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-24.04
    needs: [preflight, terraform-plan, guard-market-hours]
    if: |
      needs.preflight.outputs.bootstrap_ready == 'true' && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_apply != 'yes') ||
        (github.event_name == 'schedule' && needs.terraform-plan.outputs.plan_exitcode == '2')
      )
    environment: prod
    outputs:
      instance_id: ${{ steps.outputs.outputs.instance_id }}
      elastic_ip: ${{ steps.outputs.outputs.elastic_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC if available, else access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tv-github-terraform-apply-${{ github.run_id }}

      - name: Resolve AWS account id
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: ${{ env.TF_DIR }}/

      - name: terraform init (with S3 backend)
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=tv-terraform-state-${{ steps.aws_account.outputs.account_id }}" \
            -backend-config="key=dlt/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=tv-terraform-locks" \
            -backend-config="encrypt=true"

      - name: terraform apply
        # Re-plan + apply on THIS runner instead of applying the saved tfplan.
        # WHY: the Lambda resources use `data "archive_file"` which builds the
        # .zip on whichever runner evaluates it. The plan job built the zips on
        # the PLAN runner and uploaded only `tfplan` (not the zips), so
        # `apply tfplan` on this separate runner failed with
        # `reading ZIP file (./.budget-killswitch.zip): no such file or
        # directory` (terraform-apply #40/#43/#46). Re-evaluating here rebuilds
        # the zips locally. archive_file is deterministic, and apply only runs
        # after the plan job already passed + the market-hours guard, so a
        # same-commit re-plan is safe and idempotent.
        run: terraform -chdir=${{ env.TF_DIR }} apply -auto-approve -no-color

      - name: Capture outputs
        id: outputs
        run: |
          INSTANCE_ID=$(terraform -chdir=${{ env.TF_DIR }} output -raw instance_id 2>/dev/null || echo "")
          EIP=$(terraform -chdir=${{ env.TF_DIR }} output -raw elastic_ip 2>/dev/null || echo "")
          BUDGET=$(terraform -chdir=${{ env.TF_DIR }} output -raw monthly_budget_name 2>/dev/null || echo "")
          echo "instance_id=${INSTANCE_ID}" >> $GITHUB_OUTPUT
          echo "elastic_ip=${EIP}" >> $GITHUB_OUTPUT
          echo "monthly_budget_name=${BUDGET}" >> $GITHUB_OUTPUT
          echo "INSTANCE_ID=${INSTANCE_ID}"
          echo "ELASTIC_IP=${EIP}"

      - name: Send ready-made operator-portal link to Telegram
        # Zero-touch: if the portal is enabled, generate the device key in SSM
        # (once), then DM the operator a single tappable link with the key in
        # the URL fragment (#key=...). The fragment never reaches the server;
        # the operator opens it and is unlocked with no typing. The key is
        # NEVER printed to the Actions log — only published to the private
        # SNS->Telegram channel.
        run: |
          set +e
          URL=$(terraform -chdir=${{ env.TF_DIR }} output -raw operator_portal_url 2>/dev/null)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "operator portal disabled — nothing to publish"; exit 0
          fi
          SECRET_NAME="/tickvault/prod/operator/control-secret"
          if ! aws ssm get-parameter --name "$SECRET_NAME" --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            KEY=$(openssl rand -base64 30 | tr -d '\n')
            echo "::add-mask::${KEY}"
            aws ssm put-parameter --name "$SECRET_NAME" --type SecureString \
              --value "$KEY" --region ${{ env.AWS_REGION }} >/dev/null
            echo "generated a new operator device key (stored in SSM SecureString)"
          else
            KEY=$(aws ssm get-parameter --name "$SECRET_NAME" --with-decryption \
              --query Parameter.Value --output text --region ${{ env.AWS_REGION }})
            echo "::add-mask::${KEY}"
          fi
          LINK="${URL}#key=${KEY}"
          aws sns publish --region ${{ env.AWS_REGION }} \
            --topic-arn "arn:aws:sns:${{ env.AWS_REGION }}:${{ steps.aws_account.outputs.account_id }}:tv-prod-alerts" \
            --subject "Operator portal ready" \
            --message "Your tickvault operator portal is live. Tap to open (your key is baked in — do NOT forward this message): ${LINK}" >/dev/null
          echo "✅ Published the ready-made portal link to Telegram (key NOT shown here)."
          echo "Operator portal URL (key sent privately via Telegram): ${URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish QuestDB console URL to Telegram
        # B4: mirrors the portal-link publish above. No key is minted here —
        # the console reuses the SAME control-secret; the one-click 90s link
        # is minted live by the portal's 🗄 button, and the console's own
        # login page accepts the device key directly. The bare URL is not a
        # secret (device-key gated inside the handler).
        run: |
          set +e
          QURL=$(terraform -chdir=${{ env.TF_DIR }} output -raw questdb_console_url 2>/dev/null)
          if [ -z "$QURL" ] || [ "$QURL" = "null" ]; then
            echo "questdb console disabled — nothing to publish"; exit 0
          fi
          aws sns publish --region ${{ env.AWS_REGION }} \
            --topic-arn "arn:aws:sns:${{ env.AWS_REGION }}:${{ steps.aws_account.outputs.account_id }}:tv-prod-alerts" \
            --subject "QuestDB console ready" \
            --message "Your QuestDB console is live (read-only, device-key gated): ${QURL} — one-click open via the portal's 🗄 button, or paste your device key on its login page." >/dev/null
          echo "✅ Published the QuestDB console link to Telegram."
          echo "QuestDB console URL: ${QURL}" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────
  # Job 3b: scheduled retry found no drift — skip green, but LOUDLY.
  # Per audit-findings Rule 11 ("no false-OK"): a silent skip is
  # indistinguishable from a stranded change, so the no-drift case
  # logs its verdict explicitly instead of just not running apply.
  # ─────────────────────────────────────────────────────────────────
  no-drift:
    name: Post-close retry — no drift
    runs-on: ubuntu-24.04
    needs: [preflight, terraform-plan]
    if: |
      github.event_name == 'schedule' &&
      needs.preflight.outputs.bootstrap_ready == 'true' &&
      needs.terraform-plan.outputs.plan_exitcode == '0'
    steps:
      - name: Log no-drift verdict
        run: |
          echo "no drift, nothing to apply — terraform plan exit 0, main's infra is already live."
          {
            echo "## Post-close scheduled retry"
            echo ""
            echo "ℹ️ no drift, nothing to apply (terraform plan -detailed-exitcode returned 0)."
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────
  # Job 4: notify Telegram (via SNS) — success + failure paths
  # ─────────────────────────────────────────────────────────────────
  notify:
    name: Notify Telegram via SNS
    runs-on: ubuntu-24.04
    needs: [preflight, terraform-plan, terraform-apply]
    if: |
      always() && needs.preflight.outputs.bootstrap_ready == 'true' && (
        github.event_name == 'push' || github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'schedule' && needs.terraform-apply.result != 'skipped')
      )
    steps:
      - name: Configure AWS credentials (OIDC if available, else access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tv-github-terraform-notify-${{ github.run_id }}

      - name: Resolve account id
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Notify on success
        if: needs.terraform-apply.result == 'success'
        run: |
          aws sns publish \
            --region ${{ env.AWS_REGION }} \
            --topic-arn "arn:aws:sns:${{ env.AWS_REGION }}:${{ steps.aws_account.outputs.account_id }}:tv-prod-alerts" \
            --subject "Terraform apply OK" \
            --message "commit=${{ github.sha }} actor=${{ github.actor }} instance_id=${{ needs.terraform-apply.outputs.instance_id }} elastic_ip=${{ needs.terraform-apply.outputs.elastic_ip }} run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Notify on failure
        if: needs.terraform-apply.result == 'failure' || needs.terraform-plan.result == 'failure'
        run: |
          aws sns publish \
            --region ${{ env.AWS_REGION }} \
            --topic-arn "arn:aws:sns:${{ env.AWS_REGION }}:${{ steps.aws_account.outputs.account_id }}:tv-prod-alerts" \
            --subject "Terraform apply FAILED" \
            --message "commit=${{ github.sha }} actor=${{ github.actor }} plan=${{ needs.terraform-plan.result }} apply=${{ needs.terraform-apply.result }} run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
