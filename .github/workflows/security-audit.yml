# =============================================================================
# tickvault — Scheduled Security Audit
# =============================================================================
# Runs weekly to catch new CVEs discovered after code was committed.
# Separate from CI — this catches vulnerabilities in existing dependencies.
#
# Security: All actions pinned to SHA. No mutable tags.
# =============================================================================

name: Security Audit

on:
  schedule:
    # Every Monday at 06:00 UTC (11:30 IST)
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: "Weekly Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.95.0"

      - name: Install cargo-audit
        uses: taiki-e/install-action@2096c74c99c2f065b14e98d9738b44dd2018c2b7 # cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-deny

      - name: Supply chain check (CVEs + licenses + bans + sources)
        run: cargo deny check

      - name: Check for yanked crates
        run: cargo audit --deny yanked
