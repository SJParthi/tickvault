# =============================================================================
# dhan-live-trader — Scheduled Security Audit
# =============================================================================
# Runs weekly to catch new CVEs discovered after code was committed.
# Separate from CI — this catches vulnerabilities in existing dependencies.
# =============================================================================

name: Security Audit

on:
  schedule:
    # Every Monday at 06:00 UTC (11:30 IST)
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: "Weekly Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.1"

      - name: Install security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Security audit (CVEs)
        run: cargo audit

      - name: Deny check (licenses + bans)
        run: cargo deny check

      - name: Check for yanked crates
        run: cargo audit --deny yanked
