# =============================================================================
# dhan-live-trader — Secret Scanning (Server-Side)
# =============================================================================
# Runs on every push and PR. Scans for leaked secrets since GitHub's native
# secret scanning is unavailable for private repos on GitHub Pro.
# This is Layer 3 — blocks merge if secrets are detected.
# =============================================================================

name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: "Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Block .env files
        run: |
          echo "Scanning for .env files..."
          ENV_FILES=$(find . -name '.env' -o -name '.env.*' -o -name '*.env' | grep -v '.git/' | grep -v 'node_modules/' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "BLOCKED: .env files found in repository!"
            echo "$ENV_FILES"
            echo ""
            echo "Secrets must go in AWS SSM Parameter Store, not .env files."
            exit 1
          fi
          echo "No .env files found."

      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=false

          # AWS Access Keys
          if grep -rE 'AKIA[0-9A-Z]{16}' --include='*.rs' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' . 2>/dev/null | grep -v '.git/' | grep -v 'secret-scan.yml'; then
            echo "BLOCKED: AWS Access Key pattern detected!"
            FOUND=true
          fi

          # Private Keys
          if grep -rE '-----BEGIN.*PRIVATE KEY-----' --include='*.rs' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' --include='*.pem' . 2>/dev/null | grep -v '.git/'; then
            echo "BLOCKED: Private key detected!"
            FOUND=true
          fi

          # GitHub tokens
          if grep -rE 'ghp_[0-9a-zA-Z]{36}' --include='*.rs' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' . 2>/dev/null | grep -v '.git/' | grep -v 'secret-scan.yml'; then
            echo "BLOCKED: GitHub personal access token detected!"
            FOUND=true
          fi

          # Slack tokens
          if grep -rE 'xox[bporas]-[0-9a-zA-Z-]{10,}' --include='*.rs' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' . 2>/dev/null | grep -v '.git/' | grep -v 'secret-scan.yml'; then
            echo "BLOCKED: Slack token detected!"
            FOUND=true
          fi

          # Stripe live keys
          if grep -rE 'sk_live_[0-9a-zA-Z]{24,}' --include='*.rs' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' . 2>/dev/null | grep -v '.git/' | grep -v 'secret-scan.yml'; then
            echo "BLOCKED: Stripe live key detected!"
            FOUND=true
          fi

          # Generic password/secret assignments (not in comments)
          if grep -rE '(password|secret|api_key|token)\s*=\s*"[^"]{8,}"' --include='*.rs' --include='*.toml' . 2>/dev/null | grep -v '.git/' | grep -v 'secret-scan.yml' | grep -v '#' | grep -v '//'; then
            echo "WARNING: Possible hardcoded credential assignment detected!"
            echo "Verify these are not real secrets."
          fi

          if [ "$FOUND" = true ]; then
            echo ""
            echo "Secrets must be stored in AWS SSM Parameter Store."
            echo "See: docs/reference/secret_rotation.md"
            exit 1
          fi

          echo "No hardcoded secrets found."

      - name: Verify .gitignore blocks secrets
        run: |
          echo "Checking .gitignore coverage..."
          MISSING=false

          for pattern in ".env" "*.pem" "*.key" "credentials.json" "*.p12"; do
            if ! grep -qF "$pattern" .gitignore 2>/dev/null; then
              echo "WARNING: .gitignore missing pattern: $pattern"
              MISSING=true
            fi
          done

          if [ "$MISSING" = true ]; then
            echo ""
            echo "Add missing patterns to .gitignore to prevent accidental commits."
            # Warning only, not blocking — some patterns may not apply
          fi

          echo "Done."
