name: Secret Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Merge-gate hardening 2026-07-04: the PR/push job below is changed-files
  # ONLY (by design — identical scope to the local hook), which means a secret
  # already sitting in an UNTOUCHED file is never re-scanned. The weekly
  # full-tree job closes that gap.
  schedule:
    - cron: '0 5 * * 1'  # Weekly Monday 05:00 UTC — full-tree sweep
  workflow_dispatch: # on-demand full-tree sweep
permissions:
  contents: read
jobs:
  secret-scan:
    name: "Secret Scan"
    # PR/push diff-scope lane only — the scheduled/dispatch full-tree sweep is
    # the separate job below. This job stays a branch-protection REQUIRED
    # check, so its name and PR/push semantics must not change.
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the push / PR diff range can be computed.
          fetch-depth: 0
      - name: Scan changed files for hardcoded secrets
        # Runs the project's own secret scanner (the same script the local
        # pre-commit gate uses) over the files changed in this push / PR.
        # This makes the CI gate identical in scope to the local hook, so a
        # commit pushed with the local hook bypassed (`--no-verify`) is still
        # caught server-side. The scanner exits 2 on a hit, which fails the job.
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.base_ref }}"
            git fetch --quiet origin "$base_ref"
            changed=$(git diff --name-only --diff-filter=ACMR "origin/${base_ref}...HEAD")
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              changed=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD 2>/dev/null || git ls-files)
            else
              changed=$(git diff --name-only --diff-filter=ACMR "$before" HEAD)
            fi
          fi
          if [ -z "$changed" ]; then
            echo "No changed files to scan."
            exit 0
          fi
          echo "Scanning changed files:"
          echo "$changed"
          bash .claude/hooks/secret-scanner.sh "$GITHUB_WORKSPACE" "$changed"

  secret-scan-full-tree:
    name: "Secret Scan (full tree, weekly)"
    # Weekly + dispatch ONLY. Scans EVERY tracked file, not just the diff —
    # catches a secret that landed in an earlier commit outside any recent
    # diff range (the one class the changed-files lane structurally misses).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Scan the ENTIRE tracked tree for hardcoded secrets
        # Pre-filter to the file types the scanner actually inspects
        # (its own per-file skip list) — the scanner's inner loop runs 16
        # patterns per listed file, so feeding it the ~2/3 of tracked files
        # it would skip anyway roughly halves the wall-clock (measured
        # 2026-07-04: ~26s/100 files unfiltered; 670 of 1509 tracked files
        # are scan-relevant).
        run: |
          set -euo pipefail
          all_files=$(git ls-files | grep -E '\.(rs|toml|json|yml|yaml|cfg|conf|ini|properties|sh|env|txt)$|(^|/)(Dockerfile|Makefile|Justfile|Procfile)$' || true)
          if [ -z "$all_files" ]; then
            echo "::error::Full-tree scan matched ZERO scan-relevant files — the filter regressed; failing loudly instead of passing vacuously."
            exit 1
          fi
          count=$(echo "$all_files" | wc -l | tr -d ' ')
          echo "Scanning $count scan-relevant tracked files (full tree)."
          bash .claude/hooks/secret-scanner.sh "$GITHUB_WORKSPACE" "$all_files"
