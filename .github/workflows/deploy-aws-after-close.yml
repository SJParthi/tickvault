# =============================================================================
# tickvault — auto-deploy outside the 09:00-15:45 IST no-deploy window
# =============================================================================
# Operator lock 2026-06-03: "always deploy the app whenever the instance gets
# auto started at 8 am ... whenever any merge happens to main it should always
# be auto deployed to ec2 — ONLY between 9 am till 3.45 pm it should not happen.
# except this time always auto deployment should happen." So the ONLY no-deploy
# window is 09:00-15:45 IST (the live trading + post-close-settle band); every
# other time — including the 08:30 IST auto-start — auto-deploys the latest main.
#
# Five crons, all Mon–Fri:
#   • 03:00 UTC = 08:30 IST → INSTANCE-START deploy. Fires the moment the box is
#     scheduled to auto-start. deploy-aws SELF-STARTS a stopped box in the
#     08:30-16:30 up-window (see "Ensure instance running" in deploy-aws.yml),
#     so even if the 08:30 EventBridge instance-start silently fails, THIS cron
#     still brings the box up + ships the latest main before 09:00 open. This is
#     the belt-and-suspenders fix for the 2026-06-03 "box never auto-started"
#     incident — it does not depend on the EC2 'running' event firing at all.
#   • 03:15 UTC = 08:45 IST → PRE-MARKET backup, well before the 09:15 open.
#   • 10:16 UTC = 15:46 IST → POST-MARKET window, just AFTER the 15:45 IST end of
#     the no-deploy band (moved from 15:31 so it is no longer blocked by the
#     guard). ~16 min after NSE close — redeploys anything merged during hours.
#   • 10:46 UTC = 16:16 IST + 11:31 UTC = 17:01 IST → SCHEDULER-DROP retries
#     (2026-07-02 incident): GitHub's cron scheduler DROPPED the single 10:16
#     UTC slot today (repo-wide ~09:40–10:30 UTC drop window; dropped slots
#     never queue — they are silently skipped), so a merge blocked during
#     market hours stayed undeployed all day. Two staggered retries give three
#     independent chances. Each firing is idempotent via the sha check below,
#     so on a normal day the retries exit clean with no restart. The 11:31 UTC
#     slot is past the 16:30 IST box auto-stop — safe: the dispatched
#     deploy-aws run self-starts a stopped box (workflow_dispatch ⇒
#     SHOULD_BE_UP=yes in its "Ensure instance running" step) and its final
#     never-cross step stops the box again once the deploy finishes.
#
# Idempotent: before dispatching, we compare main's current HEAD against the
# `head_sha` of the most recent deploy-aws run on main that ACTUALLY DEPLOYED
# (status=success AND its B9 "Record deployed binary git SHA" step executed —
# a green intentional-skip run, box stopped off-hours, concludes success while
# deploying NOTHING and must NOT count; 2026-07-03 false-OK fix, see the
# Compare step below). If equal, nothing to deploy — exit clean (no spurious
# restart on quiet days).
#
# Triggers:
#   - schedule: 03:00 + 03:15 + 10:16 + 10:46 + 11:31 UTC Mon–Fri
#   - workflow_dispatch: manual operator override (just-in-case button)
#
# Honest envelope:
#   - Merge during 09:00-15:45 IST → blocked → auto-fires at 15:46 IST same day
#     (retried at 16:16 + 17:01 IST if the scheduler drops a slot) ✅
#   - GitHub scheduler drops a cron slot → the two staggered retries cover it.
#     HONEST ENVELOPE: cron redundancy REDUCES but cannot ELIMINATE GitHub
#     scheduler risk — the scheduler is an external system and can drop any or
#     all slots (as it did repo-wide on 2026-07-02). ⚠️
#   - Merge over the weekend → auto-fires Monday 08:30 IST (instance-start) ✅
#   - Merge before 08:30 IST on a weekday → auto-fires same day 08:30 IST ✅
#   - Box failed to auto-start at 08:30 → the 08:30 cron self-starts it + deploys ✅
#   - NSE holiday: cron fires; deploy-aws's own market-hours guard is a no-op
#     outside trading hours, so the deploy runs harmlessly on holiday windows.
#   - No new commits → idempotent skip (no restart, no extra cost).
# =============================================================================

name: deploy-aws-after-close

on:
  schedule:
    # 03:00 UTC = 08:30 IST (instance-start). 03:15 UTC = 08:45 IST (pre-market).
    # 10:16 UTC = 15:46 IST (post-market, just after the 15:45 no-deploy band).
    # 10:46 UTC = 16:16 IST + 11:31 UTC = 17:01 IST (scheduler-drop retries,
    # 2026-07-02 — see header; idempotent sha check makes extras free).
    # Mon–Fri only.
    - cron: '0 3 * * 1-5'
    - cron: '15 3 * * 1-5'
    - cron: '16 10 * * 1-5'
    - cron: '46 10 * * 1-5'
    - cron: '31 11 * * 1-5'
  workflow_dispatch: {}

concurrency:
  group: deploy-aws-after-close
  cancel-in-progress: false

permissions:
  contents: read
  actions: write   # required to dispatch deploy-aws.yml

jobs:
  retry-if-needed:
    name: Re-fire deploy-aws if main has an undeployed commit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (for git rev-parse)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          ref: main

      - name: Compare main HEAD vs last successful deploy
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          MAIN_SHA=$(git rev-parse HEAD)
          echo "main HEAD = $MAIN_SHA"

          # ── FALSE-OK FIX (2026-07-03) — a green NO-OP SKIP run is NOT a deploy ──
          # A push to main while the box is intentionally stopped (evening /
          # weekend, outside the 08:30-16:30 IST up-window) exits deploy-aws
          # GREEN as a deliberate no-op (DEPLOY_SKIP_REASON=intentional_stopped
          # in its "Ensure instance running" step): the run concludes SUCCESS
          # with head_sha = the merged commit, but S3 upload / SSM swap / B9
          # provenance steps are all `skipped` — NOTHING was deployed.
          #
          # The old check here took the head_sha of the single most recent
          # status=success run, so such a skip run poisoned the idempotency
          # comparison: MAIN_SHA == skip-run sha ⇒ dispatch=false ⇒ the merge
          # NEVER deploys and the box runs stale code indefinitely. Live proof
          # (2026-07-03): run 28662389892 (push 18:34 IST, sha 52fcd6f8) was a
          # green skip while the box actually ran 8ec44176 — only a LATER
          # CI-only merge moving HEAD saved the Monday-morning cron from
          # skipping the whole Friday-evening batch.
          #
          # Fix: walk the recent successful runs and accept as "last deployed"
          # only a run whose deploy job actually EXECUTED the B9 provenance
          # step ("Record deployed binary git SHA") — that step runs exactly
          # when a verified-healthy binary swap happened (deploy-aws.yml,
          # `if: success() && env.DEPLOY_SKIP_REASON == ''`). Green skips show
          # that step as `skipped` and are ignored. If no qualifying run is
          # found in the window (fresh repo / pre-B9 history / API hiccup),
          # FAIL OPEN to dispatching: an extra off-hours deploy is idempotent
          # and cheap; a silently-stale trading box is not.
          LAST_DEPLOYED=""
          RUNS=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/deploy-aws.yml/runs?branch=main&status=success&per_page=10" \
            --jq '.workflow_runs[] | "\(.id) \(.head_sha)"')
          while read -r RUN_ID RUN_SHA; do
            [ -z "${RUN_ID:-}" ] && continue
            REAL=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs?per_page=30" \
              --jq '[.jobs[].steps[]? | select((.name | contains("Record deployed binary git SHA")) and .conclusion == "success")] | length' \
              2>/dev/null || echo 0)
            if [ "${REAL:-0}" -gt 0 ]; then
              LAST_DEPLOYED="$RUN_SHA"
              echo "last REAL deploy: run $RUN_ID sha $RUN_SHA (B9 provenance step executed)"
              break
            fi
            echo "run $RUN_ID sha $RUN_SHA concluded success but deployed nothing (green no-op skip) — ignoring"
          done <<< "$RUNS"
          echo "last successful deploy sha = ${LAST_DEPLOYED:-<none>}"

          if [ -z "$LAST_DEPLOYED" ]; then
            echo "No prior successful deploy on record — dispatching first deploy."
            echo "dispatch=true" >> "$GITHUB_OUTPUT"
          elif [ "$MAIN_SHA" != "$LAST_DEPLOYED" ]; then
            echo "main has moved since last successful deploy — dispatching."
            echo "dispatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "main is already deployed — nothing to do."
            echo "dispatch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch deploy-aws.yml on main
        if: steps.check.outputs.dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-aws.yml --ref main
          echo "::notice::deploy-aws dispatched on main — watch Actions tab"

      - name: Summary
        run: |
          {
            echo "## Auto-deploy after market close"
            echo ""
            if [ "${{ steps.check.outputs.dispatch }}" = "true" ]; then
              echo "✅ Dispatched \`deploy-aws.yml\` on \`main\` — operator sees green/red on the deploy-aws run."
            else
              echo "ℹ️  \`main\` is already deployed — no action taken (idempotent)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
