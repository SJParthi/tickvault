# =============================================================================
# tickvault — Chaos Test Suite (Weekly)
# =============================================================================
# Runs the 11 `#[ignore]`d chaos tests (across 19 chaos_* test files) that exercise:
#
# 1. QuestDB outage / pause / sigkill / disk-full
# 2. WS frame WAL replay / spill saturation / disk IO failure
# 3. Zero-tick-loss defense chain (with real Docker stack)
# 4. Mock WS server end-to-end
#
# HONESTY NOTE: of the 11 ignored tests, several SELF-SKIP in this lane —
# some need a running tickvault app (TV_METRICS_PORT gate), others gate on
# env flags this job does not set by default (CI_WITH_DOCKER,
# CI_WITH_SIGKILL, TV_SLOW_CHAOS). This lane's green therefore covers the
# executing subset only; enabling the gated tests is a follow-up once the
# lane has its first green baseline.
#
# Why weekly (not every push):
# - Each test spins up Docker compose, runs Rust tests, tears down.
# - Total wall-clock ~30 min. Running on every PR would consume the free-
#   tier budget (2000 min/mo) in a week.
# - Weekly cadence catches regressions within 7 days — good enough for
#   chaos / infrastructure invariants that rarely change per commit.
#
# Operator decision path (see .claude/plans/pr-288-completion.md):
# - Free-tier GH runner (this workflow) — OK for weekly, ~30 min/week.
# - Self-hosted runner — required if we want hourly or PR-triggered.
# - Cost-budget per .claude/rules/project/aws-budget.md.
#
# Failure handling:
# - Opens a GitHub issue tagged `chaos-regression` with the failing log.
# - Manual dispatch available via workflow_dispatch for on-demand runs.
# =============================================================================

name: chaos-nightly

on:
  schedule:
    # Sat 18:30 UTC = Sun 00:00 IST — runs once a week, Saturday night IST.
    # Offset from full-test-nightly (01:00 IST daily) to avoid runner contention.
    - cron: '30 18 * * 6'
  workflow_dispatch:
    inputs:
      include_slow:
        description: 'Include prolonged-outage tests (TV_SLOW_CHAOS=1). +10 min runtime.'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: chaos-nightly
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  chaos:
    runs-on: ubuntu-latest
    # 60 min ceiling: 30 min typical + 10 min slow + 20 min safety margin.
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      # Point the test env vars at the Docker compose stack's published ports.
      TV_QUESTDB_HTTP_URL: http://127.0.0.1:9000
      TV_METRICS_PORT: '9091'
      # CI-only throwaway QuestDB PG credentials for the ephemeral runner
      # container. deploy/docker/docker-compose.yml fail-closes with
      # `${TV_QUESTDB_PG_USER:?...}` when these are unset (the root cause of
      # every scheduled run since 2026-04-25 failing at `docker compose up`).
      # Prod credentials come from AWS SSM via bootstrap.sh — these values
      # never leave the runner and guard nothing (chaos tests use ILP/HTTP,
      # not the PG wire).
      TV_QUESTDB_PG_USER: chaos_ci
      TV_QUESTDB_PG_PASSWORD: chaos-ci-local-dummy
      # Some chaos tests gate on this — off by default, on via workflow_dispatch.
      TV_SLOW_CHAOS: ${{ github.event.inputs.include_slow == 'true' && '1' || '' }}
      # ubuntu-latest is amd64; the compose file's tv-questdb defaults to
      # `platform: linux/arm64` (prod Graviton parity), which exec-format-
      # fails on amd64 runners — the exact failure .github/workflows/
      # groww-e2e.yml:12-16 documents (it works around it with a bare
      # `docker run`). questdb/questdb:9.3.5 is a multi-arch manifest list
      # (amd64 + arm64 verified 2026-07-11), so overriding the platform is
      # a clean native pull, not an emulation hack.
      TV_QDB_PLATFORM: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: '1.95.0'

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: chaos-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: chaos-${{ runner.os }}-

      - name: Bring up Docker compose stack
        # The chaos tests shell out to `docker compose pause/unpause/stop/start`
        # so the stack must be running at the start of each test. Individual
        # tests restore state in their teardown.
        # Captured to /tmp/compose-up.log so the issue-filing step can quote
        # a pre-test failure (all 11 runs since 2026-04-25 died HERE with the
        # compose interpolation error, and the bot issues said "(chaos log
        # not captured)" because /tmp/chaos.log was never created).
        run: |
          set -euo pipefail
          {
            docker compose -f deploy/docker/docker-compose.yml up -d
            echo "Waiting for QuestDB to be ready..."
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:9000/status >/dev/null 2>&1; then
                echo "QuestDB ready on attempt $i"
                break
              fi
              sleep 2
            done
            curl -fsS http://127.0.0.1:9000/status || {
              echo "QuestDB failed to come up after 60s"
              docker compose -f deploy/docker/docker-compose.yml logs --tail=50
              exit 1
            }
          } 2>&1 | tee /tmp/compose-up.log

      - name: Build chaos tests (no-run)
        # Pre-build so the compile errors surface before any stack state is
        # mutated by a test. Scoped to the chaos_* test binaries only — the
        # full workspace test build is normal CI's job and was the widest
        # pre-test failure surface in this lane.
        run: |
          set -euo pipefail
          cargo test --workspace --no-run --test 'chaos_*' 2>&1 | tee /tmp/build.log

      - name: Run chaos tests (--ignored)
        id: chaos
        run: |
          set -euo pipefail
          # `--ignored` flips the #[ignore] bit so the chaos tests actually
          # execute. We scope to the `chaos_*` test binaries via --test so
          # unrelated #[ignore]'d tests (e.g. flaky GUI tests) don't join in.
          # --no-fail-fast is intentional — we want the full failure matrix.
          cargo test \
            --workspace \
            --test 'chaos_*' \
            --no-fail-fast \
            -- --ignored --nocapture 2>&1 | tee /tmp/chaos.log

      - name: Tear down Docker compose stack
        if: always()
        run: |
          docker compose -f deploy/docker/docker-compose.yml logs --tail=100 \
            > /tmp/docker-logs.txt || true
          docker compose -f deploy/docker/docker-compose.yml down -v

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: chaos-logs
          path: |
            /tmp/chaos.log
            /tmp/build.log
            /tmp/compose-up.log
            /tmp/docker-logs.txt
          retention-days: 14

      - name: Open regression issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Fallback ladder: the run can die BEFORE the chaos test step
            // (compose up, cargo build), in which case /tmp/chaos.log never
            // exists. Walk the step logs newest-stage-first so the issue
            // always quotes the log of the stage that actually failed —
            // never the "(chaos log not captured)" dead end again.
            const sources = [
              { path: '/tmp/chaos.log', note: 'chaos.log (chaos test step output)' },
              { path: '/tmp/build.log', note: 'build.log (failure occurred before the chaos test step, during cargo build)' },
              { path: '/tmp/compose-up.log', note: 'compose-up.log (failure occurred before the chaos test step, during docker compose up)' },
              { path: '/tmp/docker-logs.txt', note: 'docker-logs.txt (container logs from teardown)' },
            ];
            let log = '';
            let sourceNote = '(no logs captured — failure before any logged step)';
            for (const s of sources) {
              try {
                log = fs.readFileSync(s.path, 'utf8');
                sourceNote = `log source: ${s.note}`;
                break;
              } catch (e) {
                // ENOENT — this stage never ran; try the next rung.
              }
            }
            // Keep the issue body small — last 100 lines is plenty.
            log = log.split('\n').slice(-100).join('\n');
            const title = `chaos-regression: nightly ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Chaos test suite failed',
              '',
              `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              sourceNote,
              '',
              '### Last 100 lines',
              '```',
              log,
              '```',
              '',
              '### Artifacts',
              `- chaos-logs: full stdout + docker compose logs`,
              '',
              `Labels: chaos-regression`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['chaos-regression'],
            });
