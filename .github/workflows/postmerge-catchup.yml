# =============================================================================
# Post-Merge Catch-up Dispatcher — bot merges must still run the full battery
# =============================================================================
# THE GAP (proven live 2026-07-04): PR #1392 was merged by github-actions[bot]
# — the ci.yml enable-auto-merge job arms native auto-merge using the
# workflow's own GITHUB_TOKEN, so the resulting merge/push event to main is
# attributed to GITHUB_TOKEN. GitHub SUPPRESSES push-triggered workflows for
# events created with GITHUB_TOKEN (recursion protection), so merge commit
# aafa226 landed on main with ZERO post-merge runs: no CI (coverage ratchet
# artifact), no Benchmarks & Perf Gate, no deploy-aws. Earlier merges (#1391)
# only fired post-merge runs because auto-merge had been armed with the
# operator's own token, so the merge was attributed to SJParthi.
#
# THE FIX (house pattern — cron/dispatch redundancy, same as
# deploy-aws-after-close.yml): GITHUB_TOKEN's suppression rule has a
# documented EXCEPTION — `workflow_dispatch` and `repository_dispatch` events
# DO trigger workflows even when created with GITHUB_TOKEN. So this ~30s
# scheduled job checks whether main HEAD has ANY run of ci.yml / bench.yml
# (any event, any status) and, if none exists, dispatches that workflow on
# main. ci.yml + bench.yml both carry `workflow_dispatch:` triggers and treat
# a dispatched main run exactly like a push-to-main run.
#
# LOOP SAFETY (self-terminating by construction): a dispatched run has
# event=workflow_dispatch and head_sha == main HEAD, so the next scheduled
# check finds it via the head_sha filter and does nothing. The head_sha
# filter also guarantees at-most-one dispatch per (workflow, SHA) — queued,
# in_progress, completed (incl. cancelled/failed) runs all count as "exists";
# this dispatcher backfills MISSING runs, it never re-runs red ones.
#
# deploy-aws.yml IS now handled here too (added 2026-07-09 after a market-open
# outage). It USED to be excluded on the theory that deploy-aws-after-close.yml
# gives it its own cron/dispatch redundancy — but that lane depends on GitHub's
# scheduler firing the 03:00/03:15 UTC (08:30/08:45 IST) morning crons, and
# GitHub SILENTLY DROPS cron slots under load. On 2026-07-09 both morning slots
# were dropped: #1449 (a boot-critical fast-boot fix) had bot-merged the night
# before (GITHUB_TOKEN suppressed its push-triggered deploy-aws), so NO deploy-aws
# run existed for main HEAD, the box auto-started 08:30 IST on the previous
# binary and booted dead, and #1449's first deploy was still queued at 09:51 IST
# — after recovery. This every-30-min, 7-days-a-week dispatcher is FAR less
# scheduler-drop-fragile than 5 fixed daily crons: it guarantees a deploy-aws RUN
# (hence the ARM build + a real, provenance-updating deploy once the box is up)
# exists for every main HEAD within ~30 min of ANY merge, bot or human. The
# existence check makes it self-terminating (one run per SHA) and it changes NO
# deploy-aws behaviour — deploy-aws's OWN market-hours guard + off-hours box-state
# skip still decide whether/when the swap happens; this dispatcher only TRIGGERS.
# The box-start deploy-watchdog Lambda remains the deterministic backstop that
# catches a stale-binary boot from the on-box provenance and pages + redeploys.
#
# HONEST ENVELOPE: cron/dispatch redundancy REDUCES but cannot ELIMINATE GitHub
# scheduler risk — the scheduler is external and can drop any or all slots. This
# moves the pre-open exposure from 2 fragile morning crons to 48 every-30-min
# slots + overnight lead time; the box-start watchdog is the AWS-native
# (scheduler-independent) deterministic catch.
#
# Cost: one job, no checkout, ~5 API reads + at most 4 dispatches per firing
# (~30s on ubuntu-latest) — negligible against free-tier minutes. Because the
# check is head_sha-run-EXISTENCE (not deployed-state), each SHA triggers at most
# ONE deploy-aws run ever — no overnight rebuild spam. terraform-apply.yml
# joined the backfill list 2026-07-14 (PR-C3 rider; path-guarded — see the
# inline note) so a bot-merged terraform change is no longer the last
# push-suppressed lane without dispatcher coverage.
name: Post-Merge Catch-up Dispatcher

on:
  schedule:
    # Every 30 minutes, all week. Bot merges can land any time a session is
    # driving PRs (weekends included), and the job is ~30s — simpler and
    # safer than a weekday-windowed cron that misses off-hours merges.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write # gh workflow run (create workflow_dispatch events)

concurrency:
  group: postmerge-catchup
  cancel-in-progress: false

jobs:
  catchup:
    name: "Dispatch missing post-merge runs"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # No checkout needed — everything goes through the GitHub API via the
      # preinstalled gh CLI.
      - name: Backfill main HEAD if it has no ci.yml / bench.yml run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          head_sha=$(gh api "repos/${GH_REPO}/commits/main" --jq .sha)
          echo "main HEAD = ${head_sha}"

          dispatched=0
          # deploy-aws.yml is included so a bot-merged (push-suppressed) commit
          # still gets its ARM build + a real deploy run before the box's 08:30 IST
          # start, independent of the scheduler-drop-fragile deploy-aws-after-close
          # crons (2026-07-09 outage — see header). deploy-aws's OWN market-hours
          # guard + off-hours box-state skip are unchanged; this only TRIGGERS.
          #
          # terraform-apply.yml (added 2026-07-14, PR-C3 rider — merge-gate-lock
          # §3.1 dated edit): its push trigger is PATH-FILTERED
          # (deploy/aws/terraform/** + its own workflow file), so a bot-merged
          # terraform change was the LAST push-suppressed lane with no
          # dispatcher coverage — the 3 post-close crons are the same
          # scheduler-drop-fragile class as the 2026-07-09 deploy-aws outage.
          # Because the path filter makes "zero runs for HEAD" the NORMAL state
          # for non-terraform merges, the existence check alone would dispatch
          # an apply run on EVERY merge; the guard below therefore dispatches
          # ONLY when the HEAD commit actually touched the filtered paths.
          # Envelope: the commit-files API returns up to 300 files — a >300-file
          # merge whose terraform change sits past the cap is missed here and
          # covered by the existing post-close crons (fail-safe direction: a
          # missed dispatch defers the apply, never doubles it; terraform-apply
          # is plan-gated + DynamoDB-locked, so extras are free no-ops anyway).
          tf_touched=$(gh api "repos/${GH_REPO}/commits/${head_sha}"             --jq '[.files[].filename
                   | select(startswith("deploy/aws/terraform/")
                            or . == ".github/workflows/terraform-apply.yml")]
                  | length')
          echo "terraform-filtered files in HEAD commit: ${tf_touched}"

          for wf in ci.yml bench.yml deploy-aws.yml terraform-apply.yml; do
            if [ "${wf}" = "terraform-apply.yml" ] && [ "${tf_touched}" -eq 0 ]; then
              echo "terraform-apply.yml: HEAD commit touched no terraform-filtered paths — skipping (path-filtered lane)"
              continue
            fi
            # Any run (any event: push, pull_request, workflow_dispatch,
            # schedule; any status — queued/in_progress/success/failed/
            # cancelled) for this exact SHA counts as covered. So a deploy-aws
            # run that ends in a green off-hours no-op skip, or a market-hours
            # guard block, still counts — this dispatcher backfills MISSING runs,
            # it never re-runs (or re-builds) a SHA that already has one.
            count=$(gh api \
              "repos/${GH_REPO}/actions/workflows/${wf}/runs?head_sha=${head_sha}&per_page=1" \
              --jq .total_count)
            if [ "${count}" -eq 0 ]; then
              echo "::warning::${wf} has ZERO runs for main HEAD ${head_sha} — a GITHUB_TOKEN bot merge (or a scheduler-dropped morning deploy cron) left it uncovered. Dispatching catch-up run on main."
              gh workflow run "${wf}" --ref main
              dispatched=$((dispatched + 1))
            else
              echo "${wf}: ${count} run(s) already exist for ${head_sha} — nothing to do"
            fi
          done

          {
            echo "## Post-merge catch-up"
            echo ""
            echo "- main HEAD: \`${head_sha}\`"
            echo "- catch-up runs dispatched: ${dispatched}"
          } >> "$GITHUB_STEP_SUMMARY"
