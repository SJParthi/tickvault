# =============================================================================
# Post-Merge Catch-up Dispatcher — bot merges must still run the full battery
# =============================================================================
# THE GAP (proven live 2026-07-04): PR #1392 was merged by github-actions[bot]
# — the ci.yml enable-auto-merge job arms native auto-merge using the
# workflow's own GITHUB_TOKEN, so the resulting merge/push event to main is
# attributed to GITHUB_TOKEN. GitHub SUPPRESSES push-triggered workflows for
# events created with GITHUB_TOKEN (recursion protection), so merge commit
# aafa226 landed on main with ZERO post-merge runs: no CI (coverage ratchet
# artifact), no Benchmarks & Perf Gate, no deploy-aws. Earlier merges (#1391)
# only fired post-merge runs because auto-merge had been armed with the
# operator's own token, so the merge was attributed to SJParthi.
#
# THE FIX (house pattern — cron/dispatch redundancy, same as
# deploy-aws-after-close.yml): GITHUB_TOKEN's suppression rule has a
# documented EXCEPTION — `workflow_dispatch` and `repository_dispatch` events
# DO trigger workflows even when created with GITHUB_TOKEN. So this ~30s
# scheduled job checks whether main HEAD has ANY run of ci.yml / bench.yml
# (any event, any status) and, if none exists, dispatches that workflow on
# main. ci.yml + bench.yml both carry `workflow_dispatch:` triggers and treat
# a dispatched main run exactly like a push-to-main run.
#
# LOOP SAFETY (self-terminating by construction): a dispatched run has
# event=workflow_dispatch and head_sha == main HEAD, so the next scheduled
# check finds it via the head_sha filter and does nothing. The head_sha
# filter also guarantees at-most-one dispatch per (workflow, SHA) — queued,
# in_progress, completed (incl. cancelled/failed) runs all count as "exists";
# this dispatcher backfills MISSING runs, it never re-runs red ones.
#
# deploy-aws.yml deliberately NOT handled here: it already has its own
# cron/dispatch redundancy (deploy-aws-after-close.yml fires it after market
# close on weekdays), so a bot-merge-suppressed deploy self-heals via that
# existing lane.
#
# Cost: one job, no checkout, 2 API reads + at most 2 dispatches per firing
# (~30s on ubuntu-latest) — negligible against free-tier minutes.
name: Post-Merge Catch-up Dispatcher

on:
  schedule:
    # Every 30 minutes, all week. Bot merges can land any time a session is
    # driving PRs (weekends included), and the job is ~30s — simpler and
    # safer than a weekday-windowed cron that misses off-hours merges.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write # gh workflow run (create workflow_dispatch events)

concurrency:
  group: postmerge-catchup
  cancel-in-progress: false

jobs:
  catchup:
    name: "Dispatch missing post-merge runs"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # No checkout needed — everything goes through the GitHub API via the
      # preinstalled gh CLI.
      - name: Backfill main HEAD if it has no ci.yml / bench.yml run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          head_sha=$(gh api "repos/${GH_REPO}/commits/main" --jq .sha)
          echo "main HEAD = ${head_sha}"

          dispatched=0
          for wf in ci.yml bench.yml; do
            # Any run (any event: push, pull_request, workflow_dispatch,
            # schedule; any status) for this exact SHA counts as covered.
            count=$(gh api \
              "repos/${GH_REPO}/actions/workflows/${wf}/runs?head_sha=${head_sha}&per_page=1" \
              --jq .total_count)
            if [ "${count}" -eq 0 ]; then
              echo "::warning::${wf} has ZERO runs for main HEAD ${head_sha} — a GITHUB_TOKEN bot merge suppressed the push trigger. Dispatching catch-up run on main."
              gh workflow run "${wf}" --ref main
              dispatched=$((dispatched + 1))
            else
              echo "${wf}: ${count} run(s) already exist for ${head_sha} — nothing to do"
            fi
          done

          {
            echo "## Post-merge catch-up"
            echo ""
            echo "- main HEAD: \`${head_sha}\`"
            echo "- catch-up runs dispatched: ${dispatched}"
          } >> "$GITHUB_STEP_SUMMARY"
