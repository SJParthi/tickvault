# =============================================================================
# dhan-live-trader — Branch Protection Setup (One-Time)
# =============================================================================
# Automatically configures branch protection rules on main and develop.
# Runs on workflow_dispatch (manual) or when this file is pushed.
# Ensures no direct pushes to main/develop bypass CI.
#
# Security: All actions pinned to SHA. No mutable tags.
# =============================================================================

name: Branch Protection

on:
  workflow_dispatch: # Manual trigger
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/branch-protection.yml"

permissions:
  administration: write

jobs:
  protect-main:
    name: "Protect main branch"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure main branch protection
        run: |
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/branches/main/protection \
            -d '{
              "required_status_checks": {
                "strict": true,
                "contexts": [
                  "Stage 1 — Compile",
                  "Stage 2 — Lint",
                  "Stage 3 — Test",
                  "Stage 4 — Security",
                  "Stage 5 — Performance",
                  "Stage 6 — Coverage",
                  "Stage 7 — Audit",
                  "Secret Scan",
                  "Mutation Testing (critical crates)",
                  "Commit Lint"
                ]
              },
              "enforce_admins": true,
              "required_pull_request_reviews": {
                "required_approving_review_count": 1,
                "dismiss_stale_reviews": true
              },
              "restrictions": null,
              "allow_force_pushes": false,
              "allow_deletions": false,
              "block_creations": false,
              "required_conversation_resolution": true
            }'
          echo "main branch protection configured."

  protect-develop:
    name: "Protect develop branch"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure develop branch protection
        run: |
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/branches/develop/protection \
            -d '{
              "required_status_checks": {
                "strict": true,
                "contexts": [
                  "Stage 1 — Compile",
                  "Stage 2 — Lint",
                  "Stage 3 — Test",
                  "Stage 4 — Security",
                  "Stage 5 — Performance",
                  "Stage 6 — Coverage",
                  "Stage 7 — Audit",
                  "Secret Scan",
                  "Mutation Testing (critical crates)",
                  "Commit Lint"
                ]
              },
              "enforce_admins": true,
              "required_pull_request_reviews": null,
              "restrictions": null,
              "allow_force_pushes": false,
              "allow_deletions": false,
              "block_creations": false,
              "required_conversation_resolution": true
            }'
          echo "develop branch protection configured."
