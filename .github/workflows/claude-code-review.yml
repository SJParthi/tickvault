# =============================================================================
# Claude Code GitHub Action — Automated PR Review
# =============================================================================
# Triggers on @claude mentions in PR comments and optionally on PR open.
# Uses Anthropic's official Claude Code GitHub Action.
#
# Setup required:
#   1. Add ANTHROPIC_API_KEY secret to repo Settings > Secrets
#   2. Enable GitHub Actions for the repo
#
# Usage:
#   Comment "@claude review this PR" on any PR
#   Comment "@claude update CLAUDE.md with <rule>" to add rules
# =============================================================================

name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    # Only run on PR comments that mention @claude AND are authored by a
    # trusted account (repo owner / org member / collaborator). Without this
    # author-association gate, a drive-by non-collaborator commenter could
    # steer the privileged review agent (write token on PRs/issues).
    if: |
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      ((github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
       (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')))
    runs-on: ubuntu-latest
    # claude-code-action v1 dropped the `timeout_minutes` input — the
    # job-level timeout below bounds the run instead.
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
