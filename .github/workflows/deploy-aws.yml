# S7-Step3 / Phase 8.2: AWS deploy workflow.
#
# Builds the release binary on GitHub Actions, ships it to the EC2
# instance via SSM Session Manager (no SSH key in the workflow),
# runs the smoke test, then swaps the systemd unit and monitors the
# first 60 seconds for crashes. Rolls back on failure.
#
# Triggers (PR #772 added the push-to-main trigger):
#   - Push to main with Rust/binary-relevant paths (auto-fire after merge)
#       paths: crates/**, Cargo.toml, Cargo.lock, deploy/systemd/**
#   - Push of a tag matching v*.*.* (release builds)
#   - Manual dispatch (workflow_dispatch) — operator override or emergency
#
# Safety nets that prevent the auto-trigger from causing harm:
#   1. preflight job — skips entire workflow if AWS_ROLE_ARN / AWS_ACCESS_KEY_ID
#      bootstrap secrets are absent (charter §C "100% no false-OK PR checks").
#   2. guard_market_hours job — blocks deploy during 09:00-15:45 IST Mon-Fri
#      unless workflow_dispatch with confirm_market_hours=yes. Since
#      2026-07-17 an in-window MAIN-BRANCH push run defers GREEN
#      (deploy_allowed=false, no-op; the 15:46 IST after-close cron delivers
#      it) instead of dying red; an in-window dispatch without the override
#      AND an in-window TAG push still fail red (the after-close cron
#      delivers main HEAD only, so a green tag deferral would silently
#      never deploy).
#   3. concurrency.group serializes deploys; never two at once.
#   4. Existing rollback path triggers on failed smoke test.
#
# Secrets required (GitHub repo > Settings > Secrets and variables > Actions):
#   AWS_ROLE_ARN                — OIDC role assumed by the workflow (optional if
#                                 access keys are set; preflight accepts either)
#   EC2_INSTANCE_ID             — the tv-prod-app instance ID from tf output
#   (AWS_ACCOUNT_ID is NO LONGER required — derived at runtime via
#    `aws sts get-caller-identity`, see the "Resolve AWS account id" step.)
#
# Variables (repo > Settings > Secrets and variables > Variables):
#   AWS_REGION                  — ap-south-1

name: deploy-aws

on:
  workflow_dispatch:
    inputs:
      confirm_market_hours:
        description: 'Deploying during market hours? Type "yes" to override the guard.'
        required: false
        default: 'no'
  push:
    branches: [main]
    paths:
      # Rust sources + deps
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      # systemd unit (apps's runtime contract)
      - 'deploy/systemd/**'
      # Docker compose (QuestDB infra; arch / image / env)
      - 'deploy/docker/**'
      # Config TOML (loaded by app at boot)
      - 'config/**'
      # CloudWatch agent + prometheus scrape configs (2026-07-06): the deploy's
      # OBSERVABILITY-LAST block copies these to the box + fetch-configs the
      # agent on every deploy — an agent-config-only change (e.g. the machine/
      # log-path fix) must self-deploy instead of waiting for the next Rust push.
      - 'deploy/aws/cloudwatch-agent.json'
      - 'deploy/aws/prometheus.yaml'
      # The deploy workflow ITSELF (so a PR that fixes the deploy
      # auto-redeploys without the operator clicking "Run workflow").
      # Charter: "everything completely comprehensively fully automated".
      - '.github/workflows/deploy-aws.yml'
    tags:
      - 'v*.*.*'

concurrency:
  group: deploy-aws-prod
  cancel-in-progress: false  # never interrupt an in-flight deploy

permissions:
  id-token: write   # OIDC for AWS role assumption
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 0: preflight — skip if AWS bootstrap secrets aren't configured.
  #
  # Mirrors the pattern from .github/workflows/terraform-apply.yml so
  # that contributors pushing to main BEFORE the operator's one-time
  # bootstrap (BOOTSTRAP-ONE-TIME.md) don't see red PR checks.
  # Pre-bootstrap: this job exits 0 with a notice, downstream jobs
  # skip cleanly. Post-bootstrap: downstream activates automatically.
  # ─────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight — check bootstrap secrets
    runs-on: ubuntu-24.04
    outputs:
      bootstrap_ready: ${{ steps.check.outputs.bootstrap_ready }}
    steps:
      - name: Check whether AWS bootstrap secrets are configured
        id: check
        env:
          OIDC_ROLE: ${{ secrets.AWS_ROLE_ARN }}
          ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -n "${OIDC_ROLE}" ] || [ -n "${ACCESS_KEY}" ]; then
            echo "bootstrap_ready=true" >> $GITHUB_OUTPUT
            echo "✅ Bootstrap secrets present — deploy chain will run."
          else
            echo "bootstrap_ready=false" >> $GITHUB_OUTPUT
            echo "::notice::AWS bootstrap secrets not yet configured — skipping deploy chain."
            echo "::notice::Follow deploy/aws/terraform/BOOTSTRAP-ONE-TIME.md (40 sec) to enable automation."
            echo ""
            echo "Skipped jobs: build, guard_market_hours, deploy."
            echo "This is the EXPECTED state for a fresh repo. Workflow exits 0."
          fi

  build:
    # Native ARM64 runner — matches t4g.medium Graviton instance arch.
    # GitHub provides ubuntu-24.04-arm at no cost for public repos and
    # standard pricing for private. Native compilation avoids cross-
    # compile complexity for native deps (aws-lc-rs, ring, jemalloc).
    name: Build release binary (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: preflight
    if: needs.preflight.outputs.bootstrap_ready == 'true'
    outputs:
      binary_artifact_name: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain (host = aarch64-unknown-linux-musl, static binary)
        # MUSL static target eliminates GLIBC version dependency entirely.
        # Background: AL2023 ships GLIBC 2.34; ubuntu-24.04-arm runners have 2.39.
        # A glibc-dynamic binary built on the runner refuses to load on the box
        # with `version GLIBC_2.38/2.39 not found`. Static musl binary = zero
        # runtime libc dependency = runs on any Linux forever. Z+ L4 PREVENT.
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # SHA-pinned (was @master, supply-chain hardening 2026-04-25)
        with:
          toolchain: 1.95.0
          targets: aarch64-unknown-linux-musl

      - name: Install ARM64 musl build deps (cmake for aws-lc-rs + musl-tools)
        # 2026-07-15: SUSTAINED ports.ubuntu.com outage killed deploy runs
        # 29430374817 / 29431100541 / 29432110918 (IPv6 net-unreachable +
        # IPv4 connect timeouts on 91.189.91.102/.103/.104). Hardening:
        #   - Acquire::Retries=5 + 15s http/https timeouts + ForceIPv4 on
        #     EVERY apt call (the IPv6 arm of the outage makes ForceIPv4
        #     free insurance).
        #   - Fallback chain (evidence 2026-07-15, PR #1586 verification):
        #       1) default sources (http://ports.ubuntu.com)
        #       2) http://azure.ports.ubuntu.com — VERIFIED serving the
        #          genuine noble ubuntu-ports Release (Architectures incl.
        #          arm64); the ecosystem-standard Azure-side ports mirror
        #          (used by microsoft/vscode Azure pipelines, elementary/os
        #          arm64 image builds, FWGS GHA arm64 scripts). NOTE: from
        #          outside Azure it resolves to the SAME 91.189.91.x pool;
        #          its value is Azure-side resolution on GitHub's
        #          Azure-hosted runners — hence rung 3 below as well.
        #       3) https://ports.ubuntu.com — TLS/443 observed answering
        #          200 while plain :80 to the same pool timed out during
        #          this outage (different port/path through the failure).
        run: |
          apt_install() {
            sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=15 \
                 -o Acquire::https::Timeout=15 -o Acquire::ForceIPv4=true update \
              && sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=15 \
                   -o Acquire::https::Timeout=15 -o Acquire::ForceIPv4=true \
                   install -y --no-install-recommends \
                   cmake build-essential pkg-config musl-tools musl-dev
          }
          set_ports_mirror() {
            # Idempotent: rewrites whatever ports mirror the sources currently
            # carry (any scheme, azure-prefixed or not) to "$1". Handles the
            # noble deb822 ubuntu.sources AND the legacy sources.list.
            target="$1"
            for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
              if [ -f "$f" ]; then
                sudo sed -i -E "s|https?://(azure\.)?ports\.ubuntu\.com|${target}|g" "$f"
              fi
            done
            return 0
          }
          if apt_install; then
            exit 0
          fi
          echo "::warning::apt failed against the default mirror (http://ports.ubuntu.com) — switching sources to http://azure.ports.ubuntu.com and retrying."
          set_ports_mirror "http://azure.ports.ubuntu.com"
          if apt_install; then
            exit 0
          fi
          echo "::warning::apt failed against http://azure.ports.ubuntu.com — switching sources to https://ports.ubuntu.com (TLS/443) and retrying."
          set_ports_mirror "https://ports.ubuntu.com"
          if apt_install; then
            exit 0
          fi
          echo "::error::apt install failed on ALL mirrors tried: http://ports.ubuntu.com (default), http://azure.ports.ubuntu.com, https://ports.ubuntu.com — cannot install ARM64 musl build deps."
          exit 1

      - name: Cache cargo registry + target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-arm64-musl-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tickvault release binary (ARM64 musl static)
        env:
          # musl needs the right C compiler/linker for aws-lc-rs's cmake build
          CC_aarch64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          # B9 deploy provenance: the DEPLOY build (and only the deploy build)
          # sets the dedicated TICKVAULT_BUILD_GIT_SHA var so crates/common/
          # build.rs embeds the EXACT sha. Other workflows never set it, so
          # their restored target caches stay valid (2026-07-03 adversarial-
          # review HIGH fix — a rerun-if-env-changed on GITHUB_SHA killed the
          # Build & Verify cache on every commit).
          TICKVAULT_BUILD_GIT_SHA: ${{ github.sha }}
        run: cargo build --release --target aarch64-unknown-linux-musl --bin tickvault -p tickvault-app

      - name: Build smoke_test binary (ARM64 musl static)
        # Separate binary at crates/app/src/bin/smoke_test.rs — exits 0/1
        # without burning Dhan rate limit. Run by deploy as a pre-swap gate.
        env:
          CC_aarch64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          # Same provenance var as the main build — BOTH shipped binaries
          # embed the exact deploy sha.
          TICKVAULT_BUILD_GIT_SHA: ${{ github.sha }}
        run: cargo build --release --target aarch64-unknown-linux-musl --bin smoke_test -p tickvault-app

      - name: Verify binaries exist + tickvault under 30MB + statically linked
        run: |
          BIN_DIR=target/aarch64-unknown-linux-musl/release
          file "$BIN_DIR/tickvault"
          file "$BIN_DIR/smoke_test"
          # Confirm the file command reports ARM aarch64 (not x86)
          file "$BIN_DIR/tickvault" | grep -q 'aarch64\|ARM' \
            || (echo "FAIL: tickvault is not ARM64 — arch mismatch with Graviton box"; exit 1)
          # Confirm statically linked (no GLIBC dependency at runtime)
          file "$BIN_DIR/tickvault" | grep -q 'statically linked' \
            || (echo "FAIL: tickvault is NOT statically linked — musl build broke; would hit GLIBC mismatch on AL2023"; exit 1)
          SIZE_BYTES=$(stat -c%s "$BIN_DIR/tickvault")
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "tickvault size: ${SIZE_MB}MB (${SIZE_BYTES} bytes)"
          # Cap raised 15MB -> 30MB on 2026-05-30. The release binary grew to
          # ~18MB through legitimate feature growth: it statically links THREE
          # AWS SDKs (aws-sdk-ssm + aws-sdk-sns + aws-config), reqwest+rustls,
          # tokio, questdb-rs and rkyv. 18MB *stripped* is normal for that set.
          # Binary size has ZERO runtime/latency impact (it is not loaded into
          # the hot path), and shrinking via opt-level="z" would TRADE AWAY the
          # O(1) latency the charter mandates — so we raise the cap, not the
          # binary. 30MB still catches catastrophic bloat (an accidentally
          # un-stripped debug binary is ~80MB). Pinned by
          # crates/common/tests/aws_infra_wiring.rs::
          # test_deploy_aws_binary_size_cap_is_30mb.
          # Note: musl static linking adds ~2-3MB vs glibc-dynamic; cap unchanged.
          if [ "$SIZE_BYTES" -gt 31457280 ]; then
            echo "FAIL: binary exceeds 30MB cap"
            exit 1
          fi

      - name: Stage both binaries for upload
        run: |
          mkdir -p dist
          BIN_DIR=target/aarch64-unknown-linux-musl/release
          cp "$BIN_DIR/tickvault"   dist/tickvault
          cp "$BIN_DIR/smoke_test"  dist/smoke_test

      - name: Upload artifact (both binaries)
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: tickvault-binary
          path: dist/
          retention-days: 7

      - name: Configure AWS credentials for failure notify (OIDC preferred, keys fallback)
        # 2026-07-16 gate-integrity sweep: failure-path only — the build job
        # needs AWS creds solely to publish the SNS page below. Mirror of the
        # deploy job's credential step (same action + inputs) so it works both
        # pre- and post-OIDC-migration.
        if: failure()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}
          role-session-name: tv-github-build-notify-${{ github.run_id }}

      - name: Resolve AWS account id for failure notify
        # Mirror of the deploy job's `id: acct` step — derives the account id
        # from the live credentials so the SNS topic ARN needs no secret.
        if: failure()
        id: acct_build
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram on build failure
        # 2026-07-16 gate-integrity sweep: a BUILD-job failure previously paged
        # nobody — the only failure notifier lived in the deploy job, so a
        # compile error / size-cap breach / artifact-upload failure stayed
        # silent until the ~24h stale-binary-sha watchdog. Mirror of the
        # deploy job's "Notify Telegram on failure" step.
        if: failure()
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IST_TIME="$(TZ='Asia/Kolkata' date +'%I:%M %p IST')"
          MSG="🆘 Build FAILED at ${IST_TIME} (version ${SHORT_SHA}) — the new code never reached the box; it keeps running the previous version. What you need to do RIGHT NOW: open the run, read the build error, fix and push. Run: ${{ github.run_id }}"
          aws sns publish \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }} \
            --topic-arn arn:aws:sns:${{ vars.AWS_REGION || 'ap-south-1' }}:${{ steps.acct_build.outputs.id }}:tv-prod-alerts \
            --subject "🆘 tickvault build FAILED" \
            --message "$MSG"

  guard_market_hours:
    name: Market-hours guard
    runs-on: ubuntu-24.04
    needs: [preflight, build]
    if: needs.preflight.outputs.bootstrap_ready == 'true'
    outputs:
      deploy_allowed: ${{ steps.window.outputs.deploy_allowed }}
    steps:
      - name: Check current IST time against market window
        id: window
        run: |
          # No-deploy band 09:00-15:45 IST = 03:30-10:15 UTC (operator lock
          # 2026-06-03: "only between 9 am till 3.45 pm it should not happen").
          # Monday-Friday only (NSE trading days, ignoring holidays for now).
          UTC_HOUR=$(date -u +%H)
          UTC_MINUTE=$(date -u +%M)
          UTC_DOW=$(date -u +%u)  # 1=Mon, 7=Sun
          UTC_TIME_NUM=$((10#$UTC_HOUR * 100 + 10#$UTC_MINUTE))

          echo "UTC time: $UTC_HOUR:$UTC_MINUTE (day $UTC_DOW), numeric $UTC_TIME_NUM"

          # No-deploy window in UTC: 0330 (09:00 IST) to 1015 (15:45 IST)
          if [ "$UTC_DOW" -le 5 ] && [ "$UTC_TIME_NUM" -ge 330 ] && [ "$UTC_TIME_NUM" -lt 1015 ]; then
            if [ "${{ github.event.inputs.confirm_market_hours }}" = "yes" ]; then
              echo "WARNING: deploying during market hours with explicit override"
            elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              # An explicit human/dispatcher action asked for an in-window
              # deploy WITHOUT the override — keep the loud red signal so the
              # asker learns immediately that nothing was deployed.
              echo "BLOCK: deploying during 09:00-15:45 IST is forbidden without override."
              echo "Re-run with confirm_market_hours=yes if this is an emergency fix."
              exit 1
            elif [ "${{ github.event_name }}" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
              # ZERO-TOUCH FIX 2026-07-17 (operator mandate, relayed via the
              # coordinator session): a branch push to main (a merge) inside
              # the band previously died RED here — and postmerge-catchup.yml
              # counts ANY run (any color) as coverage for the SHA, so prod
              # ran stale code until a human dispatched manually. A push run
              # cannot possibly carry the confirm_market_hours override, so
              # red is not actionable feedback — it just masks the SHA.
              # Defer GREEN instead: deploy_allowed=false skips the
              # Deploy-to-EC2 job entirely (NOTHING is deployed — the
              # 2026-06-03 lock's substance is unchanged), which leaves the
              # B9 "Record deployed binary git SHA" step `skipped`, so
              # deploy-aws-after-close.yml's 15:46 IST cron — which accepts
              # as "last deployed" only runs whose B9 step actually executed
              # — sees main != last-deployed and redeploys this commit right
              # after the close. For MAIN-BRANCH PUSH runs: nothing red,
              # nothing manual, nothing stale past 15:46 IST. Residual RED
              # shapes (deliberate, hostile-review 2026-07-17): (i) an
              # in-window catchup DISPATCH after a bot merge still exits 1
              # red above (coverage still lands via the 15:46 IST cron);
              # (ii) the swap-time re-gate (market_hours_swap_abort) still
              # reds a run whose build crosses 09:00 IST; (iii) in-window
              # TAG pushes still block red below (the after-close cron
              # delivers main HEAD only).
              echo "deploy_allowed=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Deploy of ${{ github.sha }} deferred: inside 09:00-15:45 IST market window; the after-close redeploy cron (15:46 IST, deploy-aws-after-close.yml) will deliver it. Immediate delivery remains available via workflow_dispatch with confirm_market_hours=yes."
              exit 0
            else
              # HOSTILE-REVIEW FIX 2026-07-17: the green defer above is
              # scoped to a branch push to main ONLY — the after-close cron
              # compares/dispatches MAIN HEAD only, so a green-deferred
              # in-window TAG push (v*.*.*, possibly on a non-HEAD commit)
              # would be a SILENT never-deploy. Tags and any other in-window
              # non-override shape keep the original loud red block.
              echo "BLOCK: deploying during 09:00-15:45 IST is forbidden without override."
              echo "This event (${{ github.event_name }} on $GITHUB_REF) cannot be green-deferred: the after-close cron redeploys main HEAD only."
              exit 1
            fi
          else
            echo "OK: outside the 09:00-15:45 IST no-deploy band, deploy can proceed"
          fi
          echo "deploy_allowed=true" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-24.04
    needs: [preflight, build, guard_market_hours]
    # deploy_allowed gate (2026-07-17): on an in-window MAIN-BRANCH push run
    # the guard now exits GREEN with deploy_allowed=false (deferred no-op)
    # instead of red — this condition is what actually skips the deploy in
    # that case. Every other path is unchanged: out-of-window and override
    # runs emit deploy_allowed=true; an in-window dispatch WITHOUT the
    # override, and an in-window TAG push, still fail the guard job red,
    # which skips this job via `needs` exactly as before.
    if: needs.preflight.outputs.bootstrap_ready == 'true' && needs.guard_market_hours.outputs.deploy_allowed == 'true'
    environment: prod
    steps:
      - name: Checkout (for deploy scripts)
        uses: actions/checkout@v7.0.0

      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: tickvault-binary
          path: ./dist/

      - name: Configure AWS credentials (OIDC preferred, keys fallback)
        # The OIDC role (AWS_ROLE_ARN) only exists AFTER the post-bootstrap
        # security cleanup (BOOTSTRAP-ONE-TIME.md steps 4-5). Until then the
        # operator has only AWS_ACCESS_KEY_ID/SECRET set — so this step MUST
        # accept either. Mirrors seed-staging-ssm.yml so deploy works the
        # moment the box exists, not only after the OIDC migration.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}
          role-session-name: tv-github-deploy-${{ github.run_id }}

      - name: Resolve AWS account id at runtime
        # Derive the account id from the live credentials instead of relying on
        # the AWS_ACCOUNT_ID GitHub secret (which was empty -> SNS publish failed
        # with `Invalid parameter: AccountId` in deploy-aws run #98). This removes
        # a manual-setup dependency entirely: the SNS topic ARN for the Telegram
        # notify steps is built from this value. Runs early (right after creds)
        # so its output is available to the `if: failure()` notify step too.
        id: acct
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Ensure instance running (self-start + wait for SSM online)
        # ROOT-CAUSE FIX 2026-06-02: every deploy ships the binary via
        # `aws ssm send-command`, which can ONLY reach a RUNNING, SSM-online
        # box. Before this step the deploy assumed the box was already up, so a
        # stopped box -> `InvalidInstanceId: Instances not in a valid state` ->
        # FAIL -> "DLT deploy FAILED" Telegram, on EVERY push. Two distinct
        # cases, two behaviours:
        #
        #   A. The box SHOULD be up now (08:30-16:30 IST Mon-Fri, OR this run is
        #      a manual/after-close workflow_dispatch). If it's stopped, the
        #      08:30 EventBridge start silently failed (see scripts/aws-autopilot.sh
        #      EventBridge diagnostic). SELF-HEAL: start it here + wait for the
        #      SSM agent to report Online, then proceed with the deploy. This is
        #      the fix for the 2026-06-02 "box never auto-started" incident.
        #
        #   B. The box is intentionally stopped (overnight / weekend push,
        #      outside the up-window). Do NOT start it (would bill ~₹2/hr off-
        #      schedule, breaching the budget lock). Skip the deploy: set
        #      DEPLOY_SKIP_REASON so EVERY downstream step (S3 upload, SSM swap,
        #      monitor, notify, auto-stop) no-ops via its `env.DEPLOY_SKIP_REASON
        #      == ''` guard and stays SILENT (no Telegram spam), then exit ZERO so
        #      this intentional skip is recorded GREEN — a deliberate no-op is not
        #      a deploy FAILURE. The 08:45 IST pre-market cron (deploy-aws-after-
        #      close) redeploys the same commit once the box is up. Honest
        #      envelope: an off-hours push shows a GREEN Actions run that did
        #      nothing-on-purpose (correct — "nothing to deploy, box is down by
        #      design") and pages nobody. A GENUINE deploy error (box up, smoke
        #      test failed, SSM error) leaves DEPLOY_SKIP_REASON empty and still
        #      fails RED + pages, so real-failure detection is unchanged.
        env:
          REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
          IID: ${{ secrets.EC2_INSTANCE_ID }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -uo pipefail
          # Up-window = 08:30-16:30 IST Mon-Fri (the EventBridge schedule window;
          # narrowed back from 08:00-17:00 on 2026-06-05 per operator).
          DOW=$(TZ='Asia/Kolkata' date +%u)            # 1=Mon..7=Sun
          HHMM=$(TZ='Asia/Kolkata' date +%H%M); HHMM=$((10#$HHMM))
          UP_WINDOW=no
          if [ "$DOW" -le 5 ] && [ "$HHMM" -ge 830 ] && [ "$HHMM" -le 1630 ]; then UP_WINDOW=yes; fi
          # A manual run or the after-close cron dispatch (workflow_dispatch)
          # always intends the box up — self-start regardless of clock.
          SHOULD_BE_UP=no
          if [ "$UP_WINDOW" = "yes" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then SHOULD_BE_UP=yes; fi
          echo "IST dow=$DOW time=$HHMM up_window=$UP_WINDOW event=$EVENT_NAME should_be_up=$SHOULD_BE_UP"

          state() {
            aws ec2 describe-instances --region "$REGION" --instance-ids "$IID" \
              --query 'Reservations[0].Instances[0].State.Name' --output text 2>/dev/null || echo unknown
          }
          # Let any in-flight pending/stopping settle (<=2 min) before deciding.
          for _ in $(seq 1 24); do
            ST=$(state); echo "instance state=$ST"
            case "$ST" in running|stopped) break ;; esac
            sleep 5
          done

          if [ "$ST" = "running" ]; then
            echo "instance already running — proceeding with deploy"
            exit 0
          fi

          if [ "$ST" != "stopped" ]; then
            echo "::error::instance in unexpected state '$ST' — not safe to deploy"
            exit 1
          fi

          if [ "$SHOULD_BE_UP" != "yes" ]; then
            echo "DEPLOY_SKIP_REASON=intentional_stopped" >> "$GITHUB_ENV"
            echo "::notice::Box is intentionally stopped (outside 08:30-16:30 IST Mon-Fri up-window) and this is an auto push — skipping deploy without paging. The 08:45 IST pre-market cron will redeploy this commit once the box is up."
            # Exit ZERO: an intentional skip is a deliberate no-op, not a deploy
            # failure. DEPLOY_SKIP_REASON is now set, so every downstream step
            # below is gated `if: env.DEPLOY_SKIP_REASON == ''` and cleanly no-ops
            # (no SSM against a down box, no false success/failure Telegram). The
            # run is GREEN. A real failure (box up + error) never reaches here.
            exit 0
          fi

          echo "box stopped but SHOULD be up — starting it (EventBridge start likely failed)"
          # Record that THIS run started a stopped box, so the final auto-stop
          # step below can stop it again if we are now OUTSIDE the 08:30-16:30
          # IST Mon-Fri up-window (e.g. an after-close workflow_dispatch deploy).
          # Without this, an out-of-window deploy would leave the box billing all
          # night until the next hourly hard-stop guard catches it.
          echo "DEPLOY_STARTED_STOPPED_BOX=yes" >> "$GITHUB_ENV"
          aws ec2 start-instances --region "$REGION" --instance-ids "$IID" >/dev/null
          # Wait for EC2 'running' (<=3 min).
          for _ in $(seq 1 36); do
            ST=$(state); echo "  waiting for running: $ST"
            [ "$ST" = "running" ] && break
            sleep 5
          done
          if [ "$ST" != "running" ]; then
            echo "::error::instance did not reach 'running' within 3 min after start-instances"
            exit 1
          fi
          # Wait for the SSM agent to register Online (<=3 min) — send-command
          # fails with InvalidInstanceId until then even on a running box.
          for _ in $(seq 1 36); do
            PING=$(aws ssm describe-instance-information --region "$REGION" \
              --filters "Key=InstanceIds,Values=$IID" \
              --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || echo None)
            echo "  waiting for SSM Online: $PING"
            [ "$PING" = "Online" ] && break
            sleep 5
          done
          if [ "$PING" != "Online" ]; then
            echo "::error::SSM agent not Online within 3 min after start — cannot send-command"
            exit 1
          fi
          echo "instance started + SSM Online — proceeding with deploy"

      - name: Verify /tickvault/prod/* secrets present (read-only; operator-populated)
        # Skipped on an intentional off-hours skip (box stopped on purpose) — the
        # whole deploy is a no-op; nothing to verify against a down box.
        if: env.DEPLOY_SKIP_REASON == ''
        # Single real env (operator 2026-06-30): the systemd unit sets
        # TV_ENVIRONMENT=prod, so the app reads SSM at /tickvault/prod/{service}/{key}.
        # The operator populates /tickvault/prod/* MANUALLY, so this step DOES NOT
        # auto-seed — no put-parameter, no --overwrite, no copy from any other env.
        # It is a READ-ONLY pre-flight that warns if a boot-halt key is absent;
        # it NEVER clobbers an operator-set value.
        #
        # Boot-halt keys (per crates/core/src/auth/secret_manager.rs +
        # ip_verifier.rs):
        #   dhan/client-id, dhan/client-secret, dhan/totp-secret,
        #   questdb/pg-user, questdb/pg-password,
        #   telegram/bot-token, telegram/chat-id,
        #   api/bearer-token, network/static-ip
        run: |
          set +e
          REGION="${{ vars.AWS_REGION || 'ap-south-1' }}"
          KEYS="dhan/client-id dhan/client-secret dhan/totp-secret questdb/pg-user questdb/pg-password telegram/bot-token telegram/chat-id api/bearer-token network/static-ip"
          PRESENT=0
          MISSING=0
          for key in $KEYS; do
            # Existence check only (no --with-decryption, no value read).
            if aws ssm get-parameter --region "$REGION" --name "/tickvault/prod/$key" >/dev/null 2>&1; then
              PRESENT=$((PRESENT+1))
              echo "  PRESENT /tickvault/prod/$key"
            else
              MISSING=$((MISSING+1))
              echo "  MISSING /tickvault/prod/$key"
            fi
          done
          echo "===== Prod-secret pre-flight ====="
          echo "  present: $PRESENT"
          echo "  missing: $MISSING"
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::$MISSING /tickvault/prod/* keys are missing — app boot may HALT. Populate them MANUALLY via aws ssm put-parameter (operator-owned; the deploy never auto-seeds prod)."
          fi

      - name: Upload both binaries to S3 deploy bucket
        # Skipped on an intentional off-hours skip — no deploy is happening.
        if: env.DEPLOY_SKIP_REASON == ''
        run: |
          chmod +x ./dist/tickvault ./dist/smoke_test
          aws s3 cp ./dist/tickvault \
            s3://tv-prod-cold/deploys/${{ github.sha }}/tickvault \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }}
          aws s3 cp ./dist/smoke_test \
            s3://tv-prod-cold/deploys/${{ github.sha }}/smoke_test \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Re-gate market hours at SWAP time (no mid-session restart)
        # Skipped on an intentional off-hours skip (box down on purpose) — there
        # is no swap to gate. (This step itself may set a DIFFERENT skip reason,
        # market_hours_swap_abort, for the build-crossed-the-open case below.)
        if: env.DEPLOY_SKIP_REASON == ''
        # ROOT-CAUSE FIX 2026-06-02 (incident #2): the `guard_market_hours`
        # job checks the clock at JOB START. PR #971 merged at 09:11:21 IST
        # (4 min before the 09:15 open), passed that guard, then the ~4-5 min
        # ARM build pushed the actual SSM binary-swap + `systemctl restart` to
        # ~09:16 IST — INSIDE market open. That restart blanked the live feed
        # for ~2 min right at the bell (recent_tick SELFTEST-02 failed 09:15;
        # ticks resumed only after FAST BOOT 09:17). The start-time guard
        # cannot see a build that crosses the open boundary.
        #
        # This step re-checks IST market hours IMMEDIATELY before the swap. If
        # we are now inside 09:00-15:45 IST Mon-Fri, ABORT before touching the
        # box: the binary is already built + in S3, so the 15:46 IST
        # post-market cron (deploy-aws-after-close) will redeploy it safely.
        # DEPLOY_SKIP_REASON suppresses the failure Telegram (this is an
        # intentional defer, not a failure) while keeping the run non-success
        # so the cron re-fires. The manual override path stays open via
        # workflow_dispatch confirm_market_hours=yes (same as the start guard).
        run: |
          set -uo pipefail
          if [ "${{ github.event.inputs.confirm_market_hours }}" = "yes" ]; then
            echo "operator override (confirm_market_hours=yes) — proceeding with swap during market hours"
            exit 0
          fi
          DOW=$(TZ='Asia/Kolkata' date +%u)
          HHMM=$(TZ='Asia/Kolkata' date +%H%M); HHMM=$((10#$HHMM))
          if [ "$DOW" -le 5 ] && [ "$HHMM" -ge 900 ] && [ "$HHMM" -lt 1545 ]; then
            echo "DEPLOY_SKIP_REASON=market_hours_swap_abort" >> "$GITHUB_ENV"
            echo "::warning::Market is OPEN ($HHMM IST) at swap time — the build crossed into the 09:00-15:45 IST no-deploy band. ABORTING the binary swap to avoid a mid-session restart. The 15:46 IST post-market cron will redeploy this commit. (Override: re-run with confirm_market_hours=yes.)"
            exit 1
          fi
          echo "outside market hours ($HHMM IST, dow=$DOW) — safe to swap"

      - name: Run SSM command — download binaries + smoke test + atomic swap
        # Skipped on an intentional off-hours skip — send-command can't reach a
        # stopped box (InvalidInstanceId), and there is nothing to deploy.
        if: env.DEPLOY_SKIP_REASON == ''
        # Target path is /opt/tickvault (matches user-data.sh.tftpl step 4).
        # Smoke test is a SEPARATE binary (crates/app/src/bin/smoke_test.rs),
        # NOT a subcommand of `tickvault`. The previous version
        # (`bin/tickvault.new smoke-test --duration 30`) was wrong and would
        # exit non-zero with "unrecognized subcommand".
        id: ssm
        run: |
          CMD_ID=$(aws ssm send-command \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }} \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "tickvault deploy sha=${{ github.sha }}" \
            --parameters 'commands=[
              "set -euo pipefail",
              "# SELF-HEAL box state before any cd (Z+ defense — idempotent).",
              "# Reconstructs /opt/tickvault layout if user-data.sh.tftpl never completed",
              "# (rebuilt instance / EBS swap / cold restore). No-op when already correct.",
              "# Ensure git is installed (AL2023 uses dnf; AL2 uses yum — try both).",
              "command -v git >/dev/null 2>&1 || sudo timeout 180 dnf install -y git || sudo timeout 180 yum install -y git",
              "# Ensure Docker is installed AND running. AL2023 ships `docker` in the",
              "# default repo but does NOT ship `docker-compose-plugin` — Docker Compose",
              "# v2 must be installed as a CLI plugin. All steps idempotent: dnf install",
              "# no-ops if present, systemctl enable is no-op if running.",
              "command -v docker >/dev/null 2>&1 || sudo timeout 180 dnf install -y docker || sudo timeout 180 yum install -y docker",
              "sudo systemctl enable --now docker",
              "sudo usermod -aG docker ec2-user || true",
              "# Ensure the Compose v2 plugin (2026-07-14 — issue #1505 made REAL on the",
              "# prod box: 5/5 compose failures on BOTH boots today with `unknown",
              "# shorthand flag: f` = the docker CLI without the compose plugin parsing",
              "# `compose -f ...`; boot survived only because tv-questdb happened to",
              "# stay up across restarts — post-nuke, any boot = BOOT-02 halt).",
              "# Ladder: (1) `docker compose version` already OK -> skip instantly;",
              "# (2) distro package, bounded 180s (AL2023 default repos typically LACK",
              "# docker-compose-plugin — expected no-op there; yum kept for AL2 parity);",
              "# (3) PINNED static plugin binary, sha256-VERIFIED against the official",
              "# docker/compose release checksums BEFORE install (house rule: every",
              "# version pinned, never an unverified curl into the plugin dir — the old",
              "# line curled straight to the final path with no checksum, so a tampered",
              "# or truncated download became the installed plugin). Download lands in",
              "# /tmp first; only a verified file is installed (atomic, 0755, root).",
              "# Then RE-VERIFY: fail the deploy loudly ONLY if compose is still broken",
              "# after both paths (a working compose via either path never fails it).",
              "# Pins recorded 2026-07-14 from the official release checksums.txt",
              "# (https://github.com/docker/compose/releases/download/v2.29.7/checksums.txt).",
              "# Box is t4g.medium (2026-07-15 Quote 8 downsize, PR #1582; was r8g.large)",
              "# = still aarch64; x86_64 kept for dev/DR parity. The SAME",
              "# pin + sha256 constants live in deploy/aws/terraform/user-data.sh.tftpl",
              "# (provision-time copy for a FRESH instance that boots before any",
              "# deploy has ever run) — BUMP BOTH IN LOCKSTEP.",
              "COMPOSE_PIN=v2.29.7",
              "COMPOSE_SHA256_AARCH64=6e9fbd5daa20dca5d7d89145081ae8155d68ef2928b497d9f85b54fe0f9dbb2c",
              "COMPOSE_SHA256_X86_64=383ce6698cd5d5bbf958d2c8489ed75094e34a77d340404d9f32c4ae9e12baf0",
              "if docker compose version >/dev/null 2>&1; then echo COMPOSE-PLUGIN-OK: already present - skipping install; else sudo timeout 180 dnf install -y docker-compose-plugin || sudo timeout 180 yum install -y docker-compose-plugin || echo compose plugin not in distro repos - falling back to pinned static binary; fi",
              "if ! docker compose version >/dev/null 2>&1; then COMPOSE_ARCH=$(uname -m); case \"$COMPOSE_ARCH\" in aarch64) COMPOSE_SHA256=\"$COMPOSE_SHA256_AARCH64\";; x86_64) COMPOSE_SHA256=\"$COMPOSE_SHA256_X86_64\";; *) COMPOSE_SHA256=\"\";; esac; if [ -z \"$COMPOSE_SHA256\" ]; then echo WARN: no pinned compose sha256 for arch $COMPOSE_ARCH - skipping static install; else timeout 150 curl -fsSL --max-time 120 https://github.com/docker/compose/releases/download/$COMPOSE_PIN/docker-compose-linux-$COMPOSE_ARCH -o /tmp/docker-compose.dl && echo \"$COMPOSE_SHA256  /tmp/docker-compose.dl\" | sha256sum -c - && sudo mkdir -p /usr/local/lib/docker/cli-plugins && sudo install -m 0755 -o root -g root /tmp/docker-compose.dl /usr/local/lib/docker/cli-plugins/docker-compose || echo WARN: pinned compose plugin download or sha256 verification FAILED - nothing installed - final verify below decides; rm -f /tmp/docker-compose.dl; fi; fi",
              "docker compose version || (echo FATAL: docker compose plugin still unavailable after distro package + pinned sha256-verified static binary attempts - boot path would BOOT-02 on the next nuke; exit 1)",
              "mkdir -p /opt/tickvault/config /opt/tickvault/data/spill /opt/tickvault/logs /opt/tickvault/bin",
              "chown -R ec2-user:ec2-user /opt/tickvault",
              "if [ ! -d /opt/tickvault/repo/.git ]; then sudo -u ec2-user git clone --depth 1 https://github.com/SJParthi/tickvault.git /opt/tickvault/repo; fi",
              "cd /opt/tickvault",
              "# Refresh the repo clone to latest main BEFORE copying config/systemd.",
              "# The clone is shallow (--depth 1) from first boot; without this pull",
              "# the box keeps its first-boot config + systemd unit. CRITICAL: the",
              "# systemd unit carries TV_ENVIRONMENT (single real env: prod, dry_run=true);",
              "# a stale unit could load an older env and arm the wrong config.",
              "if [ -d repo/.git ]; then sudo -u ec2-user timeout 120 git -C repo fetch --depth 1 origin main && sudo -u ec2-user git -C repo reset --hard origin/main; fi",
              "# Sync config files from the refreshed repo clone (idempotent).",
              "# Failures here MUST surface — previously masked by `2>/dev/null || true`",
              "# which silently swallowed missing dirs / permission errors. After cp,",
              "# verify the actually-deployed production.toml line count matches the repo",
              "# version. Mismatch = silent cp failure = abort the deploy loudly.",
              "if [ ! -d repo/config ]; then echo FATAL: repo/config missing after git clone; exit 1; fi",
              "cp -f repo/config/*.toml config/",
              "chown -R ec2-user:ec2-user config/",
              "echo ===== deployed config/production.toml line count + head =====",
              "wc -l config/production.toml repo/config/production.toml",
              "diff -q config/production.toml repo/config/production.toml || (echo FATAL: deployed config/production.toml differs from repo/config/production.toml after cp; diff config/production.toml repo/config/production.toml; exit 1)",
              "# Refresh the systemd unit from the repo (TV_ENVIRONMENT=prod et al).",
              "# Without this the box runs its first-boot unit forever.",
              "if [ -f repo/deploy/systemd/tickvault.service ]; then cp -f repo/deploy/systemd/tickvault.service /etc/systemd/system/tickvault.service; fi",
              "if [ -f repo/deploy/systemd/tickvault-holiday-gate.service ]; then cp -f repo/deploy/systemd/tickvault-holiday-gate.service /etc/systemd/system/tickvault-holiday-gate.service; fi",
              "# Groww live feed RETIRED 2026-07-15 (operator directive: REST legs",
              "# only) — the Python sidecar ship + venv-reset steps were removed with",
              "# scripts/groww-sidecar/. Clean any leftover on-box sidecar artifacts so",
              "# nothing stale can be launched (idempotent no-ops once clean).",
              "rm -rf scripts/groww-sidecar && echo GROWW-SIDECAR-RETIRED: on-box sidecar source removed",
              "rm -rf /opt/tickvault/data/groww/venv && echo GROWW-VENV-RETIRED: stale sidecar venv removed",
              "# Back up the current binary so we can roll back",
              "if [ -f bin/tickvault ]; then cp bin/tickvault bin/tickvault.backup; fi",
              "# Download the new binaries from S3",
              "timeout 300 aws s3 cp s3://tv-prod-cold/deploys/${{ github.sha }}/tickvault  bin/tickvault.new",
              "timeout 300 aws s3 cp s3://tv-prod-cold/deploys/${{ github.sha }}/smoke_test bin/smoke_test.new",
              "chmod +x bin/tickvault.new bin/smoke_test.new",
              "# Run smoke test using the NEW standalone binary (must exit 0 in < 30s)",
              "timeout 40 bin/smoke_test.new --duration 30",
              "# Atomic swap of both binaries after smoke passes",
              "mv bin/tickvault.new   bin/tickvault",
              "mv bin/smoke_test.new  bin/smoke_test",
              "chown ec2-user:ec2-user bin/tickvault bin/smoke_test",
              "# Reload systemd (picks up the refreshed unit) + (re)enable + restart.",
              "# `enable` is required because a previously-failed deploy may have",
              "# disabled the service via the auto-stop step (kills Telegram spam).",
              "# `enable` is idempotent — no-op if already enabled.",
              "# SELF-HEAL: ensure QuestDB container is running BEFORE starting the app.",
              "# user-data.sh.tftpl is supposed to `docker compose up -d` at instance boot",
              "# but if user-data never ran (rebuilt instance) OR QuestDB was stopped, the",
              "# app boots and hits BOOT-02 (QuestDB readiness deadline 60s). Idempotent:",
              "# `docker compose up -d` is a no-op when containers are already running.",
              "# Z+ L3 RECONCILE: prove the running state matches the desired state.",
              "# B4 QuestDB console fix (2026-07-03): persist TV_QDB_HTTP_BIND=0.0.0.0 in",
              "# the compose project .env (gitignored — survives the reset --hard above)",
              "# so QuestDB :9000 listens on the box PRIVATE IP for the console VPC back",
              "# Lambda. Without it the compose default 127.0.0.1 bind refuses the Lambda",
              "# connection and every console request 503s box-offline while the box is",
              "# RUNNING. Exposure unchanged: the box SG admits 9000 from the Lambda SG",
              "# ONLY (main.tf dynamic ingress) — never public. .env is read by EVERY",
              "# compose caller (this step, user-data boot, infra.rs, ensure-questdb.sh),",
              "# so the bind persists across restarts. Idempotent grep-or-append.",
              "grep -q \"^TV_QDB_HTTP_BIND=\" repo/deploy/docker/.env 2>/dev/null || echo \"TV_QDB_HTTP_BIND=0.0.0.0\" >> repo/deploy/docker/.env",
              "chown ec2-user:ec2-user repo/deploy/docker/.env",
              "if [ -f repo/deploy/docker/docker-compose.yml ]; then export TV_QUESTDB_PG_USER=$(aws ssm get-parameter --region ap-south-1 --name /tickvault/prod/questdb/pg-user --with-decryption --output text --query Parameter.Value 2>/dev/null || echo admin); export TV_QUESTDB_PG_PASSWORD=$(aws ssm get-parameter --region ap-south-1 --name /tickvault/prod/questdb/pg-password --with-decryption --output text --query Parameter.Value 2>/dev/null || echo quest); (cd repo/deploy/docker && TV_QUESTDB_PG_USER=\"$TV_QUESTDB_PG_USER\" TV_QUESTDB_PG_PASSWORD=\"$TV_QUESTDB_PG_PASSWORD\" timeout 600 docker compose up -d) || (echo FATAL: docker compose up failed or exceeded 600s; exit 1); else echo FATAL: docker-compose.yml missing from repo/deploy/docker; exit 1; fi",
              "# Verify QuestDB is actually listening on 9000 (HTTP) within 30s",
              "for i in 1 2 3 4 5 6; do if curl -fsS http://127.0.0.1:9000/exec?query=SELECT%201 >/dev/null 2>&1; then echo QUESTDB-UP; break; fi; sleep 5; if [ $i -eq 6 ]; then echo FATAL: QuestDB not responding on :9000 after 30s; docker compose -f repo/deploy/docker/docker-compose.yml ps; exit 1; fi; done",
              "# Console-shell HARD canary (2026-07-06 shell-hang fix; hard gate 2026-07-08): the console back lambda rewrites GET / -> /index.html, so /index.html must complete box-locally within 5s on every box deploy — this is the lane that ships QuestDB image bumps. curl -f fails on any code >= 400, and --max-time 5 fails an unframed keep-alive response whose body never completes (curl exit 28): completion-within-5s IS the framing assertion. Disclosed limitation: a framed 3xx at /index.html (< 400) passes curl -f here; the end-to-end proxy gate in terraform-apply.yml requires a literal 200 and catches that shape on the next in-window apply. Never probe bare / here: QuestDB answers it with an unframed keep-alive 301 that would hang this shell.",
              "curl -fsS --max-time 5 -o /dev/null http://127.0.0.1:9000/index.html || { echo \"FATAL: console shell page (/index.html) not served as a complete HTTP 200 within 5s on the box\"; exit 1; }",
              "# === TRADING APP FIRST ===",
              "# The trading app is the deploy. Start + verify it BEFORE touching the",
              "# CloudWatch agent, so a broken OBSERVABILITY agent can never block or",
              "# cancel the TRADING app start (incident 2026-06-09: `enable --now`",
              "# amazon-cloudwatch-agent retried ec2:DescribeTags 403 for ~60s then failed",
              "# config validation, starving the tickvault restart -> false deploy FAILED +",
              "# auto-stop, taking the live app down for an observability-only fault).",
              "systemctl daemon-reload",
              "systemctl enable tickvault || true",
              "# On systemctl failure, dump status + journal so the deploy log shows WHY (Z+ L1 DETECT).",
              "# Two journal dumps: (1) -xeu (rich systemd metadata, useful for context),",
              "# (2) --output=cat -n 200 (raw app stdout/stderr ONLY, no systemd noise — the actual error).",
              "# NON-BLOCKING restart + bounded readiness poll (2026-07-13 deploy-hang fix,",
              "# defense-in-depth): the unit is Type=notify with TimeoutStartSec=infinity, so",
              "# a plain `systemctl restart` blocks until the app sends sd_notify(READY=1).",
              "# A boot path that never sends it (the #1496 Dhan-OFF arm did exactly that —",
              "# app-side fix owned by the sibling Dhan-WS session) hung THIS LINE forever:",
              "# the SSM command never reached a terminal state, the workflow wait budget",
              "# expired, and the auto-stop killed the box mid-script with EMPTY on-box",
              "# output (runs 29269805430 / 29273283894 — every post-#1496 deploy, 3/3",
              "# identical). `--no-block` dispatches the start job and returns immediately;",
              "# the script-side poll below bounds the READINESS wait to 60x5s = 300s (5x",
              "# the 60s QuestDB boot gate; the swap already happened above, so a timeout",
              "# here is a VERIFY failure, never a half-swap). For a Type=notify unit,",
              "# is-active reports active ONLY after READY=1 (activating until then), so a",
              "# notify-class hang fails THIS deploy fast + loudly (journal dumps, exit 1,",
              "# terminal SSM Failed) while the start job keeps running server-side — it can",
              "# never eat the whole SSM budget into the auto-stop again. LATENT (follow-up,",
              "# flagged in PR #1515): a future dhan_enabled=true flip puts the slow-lane",
              "# READY behind the daily-universe infinite-retry CSV fetch — a >300s CDN blip",
              "# would false-fail this poll while the boot is legitimately still retrying;",
              "# if that mode returns, revisit this bound (or gate READY earlier app-side).",
              "systemctl restart tickvault --no-block || (echo ===== systemctl restart dispatch failed ===== && systemctl status tickvault.service --no-pager -l || true; echo ===== journalctl -xeu last 100 ===== && journalctl -xeu tickvault.service -n 100 --no-pager || true; exit 1)",
              "READY_OK=no; for i in $(seq 1 60); do if systemctl is-active --quiet tickvault; then READY_OK=yes; break; fi; sleep 5; done",
              "if [ \"$READY_OK\" != yes ]; then echo ===== tickvault not active within 300s - app likely never sent READY=1 - start job continues in background ===== && systemctl status tickvault.service --no-pager -l || true; echo ===== app stdout/stderr ONLY last 200 ===== && journalctl -u tickvault.service -n 200 --no-pager --output=cat || true; echo ===== journalctl -xeu last 100 ===== && journalctl -xeu tickvault.service -n 100 --no-pager || true; exit 1; fi",
              "echo TICKVAULT-UP",
              "# === OBSERVABILITY LAST (non-fatal + time-bounded) ===",
              "# SELF-HEAL: CloudWatch Agent install + config (mirrors user-data Step 2-3).",
              "# Without this the dashboards show No data and /tickvault/prod/app log group",
              "# has zero log streams. Idempotent. EVERY step is `|| true` and bounded by",
              "# `timeout` / `--no-block` so the agent can NEVER block or fail the deploy —",
              "# the verified-running trading app above is what the deploy succeeds on.",
              "command -v amazon-cloudwatch-agent-ctl >/dev/null 2>&1 || sudo timeout 180 dnf install -y amazon-cloudwatch-agent || sudo timeout 180 yum install -y amazon-cloudwatch-agent || (curl -fsSL --max-time 120 https://amazoncloudwatch-agent-ap-south-1.s3.ap-south-1.amazonaws.com/amazon_linux/arm64/latest/amazon-cloudwatch-agent.rpm -o /tmp/cwa.rpm && sudo rpm -i /tmp/cwa.rpm) || true",
              "sudo mkdir -p /opt/aws/amazon-cloudwatch-agent/etc",
              "if [ -f repo/deploy/aws/cloudwatch-agent.json ]; then sudo cp -f repo/deploy/aws/cloudwatch-agent.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json; fi",
              "if [ -f repo/deploy/aws/prometheus.yaml ]; then sudo cp -f repo/deploy/aws/prometheus.yaml /opt/aws/amazon-cloudwatch-agent/etc/prometheus.yaml; fi",
              "sudo timeout 90 /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json || echo WARN: cloudwatch-agent fetch-config failed - observability only app unaffected",
              "sudo systemctl enable amazon-cloudwatch-agent || true",
              "sudo systemctl start amazon-cloudwatch-agent --no-block || true",
              "echo CWAGENT-CONFIGURED",
              "sleep 8",
              "echo === CWAGENT STATUS ===; sudo timeout 30 /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a status || true",
              "echo === CWAGENT OWN LOG tail40 ===; sudo tail -n 40 /opt/aws/amazon-cloudwatch-agent/logs/amazon-cloudwatch-agent.log 2>/dev/null || true",
              "echo === APP LOG DIR ===; ls -la /opt/tickvault/data/logs/ 2>/dev/null | head -20 || true; ls -la /opt/tickvault/data/logs/machine/ 2>/dev/null | head -20 || true",
              "echo DEPLOY OK"
            ]' \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Wait for SSM command completion
        # Skipped on an intentional off-hours skip — no SSM command was sent.
        if: env.DEPLOY_SKIP_REASON == ''
        # continue-on-error so the box-side output is ALWAYS fetched + printed
        # below, even when the on-box script fails (smoke test, git refresh,
        # systemctl, etc.). Without this the failure reason was hidden — the
        # "Fetch output" step was skipped on wait-failure (deploy #103).
        #
        # DO NOT use `aws ssm wait command-executed` here: that built-in waiter
        # has a HARD-CODED budget of 20 polls × 5s = 100 seconds. The on-box
        # script now does Docker Compose plugin download, `docker compose up`
        # + 30s QuestDB readiness loop, CloudWatch agent install/config, and a
        # 40s smoke test — easily > 100s of wall-clock. The waiter gave up
        # while the command was still InProgress, the Fetch step then saw
        # Status=InProgress (with EMPTY stdout/stderr, because SSM only fills
        # those at a terminal state) and hard-failed a deploy that was actually
        # still progressing (deploy run 26732460896, 2026-06-01). We poll
        # manually with a ~25-minute budget for a genuine TERMINAL state instead.
        continue-on-error: true
        run: |
          set -uo pipefail
          REGION="${{ vars.AWS_REGION || 'ap-south-1' }}"
          CMD_ID="${{ steps.ssm.outputs.command_id }}"
          IID="${{ secrets.EC2_INSTANCE_ID }}"
          # 240 polls × 5s = 1200s nominal. Bumped 120 → 240 (2026-07-13):
          # the observed cadence is ~6.3s/poll (5s sleep + ~1.3s API
          # round-trip — runs 29269805430 / 29273283894 burned 120 polls in
          # ~12.6 min), so 240 polls ≈ 25 min REAL. Sizing: every on-box stage
          # is now explicitly bounded (same-date deploy-hang fix — dnf ≤180s,
          # curl ≤120s, git fetch ≤120s, s3 cp ≤300s each, compose up ≤600s,
          # smoke ≤40s, no-block restart + 300s readiness poll, CW agent ≤~300s), and the
          # sizing case is a POST-NUKE FIRST deploy that must also dnf-install
          # docker + pull the QuestDB image inside `compose up` — realistic
          # wall-clock ~8-12 min, so 25 min real gives ~2x headroom while any
          # single wedged stage still fails LOUDLY at its own bound (terminal
          # SSM Failed → the Fetch step prints the on-box reason). Budget
          # exhaustion here means something is wedged BEYOND every stage
          # bound; the auto-stop then kills the box with EMPTY on-box output
          # (SSM fills stdout/stderr only at a terminal state) — which is why
          # the per-stage bounds, not this budget, are the primary defense.
          # SSM send-command default execution timeout is 3600s, so the
          # command itself is never killed under us.
          for i in $(seq 1 240); do
            STATUS=$(aws ssm get-command-invocation \
              --region "$REGION" --command-id "$CMD_ID" --instance-id "$IID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "poll $i/240: status=$STATUS"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut)
                echo "reached terminal state: $STATUS"
                exit 0
                ;;
            esac
            sleep 5
          done
          echo "::warning::SSM command still non-terminal after ~25 min — the Fetch step below will report the real status."

      - name: Fetch SSM command output + fail loudly on box-side error
        # if: always() — print the box-side STDOUT/STDERR no matter what, so a
        # failed on-box step (e.g. smoke test) shows its real reason in the log
        # instead of an opaque "Waiter ... Failed". Then re-fail the job if the
        # command status was not Success.
        # Skipped on an intentional off-hours skip (the box is down on purpose;
        # there is no command_id to query, so this would only emit AWS
        # ParamValidation noise — see the "Ensure instance running" step).
        if: always() && env.DEPLOY_SKIP_REASON == ''
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }} \
            --command-id ${{ steps.ssm.outputs.command_id }} \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Status' --output text)
          echo "===== SSM command status: ${STATUS} ====="
          echo "----- STDOUT (on-box) -----"
          aws ssm get-command-invocation \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }} \
            --command-id ${{ steps.ssm.outputs.command_id }} \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'StandardOutputContent' --output text || true
          echo "----- STDERR (on-box) -----"
          aws ssm get-command-invocation \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }} \
            --command-id ${{ steps.ssm.outputs.command_id }} \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'StandardErrorContent' --output text || true
          if [ "${STATUS}" != "Success" ]; then
            echo "::error::SSM command on the box failed with status=${STATUS} — see STDOUT/STDERR above for the on-box reason."
            exit 1
          fi


      - name: Verify app readiness (gate on readiness, not 60s is-active)
        # Skipped on an intentional off-hours skip — nothing was deployed to the
        # (stopped) box, so there is no fresh process to monitor.
        if: env.DEPLOY_SKIP_REASON == ''
        env:
          # WAL-REPLAY BOOT WINDOW: the app is systemd `Type=notify` and only sends
          # READY=1 AFTER its boot gates + WAL frame-spill replay finish — a cold
          # boot replays ~4.85M spilled frames (dropped:4853073, ~71s). Until READY,
          # systemd reports the unit as "activating", NOT "active". The old 60s
          # `is-active != active` check therefore FALSE-FAILED healthy builds and
          # then `systemctl stop`ped a perfectly good app. We now gate on real
          # readiness (unit reaches "active" = the app sent READY=1) with up to 180s
          # headroom (matches the unit's TimeoutStartSec=infinity intent), while
          # still catching a GENUINE crash immediately (unit "failed" via
          # StartLimitBurst, or the auto-restart count climbing above baseline).
          # A slow-but-healthy WAL-replay boot must NEVER be killed.
          READINESS_TIMEOUT_SECS: "180"
          READINESS_POLL_SECS: "10"
        run: |
          set +e
          REGION="${{ vars.AWS_REGION || 'ap-south-1' }}"
          IID="${{ secrets.EC2_INSTANCE_ID }}"
          # One SSM round-trip returns BOTH the systemd state and the auto-restart
          # count so we can tell "still booting (activating / replaying WAL)" apart
          # from "crashed (failed, or Restart=always looping)". Single-line
          # commands=[...] with escaped quotes only — no apostrophes (SSM-quoting guard).
          probe() {
            local cid
            cid=$(aws ssm send-command \
              --region "$REGION" --instance-ids "$IID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["printf STATE=; systemctl is-active tickvault 2>/dev/null || true; printf NRESTARTS=; systemctl show -p NRestarts --value tickvault 2>/dev/null || true"]' \
              --query 'Command.CommandId' --output text 2>/dev/null)
            if [ -z "$cid" ] || [ "$cid" = "None" ]; then echo "STATE=probefailed NRESTARTS="; return; fi
            sleep 4
            aws ssm get-command-invocation \
              --region "$REGION" --command-id "$cid" --instance-id "$IID" \
              --query 'StandardOutputContent' --output text 2>/dev/null | tr -d '[:space:]'
          }
          parse_state() { printf '%s' "$1" | sed -n 's/.*STATE=\([a-z-]*\).*/\1/p'; }
          parse_nr()    { printf '%s' "$1" | sed -n 's/.*NRESTARTS=\([0-9]\+\).*/\1/p'; }
          # Baseline restart count captured right after the deploy restart: any
          # increase means the new binary died at least once (genuine crash).
          BASELINE=$(parse_nr "$(probe)"); BASELINE="${BASELINE:-0}"
          echo "Baseline NRestarts after deploy = ${BASELINE}"
          VERIFIED=0; CRASHED=0; ELAPSED=0
          while [ "$ELAPSED" -lt "${READINESS_TIMEOUT_SECS}" ]; do
            OUT="$(probe)"
            STATE=$(parse_state "$OUT")
            NR=$(parse_nr "$OUT"); NR="${NR:-$BASELINE}"
            echo "Readiness probe @ ~${ELAPSED}s: state=${STATE:-unknown} NRestarts=${NR} (baseline ${BASELINE})"
            if [ "$STATE" = "active" ]; then VERIFIED=1; break; fi
            if [ "$STATE" = "failed" ] || [ "$NR" -gt "$BASELINE" ]; then CRASHED=1; break; fi
            # activating / reloading / transient probe hiccup -> slow WAL-replay boot; keep waiting.
            sleep "${READINESS_POLL_SECS}"
            ELAPSED=$((ELAPSED + READINESS_POLL_SECS))
          done
          if [ "$VERIFIED" -eq 0 ] && [ "$CRASHED" -eq 0 ]; then
            # Timed out: re-probe once. Alive-but-slow (still "activating", no extra
            # restart) is a healthy slow boot we DO NOT kill; only a failed/looping
            # unit is a crash.
            OUT="$(probe)"; STATE=$(parse_state "$OUT"); NR=$(parse_nr "$OUT"); NR="${NR:-$BASELINE}"
            if [ "$STATE" = "active" ]; then
              VERIFIED=1
            elif [ "$STATE" = "failed" ] || [ "$NR" -gt "$BASELINE" ]; then
              CRASHED=1
            else
              echo "::warning::Readiness not confirmed within ${READINESS_TIMEOUT_SECS}s, but the unit is '${STATE:-unknown}' with no extra restarts (baseline ${BASELINE}) — NOT rolling back. systemd Type=notify sends READY=1 only after the WAL-replay boot gates; a slow-but-healthy boot must not be killed."
              VERIFIED=1
            fi
          fi
          if [ "$CRASHED" -eq 1 ]; then
            # ── EXTERNAL-STOP DISAMBIGUATION (2026-07-02 fix, runs #415/#416) ─
            # Today an EXTERNAL SSM wipe session ran `systemctl stop tickvault`
            # while this verify window was polling — the binary was healthy,
            # but this step declared a CRASH, rolled back, auto-stopped the
            # service and paged "deploy FAILED". Before taking the crash path:
            #   1. Re-check after ~10s — a transient blip (or an external
            #      stop-then-start) may already have recovered.
            #   2. Ask systemd WHY the unit is down. A clean EXTERNAL stop
            #      shows Result=success with ActiveState != failed, and the
            #      journal carries a "Stopping tickvault" line WITHOUT a crash
            #      signature (panic / oom / non-zero exit status). That is NOT
            #      a crash — fail with a DISTINCT message and skip the
            #      rollback + auto-stop (the real-crash path below is
            #      unchanged and still rolls back + auto-stops).
            echo "possible crash detected — re-checking after 10s before declaring"
            sleep 10
            OUT="$(probe)"; STATE=$(parse_state "$OUT")
            if [ "$STATE" = "active" ]; then
              echo "service is ACTIVE again on re-check — transient, not a crash; deploy verified"
              CRASHED=0; VERIFIED=1
            else
              EXT_CMD=$(aws ssm send-command \
                --region "$REGION" --instance-ids "$IID" \
                --document-name "AWS-RunShellScript" \
                --comment "tickvault external-stop check sha=${{ github.sha }}" \
                --parameters 'commands=["systemctl show tickvault -p ActiveState,SubState,Result 2>/dev/null || true","echo ===JOURNAL-LAST-20===","journalctl -u tickvault -n 20 --no-pager 2>&1 || true"]' \
                --query 'Command.CommandId' --output text 2>/dev/null || echo "")
              EXT_OUT=""
              if [ -n "$EXT_CMD" ] && [ "$EXT_CMD" != "None" ]; then
                sleep 6
                EXT_OUT=$(aws ssm get-command-invocation \
                  --region "$REGION" --command-id "$EXT_CMD" --instance-id "$IID" \
                  --query 'StandardOutputContent' --output text 2>/dev/null || echo "")
              fi
              echo "----- EXTERNAL-STOP CHECK (systemd state + journal tail) -----"
              echo "$EXT_OUT"
              echo "--------------------------------------------------------------"
              if echo "$EXT_OUT" | grep -q 'Result=success' \
                 && ! echo "$EXT_OUT" | grep -q 'ActiveState=failed' \
                 && echo "$EXT_OUT" | grep -qi 'Stopping tickvault' \
                 && ! echo "$EXT_OUT" | grep -Eqi 'panic|out of memory|oom-kill|status=[1-9]'; then
                # Cleanly STOPPED by someone else (Result=success, no failed
                # state, no crash signature). Skip the rollback (the new binary
                # is fine) and gate the auto-stop step off via GITHUB_ENV.
                echo "EXTERNAL_STOP_DETECTED=yes" >> "$GITHUB_ENV"
                echo "::error::EXTERNAL-STOP-DETECTED (not a crash): another session stopped the service during verify — re-run the deploy. Evidence: systemd Result=success + clean Stopping-tickvault journal line with no panic/oom/exit-code signature. Rollback and auto-stop are SKIPPED (the deployed binary is healthy)."
                exit 1
              fi
              echo "external-stop check did not match a clean stop — treating as a genuine crash"
            fi
          fi
          if [ "$CRASHED" -eq 1 ]; then
            # ── Z+ L1 DETECT (2026-06-05 fix, deploy run #176) ───────────────
            # The app started but DIED inside this 60s verify window — the most
            # common real failure (a delayed boot-step panic between T+5s and
            # T+60s). The on-box restart-failure path dumps the journal, but a
            # crash caught HERE previously rolled back with ZERO diagnostic, so
            # the operator saw "FAILED" and never learned WHY. Capture the raw
            # app stdout/stderr + systemd status NOW, before the rollback swaps
            # the binary back, so the reason reaches BOTH the deploy log AND the
            # Telegram failure alert. "100% logging — no silent failures."
            echo "===== APP DIED IN VERIFY WINDOW — capturing on-box diagnostics ====="
            DIAG_CMD=$(aws ssm send-command \
              --region "$REGION" \
              --instance-ids "$IID" \
              --document-name "AWS-RunShellScript" \
              --comment "tickvault verify-window crash diagnostics sha=${{ github.sha }}" \
              --parameters 'commands=["echo ===== systemctl status =====","systemctl status tickvault.service --no-pager -l 2>&1 | tail -n 40 || true","echo ===== app stdout/stderr ONLY last 120 =====","journalctl -u tickvault.service -n 120 --no-pager --output=cat 2>&1 || true"]' \
              --query 'Command.CommandId' --output text 2>/dev/null || echo "")
            DIAG=""
            if [ -n "$DIAG_CMD" ]; then
              sleep 6
              DIAG=$(aws ssm get-command-invocation \
                --region "$REGION" \
                --command-id "$DIAG_CMD" \
                --instance-id "$IID" \
                --query 'StandardOutputContent' --output text 2>/dev/null || echo "(diagnostics fetch failed)")
            fi
            echo "----- ON-BOX CRASH DIAGNOSTICS -----"
            echo "$DIAG"
            echo "------------------------------------"
            # Hand the last ~12 lines to the failure-notify step so the operator
            # sees the reason on Telegram WITHOUT opening the Actions run.
            {
              echo "CRASH_DIAG<<EOF_DIAG"
              echo "$DIAG" | tail -n 12
              echo "EOF_DIAG"
            } >> "$GITHUB_ENV"
            echo "ROLLBACK: tickvault is not active after deploy — rolling back"
            aws ssm send-command \
              --region "$REGION" \
              --instance-ids "$IID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["set -euo pipefail","if [ ! -d /opt/tickvault ]; then echo SKIP_ROLLBACK_NO_DIR; exit 0; fi","cd /opt/tickvault","if [ -f bin/tickvault.backup ]; then mv bin/tickvault.backup bin/tickvault; systemctl restart tickvault; fi"]'
            exit 1
          fi
          echo "DEPLOY VERIFIED: tickvault reached readiness (systemd active, or a healthy slow WAL-replay boot with no crash)"

      - name: Verify log ingestion (LOG-INGESTION-SMOKE, non-fatal)
        # Incident 2026-07-06 17:19 IST: the app moved its machine logs to
        # data/logs/machine/ while the on-box CloudWatch agent kept tailing the
        # old top-level globs — the app stayed healthy, the log SHIPPER went
        # silently dead, and /tickvault/prod/app ingested nothing for a whole
        # session with zero signal. This step is the per-deploy detector: it
        # proves fresh app log events actually reach CloudWatch AFTER the
        # restarted agent picked up the NEW config this deploy shipped.
        #
        # NON-FATAL by design (2026-06-09 doctrine: a broken OBSERVABILITY
        # surface must never fail, roll back, or auto-stop a verified-healthy
        # TRADING app). On timeout: ::warning:: + an SNS page so the operator
        # knows the shipper needs a look — then exit 0. The market-hours
        # tv-<env>-app-log-ingestion-silent alarm (log-retention.tf) is the
        # continuous in-session counterpart to this one-shot deploy check.
        # IAM: logs:FilterLogEvents on the app log group ARN (oidc.tf).
        #
        # 2026-07-17: instance-state guard — the hourly budget-guard stop raced
        # this smoke (run 29592612833) and fired a false "shipper dead" page; a
        # stopped box now short-circuits to a notice, and the true-positive page
        # prescribes the zero-touch re-deploy path instead of manual SSM.
        if: env.DEPLOY_SKIP_REASON == ''
        run: |
          set +e
          REGION="${{ vars.AWS_REGION || 'ap-south-1' }}"
          IID="${{ secrets.EC2_INSTANCE_ID }}"
          # START_MS captured HERE, in-step, AFTER readiness — any event found
          # below was ingested after the agent restart with the new config, so
          # a success proves the NEW globs ship (not a leftover from the old
          # config). Self-contained: no cross-step env plumbing.
          START_MS=$(date +%s%3N)
          echo "LOG-INGESTION-SMOKE: polling /tickvault/prod/app stream ${IID}/app for events newer than ${START_MS} (12 polls x 25s = ~5 min budget)"
          FOUND=0
          for i in $(seq 1 12); do
            sleep 25
            # 2026-07-17 instance-state guard: a budget-guard / scheduled stop
            # racing this window makes a zero-event verdict meaningless — break
            # early to the moot arm instead of burning the remaining polls.
            STATE=$(aws ec2 describe-instances --region "$REGION" --instance-ids "$IID" --query 'Reservations[0].Instances[0].State.Name' --output text 2>/dev/null || echo unknown)
            if [ "$STATE" != "running" ]; then
              echo "::notice::LOG-INGESTION-SMOKE moot — instance state is $STATE (budget guard / scheduled stop raced the smoke window); no shipper verdict possible, no page."
              exit 0
            fi
            COUNT=$(aws logs filter-log-events \
              --region "$REGION" \
              --log-group-name /tickvault/prod/app \
              --log-stream-names "${IID}/app" \
              --start-time "$START_MS" \
              --limit 1 \
              --query 'length(events)' --output text 2>/dev/null || echo 0)
            echo "poll $i/12: fresh events seen = ${COUNT:-0}"
            if [ "${COUNT:-0}" != "0" ] && [ "${COUNT:-0}" != "None" ]; then FOUND=1; break; fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "LOG-INGESTION-SMOKE OK: fresh app log events reached CloudWatch group /tickvault/prod/app (~$((i * 25))s after readiness) — the log shipper is alive on the new config."
            exit 0
          fi
          # 2026-07-17 instance-state guard (pre-page re-check): covers a stop
          # landing between the last poll and this publish — a stopped box gets
          # a notice, never a false "shipper dead" page.
          STATE=$(aws ec2 describe-instances --region "$REGION" --instance-ids "$IID" --query 'Reservations[0].Instances[0].State.Name' --output text 2>/dev/null || echo unknown)
          if [ "$STATE" != "running" ]; then
            echo "::notice::LOG-INGESTION-SMOKE moot — instance state is $STATE (budget guard / scheduled stop raced the smoke window); no shipper verdict possible, no page."
            exit 0
          fi
          echo "::warning::LOG-INGESTION-SMOKE: no fresh app log events in /tickvault/prod/app stream ${IID}/app within ~5 min of readiness — the CloudWatch agent is likely not shipping (glob/config mismatch or dead agent). The deploy itself is VERIFIED HEALTHY; NOT rolling back. Check the on-box === CWAGENT STATUS === / === APP LOG DIR === dumps above."
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IST_TIME="$(TZ='Asia/Kolkata' date +'%I:%M %p IST')"
          aws sns publish \
            --region "$REGION" \
            --topic-arn arn:aws:sns:${REGION}:${{ steps.acct.outputs.id }}:tv-prod-alerts \
            --subject "⚠️ tickvault deployed but its logs are NOT reaching CloudWatch" \
            --message "⚠️ New code went LIVE at ${IST_TIME} (version ${SHORT_SHA}) and the app is running fine — but its logs are NOT arriving in CloudWatch. Trading is unaffected. Automated remediation: re-dispatch deploy-aws.yml on main — its CloudWatch-agent step reinstalls, re-enables and restarts the shipper (no manual SSM needed). Same signature as the 06 Jul incident only if the box was RUNNING throughout this check. Run: ${{ github.run_id }}" \
          || echo "::warning::LOG-INGESTION-SMOKE: the SNS page also failed — operator must rely on this run log + the market-hours ingestion-silent alarm."
          exit 0

      - name: Record deployed binary git SHA to SSM (B9 deploy provenance)
        # Runs ONLY after the swap is verified healthy (the standalone
        # success Telegram was retired 2026-07-09 — the app's boot bubble
        # "NEW CODE deployed" header is the deploy-landed signal now; an
        # intentional off-hours skip writes nothing).
        # Consumers: the operator-portal footer (binary <sha7>) and the
        # deploy-watchdog binary-vs-main mismatch metric + 24h stale alarm.
        # NON-FATAL by design: a provenance-recording failure must never
        # fail (or roll back) a verified-healthy deploy — the next deploy
        # retries the write. The IAM grant lives in deploy/aws/terraform/
        # oidc.tf (ssm:PutParameter on exactly this parameter ARN).
        if: success() && env.DEPLOY_SKIP_REASON == ''
        run: |
          # LOCKSTEP NOTE: the SSM path below hardcodes the single real env
          # (prod) while terraform reads /tickvault/${var.environment}/deploy/
          # binary-git-sha (operator-control-lambda.tf + deploy-watchdog-
          # lambda.tf) — the two MUST stay in lockstep; a future staging env
          # would need this step parameterized on the target environment.
          # 2026-07-03 hardening: validate the sha is 40 lowercase hex before
          # recording it (mirrors the Rust is_full_lower_hex_sha guard) —
          # still non-fatal overall.
          if [[ "${GITHUB_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            aws ssm put-parameter \
              --region ${{ vars.AWS_REGION || 'ap-south-1' }} \
              --name "/tickvault/prod/deploy/binary-git-sha" \
              --type String \
              --overwrite \
              --value "${GITHUB_SHA}" \
            || echo "::warning::WARN: provenance param write failed — /tickvault/prod/deploy/binary-git-sha NOT updated (deploy itself is verified healthy; portal footer + stale-binary alarm will show the previous/unknown sha until the next deploy)"
          else
            echo "::warning::refusing to record non-hex sha to /tickvault/prod/deploy/binary-git-sha (GITHUB_SHA failed the 40-lowercase-hex check; deploy itself is verified healthy)"
          fi

      # 2026-07-09 (operator escalation — Telegram noise N1): the standalone
      # "✅ tickvault deployed — new code is LIVE" success publish is RETIRED.
      # The consolidated boot bubble's header ("tickvault starting — NEW CODE
      # deployed (build <sha>)") carries the deploy signal from the box itself
      # the moment the new binary boots — one bubble instead of two messages.
      # Every FAILURE-path publish below (and the log-shipping warning above)
      # is retained unchanged.

      - name: Auto-stop tickvault service on deploy failure (kills Telegram spam)
        # Not on an intentional off-hours skip: the box is already stopped, so
        # this would only emit InvalidInstanceId noise.
        # Not on EXTERNAL-STOP-DETECTED (2026-07-02, runs #415/#416): the
        # binary is healthy and another session already stopped the service
        # deliberately — auto-stopping again would fight that session and
        # mask its intent. The verify step failed with a DISTINCT
        # "EXTERNAL-STOP-DETECTED (not a crash)" message instead.
        if: failure() && env.DEPLOY_SKIP_REASON == '' && env.EXTERNAL_STOP_DETECTED != 'yes'
        # When the deploy fails AFTER the binary is in place, systemd's
        # Restart=always keeps relaunching it every few seconds. If each
        # boot reaches the auth step (it does after PR #921/#922), each
        # boot fires a "Auth OK" Telegram — operator gets one Telegram
        # per minute forever. We `systemctl stop` here to break that loop
        # for THIS boot (an explicit stop suppresses Restart=always until
        # the next boot/deploy).
        #
        # 2026-06-09 AUTO-START FIX: we DO NOT `systemctl disable` anymore.
        # Disabling poisoned next-morning auto-start (the unit no longer
        # started at the 08:30 boot) AND tricked scripts/aws-autopilot.sh
        # into reading a disabled unit as an INTENTIONAL kill-switch (so it
        # refused to self-heal it — see aws-autopilot.sh "unit disabled"
        # branch). Leaving the unit ENABLED means: systemd auto-starts it at
        # the next boot, the autopilot restarts an enabled-but-inactive unit,
        # and a genuinely-bad binary is replaced by the morning redeploy
        # (~08:45 IST) — all without the operator touching the box. The
        # intentional kill-switch (disable via AWS Control) stays the ONLY
        # source of a disabled unit, so the autopilot's disabled==intentional
        # semantics remain correct. Regression-locked by
        # crates/storage/tests/deploy_no_disable_on_failure_guard.rs.
        # Honest envelope: this can only execute if AWS creds were
        # configured (i.e. failure happened AFTER the configure-creds
        # step). For earlier failures it silently no-ops via `|| true`.
        run: |
          set +e
          # QUOTING FIX (2026-07-02, run #415 rc=127): the on-box echo message
          # previously contained an unquoted `;` — SSM runs each commands[]
          # element as a shell line, so the `;` TERMINATED the echo and the
          # shell then tried to execute the rest of the sentence (`unit kept
          # ENABLED ...`) as a command → `unit: command not found` → the whole
          # auto-stop invocation exited rc=127 even though the systemctl stop
          # itself succeeded. The message is now split into two `;`-free echos.
          aws ssm send-command \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }} \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "tickvault auto-stop on deploy failure sha=${{ github.sha }}" \
            --parameters 'commands=["systemctl stop tickvault || true","echo AUTO-STOPPED-UNIT-STAYS-ENABLED: stopped to break the Restart=always spam loop for this boot","echo unit kept ENABLED so it auto-starts at the next boot and aws-autopilot self-heals it"]' \
            --query Command.CommandId --output text || echo "(could not dispatch auto-stop — AWS creds likely not configured at this stage)"

      - name: Notify Telegram on failure
        # ANTI-SPAM 2026-06-02: an intentional off-hours skip (box stopped on
        # purpose, auto push outside the up-window) is NOT a failure worth
        # paging the operator at 2 AM. The 08:45 IST pre-market cron redeploys.
        # Genuine deploy failures (box up, smoke test failed, etc.) still page.
        if: failure() && env.DEPLOY_SKIP_REASON == ''
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IST_TIME="$(TZ='Asia/Kolkata' date +'%I:%M %p IST')"
          if [ "${EXTERNAL_STOP_DETECTED:-}" = "yes" ]; then
            # 2026-07-02 (runs #415/#416): NOT a crash — another session
            # stopped the service during verify. The binary is healthy, no
            # rollback and no auto-stop happened; the operator just re-runs.
            MSG="⚠️ Deploy could not be verified at ${IST_TIME} (version ${SHORT_SHA}) — another session STOPPED the app during the check (this is NOT a crash; the new code is healthy). What you need to do RIGHT NOW: re-run the deploy once the other session finishes. Run: ${{ github.run_id }}"
          else
            MSG="🆘 Deploy FAILED at ${IST_TIME} (version ${SHORT_SHA}). The app was auto-stopped to avoid repeated alerts; it stays set to auto-start at the next boot/deploy. Check the run: ${{ github.run_id }}"
          fi
          # If the app started then crashed inside the 60s verify window, the
          # Monitor step captured WHY into CRASH_DIAG — forward it so the
          # operator sees the actual reason on the phone, not just "FAILED".
          # printf keeps every YAML block-scalar line indented (a bare
          # unindented continuation line would terminate the `run: |` block).
          if [ -n "${CRASH_DIAG:-}" ]; then
            MSG="$(printf '%s\n\nWhy it died (last lines on the box):\n%s' "$MSG" "$CRASH_DIAG")"
          fi
          aws sns publish \
            --region ${{ vars.AWS_REGION || 'ap-south-1' }} \
            --topic-arn arn:aws:sns:${{ vars.AWS_REGION || 'ap-south-1' }}:${{ steps.acct.outputs.id }}:tv-prod-alerts \
            --subject "🆘 tickvault deploy FAILED" \
            --message "$MSG"

      - name: Stop the box this run self-started (if now outside the up-window)
        # COST-HARDENING 2026-06-30 (never-cross): when an after-close /
        # workflow_dispatch deploy self-started a STOPPED box (the step above set
        # DEPLOY_STARTED_STOPPED_BOX=yes), leave it running ONLY if we are inside
        # the 08:30-16:30 IST Mon-Fri up-window. If we are OUTSIDE the window, the
        # box would otherwise bill all night until the hourly hard-stop guard
        # catches it — so stop it here, immediately, at the end of the deploy.
        # always() so it runs whether the deploy passed or failed. We NEVER stop a
        # box this run did not start, and NEVER stop during the trading window.
        if: always() && env.DEPLOY_STARTED_STOPPED_BOX == 'yes'
        env:
          REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
          IID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -uo pipefail
          DOW=$(TZ='Asia/Kolkata' date +%u)            # 1=Mon..7=Sun
          HHMM=$(TZ='Asia/Kolkata' date +%H%M); HHMM=$((10#$HHMM))
          if [ "$DOW" -le 5 ] && [ "$HHMM" -ge 830 ] && [ "$HHMM" -le 1630 ]; then
            echo "Inside 08:30-16:30 IST Mon-Fri window — leaving the box running."
            exit 0
          fi
          echo "Outside the up-window (dow=$DOW time=$HHMM) and THIS run started the box — stopping it to avoid an out-of-window bill."
          aws ec2 stop-instances --region "$REGION" --instance-ids "$IID" >/dev/null \
            && echo "stop-instances dispatched for $IID" \
            || echo "(could not dispatch stop — AWS creds likely not configured at this stage)"
