# =============================================================================
# tickvault — Auto-Merge (manual fallback ONLY — merge-gate hardening 2026-07-04)
# =============================================================================
# The at-open `pull_request` arming that used to live here is RETIRED.
#
# WHY: arming `gh pr merge --auto --squash` at PR open meant the merge fired
# the moment the branch-protection REQUIRED checks passed — and only 4 checks
# were required (Build & Verify, Security & Audit, Commit Lint, Secret Scan).
# On 2026-07-03, PRs #1387 / #1388 / #1382 merged seconds BEFORE their
# (non-required) Test (storage) job failed, turning main red for hours.
#
# Auto-merge is now armed by the `enable-auto-merge` job in ci.yml, which runs
# `needs: all-green` — i.e. strictly AFTER the ENTIRE PR suite (build, all 6
# Test crates, security, coverage, repo guards, design-first wall, deploy
# lint) is green. Same token pattern, same same-repo/fork-safety guard from
# PR #1390. See .claude/rules/project/merge-gate-lock-2026-07-04.md.
#
# This file is kept ONLY as an operator-initiated manual fallback (e.g. the
# ci.yml arming job was itself cancelled and the operator wants to re-arm
# without pushing an empty commit). It never fires automatically.
#
# Security: All actions pinned. Same-repo origin is re-verified via the API
# before arming — a fork PR can never be armed even via manual dispatch.
# =============================================================================

name: Auto-Merge

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to arm auto-merge (squash) on. Same-repo PRs only."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: "Enable Auto-Merge (manual fallback)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify same-repo origin + non-draft, then arm auto-merge (squash)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::pr_number must be a plain integer, got: $PR_NUMBER"
            exit 1
          fi
          head_repo=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.repo.full_name')
          is_draft=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.draft')
          if [ "$head_repo" != "$REPO" ]; then
            echo "::error::PR #${PR_NUMBER} originates from fork '$head_repo' — refusing to arm auto-merge (PR #1390 fork-safety guard)."
            exit 1
          fi
          if [ "$is_draft" = "true" ]; then
            echo "::error::PR #${PR_NUMBER} is a draft — refusing to arm auto-merge."
            exit 1
          fi
          gh pr merge --auto --squash "https://github.com/${REPO}/pull/${PR_NUMBER}"
