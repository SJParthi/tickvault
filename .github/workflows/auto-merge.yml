# =============================================================================
# tickvault — Auto-Merge Workflow
# =============================================================================
# Automatically enables auto-merge on PRs when all CI checks pass.
# Zero human intervention — CI is the sole gatekeeper.
#
# Flow: PR opened → CI runs → all checks green → auto-merge enabled → merged
#
# Security: All actions pinned to SHA. No mutable tags.
# =============================================================================

name: Auto-Merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: "Enable Auto-Merge"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only auto-merge for trusted actors, skip draft PRs.
    #
    # SECURITY (mandatory gate): the PR must originate from a branch in THIS
    # repository, not a fork. `github.head_ref` is the PR branch name, which is
    # fully attacker-controlled on a fork PR — a stranger could fork this PUBLIC
    # repo, push a branch named `claude/anything`, open a PR, and (if CI passed)
    # have the bot arm auto-merge and self-merge into main. The
    # `head.repo.full_name == github.repository` check makes same-repo origin the
    # non-negotiable requirement; the actor / claude-branch clauses only further
    # narrow WITHIN same-repo. Fork PRs must never self-arm auto-merge.
    if: >-
      github.event.pull_request.draft != true &&
      github.event.pull_request.head.repo.full_name == github.repository && (
      github.actor == 'dependabot[bot]' ||
      github.actor == 'renovate[bot]' ||
      github.actor == 'SJParthi' ||
      startsWith(github.head_ref, 'claude/')
      )
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
