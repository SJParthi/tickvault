# =============================================================================
# dhan-live-trader — Branch Sync
# =============================================================================
# Keeps main and develop in sync automatically.
#
# Triggers:
#   1. Push to main → merge main into develop (pick up hotfixes/dependabot)
#   2. Manual dispatch → create develop → main PR for releases
#
# Security: All actions pinned to SHA. No mutable tags.
# =============================================================================

name: Branch Sync

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      direction:
        description: "Sync direction"
        required: true
        default: "main-to-develop"
        type: choice
        options:
          - main-to-develop
          - develop-to-main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Auto-sync: main → develop on every push to main ----
  sync-main-to-develop:
    name: "Sync main → develop"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.direction == 'main-to-develop')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: develop

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit || {
            echo "::error::Merge conflict — manual resolution required"
            exit 1
          }
          git push origin develop

  # ---- Manual: develop → main release PR ----
  create-release-pr:
    name: "Create release PR (develop → main)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.direction == 'develop-to-main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_COUNT=$(git rev-list --count origin/main..origin/develop)
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "develop and main are already in sync. Nothing to release."
            exit 0
          fi

          SUMMARY=$(git log --oneline origin/main..origin/develop | head -20)

          gh pr create \
            --base main \
            --head develop \
            --title "release: sync develop → main ($COMMIT_COUNT commits)" \
            --body "$(cat <<EOF
          ## Release Summary

          **$COMMIT_COUNT commits** from develop → main.

          ### Commits
          \`\`\`
          $SUMMARY
          \`\`\`

          Auto-generated by Branch Sync workflow.
          EOF
          )" || echo "PR already exists"
