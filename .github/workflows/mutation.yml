# =============================================================================
# tickvault — Mutation Testing (PR Gate for Critical Crates)
# =============================================================================
# Runs cargo-mutants on PRs that touch .rs files in core/trading/common crates.
# Mutation testing verifies that tests actually catch bugs — if a mutant survives,
# it means there's a code path where tests don't detect a behavior change.
#
# Cost optimization: Skips on draft PRs. Schedule changed from nightly to weekly.
# This is a required status check — PR cannot merge if mutation score drops.
# =============================================================================

name: Mutation Testing

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 3 AM UTC — catches untested code without burning daily minutes
  workflow_dispatch: # Manual trigger for on-demand mutation testing
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'crates/core/**/*.rs'
      - 'crates/trading/**/*.rs'
      - 'crates/common/**/*.rs'
  push:
    branches: [main]
    paths:
      - 'crates/core/**/*.rs'
      - 'crates/trading/**/*.rs'
      - 'crates/common/**/*.rs'

permissions:
  contents: read

# Cancel stale runs
concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: "Mutation Testing (critical crates)"
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: "1.95.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install cargo-mutants
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-mutants
        with:
          tool: cargo-mutants

      - name: Determine changed crates
        id: changed
        run: |
          set -euo pipefail
          # Get list of changed .rs files in critical crates, event-aware.
          # github.base_ref is only set on pull_request events — the old
          # unconditional fallback `git diff origin/${base_ref}...HEAD`
          # expanded to `origin/...HEAD` on push/schedule and exited 128
          # on every push-triggered run.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
              # Force-push / new branch: fall back to the last commit.
              CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
            else
              CHANGED=$(git diff --name-only "$before" HEAD)
            fi
          else
            # schedule / workflow_dispatch: no diff range — full weekly
            # sweep over ALL critical crates.
            CHANGED=$(printf 'crates/core/\ncrates/trading/\ncrates/common/\n')
          fi
          PACKAGES=""
          if echo "$CHANGED" | grep -q '^crates/core/'; then
            PACKAGES="$PACKAGES --package tickvault-core"
          fi
          if echo "$CHANGED" | grep -q '^crates/trading/'; then
            PACKAGES="$PACKAGES --package tickvault-trading"
          fi
          if echo "$CHANGED" | grep -q '^crates/common/'; then
            PACKAGES="$PACKAGES --package tickvault-common"
          fi
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          if [ -z "$PACKAGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run mutation testing
        if: steps.changed.outputs.skip == 'false'
        # pipefail is MANDATORY here: without it, `| tee` masks cargo-mutants
        # failures (the step exits with tee's status 0) — run 28654790130 went
        # green with ZERO mutants tested after `--test-threads` became an
        # unrecognized top-level flag. cargo-mutants passes args after the
        # first `--` to `cargo test` and after the second `--` to the test
        # binary; `--test-threads` is a libtest (test binary) flag, so the
        # correct shape preserving the original intent (bound test
        # parallelism to 2 threads) is `-- -- --test-threads=2`.
        run: |
          set -euo pipefail
          cargo mutants ${{ steps.changed.outputs.packages }} \
            --timeout=120 \
            --no-shuffle \
            -- -- --test-threads=2 \
            2>&1 | tee mutation-results.txt

      - name: Check for survived mutants
        if: steps.changed.outputs.skip == 'false'
        run: |
          if grep -q "SURVIVED" mutation-results.txt 2>/dev/null; then
            echo ""
            echo "╔══════════════════════════════════════════════╗"
            echo "║  MUTATION TESTING FAILED                      ║"
            echo "║  Survived mutants = untested code paths       ║"
            echo "╚══════════════════════════════════════════════╝"
            echo ""
            grep "SURVIVED" mutation-results.txt
            echo ""
            echo "Add or improve tests to kill these mutants."
            exit 1
          else
            echo "All mutants killed — tests are thorough."
          fi

      - name: Mutation score summary
        if: always() && steps.changed.outputs.skip == 'false'
        run: |
          if [ -f mutation-results.txt ]; then
            # NOTE: `grep -c` prints "0" itself AND exits 1 on zero matches, so
            # the old `|| echo 0` produced a two-line "0\n0" value and the
            # `[: 0\n0: integer expression expected` noise. Use `|| true` and
            # normalize the empty-file/missing-file case explicitly.
            TOTAL=$(grep -cE '(KILLED|SURVIVED|TIMEOUT)' mutation-results.txt 2>/dev/null || true)
            KILLED=$(grep -c 'KILLED' mutation-results.txt 2>/dev/null || true)
            SURVIVED=$(grep -c 'SURVIVED' mutation-results.txt 2>/dev/null || true)
            TIMEOUT=$(grep -c 'TIMEOUT' mutation-results.txt 2>/dev/null || true)
            TOTAL=${TOTAL:-0}; KILLED=${KILLED:-0}; SURVIVED=${SURVIVED:-0}; TIMEOUT=${TIMEOUT:-0}
            if [ "$TOTAL" -gt 0 ]; then
              SCORE=$(python3 -c "print(f'{$KILLED / $TOTAL * 100:.1f}')")
            else
              SCORE="N/A"
            fi
            {
              echo "## Mutation Testing Results"
              echo "| Metric | Count |"
              echo "|--------|-------|"
              echo "| Total mutants | $TOTAL |"
              echo "| Killed | $KILLED |"
              echo "| Survived | $SURVIVED |"
              echo "| Timeout | $TIMEOUT |"
              echo "| **Score** | **${SCORE}%** |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload mutation results
        if: always() && steps.changed.outputs.skip == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-results
          path: mutation-results.txt
          retention-days: 30
