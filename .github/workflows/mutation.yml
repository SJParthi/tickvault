# =============================================================================
# tickvault — Mutation Testing (SCHEDULED sweep — NOT a PR gate)
# =============================================================================
# Runs cargo-mutants on push-to-main (scoped to the changed critical crates),
# weekly (full sweep of core/trading/common), and on manual dispatch.
# Mutation testing verifies that tests actually catch bugs — if a mutant
# survives (MISSED), a code path exists where tests miss a behavior change.
#
# THE pull_request TRIGGER WAS REMOVED 2026-07-04 (merge-gate hardening).
# Verified reality before removal: EVERY recent PR run (and push run) was
# killed at the 60-minute `timeout-minutes` ceiling — 4/4 recent runs ended
# `cancelled` at 60.3–60.6 min, and 8 of the 15 most-recently merged PRs
# merged with this job still in_progress (later cancelled every time). A
# scoped `cargo mutants` over even ONE critical crate builds + tests hundreds
# of mutants; the FULL sweep is an ~18-hour-class job — it can NEVER complete
# inside a per-PR runner budget. The PR lane therefore gated NOTHING and
# burned one 60-minute runner per PR touching core/trading/common. The
# header's old claim "this is a required status check" was also false — a
# path-filtered workflow cannot safely be a required check (non-matching PRs
# would never report it).
#
# Mutation coverage remains enforced on the SCHEDULED lane (weekly full sweep
# + per-merge scoped run on main): any MISSED mutant fails the run loudly.
# If a per-PR mutation gate is ever wanted, it must be redesigned around
# `cargo mutants --in-diff` with a realistic timeout — not re-added as-is.
# =============================================================================

name: Mutation Testing

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 3 AM UTC — full sweep of the 3 critical crates
  workflow_dispatch: # Manual trigger for on-demand mutation testing
  push:
    branches: [main]
    paths:
      - 'crates/core/**/*.rs'
      - 'crates/trading/**/*.rs'
      - 'crates/common/**/*.rs'

permissions:
  contents: read

# Do NOT cancel-in-progress: with the PR trigger gone, the remaining triggers
# are push-to-main (path-filtered), weekly schedule, and dispatch. Rapid
# back-to-back merges must QUEUE their mutation runs, not cancel them —
# cancel-in-progress here was part of the "post-merge gates silently skipped
# via cancellation" hole (merge-gate hardening 2026-07-04).
concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: "Mutation Testing (critical crates)"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.95.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install cargo-mutants
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-mutants
        with:
          tool: cargo-mutants

      - name: Determine changed crates
        id: changed
        run: |
          set -euo pipefail
          # Get list of changed .rs files in critical crates, event-aware.
          # (The pull_request arm was removed with the PR trigger, 2026-07-04.)
          if [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
              # Force-push / new branch: fall back to the last commit.
              CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
            else
              CHANGED=$(git diff --name-only "$before" HEAD)
            fi
          else
            # schedule / workflow_dispatch: no diff range — full weekly
            # sweep over ALL critical crates.
            CHANGED=$(printf 'crates/core/\ncrates/trading/\ncrates/common/\n')
          fi
          PACKAGES=""
          if echo "$CHANGED" | grep -q '^crates/core/'; then
            PACKAGES="$PACKAGES --package tickvault-core"
          fi
          if echo "$CHANGED" | grep -q '^crates/trading/'; then
            PACKAGES="$PACKAGES --package tickvault-trading"
          fi
          if echo "$CHANGED" | grep -q '^crates/common/'; then
            PACKAGES="$PACKAGES --package tickvault-common"
          fi
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          if [ -z "$PACKAGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run mutation testing
        if: steps.changed.outputs.skip == 'false'
        # pipefail is MANDATORY here: without it, `| tee` masks cargo-mutants
        # failures (the step exits with tee's status 0) — run 28654790130 went
        # green with ZERO mutants tested after `--test-threads` became an
        # unrecognized top-level flag. cargo-mutants passes args after the
        # first `--` to `cargo test` and after the second `--` to the test
        # binary; `--test-threads` is a libtest (test binary) flag, so the
        # correct shape preserving the original intent (bound test
        # parallelism to 2 threads) is `-- -- --test-threads=2`.
        run: |
          set -euo pipefail
          cargo mutants ${{ steps.changed.outputs.packages }} \
            --timeout=120 \
            --no-shuffle \
            -- -- --test-threads=2 \
            2>&1 | tee mutation-results.txt

      - name: Check for survived mutants
        if: steps.changed.outputs.skip == 'false'
        # cargo-mutants (v27) prints "MISSED" for a surviving mutant — the old
        # grep for "SURVIVED" (mutmut/PIT/Stryker wording) could NEVER match,
        # so this gate was dead code: the job only failed via the run step's
        # exit code + pipefail (PR #1375). Grep the wording cargo-mutants
        # actually emits. A missing or empty results file means the mutation
        # step produced no output at all — that is a broken run and MUST fail
        # loudly here, never pass silently (the old `2>/dev/null` +
        # else-branch printed "All mutants killed" on a missing file).
        run: |
          set -euo pipefail
          if [ ! -s mutation-results.txt ]; then
            echo "::error::mutation-results.txt is missing or empty — the mutation step produced no output"
            exit 1
          fi
          if grep -q "MISSED" mutation-results.txt; then
            echo ""
            echo "╔══════════════════════════════════════════════╗"
            echo "║  MUTATION TESTING FAILED                      ║"
            echo "║  MISSED mutants = untested code paths         ║"
            echo "╚══════════════════════════════════════════════╝"
            echo ""
            grep "MISSED" mutation-results.txt
            echo ""
            echo "Add or improve tests to kill these mutants."
            exit 1
          else
            echo "All mutants killed — tests are thorough."
          fi

      - name: Mutation score summary
        if: always() && steps.changed.outputs.skip == 'false'
        run: |
          if [ -f mutation-results.txt ]; then
            # NOTE: `grep -c` prints "0" itself AND exits 1 on zero matches, so
            # the old `|| echo 0` produced a two-line "0\n0" value and the
            # `[: 0\n0: integer expression expected` noise. Use `|| true` and
            # normalize the empty-file/missing-file case explicitly.
            #
            # cargo-mutants v27 wording (the old KILLED/SURVIVED greps matched
            # NOTHING — those are mutmut/PIT terms): surviving mutants print a
            # per-line "MISSED"; timeouts print "TIMEOUT"; caught mutants are
            # NOT listed per-line — the caught count exists only in the final
            # summary line "N mutants tested in Xm: A missed, B caught,
            # C unviable". CARGO_TERM_COLOR=always means the tee'd file
            # carries ANSI codes, so strip them before parsing.
            sed 's/\x1b\[[0-9;]*m//g' mutation-results.txt > mutation-results.clean.txt
            MISSED=$(grep -c 'MISSED' mutation-results.clean.txt 2>/dev/null || true)
            TIMEOUT=$(grep -c 'TIMEOUT' mutation-results.clean.txt 2>/dev/null || true)
            CAUGHT=$(grep -oE '[0-9]+ caught' mutation-results.clean.txt 2>/dev/null | tail -1 | cut -d' ' -f1 || true)
            TOTAL=$(grep -oE '[0-9]+ mutants tested' mutation-results.clean.txt 2>/dev/null | tail -1 | cut -d' ' -f1 || true)
            TOTAL=${TOTAL:-0}; MISSED=${MISSED:-0}; CAUGHT=${CAUGHT:-0}; TIMEOUT=${TIMEOUT:-0}
            if [ "$TOTAL" -gt 0 ]; then
              # Language port 2026-07-18 (rust-only purge Phase 2a-1): the
              # former python3 f'{c / t * 100:.1f}' one-liner, re-expressed as
              # awk printf "%.1f" — both format the same IEEE-754 double with
              # correctly-rounded decimal output (byte-identical values;
              # spot-checked across the caught/total range in the porting PR).
              SCORE=$(awk -v c="$CAUGHT" -v t="$TOTAL" 'BEGIN{printf "%.1f", c / t * 100}')
            else
              SCORE="N/A"
            fi
            {
              echo "## Mutation Testing Results"
              echo "| Metric | Count |"
              echo "|--------|-------|"
              echo "| Total mutants tested | $TOTAL |"
              echo "| Caught | $CAUGHT |"
              echo "| Missed | $MISSED |"
              echo "| Timeout | $TIMEOUT |"
              echo "| **Score** | **${SCORE}%** |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload mutation results
        if: always() && steps.changed.outputs.skip == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-results
          path: mutation-results.txt
          retention-days: 30
