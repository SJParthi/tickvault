# =============================================================================
# tickvault — Safety Net (Weekly Scheduled)
# =============================================================================
# UB detection, memory safety, concurrency bugs.
# Runs weekly (Monday 6 AM UTC). Creates GitHub issue on failure.
# These checks are too slow for per-PR CI but catch deep bugs.
#
# Issue deduplication: checks for existing open issue before creating a new one.
# Build vs test: separates build from test to distinguish compilation errors
# from actual sanitizer findings.
#
# Checks:
#   1. cargo-careful test — extra debug checking with FFI support
#   2. AddressSanitizer (ASan) — memory safety via nightly
#   3. ThreadSanitizer (TSan) — data race detection via nightly
# =============================================================================

name: Safety Net

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6 AM UTC
  workflow_dispatch:       # Allow manual trigger
  # Self-validate the workflow whenever it itself is edited on main —
  # ensures toolchain pin bumps (NIGHTLY_VERSION) and step changes run
  # against the new substrate at merge time instead of waiting up to a
  # week for the next scheduled cycle.
  push:
    branches: [main]
    paths:
      - '.github/workflows/safety.yml'

permissions:
  contents: read
  issues: write            # Create issues on failure

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin nightly to a specific date for reproducible builds.
  # Update periodically after verifying the new nightly compiles cleanly.
  # 2026-04-24: bumped from 2026-04-15 → 2026-04-20 to keep the pin under
  # the 14-day safety window. 2026-04-20 is proven working (weekly safety
  # run on that date surfaced issues #302 + #304 — i.e. the build +
  # sanitizer jobs ran end-to-end).
  # 2026-05-23: bumped from 2026-04-20 → 2026-05-19 to clear the three open
  # nightly-compatibility build failures #460 (cargo-careful), #461 (ASan),
  # #462 (TSan). The 2026-04-20 pin sat 33 days stale, outside the 14-day
  # window; recent workspace dep updates (incl. rustls 0.23 chain) required
  # a newer nightly to compile the sanitizer builds.
  NIGHTLY_VERSION: nightly-2026-05-19

jobs:
  # ---- cargo-careful: Extra debug checks ----
  careful:
    name: "cargo-careful test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install nightly toolchain (required by cargo-careful)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.NIGHTLY_VERSION }}
          components: rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          prefix-key: safety-${{ env.NIGHTLY_VERSION }}

      - name: Install cargo-careful
        uses: taiki-e/install-action@e76ddd6ceed25b6c2aa8dfe0ec368bf2fb77a498 # cargo-careful
        with:
          tool: cargo-careful

      - name: Build with cargo-careful
        id: build
        run: |
          cargo +${{ env.NIGHTLY_VERSION }} careful test --workspace --no-run 2>&1 || {
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::cargo-careful build failed (not a test finding). Check nightly compatibility."
            exit 1
          }

      - name: Auto-close cargo-careful build-failure issue on green build
        if: steps.build.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '⚠️ Safety Net: cargo-careful build failure (nightly compatibility)';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);
            if (!match) { return; }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `Auto-closed: cargo-careful builds clean on \`${process.env.NIGHTLY_VERSION || 'current pin'}\`.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Run careful tests
        id: test
        if: steps.build.outcome == 'success'
        env:
          TV_SKIP_PERF_ASSERTIONS: "1"
        run: |
          # --test-threads=1: reduces memory pressure on CI runners
          # TV_SKIP_PERF_ASSERTIONS: skip timing assertions (instrumentation = 10-100x slower)
          cargo +${{ env.NIGHTLY_VERSION }} careful test --workspace \
            -- --test-threads=1 2>&1 | tee /tmp/careful-test.log || {
            echo "test_failed=true" >> "$GITHUB_OUTPUT"
            echo "=== cargo-careful test failed (exit code: ${PIPESTATUS[0]}) ==="
            echo "=== Failed tests ==="
            grep -E "^test .+ FAILED|^failures:" /tmp/careful-test.log || true
            echo "=== Last 80 lines ==="
            tail -80 /tmp/careful-test.log
            exit 1
          }

      - name: Auto-close cargo-careful runtime issue on green run
        if: steps.test.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '🔴 Safety Net: cargo-careful found issues';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);
            if (!match) { return; }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `Auto-closed: cargo-careful green on \`${process.env.NIGHTLY_VERSION || 'current pin'}\`.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Create issue on test failure (deduplicated)
        if: failure() && steps.test.outputs.test_failed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '🔴 Safety Net: cargo-careful found issues';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const duplicate = existing.find(i => i.title === title);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still reproducing as of ${new Date().toISOString()}.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Weekly safety scan detected potential undefined behavior.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThis requires investigation.`,
              labels: ['bug', 'safety', 'critical'],
            });

      - name: Create issue on build failure (deduplicated)
        if: failure() && steps.build.outputs.build_failed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '⚠️ Safety Net: cargo-careful build failure (nightly compatibility)';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const duplicate = existing.find(i => i.title === title);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still failing as of ${new Date().toISOString()}.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `cargo-careful tests failed to **build** (not a test finding).\nThis is typically a nightly toolchain compatibility issue.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nTo fix: update \`NIGHTLY_VERSION\` in \`.github/workflows/safety.yml\`.`,
              labels: ['bug', 'safety'],
            });

  # ---- AddressSanitizer: Memory safety ----
  sanitizer-asan:
    name: "AddressSanitizer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install nightly toolchain (required by sanitizers)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.NIGHTLY_VERSION }}
          components: rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          prefix-key: safety-${{ env.NIGHTLY_VERSION }}

      - name: Build with AddressSanitizer
        id: build
        env:
          RUSTFLAGS: "-Z sanitizer=address"
        run: |
          cargo +${{ env.NIGHTLY_VERSION }} test --workspace \
            --target x86_64-unknown-linux-gnu \
            -Z build-std \
            --lib --tests \
            --no-run 2>&1 || {
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::AddressSanitizer build failed (not a runtime finding). Check nightly compatibility."
            exit 1
          }

      - name: Auto-close ASan build-failure issue on green build
        if: steps.build.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '⚠️ Safety Net: ASan build failure (nightly compatibility)';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);
            if (!match) { return; }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `Auto-closed: ASan builds clean on \`${process.env.NIGHTLY_VERSION || 'current pin'}\`.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Run tests with AddressSanitizer
        id: test
        if: steps.build.outcome == 'success'
        env:
          RUSTFLAGS: "-Z sanitizer=address"
          TV_SKIP_PERF_ASSERTIONS: "1"
          # halt_on_error=1 ensures ASan-detected issues actually fail the
          # test process (default is print-and-continue, which silently lets
          # the test exit 0 and falsely greens the workflow).
          ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1:detect_leaks=0"
        run: |
          cargo +${{ env.NIGHTLY_VERSION }} test --workspace \
            --target x86_64-unknown-linux-gnu \
            -Z build-std \
            --lib --tests \
            -- --test-threads=1 2>&1 || {
            echo "test_failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          }

      - name: Auto-close ASan runtime issue on green run
        if: steps.test.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '🔴 Safety Net: AddressSanitizer found memory issues';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);
            if (!match) { return; }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `Auto-closed: ASan green on \`${process.env.NIGHTLY_VERSION || 'current pin'}\`.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Create issue on test failure (deduplicated)
        if: failure() && steps.test.outputs.test_failed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '🔴 Safety Net: AddressSanitizer found memory issues';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const duplicate = existing.find(i => i.title === title);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still reproducing as of ${new Date().toISOString()}.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Weekly safety scan detected memory safety issues (use-after-free, buffer overflow, etc.).\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThis requires immediate investigation.`,
              labels: ['bug', 'safety', 'critical'],
            });

      - name: Create issue on build failure (deduplicated)
        if: failure() && steps.build.outputs.build_failed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '⚠️ Safety Net: ASan build failure (nightly compatibility)';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const duplicate = existing.find(i => i.title === title);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still failing as of ${new Date().toISOString()}.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `AddressSanitizer tests failed to **build** (not a runtime finding).\nThis is typically a nightly toolchain compatibility issue.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nTo fix: update \`NIGHTLY_VERSION\` in \`.github/workflows/safety.yml\`.`,
              labels: ['bug', 'safety'],
            });

  # ---- ThreadSanitizer: Data races ----
  sanitizer-tsan:
    name: "ThreadSanitizer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.NIGHTLY_VERSION }}
          components: rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          prefix-key: safety-${{ env.NIGHTLY_VERSION }}

      - name: Build with ThreadSanitizer
        id: build
        env:
          RUSTFLAGS: "-Z sanitizer=thread"
        run: |
          cargo +${{ env.NIGHTLY_VERSION }} test --workspace \
            --target x86_64-unknown-linux-gnu \
            -Z build-std \
            --lib --tests \
            --no-run 2>&1 || {
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::ThreadSanitizer build failed (not a runtime finding). Check nightly compatibility."
            exit 1
          }

      - name: Auto-close TSan build-failure issue on green build
        if: steps.build.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '⚠️ Safety Net: TSan build failure (nightly compatibility)';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);
            if (!match) { return; }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `Auto-closed: TSan builds clean on \`${process.env.NIGHTLY_VERSION || 'current pin'}\`.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Run tests with ThreadSanitizer
        id: test
        if: steps.build.outcome == 'success'
        env:
          RUSTFLAGS: "-Z sanitizer=thread"
          TV_SKIP_PERF_ASSERTIONS: "1"
          # halt_on_error=1 ensures TSan-detected races actually fail the
          # test process. history_size=7 widens TSan's memory-access ring
          # buffer so racy stacktraces aren't truncated under heavy test
          # load (the workspace test count is large).
          TSAN_OPTIONS: "halt_on_error=1:history_size=7"
        run: |
          cargo +${{ env.NIGHTLY_VERSION }} test --workspace \
            --target x86_64-unknown-linux-gnu \
            -Z build-std \
            --lib --tests \
            -- --test-threads=1 2>&1 || {
            echo "test_failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          }

      - name: Auto-close TSan runtime issue on green run
        if: steps.test.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '🔴 Safety Net: ThreadSanitizer found data races';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);
            if (!match) { return; }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `Auto-closed: TSan green on \`${process.env.NIGHTLY_VERSION || 'current pin'}\`.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Create issue on test failure (deduplicated)
        if: failure() && steps.test.outputs.test_failed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '🔴 Safety Net: ThreadSanitizer found data races';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const duplicate = existing.find(i => i.title === title);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still reproducing as of ${new Date().toISOString()}.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Weekly safety scan detected data race conditions.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThis requires investigation — data races in trading systems can cause incorrect fills.`,
              labels: ['bug', 'safety', 'critical'],
            });

      - name: Create issue on build failure (deduplicated)
        if: failure() && steps.build.outputs.build_failed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = '⚠️ Safety Net: TSan build failure (nightly compatibility)';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'safety',
              per_page: 100,
            });
            const duplicate = existing.find(i => i.title === title);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still failing as of ${new Date().toISOString()}.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `ThreadSanitizer tests failed to **build** (not a runtime finding).\nThis is typically a nightly toolchain compatibility issue.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nTo fix: update \`NIGHTLY_VERSION\` in \`.github/workflows/safety.yml\`.`,
              labels: ['bug', 'safety'],
            });
