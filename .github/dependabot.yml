# =============================================================================
# Dependabot — Automated Dependency Vulnerability Alerts
# =============================================================================
# Creates PRs when pinned dependencies have known CVEs.
# Does NOT auto-update — all version changes require manual review
# per principle #3: "Every version pinned."
# =============================================================================

version: 2
updates:
  # Cargo dependencies (Rust crates)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    assignees:
      - "SJParthi"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions (workflow dependencies)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    labels:
      - "ci"
      - "dependencies"
    assignees:
      - "SJParthi"
    commit-message:
      prefix: "chore(ci)"
