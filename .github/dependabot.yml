# =============================================================================
# dhan-live-trader — Dependabot Configuration
# =============================================================================
# Automates dependency update PRs for both Cargo and GitHub Actions.
# Each PR goes through the full CI pipeline before merge.
#
# Cargo strategy: lockfile-only — Dependabot updates Cargo.lock only.
# Actual Cargo.toml version bumps are manual (requires Bible update).
# GitHub Actions: updates pinned SHA refs to latest tagged versions.
# =============================================================================

version: 2
updates:
  # Rust dependencies (Cargo.lock only — respects exact pinning)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    versioning-strategy: "lockfile-only"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions (pinned SHA → latest tagged version)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels: ["ci"]
    commit-message:
      prefix: "chore(ci)"
