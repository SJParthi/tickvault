# =============================================================================
# tickvault — cargo-deny Configuration
# =============================================================================
# Checks dependencies for: security advisories, banned licenses,
# banned crates, and duplicate versions.
#
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/
# =============================================================================

[graph]
targets = [
    "x86_64-unknown-linux-gnu",    # AWS EC2 c7i.2xlarge (production)
    "aarch64-apple-darwin",         # MacBook Pro M4 Pro (development)
]
all-features = true

# --- Advisories: Block known CVEs ---
# cargo-deny v0.19+ uses deny-by-default for advisories.
# Unmaintained advisories only error for direct workspace deps —
# transitive unmaintained deps (e.g., proc-macro-error via derive crates)
# are outside our control and should not block CI.
[advisories]
unmaintained = "workspace"
# Temporary advisory ignores — waiting on stable upstream fixes.
# Review at every dependency-bump pass; remove once the fix ships in a
# non-alpha release and we bump the relevant workspace dep.
#
# 2026-04-22 partial cleanup: 4 of 6 stale ignores removed after the
# CVE bump landed (`claude/dependabot-cve-fixes-2026-04-22` branch):
#   - RUSTSEC-2026-0044, 0048 → fixed by aws-lc-sys 0.40.0
#   - RUSTSEC-2026-0049 → fixed by rustls-webpki 0.103.13
#   - RUSTSEC-2026-0097 → fixed by rand 0.9.4
# The two remaining ignores below apply to rustls-webpki 0.101.7, which
# is pulled in by tokio-rustls 0.24.1 → rustls 0.21.12 in the deep AWS
# SDK stack (aws-smithy-http-client 1.1.12). Bumping the AWS SDK suite
# is its own change requiring a separate PR + verification window — see
# the deferred-work table in PR #323 for context.
ignore = [
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.101.7 (AWS SDK transitive only — not on tickvault's primary TLS path which is now 0.103.13)" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.101.7 (AWS SDK transitive only — not on tickvault's primary TLS path which is now 0.103.13)" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.101.7 CRL-parse panic — AWS SDK transitive only; CRL parsing is not on tickvault's live-feed path (which uses rustls 0.23.37 → webpki 0.103.13, patched). Exploit surface: attacker-controlled CRL from an AWS SDK endpoint — not a realistic attack vector for us. Full fix = AWS SDK suite bump, deferred to its own branch." },
]

# --- Licenses: Block incompatible licenses ---
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",  # webpki-roots (Mozilla CA cert data)
]
# GPL/AGPL/copyleft licenses are denied by default (not in allow list).

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# --- Bans: Block specific crates (CLAUDE.md banned list) ---
[bans]
multiple-versions = "deny"
wildcards = "allow"  # workspace path deps don't have versions
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = [
    # CLAUDE.md BANNED crates
    { crate = "bincode" },                              # TOMBSTONED upstream. Use bitcode.
    { crate = "openssl" },  # Use rustls instead
]
skip = [
    # --- AWS SDK transitive duplicates ---
    # AWS SDK Rust uses older HTTP/TLS stack internally.
    # These cannot be resolved until AWS SDK updates upstream.
    { crate = "getrandom", reason = "AWS SDK + ring use 0.2.x/0.3.x, our deps use 0.4.x" },
    { crate = "h2", reason = "AWS SDK uses h2 0.3.x, axum uses 0.4.x" },
    { crate = "http", reason = "AWS SDK uses http 0.2.x, axum uses 1.x" },
    { crate = "http-body", reason = "follows http version split" },
    { crate = "hyper", reason = "AWS SDK uses hyper 0.14.x, axum uses 1.x" },
    { crate = "hyper-rustls", reason = "follows hyper version split" },
    { crate = "rustls", reason = "AWS SDK uses rustls 0.21.x, we pin 0.23.x" },
    { crate = "rustls-webpki", reason = "follows rustls version split" },
    { crate = "tokio-rustls", reason = "follows rustls version split" },
    { crate = "socket2", reason = "AWS SDK + tokio version split" },
    # --- Proc-macro ecosystem duplicates ---
    { crate = "syn", reason = "proc-macro crates straddle syn 1.x and 2.x" },
    # --- Other transitive duplicates ---
    { crate = "hashbrown", reason = "different indexmap versions via transitive deps" },
    { crate = "rand", reason = "failsafe uses rand 0.8.x via transitive deps" },
    { crate = "rand_chacha", reason = "follows rand version split" },
    { crate = "rand_core", reason = "follows rand version split" },
    { crate = "redis", reason = "deadpool-redis may pull different redis version" },
    { crate = "untrusted", reason = "aws-lc-rs 1.16.3 pins untrusted 0.7.x while ring/aws-credential-types use 0.9.x" },
    { crate = "serde_spanned", reason = "figment + toml crate version split" },
    { crate = "toml", reason = "figment uses older toml, we pin newer" },
    { crate = "toml_datetime", reason = "follows toml version split" },
    # axum 0.8.8 (tickvault-api) pins tokio-tungstenite 0.28.0 while
    # crates/core pins 0.29.0 directly for Dhan WebSocket. Two distinct
    # call sites, intentional.
    { crate = "tokio-tungstenite", reason = "axum 0.8 uses 0.28, core uses 0.29 for Dhan WS" },
    { crate = "tungstenite", reason = "follows tokio-tungstenite version split" },
    # toml_edit 0.22 (direct) + toml_edit 0.23 (via cargo-deny internal) etc.
    # causes winnow 0.6 + 0.7 duplicate through toml_edit's parser stack.
    { crate = "winnow", reason = "toml_edit + figment parser version split" },
]
skip-tree = []

# --- Sources: Only allow crates from crates.io ---
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "sparse+https://index.crates.io/",
]
allow-git = []
