<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dhan — Advanced Option Chain</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  :root{
    --bg:#0a0a0a;--bg-2:#0e0e0e;--bg-3:#141414;--bg-row-hover:rgba(255,255,255,0.025);
    --border:#1a1a1a;--border-2:#242424;
    --text:#e5e5e5;--dim:#9a9a9a;--muted:#6a6a6a;
    --g:#1dbf73;--g-soft:#23c77a;--g-bg:rgba(29,191,115,0.10);
    --r:#e04f5f;--r-soft:#d9575e;--r-bg:rgba(224,79,95,0.10);
    --orange:#ff8c2a;--orange-bg:rgba(255,140,42,0.14);
    --violet:#9b6bff;--violet-bg:rgba(155,107,255,0.12);
    --atm:#14b869;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:var(--tv-font-sans,system-ui);font-size:12px;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* Browser chrome */
  .chrome{background:#2a2a2a;border-bottom:1px solid #000}
  .chrome-tabs{display:flex;height:32px;align-items:flex-end;padding:0 8px;gap:2px;background:#1a1a1a;}
  .chrome-tab{height:28px;padding:0 14px;background:#2a2a2a;border-radius:6px 6px 0 0;
    display:flex;align-items:center;gap:6px;font-size:11px;color:#b8b8b8;max-width:160px;}
  .chrome-tab.on{background:#3a3a3a;color:#fff}
  .chrome-url{background:#1a1a1a;padding:6px 12px;display:flex;align-items:center;gap:10px;font-size:11px;color:#888}
  .chrome-url .bar{flex:1;background:#0e0e0e;padding:5px 10px;border-radius:14px;color:#ccc;font-family:var(--tv-font-mono,monospace)}
  .chrome-url .lock{color:#999}

  /* Top header — dark olive exactly like Dhan */
  .topbar{display:flex;align-items:center;height:48px;padding:0 18px;
    background:linear-gradient(90deg,#1a1f15 0%,#1e2319 50%,#21261b 100%);
    border-bottom:1px solid #000;gap:16px;}
  .logo{width:22px;height:22px;border-radius:4px;background:#d4b84a;
    color:#1a1a1a;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;
    font-family:Georgia,serif;font-style:italic;}
  .scrip-info{display:flex;align-items:center;gap:8px;font-size:13px;color:#dcdcdc;flex-shrink:0;white-space:nowrap;}
  .scrip-info .name{font-weight:600}
  .scrip-info .price{color:#fff}
  .scrip-info .chg{color:var(--g-soft);font-size:12px}
  .ohlc{display:flex;gap:20px;margin-left:18px;font-size:11px;color:#b8b8b8;flex-shrink:1;min-width:0;white-space:nowrap;overflow:hidden;}
  .ohlc b{color:#fff;font-weight:500;margin-left:3px;}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .scrip-pill{padding:5px 12px;border-radius:4px;font-size:11px;color:#b8b8b8;
    border:1px solid transparent;background:transparent}
  .scrip-pill.on{background:#1dbf7318;color:var(--g);border-color:#1dbf7350}
  .search-box{position:relative;flex:1;max-width:380px;}
  .search-box input{background:#0e0e0e;border:1px solid #2a2a2a;color:var(--text);
    padding:8px 30px 8px 32px;border-radius:4px;font-family:inherit;font-size:12px;width:100%;box-sizing:border-box;}
  .search-box input:focus{outline:none;border-color:#3a3a3a;}
  .search-box .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#888;font-size:12px;pointer-events:none;}
  .search-box .x{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#888;font-size:13px;cursor:pointer;}
  .search-dd{position:absolute;top:calc(100% + 4px);right:0;left:0;background:#0e0e0e;
    border:1px solid #2a2a2a;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.6);
    padding:4px 0;z-index:50;display:none;max-height:380px;overflow-y:auto;}
  .search-dd.open{display:block}
  .search-dd .sec{padding:6px 14px 4px;font-size:9px;color:#666;letter-spacing:.6px;text-transform:uppercase;}
  .search-dd .it{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#ddd;cursor:pointer;}
  .search-dd .it:hover{background:#1a1a1a}
  .search-dd .it .l{display:flex;flex-direction:column;gap:2px;}
  .search-dd .it .l .sub{font-size:10px;color:#888;}
  .search-dd .it .ex{color:#888;font-size:10px;padding:2px 6px;background:#1a1a1a;border-radius:3px;}
  .search-dd .it .ex.fno{color:var(--g);background:rgba(29,191,115,.1);}
  .search-dd .empty{padding:18px 14px;text-align:center;color:#666;font-size:11px;}

  /* Sub header */
  .subhead{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;}
  .subhead .title{font-size:13px;font-weight:500;color:var(--text);}
  .exp-pills{display:flex;gap:4px;margin-left:12px;position:relative;}
  .exp-pill{padding:4px 12px;border-radius:3px;font-size:11.5px;color:var(--dim);cursor:pointer;border:0;background:transparent;}
  .exp-pill:hover{color:#ddd}
  .exp-pill.on{background:rgba(29,191,115,.15);color:var(--g);font-weight:500;}
  .exp-pill .caret{margin-left:4px;font-size:9px;}
  .exp-dd{position:absolute;top:calc(100% + 6px);left:180px;background:#0e0e0e;border:1px solid #2a2a2a;
    border-radius:6px;padding:6px 0;min-width:140px;z-index:50;display:none;
    box-shadow:0 8px 24px rgba(0,0,0,.6);}
  .exp-dd.open{display:block}
  .exp-dd .it{padding:8px 14px;font-size:11px;color:#ddd;}
  .exp-dd .it:hover{background:#1a1a1a}
  .hide-btn{margin-left:auto;font-size:11px;color:#b8b8b8;background:#1a1a1a;padding:5px 12px;border-radius:4px;}

  /* Info strip */
  .info-strip{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid var(--border);gap:44px;}
  .info-strip .stat{font-size:10.5px;color:var(--dim);line-height:1.3;}
  .info-strip .stat b{display:block;color:var(--text);font-size:14px;font-weight:500;margin-top:2px;letter-spacing:.2px;}
  .info-strip .chks{display:flex;gap:22px;margin-left:auto;align-items:center;}
  .chk{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);cursor:pointer;line-height:1.3;}
  .chk .lbl{font-size:10.5px;color:var(--dim);margin-right:4px;}
  .chk .box{width:13px;height:13px;border:1px solid #444;border-radius:2px;background:#0e0e0e;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;flex-shrink:0;}
  .chk.on .box{background:var(--g);border-color:var(--g);color:#0a0a0a;}
  .chk.on .box::after{content:'✓';font-weight:700;}
  .chk .txt{color:#d8d8d8;font-size:11.5px;}
  .chk.on .txt{color:#f0f0f0}
  .refresh-btns{display:flex;gap:6px;margin-left:12px;}
  .refresh-btns button{width:28px;height:28px;background:transparent;border:0;border-radius:50%;color:#8a8a8a;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .refresh-btns button:hover{background:#1a1a1a;color:#ddd;}

  /* Layout */
  .body{display:flex;min-height:calc(100vh - 48px - 32px - 28px);}
  .chain-wrap{flex:1;overflow:auto;position:relative;}
  .chain-wrap::-webkit-scrollbar{width:8px;height:8px;}
  .chain-wrap::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}

  /* Manage panel */
  .manage{width:260px;background:var(--bg-2);border-left:1px solid var(--border);display:none;flex-direction:column;}
  .manage.open{display:flex}
  .manage-h{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);font-weight:500;}
  .manage-h .x{margin-left:auto;cursor:pointer;color:#888;font-size:14px;}
  .manage-h .reset{margin-left:auto;color:#888;font-size:11px;}
  .manage-body{flex:1;overflow-y:auto;padding:14px;}
  .manage-section{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;margin-top:12px}
  .manage-section:first-child{margin-top:0}
  .col-item{display:flex;align-items:center;padding:6px 4px;font-size:12px;color:var(--text);gap:8px;cursor:grab;}
  .col-item .drag{color:#555;font-size:10px;letter-spacing:-2px;}
  .col-item .chk .box{border-radius:2px}
  .insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .insight-pill{padding:8px;border-radius:4px;font-size:10px;text-align:center;background:#141414;color:#bbb;border:1px solid #242424;cursor:pointer;}
  .insight-pill.on.oh{background:var(--orange-bg);color:var(--orange);border-color:#ff8c2a40}
  .insight-pill.on.ol{background:var(--violet-bg);color:var(--violet);border-color:#9b6bff40}
  .insight-pill.on.hoi{background:#ec4899;color:#fff;border-color:#ec4899}
  .insight-pill.on.hiv{background:#ec4899;color:#fff;border-color:#ec4899}
  .strikes-row{display:flex;gap:4px;flex-wrap:wrap;}
  .strike-chip{padding:5px 10px;border-radius:4px;font-size:10px;background:#141414;color:#bbb;border:1px solid #242424;}
  .strike-chip.on{background:var(--g);color:#0a0a0a;border-color:var(--g);font-weight:500}
  .save-btn{margin:14px;padding:10px;background:var(--g);color:#0a0a0a;border-radius:4px;font-weight:500;font-size:12px;}

  /* Table */
  table.oc{width:100%;border-collapse:separate;border-spacing:0;font-family:var(--tv-font-mono,monospace);font-size:11px;min-width:1400px;}
  .oc thead th{position:sticky;top:0;z-index:3;background:var(--bg);
    padding:9px 8px;color:var(--dim);font-size:10px;font-weight:500;
    border-bottom:1px solid var(--border);white-space:nowrap;text-align:right;letter-spacing:.3px;cursor:pointer;user-select:none;}
  .oc thead th.center{text-align:center}
  .oc thead th.strike-h{background:#141414;color:var(--text);text-align:center;}
  .oc thead th.ce-tog{background:var(--orange-bg);color:var(--orange);text-align:center;font-weight:600;}
  .oc thead th.pe-tog{background:var(--orange-bg);color:var(--orange);text-align:center;font-weight:600;}
  .oc tbody td{padding:8px 8px;text-align:right;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums;position:relative;}
  .oc tbody td.center{text-align:center}
  .oc tbody td.strike{text-align:center;background:#141414;color:var(--text);font-weight:500;}
  .oc tbody tr.atm td.strike{background:var(--atm);color:#0a0a0a;font-weight:600;}
  .oc tbody tr.atm{background:rgba(29,191,115,0.04);}
  .oc tbody tr:hover td:not(.strike){background:var(--bg-row-hover);}
  .oc td.up{color:var(--g-soft)}.oc td.down{color:var(--r-soft)}
  .oc td.ce-itm{background:rgba(255,140,42,0.04);}
  .oc td.pe-itm{background:rgba(255,140,42,0.04);}

  /* OI bar overlay */
  .oi-bar{position:absolute;bottom:0;height:2px;background:var(--orange);}
  .oi-bar.pe{background:var(--violet);}

  /* OI+/OI- badges */
  .oi-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;
    background:var(--orange);color:#0a0a0a;font-weight:600;margin-left:4px;}
  .oi-badge.minus{background:var(--violet);color:#fff;}

  /* Checkbox column */
  .cb-cell{width:18px;}
  .cb{width:13px;height:13px;border:1px solid #3a3a3a;border-radius:2px;background:#0e0e0e;display:inline-block;vertical-align:middle;cursor:pointer;}

  /* Buildup pills */
  .bp{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;font-weight:500;min-width:90px;text-align:center;}
  .bp.sb{background:var(--r-bg);color:var(--r-soft);}
  .bp.sc{background:rgba(224,79,95,0.08);color:#e04f5f;border:1px solid rgba(224,79,95,0.3);}
  .bp.lb{background:var(--g-bg);color:var(--g-soft);}
  .bp.lu{background:var(--violet-bg);color:var(--violet);}

  /* Hover B/S action buttons (appear inside the CE/PE toggle cell on hover) */
  .hover-actions{display:none;align-items:center;gap:3px;justify-content:center;}
  .oc tr:hover .hover-actions{display:inline-flex}
  .oc tr:hover .cb{display:none}
  .ha-btn{width:18px;height:16px;font-size:9px;display:inline-flex;align-items:center;justify-content:center;border-radius:2px;color:#fff;font-weight:600;}
  .ha-btn.b{background:var(--g)}
  .ha-btn.s{background:var(--r)}
  .ha-btn.misc{background:#2a2a2a;color:#888;width:16px;}

  /* Bottom bar */
  .bottom{position:sticky;bottom:0;display:flex;align-items:center;padding:10px 18px;
    background:var(--bg);border-top:1px solid var(--border);gap:10px;}
  .bbtn{background:#141414;border:1px solid var(--border-2);color:var(--text);
    padding:7px 14px;border-radius:4px;font-size:11px;display:inline-flex;align-items:center;gap:6px;}
  .bbtn .c{font-size:10px;color:var(--muted);background:#0a0a0a;padding:1px 6px;border-radius:8px;}
  .bottom .right{margin-left:auto}
  .strat-btn{background:#151515;border:1px solid var(--border-2);color:var(--text);padding:7px 14px;border-radius:4px;font-size:11px;display:inline-flex;align-items:center;gap:6px;}
  .strat-btn .ic{color:var(--g);}

  /* Nav back link */
  .back-topbar{color:#ccc;font-size:14px;text-decoration:none;padding:4px 8px;border-radius:4px;background:transparent;margin-right:-4px;}
  .back-topbar:hover{background:#1a1a1a}
</style>
</head>

function fmt(n,dec){ if(typeof n!=='number'||isNaN(n)) return n;
  return n.toLocaleString('en-IN',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtInt(n){ return typeof n==='number'?n.toLocaleString('en-IN'):n; }
function fmtK(n){
  if(typeof n!=='number') return n;
  if(Math.abs(n)>=1e7) return (n/1e7).toFixed(2)+' Cr';
  if(Math.abs(n)>=1e5) return (n/1e5).toFixed(2)+' L';
  return fmtInt(n);
}
function pctCls(n){ return n>=0?'up':'down'; }

/* map raw row → object for easier indexing */
/* Generate synthetic rows for dynamic scrips. Deterministic on (scrip, expiry). */
function genRows(s, expiry){
  const step = s.step || (s.ltp>5000?100:s.ltp>2000?50:s.ltp>500?20:10);
  const atm = Math.round(s.ltp/step)*step;
  let seed = 0;
  const str = s.name+expiry;
  for(let i=0;i<str.length;i++) seed = (seed*31 + str.charCodeAt(i)) & 0x7fffffff;
  const rand = ()=>{ seed=(seed*9301+49297)%233280; return seed/233280; };
  const rows = [];
  for(let k=-7;k<=7;k++){
    const strike = atm + k*step;
    const ceITM = strike < s.ltp;
    const peITM = strike > s.ltp;
    const ceIntrinsic = Math.max(0, s.ltp-strike);
    const peIntrinsic = Math.max(0, strike-s.ltp);
    const timeVal = s.ltp*0.008*(1+rand()*0.5);
    const ce_ltp = +(ceIntrinsic + timeVal).toFixed(2);
    const pe_ltp = +(peIntrinsic + timeVal).toFixed(2);
    const ce_oi = Math.floor(50000 + rand()*500000 + (ceITM?0:200000*Math.exp(-Math.abs(k)/3)));
    const pe_oi = Math.floor(50000 + rand()*500000 + (peITM?0:200000*Math.exp(-Math.abs(k)/3)));
    const ce_vol = Math.floor(ce_oi*0.05 + rand()*ce_oi*0.3);
    const pe_vol = Math.floor(pe_oi*0.05 + rand()*pe_oi*0.3);
    const ce_oichgP = +((rand()-0.4)*200).toFixed(2);
    const pe_oichgP = +((rand()-0.4)*200).toFixed(2);
    const ce_ltpchgP = +((rand()-0.5)*80).toFixed(2);
    const pe_ltpchgP = +((rand()-0.5)*80).toFixed(2);
    const iv = +(s.atmIV + Math.abs(k)*0.3 + rand()*2).toFixed(2);
    const delta = +(ceITM ? 0.5+Math.min(0.49,Math.abs(k)*0.08) : 0.5-Math.min(0.49,Math.abs(k)*0.08)).toFixed(5);
    const gamma = +(0.0001 + rand()*0.0002).toFixed(5);
    const theta = +(-20 - rand()*40).toFixed(4);
    const vega = +(20 + rand()*30).toFixed(3);
    const buildup = ce_oichgP>0 && ce_ltpchgP>0 ? 'Long Buildup' : (ce_oichgP>0 ? 'Short Buildup' : (ce_ltpchgP>0?'Short Covering':'Long Unwinding'));
    const buildup_pe = pe_oichgP>0 && pe_ltpchgP>0 ? 'Long Buildup' : (pe_oichgP>0 ? 'Short Buildup' : (pe_ltpchgP>0?'Short Covering':'Long Unwinding'));
    rows.push([
      ce_oichgP, ce_oi, ce_ltpchgP, ce_ltp, strike,
      +((pe_oi/ce_oi)||1).toFixed(2), pe_ltp, pe_ltpchgP, pe_oi, pe_oichgP,
      ce_vol, ce_oichgP, pe_vol, pe_oichgP,
      iv, iv, delta, gamma, theta, vega,
      0,0,0,0,
      buildup, buildup_pe, 0,0
    ]);
  }
  return rows;
}

function rowObj(r){
  return {
    oichgP_ce:r[0], oi_ce:r[1], ltpchgP_ce:r[2], ltp_ce:r[3],

    buildup_ce:r[24], buildup_pe:r[25],

function bpClass(label){
  const m = {
    'Short Buildup':'sb','Short Covering':'sc','Long Buildup':'lb','Long Unwinding':'lu'
  };
  return m[label]||'sb';
}

function cellFor(col, o, maxOI_ce, maxOI_pe, maxVol_ce, maxVol_pe){
  const v = o[col.key];
  if(col.key==='strike') return `<td class="strike">${fmt(o.strike,2)}</td>`;
  if(col.key==='pcr') return `<td>${fmt(o.pcr,2)}</td>`;
  if(col.key==='ce_tog') return `<td class="center">
    <span class="cb"></span>
    <span class="hover-actions">
      <span class="ha-btn b">B</span><span class="ha-btn s">S</span>
      <span class="ha-btn misc">📈</span><span class="ha-btn misc">⛶</span><span class="ha-btn misc">⋮</span>
    </span></td>`;
  if(col.key==='pe_tog') return `<td class="center">
    <span class="cb"></span>
    <span class="hover-actions">
      <span class="ha-btn b">B</span><span class="ha-btn s">S</span>
      <span class="ha-btn misc">📈</span><span class="ha-btn misc">⛶</span><span class="ha-btn misc">⋮</span>
    </span></td>`;
  if(col.key==='buildup_ce'||col.key==='buildup_pe'){
    return `<td class="center"><span class="bp ${bpClass(v)}">${v}</span></td>`;
  }
  /* OI column: show bar + badge */
  if(col.key==='oi_ce'){
    const pct = Math.min(100, Math.abs(v)/maxOI_ce*100);
    const badge = o.oi_marker_ce ? `<span class="oi-badge ${o.oi_marker_ce==='OI-'?'minus':''}">${o.oi_marker_ce}</span>`:'';
    return `<td><span class="oi-bar" style="width:${pct}%;right:0;left:auto;"></span>${fmtInt(v)}${badge}</td>`;
  }
  if(col.key==='oi_pe'){
    const pct = Math.min(100, Math.abs(v)/maxOI_pe*100);
    const badge = o.oi_marker_pe ? `<span class="oi-badge ${o.oi_marker_pe==='OI-'?'minus':''}">${o.oi_marker_pe}</span>`:'';
    return `<td><span class="oi-bar pe" style="width:${pct}%;left:0;"></span>${fmtInt(v)}${badge}</td>`;
  }
  if(col.key==='vol_ce'){
    const pct = Math.min(100, Math.abs(v)/maxVol_ce*100);
    return `<td><span class="oi-bar" style="width:${pct}%;right:0;left:auto;opacity:.5;"></span>${fmtK(v)}</td>`;
  }
  if(col.key==='vol_pe'){
    const pct = Math.min(100, Math.abs(v)/maxVol_pe*100);
    return `<td><span class="oi-bar pe" style="width:${pct}%;left:0;opacity:.5;"></span>${fmtK(v)}</td>`;
  }
  if(col.key==='oichgP_ce'||col.key==='oichgP_pe'){
    return `<td class="${pctCls(v)}">${v>=0?'':''}${fmt(v,2)}%</td>`;
  }
  if(col.key==='ltpchgP_ce'||col.key==='ltpchgP_pe'){
    const isNeg = v<0;
    return `<td>${fmt(Math.abs(v),2)} (<span class="${isNeg?'down':'up'}">${isNeg?'-':'+'}${fmt(Math.abs(v),2)}%</span>)</td>`;
  }
  if(col.key==='volchgP_ce'||col.key==='volchgP_pe'){
    return `<td class="${pctCls(v)}">${fmt(v,2)}%</td>`;
  }
  if(col.key==='ltp_ce'||col.key==='ltp_pe') return `<td>${fmt(v,2)}</td>`;
  if(col.key.startsWith('iv_')) return `<td>${fmt(v,2)}</td>`;
  if(col.key.startsWith('delta_')) return `<td>${fmt(v,5)}</td>`;
  if(col.key.startsWith('gamma_')) return `<td>${fmt(v,5)}</td>`;
  if(col.key.startsWith('theta_')) return `<td>${fmt(v,5)}</td>`;
  if(col.key.startsWith('vega_')) return `<td>${fmt(v,5)}</td>`;
  return `<td>${v}</td>`;
}

function render(){
  const s = SCRIPS[state.scrip];
  let rows;
  if(state.scrip==='NIFTY') rows = NIFTY_ROWS;
  else if(state.scrip==='SENSEX') rows = SENSEX_ROWS;
  else rows = genRows(s, state.expiry);

  /* update header */
  document.getElementById('scripInfo').innerHTML =
    `<span class="name">${s.name}</span> <span class="price">${fmt(s.ltp,2)}</span>
     <span class="chg">+${fmt(s.chg,2)} (${s.chgP}%) ↗</span>`;
  document.getElementById('ohlc').innerHTML =
    `<span>Open:<b>${fmt(s.open,2)}</b></span>
     <span>High:<b>${fmt(s.high,2)}</b></span>
     <span>Low:<b>${fmt(s.low,2)}</b></span>
     <span>Close:<b>${fmt(s.close,2)}</b></span>`;
  document.getElementById('chainTitle').textContent = s.title;
  document.getElementById('atmIV').textContent = fmt(s.atmIV,2);
  document.getElementById('daysExp').textContent = s.days;
  document.getElementById('mktLot').textContent = s.lot;
  document.getElementById('pcrTop').textContent = fmt(s.pcr,2);

  /* scrip pill active */
  document.querySelectorAll('.scrip-pill').forEach(p=>{
    p.classList.toggle('on', p.dataset.scrip===state.scrip);
  });
  /* update expiry labels */
  const pills = document.querySelectorAll('.exp-pill[data-exp]');
  s.expiries.forEach((e,i)=>{ pills[i].textContent=e; pills[i].dataset.exp=e; });
  pills.forEach(p=>p.classList.toggle('on', p.dataset.exp===state.expiry));

  /* visible columns: respect buildup toggle for buildup cols */
  let cols = COLUMNS.filter(c=>{
    if((c.key==='buildup_ce'||c.key==='buildup_pe') && !state.buildupOn) return false;
    return c.on;
  });

  /* compute max OI / Vol for bars */
  const maxOI_ce = Math.max(...rows.map(r=>r[1]));
  const maxOI_pe = Math.max(...rows.map(r=>r[8]));
  const maxVol_ce = Math.max(...rows.map(r=>r[10]));
  const maxVol_pe = Math.max(...rows.map(r=>r[12]));

  /* header */
  const thead = `<thead><tr>${cols.map(c=>{
    let cls='';
    if(c.key==='strike') cls='strike-h center';
    else if(c.key==='ce_tog') cls='ce-tog';
    else if(c.key==='pe_tog') cls='pe-tog';
    else if(c.key==='pcr') cls='center';
    else if(c.key==='buildup_ce'||c.key==='buildup_pe') cls='center';
    return `<th class="${cls}">${c.label}</th>`;
  }).join('')}</tr></thead>`;

  /* body */
  const tbody = `<tbody>${rows.map(r=>{
    const o = rowObj(r);
    const isATM = Math.abs(o.strike - s.atm) < 0.5;
    return `<tr class="${isATM?'atm':''}">${cols.map(c=>cellFor(c,o,maxOI_ce,maxOI_pe,maxVol_ce,maxVol_pe)).join('')}</tr>`;
  }).join('')}</tbody>`;

  document.getElementById('ocTable').innerHTML = thead+tbody;

  /* column list in manage panel */
  renderColList();
}

function renderColList(){
  const list = document.getElementById('colList');
  list.innerHTML = COLUMNS
    .filter(c=>c.optional && c.group==='pe') // show PE side list (matches screenshot)
    .map(c=>`
      <div class="col-item" data-col="${c.key}">
        <span class="drag">⋮⋮</span>
        <label class="chk ${c.on?'on':''}"><span class="box"></span>${c.label}</label>
      </div>`).join('');
  list.querySelectorAll('.col-item').forEach(el=>{
    el.querySelector('.chk').onclick = ()=>{
      const key = el.dataset.col;
      const col = COLUMNS.find(c=>c.key===key);
      col.on = !col.on;
      /* mirror on CE side */
      const ceKey = key.replace('_pe','_ce');
      const ceCol = COLUMNS.find(c=>c.key===ceKey);
      if(ceCol) ceCol.on = col.on;
      render();
    };
  });
}

const searchInput = document.getElementById('searchInput');
const searchDD = document.getElementById('searchDD');
const searchClear = document.getElementById('searchClear');

function rankMatches(q){
  q = q.toLowerCase().trim();
  if(!q) return [];
  const scored = [];
  for(const it of FNO_UNIVERSE){
    const sym = it.s.toLowerCase();
    const sub = it.sub.toLowerCase();
    let score = -1;
    if(sym===q) score = 100;
    else if(sym.startsWith(q)) score = 90 - sym.length*0.1;
    else if(sub.startsWith(q)) score = 80 - sub.length*0.1;
    else if(sym.includes(q)) score = 60;
    else if(sub.includes(q)) score = 40;
    if(score>=0) scored.push({...it,score});
  }
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,14);
}

searchInput.oninput = () => {
  const q = searchInput.value;
  searchClear.style.display = q ? 'block' : 'none';
  if(!q.trim()){ searchDD.classList.remove('open'); return; }
  const hits = rankMatches(q);
  if(!hits.length){
    searchDD.innerHTML = `<div class="empty">No results for “${q}”</div>`;
  } else {
    const indices = hits.filter(h=>h.t==='Index');
    const stocks = hits.filter(h=>h.t!=='Index');
    let html='';
    if(indices.length){
      html += `<div class="sec">Indices</div>`;
      html += indices.map(h=>`<div class="it" data-sym="${h.s}"><div class="l"><span>${h.s}</span>${h.sub?`<span class="sub">${h.sub}</span>`:''}</div><span class="ex ${h.fno?'fno':''}">${h.fno?'F&O':h.e}</span></div>`).join('');
    }
    if(stocks.length){
      html += `<div class="sec">Stocks</div>`;
      html += stocks.map(h=>`<div class="it" data-sym="${h.s}"><div class="l"><span>${h.s}</span>${h.sub?`<span class="sub">${h.sub}</span>`:''}</div><span class="ex ${h.fno?'fno':''}">${h.fno?'F&O':h.e}</span></div>`).join('');
    }
    searchDD.innerHTML = html;
    searchDD.querySelectorAll('.it').forEach(el=>{
      el.onclick = ()=>{
        const sym = el.dataset.sym;
        // If NIFTY or SENSEX, switch scrip directly
        if(sym==='NIFTY 50'){ state.scrip='NIFTY'; }
        else if(sym==='SENSEX'){ state.scrip='SENSEX'; }
        else {
          // treat as a new scrip: seed into SCRIPS on the fly
          const rnd = (a,b)=>a+Math.random()*(b-a);
          const base = 500 + Math.random()*4000;
          const step = base>2000?100:(base>500?50:25);
          const atm = Math.round(base/step)*step;
          SCRIPS[sym] = {
            name: sym,
            ltp: +base.toFixed(2),
            chg: +rnd(-30,30).toFixed(2),
            chgP: +rnd(-2,2).toFixed(2),
            open: +rnd(base*0.99,base*1.01).toFixed(2),
            high: +rnd(base*1.00,base*1.02).toFixed(2),
            low:  +rnd(base*0.98,base*1.00).toFixed(2),
            close:+rnd(base*0.99,base*1.01).toFixed(2),
            atmIV: +rnd(14,32).toFixed(2),
            days: Math.floor(rnd(3,28)),
            lot: step>=100?250:500,
            pcr: +rnd(0.6,1.8).toFixed(2),
            atm: atm,
            title: sym + ' Options Chain',
            expiries:['24 Apr','1 May','8 May'],
            dynamic:true,
            step: step,
          };
          state.scrip = sym;
        }
        searchInput.value='';
        searchClear.style.display='none';
        searchDD.classList.remove('open');
        render();
      };
    });
  }
  searchDD.classList.add('open');
};
searchClear.onclick = () => { searchInput.value=''; searchDD.classList.remove('open'); searchClear.style.display='none'; searchInput.focus(); };
searchInput.onfocus = () => { if(searchInput.value.trim()) searchDD.classList.add('open'); };

});

/* ========== URL PARAM LOADER — acts like fetching from backend ========== */
function loadFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const scripParam = params.get('scrip');
  if(!scripParam) return;
  const sym = scripParam.toUpperCase();
  if(sym==='NIFTY' || sym==='NIFTY 50'){ state.scrip='NIFTY'; return; }
  if(sym==='SENSEX'){ state.scrip='SENSEX'; return; }
  // Lookup real stock data
  const stock = STOCK_DB[sym];
  if(stock){
    const base = stock.ltp;
    const step = base>5000?100:(base>2000?50:(base>500?20:10));
    SCRIPS[sym] = {
      name: stock.name,
      ltp: stock.ltp, chg: stock.chg, chgP: stock.chgP,
      open: +(base*0.995).toFixed(2),
      high: +(base*1.015).toFixed(2),
      low:  +(base*0.985).toFixed(2),
      close:+(base*0.998).toFixed(2),
      atmIV: 22 + ((sym.charCodeAt(0)*7)%15),
      days: 6, lot: stock.lot,
      pcr: +(0.8 + ((sym.charCodeAt(1)||65)%10)/10).toFixed(2),
      atm: Math.round(base/step)*step,
      title: stock.name + ' Options Chain',
      expiries:['24 Apr','1 May','29 May'],
      dynamic: true,
      step: step,
    };
    state.scrip = sym;
    state.expiry = '24 Apr';
  } else {
    // Unknown scrip — fall back to seeded data
    state.scrip = sym;
    const rnd = (a,b)=>a+Math.random()*(b-a);
    const base = 1000 + (sym.charCodeAt(0)*37 % 3000);
    const step = base>2000?100:(base>500?50:25);
    SCRIPS[sym] = {
      name: sym, ltp:+base.toFixed(2),
      chg:+rnd(-30,30).toFixed(2), chgP:+rnd(-2,2).toFixed(2),
      open:+rnd(base*0.99,base*1.01).toFixed(2),
      high:+rnd(base*1.00,base*1.02).toFixed(2),
      low:+rnd(base*0.98,base*1.00).toFixed(2),
      close:+rnd(base*0.99,base*1.01).toFixed(2),
      atmIV:+rnd(14,32).toFixed(2), days:Math.floor(rnd(3,28)),
      lot:step>=100?250:500, pcr:+rnd(0.6,1.8).toFixed(2),
      atm:Math.round(base/step)*step,
      title: sym + ' Options Chain',
      expiries:['24 Apr','1 May','29 May'],
      dynamic:true, step:step,
    };
  }
}
