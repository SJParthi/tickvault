<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:16px;background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3;box-sizing:border-box}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:110px;padding:10px;border-radius:6px;border:1px solid #30363d;background:#161b22}
.chip{width:100%;height:28px;border-radius:4px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.5px}
.n{font-size:11px;color:#e6edf3}
.h{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8b949e}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:rgba(38,166,154,.15);color:#26a69a">UP</div><div class="n">green-tint</div><div class="h">#26a69a / 15%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(239,83,80,.15);color:#ef5350">DOWN</div><div class="n">red-tint</div><div class="h">#ef5350 / 15%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,171,0,.15);color:#ffab00">WARN</div><div class="n">yellow-tint</div><div class="h">#ffab00 / 15%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(41,98,255,.15);color:#2962ff">INFO</div><div class="n">blue-tint</div><div class="h">#2962ff / 15%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(124,77,255,.15);color:#7c4dff">DB</div><div class="n">purple-tint</div><div class="h">#7c4dff / 15%</div></div>
</div>
</body></html>
