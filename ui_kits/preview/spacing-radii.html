<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:16px;background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3;box-sizing:border-box}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.s{width:60px;height:60px;border:1px solid #30363d;background:#161b22;border-radius:0;display:flex;align-items:center;justify-content:center;color:#8b949e;font-size:10px;font-family:'JetBrains Mono',monospace}
.s.r4{border-radius:4px}.s.r6{border-radius:6px}.s.r8{border-radius:8px}
.sp{display:flex;align-items:center;gap:6px;color:#8b949e;font-size:11px;font-family:'JetBrains Mono',monospace}
.box{background:#2962ff;height:14px;border-radius:2px}
h4{font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 8px;font-weight:600}
</style></head><body>
<h4>Radii</h4>
<div class="row">
  <div class="s">0</div><div class="s r4">4</div><div class="s r6">6</div><div class="s r8">8</div>
</div>
<h4>Spacing (4-point)</h4>
<div class="row">
  <div class="sp"><div class="box" style="width:4px"></div>4</div>
  <div class="sp"><div class="box" style="width:8px"></div>8</div>
  <div class="sp"><div class="box" style="width:12px"></div>12</div>
  <div class="sp"><div class="box" style="width:16px"></div>16</div>
  <div class="sp"><div class="box" style="width:20px"></div>20</div>
  <div class="sp"><div class="box" style="width:24px"></div>24</div>
  <div class="sp"><div class="box" style="width:40px"></div>40</div>
</div>
</body></html>
