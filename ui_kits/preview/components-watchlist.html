<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:16px;background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3;box-sizing:border-box}
.row{display:flex;gap:10px;flex-wrap:wrap}
.i{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 12px;display:flex;align-items:center;gap:8px;min-width:160px}
.bar{width:3px;height:32px;border-radius:2px}
.bar.u{background:#05b878}.bar.d{background:#dd6565}
.n{font-size:12px;color:#e6edf3}
.ex{font-size:10px;color:#8b949e}
.r{margin-left:auto;text-align:right}
.p{font-size:12px;color:#e6edf3;font-family:'JetBrains Mono',monospace}
.c{font-size:10px;font-family:'JetBrains Mono',monospace}
.c.u{color:#05b878}.c.d{color:#dd6565}
</style></head><body>
<div class="row">
<div class="i"><div class="bar u"></div><div><div class="n">Reliance</div><div class="ex">NSE</div></div><div class="r"><div class="p">1,268.75</div><div class="c u">+22.15 (+1.78%)</div></div></div>
<div class="i"><div class="bar d"></div><div><div class="n">HDFC Bank</div><div class="ex">NSE</div></div><div class="r"><div class="p">1,895.20</div><div class="c d">-8.40 (-0.44%)</div></div></div>
<div class="i"><div class="bar u"></div><div><div class="n">Tata Motors</div><div class="ex">NSE</div></div><div class="r"><div class="p">652.30</div><div class="c u">+14.75 (+2.31%)</div></div></div>
</div>
</body></html>
