<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:20px;background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3;box-sizing:border-box}
.row{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;width:170px}
.t{font-size:13px;font-weight:600;margin-bottom:4px}
.d{font-size:11px;color:#8b949e}
.hover{border-color:#2962ff;background:#1c2228;transform:translateY(-2px);box-shadow:0 4px 12px rgba(41,98,255,.15)}
h4{font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:1.5px;margin:0;font-weight:600;width:100%}
</style></head><body>
<h4 style="margin-bottom:12px">Hover-only shadow · translateY(-2px) · blue border</h4>
<div class="row">
  <div class="card"><div class="t">Resting</div><div class="d">border · no shadow</div></div>
  <div class="card hover"><div class="t">Hover</div><div class="d">lift · blue · shadow</div></div>
</div>
</body></html>
