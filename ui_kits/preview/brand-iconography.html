<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:16px;background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3;box-sizing:border-box}
.row{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.box{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px}
.g{font-size:22px;color:#8b949e}
.n{font-size:10px;color:#484f58;font-family:'JetBrains Mono',monospace}
h4{font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 10px;font-weight:600;width:100%}
.emoji{font-size:20px}
</style></head><body>
<h4>Unicode glyphs (used in dashboards)</h4>
<div class="row" style="margin-bottom:14px">
  <div class="box"><span class="g">&#9881;</span><span class="n">gear</span></div>
  <div class="box"><span class="g">&#9662;</span><span class="n">chevron</span></div>
  <div class="box"><span class="g">&#128269;</span><span class="n">search</span></div>
  <div class="box"><span class="g">&#8943;</span><span class="n">ellipsis</span></div>
  <div class="box"><span class="g">&#9650;&#9660;</span><span class="n">sort</span></div>
  <div class="box"><span class="g">&larr;</span><span class="n">back</span></div>
  <div class="box"><span class="g">&rarr;</span><span class="n">forward</span></div>
</div>
<h4>Emoji section markers (portal only)</h4>
<div class="row">
  <div class="box"><span class="emoji">📊</span><span class="n">Markets</span></div>
  <div class="box"><span class="emoji">🗄️</span><span class="n">Database</span></div>
  <div class="box"><span class="emoji">🔌</span><span class="n">WebSocket</span></div>
  <div class="box"><span class="emoji">🔑</span><span class="n">Credentials</span></div>
  <div class="box"><span class="emoji">❤️</span><span class="n">Health</span></div>
</div>
</body></html>
