<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3}
.card{padding:16px;height:100%;box-sizing:border-box}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sw{width:56px;height:56px;border-radius:6px;border:1px solid #30363d;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;font-family:'JetBrains Mono',monospace;font-size:9px;color:#e6edf3;text-shadow:0 0 2px #000}
.label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.name{font-size:11px;color:#e6edf3;margin-top:4px}
.hex{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8b949e}
</style></head><body class="card">
<div class="row">
  <div><div class="sw" style="background:#0d1117">bg</div><div class="name">bg</div><div class="hex">#0d1117</div></div>
  <div><div class="sw" style="background:#161b22">card</div><div class="name">bg-card</div><div class="hex">#161b22</div></div>
  <div><div class="sw" style="background:#1c2228">hover</div><div class="name">bg-card-hover</div><div class="hex">#1c2228</div></div>
  <div><div class="sw" style="background:#30363d">border</div><div class="name">border</div><div class="hex">#30363d</div></div>
  <div><div class="sw" style="background:#000">deep</div><div class="name">bg-deep</div><div class="hex">#000000</div></div>
  <div><div class="sw" style="background:#181818">elev</div><div class="name">bg-elevated</div><div class="hex">#181818</div></div>
  <div><div class="sw" style="background:#242424">elev-2</div><div class="name">bg-elev-2</div><div class="hex">#242424</div></div>
</div>
</body></html>
