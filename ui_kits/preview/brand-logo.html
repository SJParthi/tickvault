<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:20px;background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3;box-sizing:border-box}
.row{display:flex;gap:24px;align-items:center}
.b{display:flex;flex-direction:column;align-items:center;gap:8px}
.logo{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#1e90ff,#4169e1);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px}
.av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#9370db,#6a4c93);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px}
.wm{display:flex;align-items:center;gap:10px}
.wm .t{font-size:18px;font-weight:600;color:#e6edf3}
.wm .sub{font-size:10px;color:#8b949e;font-family:'JetBrains Mono',monospace}
.lbl{font-size:10px;color:#8b949e;font-family:'JetBrains Mono',monospace}
</style></head><body>
<div class="row">
  <div class="b"><div class="logo">D</div><span class="lbl">DLT chip</span></div>
  <div class="b"><div class="av">P</div><span class="lbl">User avatar</span></div>
  <div class="b">
    <div class="wm"><div class="logo" style="width:32px;height:32px;font-size:14px">D</div><div><div class="t">tickvault</div><div class="sub">O(1) · F&amp;O · NSE</div></div></div>
    <span class="lbl">Wordmark</span>
  </div>
</div>
</body></html>
