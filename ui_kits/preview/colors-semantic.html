<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:16px;background:#0d1117;font-family:'Inter',-apple-system,sans-serif;color:#e6edf3;box-sizing:border-box}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:76px;padding:8px;border-radius:6px;border:1px solid #30363d;background:#161b22}
.chip{width:100%;height:36px;border-radius:4px;margin-bottom:6px}
.n{font-size:11px;color:#e6edf3}
.h{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8b949e}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#26a69a"></div><div class="n">green</div><div class="h">#26a69a</div></div>
  <div class="sw"><div class="chip" style="background:#05b878"></div><div class="n">green-strong</div><div class="h">#05b878</div></div>
  <div class="sw"><div class="chip" style="background:#5ca81d"></div><div class="n">green-alt</div><div class="h">#5ca81d</div></div>
  <div class="sw"><div class="chip" style="background:#ef5350"></div><div class="n">red</div><div class="h">#ef5350</div></div>
  <div class="sw"><div class="chip" style="background:#dd6565"></div><div class="n">red-soft</div><div class="h">#dd6565</div></div>
  <div class="sw"><div class="chip" style="background:#2962ff"></div><div class="n">blue</div><div class="h">#2962ff</div></div>
  <div class="sw"><div class="chip" style="background:#ffab00"></div><div class="n">yellow</div><div class="h">#ffab00</div></div>
  <div class="sw"><div class="chip" style="background:#7c4dff"></div><div class="n">purple</div><div class="h">#7c4dff</div></div>
</div>
</body></html>
