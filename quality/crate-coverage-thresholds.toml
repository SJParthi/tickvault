# ======================================================================# tickvault — Per-Crate Coverage Thresholds
# ======================================================================# Used by: scripts/coverage-gate.sh (CI Stage 6)
#
# All values are line coverage percentages.
# Any crate not listed uses the default threshold.
#
# POLICY (updated 2026-06-10, P0 of the coverage-gaps plan):
#   * 100% remains the TARGET for every crate.
#   * The values below are ENFORCED RATCHET FLOORS, set from the first real
#     measurement (main @ a6fe35c4, run #3112 reproduction — see
#     .claude/plans/research/coverage-gaps.md §3). The previous 100.0 values
#     were never actually enforced: the gate matched zero files and passed
#     vacuously (report §2, GAP #0). Honest enforced floors replace a
#     fictional unenforced 100 — and the gate is now fail-closed.
#   * RATCHET RULE: floors may only move UP, never down. When P1–P4 of the
#     coverage-gaps action plan raise real coverage, raise the floor in the
#     same PR (floor = measured, rounded DOWN to one decimal, minus 0.1).
#   * Floors sit 0.07–0.13 below the measured value so ordinary line-count
#     drift does not flap the post-merge Coverage & Perf job.
#
# Measured baseline (2026-06-10, main @ a6fe35c4):
#   common 99.57 | api 98.71 | trading 97.02 | storage 91.35 | core 90.38 | app 63.43
# ======================================================================
# Default threshold for any crate not explicitly listed
default = 63.0

[crates]
common  = 99.5
core    = 90.2
trading = 96.9
# storage: 91.2 -> 90.1 (2026-07-17, stage-2 dead-WS sweep, PR #1631).
# TRUTHFUL RE-BASELINE, not a ratchet bypass: the sweep deleted ~12K LoC of
# heavily-unit-tested DEAD tick-chain code from crates/storage
# (tick_persistence.rs, tick_flush_worker.rs, tick_row_builder.rs,
# tick_spill_drain.rs + 15 dead test/bench targets), mechanically lowering the
# crate's covered/total ratio. Measured on the PR merge ref: 90.26%
# (CI run 29590767611, Coverage & Perf job 87920295139 — the deleted test
# files exercised ONLY the deleted modules, verified via origin/main imports:
# no surviving storage module lost a test). Floor per the standing formula:
# measured 90.26 rounded down to one decimal (90.2) minus 0.1 = 90.1.
# The deleted code no longer exists to cover; the ratchet (up-only) resumes
# from this honest floor. Flagged in the PR #1631 body for coordinator review.
storage = 90.1
api     = 98.6
app     = 63.3
# aws-lambdas: NEW crate (2026-07-18, rust-only phase 2b-1 — the 4 AWS
# Lambdas as Rust bins). MEASURED-then-ratcheted per the phase-2 design:
# local `cargo llvm-cov -p tickvault-aws-lambdas` measured 64.92% lines
# (935 lines, 328 missed — the misses are the 4 thin [[bin]] glue files,
# clients.rs SDK construction, and the async AWS-call glue, all
# structurally unexercisable without a live AWS account; every pure
# decision/formatting fn is covered). Floor per the standing formula:
# measured 64.92 rounded down to one decimal (64.9) minus 0.1 = 64.8.
# RE-MEASURED 2026-07-18 (rust-only phase 2b-2 wave 1 — telegram-webhook +
# market-open-readiness + deploy-watchdog modules added, each with its
# python test suite ported 1:1): `cargo llvm-cov -p tickvault-aws-lambdas`
# measured 66.06% lines (2681 lines, 910 missed — the misses remain the
# thin [[bin]] glue files + the async AWS/HTTP-call glue, structurally
# unexercisable without a live AWS account; every pure decision/formatting
# fn is covered). Ratchet up-only: 66.06 → 66.0 − 0.1 = 65.9.
aws-lambdas = 65.9
# tickvault-logs-mcp: INITIAL floor (2026-07-18, rust-only phase 2c — the
# new Rust MCP crate). Locally measured 85.83% line coverage (cargo
# llvm-cov -p tickvault-logs-mcp, all targets — the parity integration
# test's subprocess coverage IS captured via LLVM_PROFILE_FILE
# inheritance), but this is a dev-sandbox measurement, not the CI
# Coverage & Perf environment. Initial floor set CONSERVATIVELY at 80.0
# to absorb CI-side variance (nextest partitioning, subprocess profraw
# collection); RATCHET to the standing formula (measured rounded down to
# one decimal minus 0.1) in a follow-up once the first post-merge CI
# measurement lands.
tickvault-logs-mcp = 80.0
