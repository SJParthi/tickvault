# =============================================================================
# tickvault — Per-Crate Coverage Thresholds
# =============================================================================
# Used by: scripts/coverage-gate.sh (CI Stage 6)
#
# All values are line coverage percentages.
# Any crate not listed uses the default threshold.
#
# POLICY: 100% minimum coverage for ALL crates. No exceptions.
# Mechanical enforcement: CI blocks merge if any crate falls below threshold.
# =============================================================================

# Default threshold for any crate not explicitly listed
default = 100.0

[crates]
common  = 100.0
core    = 100.0
trading = 100.0
storage = 100.0
api     = 100.0
app     = 100.0
