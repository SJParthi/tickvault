  - name: data-814-invalid-request-escalate
    match:
      code: DATA-814
    action: escalate
    runbook_path: .claude/rules/dhan/api-introduction.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DATA-814 = request schema invalid. Source-level regression —
