  - name: dh-909-network-error-silence
    match:
      code: DH-909
    action: silence
    runbook_path: .claude/rules/dhan/api-introduction.md
    confidence: 1.0
    cooldown_secs: 600
    justification: >-
      DH-909 = network error. Retry with backoff handles it. Silence
