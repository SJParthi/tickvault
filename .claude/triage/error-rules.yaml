  - name: data-806-not-subscribed-escalate
    match:
      code: DATA-806
    action: escalate
    runbook_path: .claude/rules/dhan/api-introduction.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DATA-806 = account not subscribed to Data API product. Operator
