  # ── D2b: runtime Dhan-lane cold-start FSM (2026-06-26) ──────────────────
  # DHAN-LANE-01/02/03 = a runtime Dhan-lane cold-start (a boot-OFF Dhan feed
  # enabled at runtime) failed at the universe-build / ws-pool-spawn / auth-gate
  # stage. The FSM returns to Off (no half-running lane) and a bounded backoff
  # retry re-attempts automatically — but the operator MUST know the lane did
  # not come up (the cause is usually upstream: Dhan CSV / niftyindices source,
  # TLS/DNS, token/static-IP). Escalate; the retry self-heals if the upstream
  # recovers. NOT auto-fixable from the app (no in-app fix for an upstream
