# Zero-Touch Error Triage Rules — Phase 6 of active-plan.md
#
# The triage hook (`.claude/hooks/error-triage.sh`) reads this file on every
# run, walks the current `data/logs/errors.summary.md`, and for each
# signature chooses ONE of:
#
#   action: silence       -> noop, mark as seen (expected recurring noise)
#   action: auto_restart  -> run scripts/auto-fix-restart-*.sh (dry-run first)
#   action: auto_fix      -> run scripts/auto-fix-<name>.sh (dry-run first)
#   action: escalate      -> Telegram + open draft GitHub Issue
#
# Conservative defaults:
# - Unknown signature -> escalate (always ask the operator first)
# - severity=critical  -> escalate (never auto-action, per ErrorCode
#                         `is_auto_triage_safe`)
# - confidence < 0.95  -> escalate (never auto-action low-confidence rules)
#
# Schema contract:
#
#   rules:
#     - name:                 <stable identifier, unique, kebab-case>
#       match:
#         code:               <ErrorCode::X.code_str() — exact match>
#         message_contains:   <optional substring filter>
#         target_contains:    <optional substring filter>
#       action:               silence | auto_restart | auto_fix | escalate
#       auto_fix_script:      <path relative to repo root, required for
#                              auto_fix / auto_restart>
#       runbook_path:         <.claude/rules/...md — for operator context>
#       confidence:           0.0..=1.0 (default 1.0)
#       cooldown_secs:        <min seconds between triggers, default 3600>
#       justification:        <one-line human-readable why>
#
# Adding new rules is the primary growth path. Every addition MUST be
# accompanied by:
#   1. A sample event in the signature-hash regression test
#      (crates/core/src/notification/summary_writer.rs tests)
#   2. The auto-fix script actually existing under scripts/
#   3. A runbook path that the cross-ref tests can resolve
#
# Current rule count: 6 seeds. The YAML parser is deliberately strict —
# unknown fields fail the hook rather than silently ignoring a typo.

version: 1
rules:

  # -----------------------------------------------------------------------
  # Expected recurring noise — silence, track, never Telegram
  # -----------------------------------------------------------------------

  - name: i-p1-11-cross-segment-collision-expected
    match:
      code: I-P1-11
    action: silence
    runbook_path: .claude/rules/project/security-id-uniqueness.md
    confidence: 1.0
    cooldown_secs: 86400
    justification: >-
      Dhan's CSV reuses security_id across segments (NIFTY id=13 IDX_I +
      some NSE_EQ id=13). The composite index in InstrumentRegistry
      handles this correctly; the ERROR log is visibility-only. Silence
      after the first-seen per day, don't Telegram.

  # -----------------------------------------------------------------------
  # Rate-limit backoff — auto-handled by DH-904 backoff logic
  # -----------------------------------------------------------------------

  - name: dh-904-rate-limit-during-backoff
    match:
      code: DH-904
    action: silence
    runbook_path: .claude/rules/dhan/api-introduction.md
    confidence: 1.0
    cooldown_secs: 600
    justification: >-
      DH-904 triggers the 10s->20s->40s->80s exponential backoff in
      api_client.rs. The backoff is working as intended; we only escalate
      if the same signature fires >5x in 60s (approximated via cooldown).

  # -----------------------------------------------------------------------
  # Depth spot stale — auto-restart the rebalancer (market-hours only)
  # -----------------------------------------------------------------------

  - name: depth-spot-stale-auto-restart
    match:
      code: I-P1-11       # placeholder until DepthSpotStale code exists
      message_contains: "Depth spot price STALE"
    action: auto_restart
    auto_fix_script: scripts/auto-fix-restart-depth.sh
    runbook_path: .claude/rules/project/depth-subscription.md
    confidence: 0.90
    cooldown_secs: 1800
    justification: >-
      Depth rebalancer occasionally stalls when the main feed misses a
      heartbeat. Restarting the rebalancer subscription is idempotent
      and resolves the stall 90% of the time. Still escalates if the
      stall recurs within the cooldown window.

  # -----------------------------------------------------------------------
  # Instrument rebuild — auto-fix on SecurityId-invalid data API error
  # -----------------------------------------------------------------------

  - name: data-813-invalid-security-id-rebuild
    match:
      code: DATA-813
    action: auto_fix
    auto_fix_script: scripts/auto-fix-refresh-instruments.sh
    runbook_path: .claude/rules/dhan/instrument-master.md
    confidence: 0.85
    cooldown_secs: 3600
    justification: >-
      DATA-813 (invalid SecurityId) most often means our instrument
      master is stale. Re-downloading the daily CSV and rebuilding the
      universe fixes this; the existing idempotent POST /api/instruments/
      rebuild endpoint is safe to call. 0.85 confidence — below our
      auto-action threshold of 0.95, so by the global policy this
      escalates instead of auto-running. Kept here as a documented
      upgrade path when the confidence rises.

  # -----------------------------------------------------------------------
  # Disk spill stuck — try an explicit drain via the clear-spill helper
  # -----------------------------------------------------------------------

  - name: tick-spill-stuck-clear
    match:
      code: STORAGE-GAP-01
      message_contains: "spill file preserved for next recovery"
    action: auto_restart
    auto_fix_script: scripts/auto-fix-clear-spill.sh
    runbook_path: .claude/rules/project/observability-architecture.md
    confidence: 0.85
    cooldown_secs: 3600
    justification: >-
      When QuestDB was down and spilled ticks did not drain on the
      next attempt, the files sit on disk until a new tick arrives.
      This triggers an explicit drain via the clear-spill helper.
      0.85 confidence so it currently escalates instead of auto-
      executing until the /api/spill/drain endpoint lands.

  # -----------------------------------------------------------------------
  # Critical auth failures — NEVER auto-action
  # -----------------------------------------------------------------------

  - name: dh-901-invalid-auth-escalate
    match:
      code: DH-901
    action: escalate
    runbook_path: .claude/rules/dhan/authentication.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DH-901 means our token was rejected. The system already tries a
      single rotation; if that fails, the app halts. Triage MUST escalate
      to operator — no auto-action is safe here.

  # -----------------------------------------------------------------------
  # OMS circuit breaker open — escalate to operator immediately
  # -----------------------------------------------------------------------

  - name: oms-gap-03-circuit-open-escalate
    match:
      code: OMS-GAP-03
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      Circuit breaker opened means 3 consecutive order failures. Never
      auto-reset — the operator must diagnose whether the underlying
      issue is authentication, rate limiting, or a bad order payload.

  # =======================================================================
  # MILESTONE 2 — full ErrorCode coverage (48 new rules, total 54 codes)
  #
  # See .claude/plans/autonomous-operations-100pct.md for scope + safety.
  # Conservative defaults: unknown/Critical/<0.95-confidence -> escalate.
  # Only 6 codes have auto_* actions today (tied to 3 existing scripts);
  # everything else is silence (internal handler fixes it) or escalate
  # (operator review). M3 adds auto_fix scripts and upgrades these rules.
  # =======================================================================

  # -----------------------------------------------------------------------
  # Critical — auth / account / global connection cap. Never auto-action.
  # -----------------------------------------------------------------------

  - name: dh-902-no-api-access-escalate
    match:
      code: DH-902
    action: escalate
    runbook_path: .claude/rules/dhan/api-introduction.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DH-902 = account has no API access. Requires operator to check
      subscription status with Dhan support. Never auto-retry.

  - name: dh-903-account-issue-escalate
    match:
      code: DH-903
    action: escalate
    runbook_path: .claude/rules/dhan/api-introduction.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DH-903 = account-level issue (margin blocked, compliance hold, etc).
      HALT + alert operator. Never auto-act.

  - name: data-805-too-many-connections-escalate
    match:
      code: DATA-805
    action: escalate
    runbook_path: .claude/rules/dhan/live-market-feed.md
    confidence: 1.0
    cooldown_secs: 60
    justification: >-
      DATA-805 means >5 WebSocket connections. The in-app handler pauses
      ALL connections for 60s and then audits before reconnecting one at a
      time. If the signature still fires post-recovery, it is a real leak
      requiring operator diagnosis.

  - name: data-808-auth-failed-escalate
    match:
      code: DATA-808
    action: escalate
    runbook_path: .claude/rules/dhan/authentication.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DATA-808 = Data API authentication failed. Token is present but
      rejected. Operator must check client_id + token validity.

  - name: data-809-token-invalid-escalate
    match:
      code: DATA-809
    action: escalate
    runbook_path: .claude/rules/dhan/authentication.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DATA-809 = access token invalid. App already attempts single
      rotation; further failure requires manual token regeneration.

  - name: data-810-client-id-invalid-escalate
    match:
      code: DATA-810
    action: escalate
    runbook_path: .claude/rules/dhan/authentication.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DATA-810 = client_id invalid. Never recoverable automatically —
      requires operator to re-check SSM config and Dhan dashboard.

  - name: auth-gap-01-token-expiry-escalate
    match:
      code: AUTH-GAP-01
    action: escalate
    runbook_path: .claude/rules/dhan/authentication.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      Token expiry pipeline failed to refresh in the 23h window. The
      app halts at end-of-token-life — operator must rotate manually.

  - name: auth-gap-02-disconnect-token-map-escalate
    match:
      code: AUTH-GAP-02
    action: escalate
    runbook_path: .claude/rules/dhan/authentication.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      AUTH-GAP-02 = wrong disconnect-code is triggering token refresh,
      or a 807 disconnect is not triggering refresh. Logic regression —
      operator must review ws_disconnect_codes test suite.

  - name: oms-gap-06-dry-run-safety-escalate
    match:
      code: OMS-GAP-06
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      OMS-GAP-06 = dry_run safety gate breached: an order was submitted
      to Dhan when dry_run=true. HALT trading immediately + operator
      review. Never auto-action, never silence.

  - name: i-p0-06-emergency-download-escalate
    match:
      code: I-P0-06
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      I-P0-06 = all instrument caches missing AND live download failed.
      Trading cannot start without instruments — CRITICAL escalation.

  # -----------------------------------------------------------------------
  # High — order / risk / rate-limit / regulatory
  # -----------------------------------------------------------------------

  - name: dh-905-input-exception-escalate
    match:
      code: DH-905
    action: escalate
    runbook_path: .claude/rules/dhan/api-introduction.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DH-905 = Dhan rejected the request as invalid. NEVER retry —
      retrying a malformed request wastes rate-limit budget. Operator
      must fix the request payload.

  - name: dh-906-order-error-escalate
    match:
      code: DH-906
    action: escalate
    runbook_path: .claude/rules/dhan/orders.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DH-906 = order rejected by Dhan. Reasons include insufficient
      margin, wrong product type, stale SecurityId, market-closed. Never
      auto-retry — operator reviews.

  - name: oms-gap-01-state-machine-escalate
    match:
      code: OMS-GAP-01
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      OMS-GAP-01 = invalid state transition attempted (e.g. Traded ->
      Pending). State machine corruption — HALT + operator review.

  - name: oms-gap-02-reconciliation-escalate
    match:
      code: OMS-GAP-02
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      OMS-GAP-02 = status mismatch between OMS state and Dhan order book.
      Ghost order or wrong-status drift — operator diagnoses before any
      further order placement.

  - name: oms-gap-04-rate-limit-silence
    match:
      code: OMS-GAP-04
    action: silence
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 600
    justification: >-
      OMS-GAP-04 rate-limit rejections are handled by the GCRA burst
      algorithm — the next request naturally waits its slot. Silence
      keeps Telegram clean; if burst exhaustion lasts > cooldown the
      signature re-fires and escalates.

  - name: oms-gap-05-idempotency-escalate
    match:
      code: OMS-GAP-05
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      OMS-GAP-05 = correlation-id collision or UUID non-uniqueness.
      Duplicate order risk — operator stops trading, investigates.

  - name: risk-gap-01-pretrade-escalate
    match:
      code: RISK-GAP-01
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      RISK-GAP-01 = pre-trade risk check rejected an order (halt /
      daily-loss / position-limit). The rejection itself is safe; the
      LOG escalation surfaces when auto-halt fires so operator knows.

  - name: risk-gap-02-position-pnl-escalate
    match:
      code: RISK-GAP-02
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      RISK-GAP-02 = fill recording / P&L tracking invariant violated.
      Never silence — operator must reconcile positions manually.

  - name: i-p0-03-expiry-at-gate-4-escalate
    match:
      code: I-P0-03
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      I-P0-03 = attempted to submit order for an expired contract.
      Universe is stale — operator forces instrument rebuild before
      resuming trading.

  - name: data-807-token-expired-auto-fix
    match:
      code: DATA-807
    action: auto_fix
    auto_fix_script: scripts/auto-fix-rotate-token.sh
    runbook_path: .claude/rules/dhan/authentication.md
    confidence: 0.85
    cooldown_secs: 60
    justification: >-
      DATA-807 triggers the token-refresh pipeline automatically via
      AUTH-GAP-02. If we still see a 807 event surfaced to the triage
      log, the refresh failed. auto-fix-rotate-token.sh (M3) is
      scaffolded; backing /api/auth/rotate endpoint pending (M3.5).
      Confidence 0.85 keeps below the 0.95 auto-action threshold so the
      rule currently escalates, but documents the upgrade path.

  # -----------------------------------------------------------------------
  # Medium — data pipeline correctness
  # -----------------------------------------------------------------------

  - name: i-p0-01-duplicate-security-id-escalate
    match:
      code: I-P0-01
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      I-P0-01 = duplicate security_id in CSV universe. Data-quality
      issue from Dhan — operator diagnoses whether to hotfix the
      universe filter or file a support ticket.

  - name: i-p0-02-count-consistency-escalate
    match:
      code: I-P0-02
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      I-P0-02 = post-build derivative count below minimum threshold.
      CSV truncation or parser regression — operator checks before
      allowing trading to proceed with sparse universe.

  - name: i-p0-04-cache-persistence-escalate
    match:
      code: I-P0-04
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      I-P0-04 = instrument cache dir is on tmpfs or otherwise
      non-persistent. Cold-boot risk — operator fixes mount before
      trusting cached universe.

  - name: i-p0-05-s3-backup-silence
    match:
      code: I-P0-05
    action: silence
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 86400
    justification: >-
      I-P0-05 fires when S3 backup config is missing. Pre-AWS-provision
      this is expected. Silence daily — re-enable via operator when the
      S3 bucket is live.

  - name: i-p1-03-security-id-reuse-escalate
    match:
      code: I-P1-03
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 3600
    justification: >-
      I-P1-03 = Dhan reassigned a security_id (expired contract id
      reused for a new contract). Operator reviews delta_detector output
      before accepting the rebuild.

  - name: i-p1-05-compound-dedup-key-escalate
    match:
      code: I-P1-05
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      I-P1-05 = DEDUP_KEY_DERIVATIVE_CONTRACTS missing underlying_symbol.
      Source-level regression — operator reverts or fixes the constant.

  - name: i-p1-06-segment-in-tick-dedup-escalate
    match:
      code: I-P1-06
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      I-P1-06 = DEDUP_KEY_TICKS missing exchange_segment. Cross-segment
      collision risk — operator fixes constant and re-verifies meta-guard.

  - name: i-p1-08-single-row-lifecycle-silence
    match:
      code: I-P1-08
    action: silence
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 86400
    justification: >-
      I-P1-08 lifecycle events (active -> expired flips) are expected
      daily after CSV rebuild. Silence daily; escalate only on
      count-anomalies surfaced by I-P0-02.

  - name: gap-net-01-ip-monitor-escalate
    match:
      code: GAP-NET-01
    action: escalate
    runbook_path: .claude/rules/dhan/authentication.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      GAP-NET-01 = app's detected public IP drifted from registered
      Dhan static IP. Orders will be rejected from April 1, 2026.
      Operator must setIP via the Dhan portal (7-day cooldown).

  - name: gap-sec-01-api-auth-escalate
    match:
      code: GAP-SEC-01
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 60
    justification: >-
      GAP-SEC-01 = tickvault API auth middleware rejected a request.
      Expected at low volume (health probes); escalate if the same IP
      hammers it, indicating token leak or scanner.

  - name: ws-gap-01-disconnect-classification-silence
    match:
      code: WS-GAP-01
    action: silence
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 300
    justification: >-
      WS-GAP-01 surfaces reconnectable disconnect codes (800, 807,
      Unknown). The WebSocket auto-reconnects. Silence — if reconnect
      stalls, RISK-GAP-03 (tick gap) fires as the consequence and
      escalates via its own rule.

  - name: ws-gap-02-subscription-batching-escalate
    match:
      code: WS-GAP-02
    action: escalate
    runbook_path: .claude/rules/dhan/live-market-feed.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      WS-GAP-02 = subscription batch size violated (>100 per message or
      numeric SecurityId). Source-level regression — operator fixes
      subscription_builder.rs.

  - name: ws-gap-03-connection-state-escalate
    match:
      code: WS-GAP-03
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      WS-GAP-03 = connection state machine invariant violated. Operator
      reviews ws_connection_state test suite.

  - name: risk-gap-03-tick-gap-escalate
    match:
      code: RISK-GAP-03
    action: escalate
    runbook_path: .claude/rules/project/live-market-feed-subscription.md
    confidence: 1.0
    cooldown_secs: 900
    justification: >-
      RISK-GAP-03 = tick gap exceeded warn/error threshold. Outside
      market hours this is expected (no ticks flowing). Inside market
      hours it indicates a stall — escalate with 15min cooldown.

  - name: storage-gap-02-f32-f64-precision-escalate
    match:
      code: STORAGE-GAP-02
    action: escalate
    runbook_path: .claude/rules/project/gap-enforcement.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      STORAGE-GAP-02 = IEEE 754 widening artifact slipped through
      f32_to_f64_clean(). Source-level regression — operator reviews.

  - name: dh-907-data-error-escalate
    match:
      code: DH-907
    action: escalate
    runbook_path: .claude/rules/dhan/api-introduction.md
    confidence: 1.0
    cooldown_secs: 0
    justification: >-
      DH-907 = Dhan data API rejected request params. Do not retry
