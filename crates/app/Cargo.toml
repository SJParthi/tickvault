[package]
name = "tickvault-app"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "tickvault_app"
path = "src/lib.rs"

[[bin]]
name = "tickvault"
path = "src/main.rs"

[dependencies]
tickvault-common = { path = "../common" }
tickvault-core = { path = "../core" }
tickvault-trading = { path = "../trading" }
tickvault-storage = { path = "../storage" }
tickvault-api = { path = "../api" }
tokio = { workspace = true }
governor = { workspace = true }
axum = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-opentelemetry = { workspace = true }
tracing-appender = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
opentelemetry-otlp = { workspace = true }
metrics = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
figment = { workspace = true }
clap = { workspace = true }
secrecy = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
arc-swap = { workspace = true }
bytes = { workspace = true }
signal-hook = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
rustls = { workspace = true }
reqwest = { workspace = true }
core_affinity = { workspace = true }
# Only the feature-gated daily-universe boot orchestrator hashes the CSV
# (source_csv_sha256 provenance); optional so the default build stays lean.
sha2 = { workspace = true, optional = true }

[features]
# Sub-PR #10b-ζ-2 of the 2026-05-27 daily-universe expansion: forwards
# the daily_universe_fetcher gate to core (the INSTR-FETCH runner) and
# storage (the instrument_fetch_audit writer) so the app-side audit-write
# seam compiles against both. Dormant by default per rule §21 — the boot
# callsite + feature flip land in the final Sub-PR #10 boot orchestrator.
daily_universe_fetcher = [
    "dep:sha2",
    "tickvault-core/daily_universe_fetcher",
    "tickvault-storage/daily_universe_fetcher",
]

[package.metadata.cargo-machete]
ignored = ["chrono-tz", "clap", "signal-hook"]
