[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tickvault-trading = { path = "../trading" }

[package.metadata.cargo-machete]
ignored = ["anyhow", "chrono", "tickvault-storage", "thiserror", "tower"]
