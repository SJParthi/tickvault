    <meta charset="UTF-8">

    <style>
        :root {
            --bg-body: #0e0e0e;
            --bg-nav: rgba(18,18,18,0.62);
            --bg-sidebar: #111111;
            --bg-main: #0e0e0e;
            --bg-ticker: #111111;
            --bg-subtab: #181818;
            --bg-table-header: #131313;
            --bg-row-hover: rgba(255,255,255,0.03);
            --bg-search: #1a1a1a;
            --bg-watchlist-item-hover: #1a1a1a;
            --border-nav: #242424;
            --border-subtle: #1c1c1c;
            --border-sidebar: #1c1c1c;
            --text-primary: #DADADA;
            --text-secondary: #8E8E8E;
            --text-dim: #5a5a5a;
            --text-nav: #8E8E8E;
            --text-nav-active: #DADADA;
            --green: #21C55E;
            --green-dim: rgba(33,197,94,0.12);
            --red: #EF4444;
            --red-dim: rgba(239,68,68,0.12);
            --accent-green: #21C55E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.4;
            overflow: hidden;
            height: 100vh;
        }

        /* ===== MAIN NAV BAR (60px) ===== */
        .main-nav {
            height: 60px;
            background: var(--bg-nav);
            border-bottom: 0.5px solid var(--border-nav);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 0;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-center a {
            color: var(--text-nav);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            transition: color 0.15s;
        }

        .nav-center a:hover {
            color: var(--text-nav-active);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-right a {
            color: var(--text-nav);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.15s;
        }

        .nav-right a:hover {
            color: var(--text-nav-active);
        }

        .nav-right a.active {
            color: var(--accent-green);
        }

        .nav-market-status {
            font-size: 12px;
            color: var(--text-dim);
            padding: 4px 10px;
            border: 1px solid var(--border-nav);
            border-radius: 4px;
        }

        .nav-profile {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* ===== INDEX TICKER BAR (40px) ===== */
        .ticker-bar {
            height: 40px;
            background: var(--bg-ticker);
            border-bottom: 0.5px solid var(--border-nav);
            display: flex;
            align-items: center;
            padding: 0 16px;
            overflow-x: auto;
            gap: 0;
            white-space: nowrap;
        }

        .ticker-bar::-webkit-scrollbar { height: 0; }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            border-right: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .ticker-item:last-child { border-right: none; }

        .ticker-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .ticker-price {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .ticker-change {
            font-size: 11px;
            font-weight: 500;
        }

        .ticker-change.up { color: var(--green); }
        .ticker-change.down { color: var(--red); }

        /* ===== LAYOUT: SIDEBAR + MAIN ===== */
        .layout {
            display: flex;
            height: calc(100vh - 100px);
        }

        /* ===== SIDEBAR (348px) ===== */
        .sidebar {
            width: 348px;
            min-width: 348px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-sidebar);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-search {
            padding: 12px;
        }

        .sidebar-search input {
            width: 100%;
            background: var(--bg-search);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 8px 12px 8px 34px;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .sidebar-search input::placeholder {
            color: var(--text-dim);
        }

        .sidebar-search input:focus {
            border-color: #333;
        }

        .sidebar-search-wrap {
            position: relative;
        }

        .sidebar-search-wrap .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 12px;
        }

        .sidebar-tab {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .sidebar-tab:hover { color: var(--text-secondary); }
        .sidebar-tab.active { color: var(--text-primary); border-bottom-color: var(--accent-green); }

        .watchlist {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .watchlist::-webkit-scrollbar { width: 4px; }
        .watchlist::-webkit-scrollbar-track { background: transparent; }
        .watchlist::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

        .watchlist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .watchlist-item:hover { background: var(--bg-watchlist-item-hover); }

        .wl-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .wl-symbol {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .wl-exchange {
            font-size: 11px;
            color: var(--text-dim);
        }

        .wl-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .wl-price {
            font-size: 13px;
            font-weight: 600;
        }

        .wl-change {
            font-size: 11px;
            font-weight: 500;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-subtle);
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Sub-tabs bar */
        .sub-tabs {
            height: 40px;
            background: var(--bg-subtab);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .sub-tab {
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            text-decoration: none;
        }

        .sub-tab:hover { color: var(--text-primary); }

        .sub-tab.active {
            color: var(--accent-green);
            border-bottom-color: var(--accent-green);
        }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            gap: 4px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .filter-tab {
            padding: 5px 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }

        .filter-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }

        .filter-tab.active {
            color: var(--text-primary);
            background: rgba(255,255,255,0.08);
        }

        /* Table area */
        .table-area {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .table-area::-webkit-scrollbar { width: 6px; }
        .table-area::-webkit-scrollbar-track { background: transparent; }
        .table-area::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

        .index-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

        .index-table thead { position: sticky; top: 0; z-index: 10; }

        .index-table th {
            height: 42px;
            background: var(--bg-table-header);
            padding: 0 16px;
            text-align: right;
            font-size: 12px;
            font-weight: 300;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border-subtle);
            white-space: nowrap;
        }

        .index-table th:first-child {
            text-align: left;
            padding-left: 20px;
        }

        .index-table td {
            padding: 12px 16px;
            text-align: right;
            font-size: 14px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
            white-space: nowrap;
        }

        .index-table td:first-child {
            text-align: left;
            padding-left: 20px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .index-table tbody tr {
            transition: background 0.1s;
        }

        .index-table tbody tr:hover {
            background: var(--bg-row-hover);
        }

        /* Color classes */
        .text-green { color: var(--green); }
        .text-red { color: var(--red); }

        .loading-msg {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
            font-size: 13px;
        }
    </style>
</head>

/* ===== XSS PREVENTION ===== */
function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* ===== NUMBER FORMATTING (Indian system) ===== */
function fmtNum(v, d) {
    if (v == null || !isFinite(v)) return '--';
    d = (d !== undefined) ? d : 2;
    return Number(v).toLocaleString('en-IN', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function fmtSign(v, d) {
    if (v == null || !isFinite(v)) return '--';
    d = (d !== undefined) ? d : 2;
    var prefix = v > 0 ? '+' : '';
    return prefix + Number(v).toLocaleString('en-IN', { minimumFractionDigits: d, maximumFractionDigits: d });
}

/* ===== RENDER TICKER BAR ===== */
function renderTickerBar(indices) {
    var bar = document.getElementById('tickerBar');
    var html = '';
    indices.forEach(function(idx) {
        var isUp = idx.change >= 0;
        var cls = isUp ? 'up' : 'down';
        var arrow = isUp ? '&#9650;' : '&#9660;';
        html += '<div class="ticker-item">';
        html += '<span class="ticker-name">' + esc(idx.name) + '</span>';
        html += '<span class="ticker-price">' + fmtNum(idx.ltp) + '</span>';
        html += '<span class="ticker-change ' + cls + '">' + arrow + ' ' + fmtSign(idx.change) + ' (' + fmtSign(idx.change_pct) + '%)</span>';
        html += '</div>';
    });
    bar.innerHTML = html || '<div class="ticker-item"><span class="ticker-name">No data</span></div>';
}

/* ===== RENDER WATCHLIST ===== */
function renderWatchlist() {
    var wl = document.getElementById('watchlist');
    var html = '';
    watchlistItems.forEach(function(item) {
        var isUp = item.change >= 0;
        var priceColor = isUp ? 'text-green' : 'text-red';
        html += '<div class="watchlist-item">';
        html += '<div class="wl-left">';
        html += '<span class="wl-symbol">' + esc(item.symbol) + '</span>';
        html += '<span class="wl-exchange">' + esc(item.exchange) + '</span>';
        html += '</div>';
        html += '<div class="wl-right">';
        html += '<span class="wl-price ' + priceColor + '">' + fmtNum(item.price) + '</span>';
        html += '<span class="wl-change ' + priceColor + '">' + fmtSign(item.change) + ' (' + fmtSign(item.change_pct) + '%)</span>';
        html += '</div>';
        html += '</div>';
    });
    wl.innerHTML = html;
}

/* ===== RENDER INDEX TABLE ===== */
function renderIndexTable(data) {
    var body = document.getElementById('indexBody');
    if (!data || data.length === 0) {
        body.innerHTML = '<tr><td colspan="7" class="loading-msg">No index data available</td></tr>';
        return;
    }
    var html = '';
    data.forEach(function(idx) {
        var isUp = idx.change >= 0;
        var chgColor = isUp ? 'text-green' : 'text-red';
        var chgText = fmtSign(idx.change) + ' (' + fmtSign(idx.change_pct) + '%)';

        html += '<tr>';
        html += '<td>' + esc(idx.name) + '</td>';
        html += '<td>' + fmtNum(idx.ltp) + '</td>';
        html += '<td class="' + chgColor + '">' + chgText + '</td>';
        html += '<td>' + fmtNum(idx.open) + '</td>';
        html += '<td>' + fmtNum(idx.high) + '</td>';
        html += '<td>' + fmtNum(idx.low) + '</td>';
        html += '<td>' + fmtNum(idx.prev_close) + '</td>';
        html += '</tr>';
    });
    body.innerHTML = html;
}

/* ===== FILTER SWITCHING ===== */
function switchFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-filter') === filter);
    });
    loadData();
}

/* ===== DATA FETCHING ===== */
function loadData() {
    /* Try API first, fall back to hardcoded data */
    fetch('/api/market/indices')
        .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(function(d) {
            if (d && d.available && d.indices && d.indices.length > 0) {
                /* Use API data for ticker bar */
                var majorNames = ['NIFTY 50', 'SENSEX', 'NIFTY BANK', 'NIFTY IT', 'NIFTY FIN SERVICE', 'INDIA VIX'];
                var tickerData = [];
                d.indices.forEach(function(idx) {
                    var upperName = (idx.name || '').toUpperCase();
                    for (var i = 0; i < majorNames.length; i++) {
                        if (upperName.indexOf(majorNames[i]) >= 0 || majorNames[i].indexOf(upperName) >= 0) {
                            tickerData.push(idx);
                            break;
                        }
                    }
                });
                if (tickerData.length > 0) {
                    renderTickerBar(tickerData);
                }

                /* Render table with API data (filter ignored since API returns all) */
                renderIndexTable(d.indices);
            } else {
                useFallback();
            }
        })
        .catch(function() {
            useFallback();
        });
}

function useFallback() {
    var data = fallbackData[currentFilter] || fallbackData.global;
    renderTickerBar(tickerIndices);
    renderIndexTable(data);
}

/* ===== SIDEBAR SEARCH ===== */
function setupSearch() {
    var input = document.getElementById('sidebarSearch');
    input.addEventListener('input', function() {
        var query = input.value.toLowerCase();
        var items = document.querySelectorAll('.watchlist-item');
        items.forEach(function(item) {
            var symbol = item.querySelector('.wl-symbol').textContent.toLowerCase();
            item.style.display = symbol.indexOf(query) >= 0 ? '' : 'none';
        });
    });
}

/* ===== SIDEBAR TAB SWITCHING ===== */
function setupSidebarTabs() {
    document.querySelectorAll('.sidebar-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.sidebar-tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
        });
    });
}

/* ===== INIT ===== */
renderWatchlist();
renderTickerBar(tickerIndices);
setupSearch();
setupSidebarTabs();
loadData();

/* Auto-refresh every 5 seconds */
refreshTimer = setInterval(loadData, 5000);
</script>
</body>
</html>
