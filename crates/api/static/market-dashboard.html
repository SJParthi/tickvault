<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLT Market Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #8E8E8E;
            font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            line-height: 20px;
            overflow: hidden;
        }

        /* ============ TOP NAV ============ */
        .top-nav {
            display: flex;
            align-items: center;
            background-color: rgba(18, 18, 18, 0.62);
            border-bottom: 1px solid #242424;
            padding: 0 20px;
            gap: 20px;
            height: 60px;
        }

        .logo {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e90ff, #4169e1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .search-bar {
            background-color: #242424;
            border: 1px solid #242424;
            border-radius: 4px;
            padding: 8px 12px;
            color: #8E8E8E;
            width: 220px;
            font-size: 13px;
        }

        .search-bar::placeholder {
            color: #8E8E8E;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            margin-left: 10px;
        }

        .nav-links a {
            color: #8E8E8E;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #DADADA;
        }

        .nav-links a.active-nav {
            color: #05B878;
        }

        .right-nav {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #8E8E8E;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #05B878;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .icon-button {
            background: none;
            border: none;
            color: #8E8E8E;
            cursor: pointer;
            font-size: 18px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9370db, #6a4c93);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        /* ============ INDEX TICKER BAR ============ */
        .index-ticker {
            display: flex;
            background-color: #181818;
            border-bottom: 1px solid #242424;
            padding: 8px 20px;
            gap: 40px;
            overflow-x: auto;
            font-size: 12px;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: max-content;
        }

        .ticker-name {
            color: #8E8E8E;
            font-size: 12px;
        }

        .ticker-value {
            color: #DADADA;
            font-size: 12px;
        }

        .ticker-change {
            font-size: 12px;
        }

        .ticker-change.up { color: #05B878; }
        .ticker-change.down { color: #DD6565; }

        /* ============ MAIN CONTAINER ============ */
        .main-container {
            display: flex;
            height: calc(100vh - 60px - 40px);
        }

        /* ============ LEFT SIDEBAR (WATCHLIST) ============ */
        .sidebar {
            width: 348px;
            min-width: 280px;
            background-color: #000000;
            border-right: 1px solid #242424;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid #242424;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header-title {
            font-size: 13px;
            color: #8E8E8E;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-actions {
            display: flex;
            gap: 8px;
        }

        .sidebar-action-btn {
            background: none;
            border: none;
            color: #8E8E8E;
            cursor: pointer;
            font-size: 14px;
        }

        .sidebar-search {
            padding: 8px 12px;
            border-bottom: 1px solid #242424;
        }

        .sidebar-search input {
            width: 100%;
            background-color: #181818;
            border: 1px solid #242424;
            border-radius: 4px;
            padding: 6px 10px;
            color: #DADADA;
            font-size: 12px;
        }

        .sidebar-search input::placeholder {
            color: #8E8E8E;
        }

        .sidebar-items {
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 8px 12px;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.15s;
        }

        .sidebar-item:hover {
            background-color: #0a0a0a;
        }

        .sidebar-item-color-bar {
            width: 3px;
            height: 32px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .sidebar-item-color-bar.up { background-color: #05B878; }
        .sidebar-item-color-bar.down { background-color: #DD6565; }

        .sidebar-item-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-item-name {
            font-size: 13px;
            color: #DADADA;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-item-exchange {
            font-size: 11px;
            color: #8E8E8E;
        }

        .sidebar-item-right {
            text-align: right;
        }

        .sidebar-item-price {
            font-size: 13px;
            color: #DADADA;
        }

        .sidebar-item-change {
            font-size: 11px;
        }

        .sidebar-item-change.up { color: #05B878; }
        .sidebar-item-change.down { color: #DD6565; }

        /* ============ MAIN CONTENT ============ */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #000000;
        }

        /* ============ MAIN TABS (8 tabs) ============ */
        .main-tabs {
            display: flex;
            gap: 0;
            padding: 8px 16px;
            background-color: #000000;
            border-bottom: 1px solid #242424;
            align-items: center;
        }

        .main-tab {
            padding: 5px 20px;
            color: #8E8E8E;
            font-size: 14px;
            font-weight: 400;
            border: none;
            background-color: #181818;
            cursor: pointer;
            transition: color 0.2s, background-color 0.2s;
            height: 36px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .main-tab:hover {
            color: #DADADA;
        }

        .main-tab.active {
            color: #05B878;
            background-color: #1C2C27;
            border: 1px solid #138C61;
            border-radius: 8px;
        }

        /* ============ SUB-TABS (under Stocks) ============ */
        .sub-tabs {
            display: flex;
            gap: 0;
            padding: 8px 16px;
            background-color: #000000;
            border-bottom: 1px solid #242424;
            overflow-x: auto;
            align-items: center;
        }

        .sub-tab {
            padding: 4px 16px;
            color: #8E8E8E;
            font-size: 13px;
            font-weight: 400;
            border: none;
            background-color: transparent;
            cursor: pointer;
            transition: color 0.2s;
            height: 32px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .sub-tab:hover {
            color: #DADADA;
        }

        .sub-tab.active {
            color: #05B878;
            border-bottom: 2px solid #05B878;
        }

        /* ============ FILTER BAR ============ */
        .filter-bar {
            display: flex;
            gap: 12px;
            padding: 10px 16px;
            background-color: #000000;
            border-bottom: 1px solid #242424;
            align-items: center;
            flex-wrap: wrap;
        }

        .exchange-filter {
            display: flex;
            gap: 0;
            border: 1px solid #242424;
            border-radius: 4px;
            overflow: hidden;
        }

        .exchange-btn {
            padding: 5px 14px;
            font-size: 12px;
            color: #8E8E8E;
            background-color: #181818;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .exchange-btn.active {
            color: #DADADA;
            background-color: #242424;
        }

        .exchange-btn:not(:last-child) {
            border-right: 1px solid #242424;
        }

        .mode-filter {
            display: flex;
            gap: 0;
            border: 1px solid #242424;
            border-radius: 4px;
            overflow: hidden;
            margin-left: 8px;
        }

        .mode-btn {
            padding: 5px 14px;
            font-size: 12px;
            color: #8E8E8E;
            background-color: #181818;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            color: #DADADA;
            background-color: #242424;
        }

        .mode-btn:not(:last-child) {
            border-right: 1px solid #242424;
        }

        .filter-separator {
            width: 1px;
            height: 20px;
            background-color: #242424;
            margin: 0 4px;
        }

        .data-status {
            margin-left: auto;
            font-size: 11px;
            color: #8E8E8E;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .data-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #05B878;
        }

        /* ============ TABLE ============ */
        .table-container {
            flex: 1;
            overflow: auto;
            background-color: #000000;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: auto;
            background-color: transparent;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 1px 8px 0px 0px;
            text-align: right;
            font-size: 14px;
            color: #8E8E8E;
            font-weight: 300;
            border-bottom: 1px solid #242424;
            background-color: #181818;
            cursor: pointer;
            white-space: nowrap;
            height: 42px;
            vertical-align: middle;
        }

        th:first-child {
            text-align: left;
            padding: 1px 9px 0px 10px;
            border-right: 1px solid #242424;
        }

        th .sort-icon {
            font-size: 10px;
            margin-left: 4px;
            opacity: 0.5;
        }

        th:hover .sort-icon {
            opacity: 1;
        }

        td {
            padding: 0px 8px 0px 0px;
            font-size: 14px;
            color: #8E8E8E;
            font-weight: 400;
            border-bottom: 0.5px solid #242424;
            height: 42px;
            background-color: #121212;
            text-align: right;
            vertical-align: middle;
        }

        td:first-child {
            padding: 0px 9px 0px 10px;
            text-align: left;
            color: #DADADA;
            border-right: 1px solid #242424;
        }

        tbody tr {
            cursor: pointer;
        }

        tbody tr:hover td {
            background-color: #0a0a0a;
        }

        .up { color: #5CA81D; }
        .down { color: #DD6565; }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: #8E8E8E;
            font-size: 14px;
            gap: 8px;
        }

        .empty-state .icon {
            font-size: 32px;
            opacity: 0.5;
        }

        /* ============ LOADING ============ */
        .loading-row td {
            text-align: center;
            color: #8E8E8E;
            font-size: 13px;
            height: 60px;
        }

        @keyframes shimmer {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }

        .loading-text {
            animation: shimmer 1.5s infinite;
        }

        /* ============ SCROLLBAR ============ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1200px) {
            .sidebar {
                width: 280px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 150px;
                border-right: none;
                border-bottom: 1px solid #242424;
            }
        }
    </style>
</head>
<body>
    <!-- TOP NAV -->
    <div class="top-nav">
        <div class="logo">D</div>
        <input type="text" class="search-bar" placeholder="Search eg: Infy, Nifty Fut, Nifty 24000 CE">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Portfolio</a>
            <a href="#">Positions</a>

            <a href="#" class="active-nav">Markets</a>

        <div class="ticker-item">
            <span class="ticker-name">Fin Nifty</span>
            <span class="ticker-value" id="idx-finnifty">--</span>

        <div class="ticker-item">

        <div class="ticker-item">
            <span class="ticker-name">Sensex</span>
            <span class="ticker-value" id="idx-sensex">--</span>
            <span class="ticker-change" id="idx-sensex-chg">--</span>
        </div>
        <div class="ticker-item">
            <span class="ticker-name">Nifty IT</span>
            <span class="ticker-value" id="idx-niftyit">--</span>
            <span class="ticker-change" id="idx-niftyit-chg">--</span>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <!-- LEFT SIDEBAR: WATCHLIST -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-title">
                    <span>Watchlist</span>
                    <span style="color:#8E8E8E;font-size:11px;">&#9662;</span>
                </div>
                <div class="sidebar-actions">
                    <button class="sidebar-action-btn" title="Search">&#128269;</button>
                    <button class="sidebar-action-btn" title="Settings">&#8943;</button>
                </div>
            </div>
            <div class="sidebar-search">
                <input type="text" placeholder="Search stocks..." id="sidebar-search-input">

            </div>
        </div>

        <!-- MAIN CONTENT AREA -->
        <div class="content">
            <!-- 8 MAIN TABS -->
            <div class="main-tabs">
                <button class="main-tab" data-tab="live">Live</button>
                <button class="main-tab" data-tab="options">Options</button>
                <button class="main-tab active" data-tab="stocks">Stocks</button>
                <button class="main-tab" data-tab="commodity">Commodity</button>
                <button class="main-tab" data-tab="futures">Futures</button>
                <button class="main-tab" data-tab="etfs">ETFs</button>
                <button class="main-tab" data-tab="bonds">Bonds</button>

            </div>

            <!-- SUB-TABS (for Stocks tab) -->
            <div class="sub-tabs" id="stocks-sub-tabs">
                <button class="sub-tab active" data-subtab="intraday-movers">Intraday Movers</button>

                <div class="mode-filter">
                    <button class="mode-btn active" data-mode="rise-fall">Rise &amp; Fall</button>
                    <button class="mode-btn" data-mode="recovery">Recovery</button>
                </div>

                <div class="data-status">
                    <span class="dot"></span>
                    <span id="data-timestamp">Live Data</span>
                </div>
            </div>

            <!-- DATA TABLE -->
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Name <span class="sort-icon">&#9650;&#9660;</span></th>
                            <th>LTP <span class="sort-icon">&#9650;&#9660;</span></th>
                            <th>Change <span class="sort-icon">&#9650;&#9660;</span></th>
                            <th>Change % <span class="sort-icon">&#9650;&#9660;</span></th>
                            <th>Value (Cr.) <span class="sort-icon">&#9650;&#9660;</span></th>
                            <th>Volume <span class="sort-icon">&#9650;&#9660;</span></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr class="loading-row">

                                <span class="loading-text">Loading market data...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ============ STATE ============
        let currentMainTab = 'stocks';
        let currentSubTab = 'intraday-movers';
        let currentExchange = 'nse';
        let currentMode = 'rise-fall';
        let sortColumn = null;
        let sortDir = 'desc';
        let stockData = { gainers: [], losers: [], most_active: [] };
        let refreshInterval = null;

        // ============ WATCHLIST DATA ============
        const watchlistStocks = [
            { name: 'Adani Ports', exchange: 'NSE', price: 1285.50, change: +18.30, changePct: +1.44 },
            { name: 'ICICI Bank', exchange: 'NSE', price: 1372.90, change: +12.55, changePct: +0.92 },
            { name: 'HDFC Bank', exchange: 'NSE', price: 1895.20, change: -8.40, changePct: -0.44 },
            { name: 'Reliance', exchange: 'NSE', price: 1268.75, change: +22.15, changePct: +1.78 },
            { name: 'TCS', exchange: 'NSE', price: 3542.00, change: -15.60, changePct: -0.44 },
            { name: 'Infosys', exchange: 'NSE', price: 1487.30, change: +9.85, changePct: +0.67 },
            { name: 'Bharti Airtel', exchange: 'NSE', price: 1725.40, change: +31.20, changePct: +1.84 },
            { name: 'SBI', exchange: 'NSE', price: 812.65, change: -3.90, changePct: -0.48 },
            { name: 'ITC', exchange: 'NSE', price: 428.50, change: +5.10, changePct: +1.20 },
            { name: 'Tata Motors', exchange: 'NSE', price: 652.30, change: +14.75, changePct: +2.31 },
            { name: 'Axis Bank', exchange: 'NSE', price: 1156.80, change: -6.25, changePct: -0.54 },
            { name: 'HUL', exchange: 'NSE', price: 2378.10, change: +4.50, changePct: +0.19 },
            { name: 'L&T', exchange: 'NSE', price: 3412.90, change: +28.60, changePct: +0.85 },
            { name: 'Wipro', exchange: 'NSE', price: 245.70, change: -1.80, changePct: -0.73 },
            { name: 'Kotak Mahindra', exchange: 'NSE', price: 1834.50, change: +11.20, changePct: +0.61 },
        ];

        // ============ FORMAT HELPERS ============
        function formatINR(num) {
            if (num == null || isNaN(num)) return '--';
            return Number(num).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatVolume(num) {
            if (num == null || isNaN(num)) return '--';
            return Number(num).toLocaleString('en-IN');
        }

        function formatCrore(num) {
            if (num == null || isNaN(num)) return '--';
            // Approximate value in crores from volume * ltp
            const cr = num / 10000000;
            if (cr >= 1) return cr.toFixed(2);
            return cr.toFixed(4);
        }

        function getChangeClass(val) {
            if (val > 0) return 'up';
            if (val < 0) return 'down';
            return '';
        }

        function getChangeSign(val) {
            return val > 0 ? '+' : '';
        }

        // ============ RENDER WATCHLIST ============
        function renderWatchlist(filter = '') {
            const container = document.getElementById('sidebar-items');
            const filtered = filter
                ? watchlistStocks.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()))
                : watchlistStocks;

            container.innerHTML = filtered.map(s => `
                <div class="sidebar-item">
                    <div class="sidebar-item-color-bar ${s.change >= 0 ? 'up' : 'down'}"></div>
                    <div class="sidebar-item-info">
                        <div class="sidebar-item-name">${s.name}</div>
                        <div class="sidebar-item-exchange">${s.exchange}</div>
                    </div>
                    <div class="sidebar-item-right">
                        <div class="sidebar-item-price">${formatINR(s.price)}</div>
                        <div class="sidebar-item-change ${getChangeClass(s.change)}">${getChangeSign(s.change)}${s.change.toFixed(2)} (${getChangeSign(s.changePct)}${s.changePct.toFixed(2)}%)</div>
                    </div>
                </div>
            `).join('');
        }

        // ============ RENDER TABLE ============
        function renderTable(data) {
            const tbody = document.getElementById('table-body');

            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align:center;height:200px;color:#8E8E8E;">
                            No data available for this category
                        </td>
                    </tr>`;
                return;
            }

            // Filter out non-stock items (exclude FUT, CALL, PUT, options from stock movers)
            let filtered = data.filter(item => {
                const sym = item.symbol || '';
                // Exclude anything with CALL, PUT, FUT, CE, PE keywords
                if (/\b(CALL|PUT|FUT|CE|PE)\b/i.test(sym)) return false;
                // Exclude anything with date-like patterns (e.g. "28 APR", "13 APR")
                if (/\d{1,2}\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\b/i.test(sym)) return false;
                // Exclude anything with strike price patterns (number at end after space)
                if (/\s\d{3,6}\s/i.test(sym)) return false;
                return true;
            });

            // If no pure stocks found, show message (don't fall back to showing derivatives)
            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align:center;height:200px;color:#8E8E8E;">
                            No stock-only data available. API returned ${data.length} items (derivatives/futures excluded).
                        </td>
                    </tr>`;
                return;
            }

            // Sort if needed
            if (sortColumn !== null) {
                filtered.sort((a, b) => {
                    let valA, valB;
                    switch (sortColumn) {
                        case 0: valA = (a.symbol || '').toLowerCase(); valB = (b.symbol || '').toLowerCase();
                            return sortDir === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                        case 1: valA = a.ltp || 0; valB = b.ltp || 0; break;
                        case 2: valA = a.change || 0; valB = b.change || 0; break;
                        case 3: valA = a.change_pct || 0; valB = b.change_pct || 0; break;
                        case 4: valA = (a.ltp || 0) * (a.volume || 0); valB = (b.ltp || 0) * (b.volume || 0); break;
                        case 5: valA = a.volume || 0; valB = b.volume || 0; break;
                        default: return 0;
                    }
                    if (sortColumn > 0) return sortDir === 'asc' ? valA - valB : valB - valA;
                    return 0;
                });
            }

            tbody.innerHTML = filtered.map(item => {
                const chgClass = getChangeClass(item.change_pct);
                const chgSign = getChangeSign(item.change);
                const pctSign = getChangeSign(item.change_pct);
                const valueCr = ((item.ltp || 0) * (item.volume || 0)) / 10000000;

                return `<tr>
                    <td>${item.symbol || '--'}</td>
                    <td>${formatINR(item.ltp)}</td>
                    <td class="${chgClass}">${chgSign}${formatINR(item.change)}</td>
                    <td class="${chgClass}">${pctSign}${(item.change_pct || 0).toFixed(2)}%</td>
                    <td>${valueCr >= 0.01 ? valueCr.toFixed(2) : '--'}</td>
                    <td>${formatVolume(item.volume)}</td>
                </tr>`;
            }).join('');
        }

        // ============ FETCH DATA ============
        async function fetchStockMovers() {
            try {
                const resp = await fetch('/api/market/stock-movers');
                if (!resp.ok) throw new Error('API error: ' + resp.status);
                const data = await resp.json();
                stockData = data;

                // Combine all available data, prioritizing based on mode
                let displayData = [];
                if (currentMode === 'rise-fall') {
                    // Show gainers first, then most_active, then losers
                    displayData = [
                        ...(data.gainers || []),
                        ...(data.most_active || []),
                        ...(data.losers || [])
                    ];
                } else {
                    // Recovery mode - show losers first, then most_active, then gainers
                    displayData = [
                        ...(data.losers || []),
                        ...(data.most_active || []),
                        ...(data.gainers || [])
                    ];
                }
                // De-duplicate by symbol
                const seen = new Set();
                displayData = displayData.filter(item => {
                    if (seen.has(item.symbol)) return false;
                    seen.add(item.symbol);
                    return true;
                });

                renderTable(displayData);

                // Update timestamp
                const now = new Date();
                document.getElementById('data-timestamp').textContent =
                    'Updated ' + now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            } catch (err) {
                console.error('Failed to fetch stock movers:', err);
                document.getElementById('table-body').innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align:center;height:100px;color:#DD6565;">
                            Failed to load data. Retrying...
                        </td>
                    </tr>`;
                // Retry after 3 seconds
                setTimeout(fetchStockMovers, 3000);
            }
        }

        // Stub fetcher for /api/market/option-movers — the Options tab is wired to
        // the backend endpoint but the render path is minimal until the full
        // options UI is designed. This function exists so the dashboard reference
        // to the endpoint is real, not aspirational. See tickvault session 8
        // "more-thorough-check" commit for context.
        async function fetchOptionMovers(category) {
            try {
                const cat = category || 'top_volume';
                const resp = await fetch(`/api/market/option-movers?category=${cat}`);
                if (!resp.ok) return null;
                return await resp.json();
            } catch (err) {
                console.error('Failed to fetch option movers:', err);
                return null;
            }
        }

        async function fetchIndices() {
            try {
                const resp = await fetch('/api/market/indices');
                if (!resp.ok) return;
                const data = await resp.json();
                // If the API returns index data, populate the ticker bar
                if (data && Array.isArray(data.indices)) {
                    data.indices.forEach(idx => {
                        // Try to match known indices
                        const name = (idx.symbol || idx.name || '').toLowerCase();
                        let elVal, elChg;
                        if (name.includes('nifty 50') || name.includes('nifty50')) {
                            elVal = document.getElementById('idx-nifty50');
                            elChg = document.getElementById('idx-nifty50-chg');
                        } else if (name.includes('bank') && name.includes('nifty')) {
                            elVal = document.getElementById('idx-banknifty');
                            elChg = document.getElementById('idx-banknifty-chg');
                        } else if (name.includes('fin') && name.includes('nifty')) {
                            elVal = document.getElementById('idx-finnifty');
                            elChg = document.getElementById('idx-finnifty-chg');
                        }
                        if (elVal && idx.ltp) {
                            elVal.textContent = formatINR(idx.ltp);
                        }
                        if (elChg && idx.change_pct != null) {
                            const cls = idx.change_pct >= 0 ? 'up' : 'down';
                            elChg.className = 'ticker-change ' + cls;
                            elChg.textContent = (idx.change_pct >= 0 ? '+' : '') + idx.change_pct.toFixed(2) + '%';
                        }
                    });
                }
            } catch (err) {
                console.error('Failed to fetch indices:', err);
            }
        }

        // ============ MAIN TAB SWITCHING ============
        document.querySelectorAll('.main-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentMainTab = this.getAttribute('data-tab');

                // Show/hide sub-tabs and filter bar based on main tab
                const subTabs = document.getElementById('stocks-sub-tabs');
                const filterBar = document.getElementById('stocks-filter-bar');

                if (currentMainTab === 'stocks') {
                    subTabs.style.display = 'flex';
                    filterBar.style.display = 'flex';
                    fetchStockMovers();
                } else {
                    subTabs.style.display = 'none';
                    filterBar.style.display = 'none';

                    // Show placeholder for non-stocks tabs
                    document.getElementById('table-body').innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align:center;height:200px;color:#8E8E8E;">
                                ${currentMainTab.charAt(0).toUpperCase() + currentMainTab.slice(1)} data — coming soon
                            </td>
                        </tr>`;
                }
            });
        });

        // ============ SUB-TAB SWITCHING ============
        document.querySelectorAll('.sub-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentSubTab = this.getAttribute('data-subtab');

                // Re-fetch or re-render based on sub-tab
                fetchStockMovers();
            });
        });

        // ============ EXCHANGE FILTER ============
        document.querySelectorAll('.exchange-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.exchange-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentExchange = this.getAttribute('data-exchange');
                fetchStockMovers();
            });
        });

        // ============ MODE FILTER ============
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMode = this.getAttribute('data-mode');
                fetchStockMovers();
            });
        });

        // ============ COLUMN SORTING ============
        document.querySelectorAll('#data-table thead th').forEach((th, idx) => {
            th.addEventListener('click', function() {
                if (sortColumn === idx) {
                    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = idx;
                    sortDir = 'desc';
                }

                // Re-render with current data
                let displayData;
                if (currentMode === 'rise-fall') {
                    displayData = stockData.gainers && stockData.gainers.length > 0 ? stockData.gainers : stockData.most_active || [];
                } else {
                    displayData = stockData.losers && stockData.losers.length > 0 ? stockData.losers : stockData.most_active || [];
                }
                renderTable(displayData);
            });
        });

        // ============ SIDEBAR SEARCH ============
        document.getElementById('sidebar-search-input').addEventListener('input', function(e) {
            renderWatchlist(e.target.value);
        });

        // ============ INIT ============
        function init() {
            renderWatchlist();
            fetchStockMovers();
            fetchIndices();

            // Auto-refresh every 5 seconds
            refreshInterval = setInterval(() => {
                if (currentMainTab === 'stocks') {
                    fetchStockMovers();
                }
                fetchIndices();
            }, 5000);
        }

        init();
    </script>
</body>
</html>
