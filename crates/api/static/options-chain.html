<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLT Options Chain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #000000;
            color: #8E8E8E;
            font-weight: 400;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Header */
        .header {
            background-color: #121212;
            border-bottom: 1px solid #242424;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 300;
            color: #FFFFFF;
            letter-spacing: 0.3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            color: #518EF8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #6BA3FF;
        }

        /* Controls Bar */
        .controls-bar {
            background-color: #121212;
            border-bottom: 1px solid #242424;
            padding: 16px 24px;
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 12px;
            font-weight: 400;
            color: #8E8E8E;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            background-color: #181818;
            color: #FFFFFF;
            border: 1px solid #242424;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 400;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
            min-width: 140px;
        }

        select:hover {
            border-color: #393939;
            background-color: #242424;
        }

        select:focus {
            outline: none;
            border-color: #518EF8;
            background-color: #242424;
        }

        /* Summary Panel */
        .summary-panel {
            background-color: #121212;
            border-bottom: 1px solid #242424;
            padding: 16px 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 24px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-label {
            font-size: 12px;
            font-weight: 400;
            color: #8E8E8E;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-value {
            font-size: 16px;
            font-weight: 400;
            color: #FFFFFF;
        }

        .summary-positive {
            color: #5CA81D;
        }

        .summary-negative {
            color: #DD6565;
        }

        /* Expiry Tabs */
        .expiry-tabs {
            background-color: #121212;
            border-bottom: 1px solid #242424;
            padding: 0 24px;
            display: flex;
            gap: 0;
            overflow-x: auto;
            scroll-behavior: smooth;
        }

        .expiry-tab {
            padding: 12px 16px;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            color: #8E8E8E;
            font-size: 14px;
            font-weight: 400;
            white-space: nowrap;
            transition: color 0.2s, border-color 0.2s;
        }

        .expiry-tab:hover {
            color: #FFFFFF;
        }

        .expiry-tab.active {
            color: #518EF8;
            border-bottom-color: #518EF8;
        }

        /* Main Content */
        .main-content {
            padding: 24px;
            overflow-x: auto;
        }

        .loading-message,
        .error-message,
        .no-data-message {
            text-align: center;
            padding: 48px 24px;
            font-size: 16px;
        }

        .loading-message {
            color: #8E8E8E;
        }

        .error-message {
            color: #DD6565;
        }

        .no-data-message {
            color: #8E8E8E;
        }

        /* Table */
        .options-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: auto;
        }

        .options-table th {
            height: 42px;
            font-weight: 300;
            font-size: 14px;
            color: #8E8E8E;
            padding: 1px 8px 0px 0px;
            text-align: right;
            background-color: #121212;
            border-bottom: 1px solid #242424;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .options-table th:first-child {
            text-align: left;
            padding-left: 8px;
        }

        .options-table td {
            height: 42px;
            font-size: 14px;
            color: #8E8E8E;
            padding: 0px 8px 0px 0px;
            text-align: right;
            border-bottom: 1px solid #1a1a1a;
        }

        .options-table td:first-child {
            text-align: left;
            padding-left: 8px;
        }

        /* Call Side */
        .call-oi,
        .call-volume,
        .call-iv,
        .call-delta,
        .call-theta,
        .call-gamma,
        .call-vega,
        .call-chg,
        .call-ltp {
            text-align: right;
        }

        .call-chg {
            font-weight: 400;
        }

        /* LTP Column - Always Grey */
        .call-ltp,
        .put-ltp {
            color: #8E8E8E !important;
            font-weight: 400;
        }

        /* Strike Column - Center */
        .strike-cell {
            text-align: center;
            font-weight: 400;
            color: #FFFFFF;
            background-color: #000000;
            padding: 0px 16px;
            min-width: 80px;
        }

        .strike-header {
            text-align: center;
            background-color: #121212;
        }

        /* Put Side */
        .put-oi,
        .put-volume,
        .put-iv,
        .put-delta,
        .put-theta,
        .put-gamma,
        .put-vega,
        .put-chg,
        .put-ltp {
            text-align: right;
        }

        .put-chg {
            font-weight: 400;
        }

        /* Data Colors */
        .positive {
            color: #5CA81D;
        }

        .negative {
            color: #DD6565;
        }

        /* ATM Row */
        .atm-row {
            border-top: 1px solid #518EF8;
            border-bottom: 1px solid #518EF8;
        }

        .atm-row .strike-cell {
            border-left: 1px solid #518EF8;
            border-right: 1px solid #518EF8;
        }

        /* ITM Backgrounds */
        .itm-ce {
            background-color: rgba(238, 162, 14, 0.17);
        }

        .itm-pe {
            background-color: rgba(141, 125, 240, 0.14);
        }

        /* Status Messages */
        .status-bar {
            background-color: #121212;
            border-top: 1px solid #242424;
            padding: 12px 24px;
            font-size: 12px;
            color: #8E8E8E;
            text-align: right;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .summary-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .controls-bar {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .control-group {
                width: 100%;
            }

            select {
                width: 100%;
            }

            .summary-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-title">DLT Options Chain</div>
        </div>
        <div class="header-right">
            <a href="/portal" class="back-link">← Back to Control Panel</a>
        </div>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar">
        <div class="control-group">
            <label class="control-label">Underlying</label>
            <select id="underlyingSelect">
                <option value="NIFTY">NIFTY 50</option>
                <option value="BANKNIFTY">BANK NIFTY</option>
                <option value="FINNIFTY">FIN NIFTY</option>
                <option value="MIDCPNIFTY">MIDCP NIFTY</option>
            </select>
        </div>

        <div class="control-group">
            <label class="control-label">Refresh Interval</label>
            <select id="refreshSelect">
                <option value="0">Off</option>
                <option value="5000">5 seconds</option>
                <option value="10000">10 seconds</option>
                <option value="30000">30 seconds</option>
            </select>
        </div>
    </div>

    <!-- Summary Panel -->
    <div class="summary-panel" id="summaryPanel">
        <div class="summary-item">
            <div class="summary-label">Spot Price</div>
            <div class="summary-value" id="spotPrice">—</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">ATM Strike</div>
            <div class="summary-value" id="atmStrike">—</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">ATM IV (CE)</div>
            <div class="summary-value" id="atmIvCe">—</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">ATM IV (PE)</div>
            <div class="summary-value" id="atmIvPe">—</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">PCR Ratio</div>
            <div class="summary-value" id="pcrRatio">—</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">Total CE OI</div>
            <div class="summary-value" id="totalCeOi">—</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">Total PE OI</div>
            <div class="summary-value" id="totalPeOi">—</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">Contracts</div>
            <div class="summary-value" id="contractCount">—</div>
        </div>
    </div>

    <!-- Expiry Tabs -->
    <div class="expiry-tabs" id="expiryTabs"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div id="loadingMessage" class="loading-message">Loading option chain data...</div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="tableContainer"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">Ready</div>

    <script>
        class OptionsChain {
            constructor() {
                this.currentUnderlying = 'NIFTY';
                this.currentExpiry = null;
                this.data = null;
                this.refreshInterval = null;
                this.refreshRate = 0;
                this.lastUpdate = null;

                this.init();
            }

            init() {
                this.setupEventListeners();
                this.fetchData();
            }

            setupEventListeners() {
                document.getElementById('underlyingSelect').addEventListener('change', (e) => {
                    this.currentUnderlying = e.target.value;
                    this.currentExpiry = null;
                    this.fetchData();
                });

                document.getElementById('refreshSelect').addEventListener('change', (e) => {
                    this.refreshRate = parseInt(e.target.value);
                    this.setupAutoRefresh();
                });
            }

            async fetchData() {
                try {
                    this.showLoading();

                    const response = await fetch(`/api/option-chain?underlying=${this.currentUnderlying}&expiry=${this.currentExpiry || ''}`);

                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }

                    this.data = await response.json();
                    this.lastUpdate = new Date();

                    // Set default expiry if not set
                    if (!this.currentExpiry && this.data.available_expiries && this.data.available_expiries.length > 0) {
                        this.currentExpiry = this.data.available_expiries[0];
                    }

                    this.renderExpiryTabs();
                    this.renderSummary();
                    this.renderTable();
                    this.hideLoading();
                    this.updateStatus();

                } catch (error) {
                    console.error('Error fetching data:', error);
                    this.showError(`Unable to load option chain data: ${error.message}`);
                    this.updateStatus();
                }
            }

            async fetchPcrData() {
                try {
                    const response = await fetch(`/api/pcr?underlying=${this.currentUnderlying}`);
                    if (response.ok) {
                        const pcrData = await response.json();
                        return pcrData.ratio || null;
                    }
                    return null;
                } catch (error) {
                    console.error('Error fetching PCR data:', error);
                    return null;
                }
            }

            renderExpiryTabs() {
                if (!this.data || !this.data.available_expiries) return;

                const tabsContainer = document.getElementById('expiryTabs');
                tabsContainer.innerHTML = '';

                this.data.available_expiries.forEach(expiry => {
                    const tab = document.createElement('div');
                    tab.className = 'expiry-tab';
                    if (expiry === this.currentExpiry) {
                        tab.classList.add('active');
                    }
                    tab.textContent = this.formatDate(expiry);
                    tab.addEventListener('click', () => {
                        this.currentExpiry = expiry;
                        this.fetchData();
                    });
                    tabsContainer.appendChild(tab);
                });
            }

            renderSummary() {
                if (!this.data) return;

                const spotPrice = this.data.spot_price || 0;
                const contracts = this.data.contracts || [];

                // Find ATM strike
                let atmStrike = null;
                let atmIvCe = null;
                let atmIvPe = null;
                let minDiff = Infinity;

                contracts.forEach(contract => {
                    const diff = Math.abs(contract.strike_price - spotPrice);
                    if (diff < minDiff) {
                        minDiff = diff;
                        atmStrike = contract.strike_price;
                    }
                });

                // Get ATM IVs
                contracts.forEach(contract => {
                    if (contract.strike_price === atmStrike) {
                        if (contract.option_type === 'CE') {
                            atmIvCe = contract.iv;
                        } else if (contract.option_type === 'PE') {
                            atmIvPe = contract.iv;
                        }
                    }
                });

                // Calculate totals
                let totalCeOi = 0;
                let totalPeOi = 0;

                contracts.forEach(contract => {
                    if (contract.option_type === 'CE') {
                        totalCeOi += contract.oi || 0;
                    } else if (contract.option_type === 'PE') {
                        totalPeOi += contract.oi || 0;
                    }
                });

                // Fetch PCR ratio
                this.fetchPcrData().then(pcr => {
                    const pcrValue = pcr ? pcr.toFixed(2) : '—';
                    document.getElementById('pcrRatio').textContent = pcrValue;
                });

                document.getElementById('spotPrice').textContent = spotPrice.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                document.getElementById('atmStrike').textContent = atmStrike ? atmStrike.toLocaleString('en-IN', { minimumFractionDigits: 0 }) : '—';
                document.getElementById('atmIvCe').textContent = atmIvCe ? (atmIvCe * 100).toFixed(2) + '%' : '—';
                document.getElementById('atmIvPe').textContent = atmIvPe ? (atmIvPe * 100).toFixed(2) + '%' : '—';
                document.getElementById('totalCeOi').textContent = this.formatOi(totalCeOi);
                document.getElementById('totalPeOi').textContent = this.formatOi(totalPeOi);
                document.getElementById('contractCount').textContent = contracts.length.toLocaleString('en-IN');
            }

            renderTable() {
                if (!this.data || !this.data.contracts || this.data.contracts.length === 0) {
                    this.showNoData();
                    return;
                }

                const spotPrice = this.data.spot_price;
                const contracts = this.data.contracts;

                // Find ATM strike
                let atmStrike = null;
                let minDiff = Infinity;

                contracts.forEach(contract => {
                    const diff = Math.abs(contract.strike_price - spotPrice);
                    if (diff < minDiff) {
                        minDiff = diff;
                        atmStrike = contract.strike_price;
                    }
                });

                // Group contracts by strike
                const strikeMap = {};
                contracts.forEach(contract => {
                    const strike = contract.strike_price;
                    if (!strikeMap[strike]) {
                        strikeMap[strike] = { CE: null, PE: null };
                    }
                    strikeMap[strike][contract.option_type] = contract;
                });

                // Create table
                const table = document.createElement('table');
                table.className = 'options-table';

                // Header
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');

                const headers = [
                    'OI', 'Vol', 'IV', 'Delta', 'Theta', 'Gamma', 'Vega', 'Chg%', 'LTP',
                    'STRIKE',
                    'LTP', 'Chg%', 'Vega', 'Gamma', 'Theta', 'Delta', 'IV', 'Vol', 'OI'
                ];

                headers.forEach((header, idx) => {
                    const th = document.createElement('th');
                    if (header === 'STRIKE') {
                        th.className = 'strike-header';
                    }
                    th.textContent = header;
                    headerRow.appendChild(th);
                });

                thead.appendChild(headerRow);
                table.appendChild(thead);

                // Body
                const tbody = document.createElement('tbody');
                const strikes = Object.keys(strikeMap).map(Number).sort((a, b) => a - b);

                strikes.forEach(strike => {
                    const row = document.createElement('tr');
                    const ceContract = strikeMap[strike].CE;
                    const peContract = strikeMap[strike].PE;
                    const isAtm = strike === atmStrike;
                    const isItmCe = ceContract && ceContract.ltp > 0;
                    const isItmPe = peContract && peContract.ltp > 0;

                    if (isAtm) {
                        row.className = 'atm-row';
                    }

                    // CE Side
                    const ceFields = [
                        'oi', 'volume', 'iv', 'delta', 'theta', 'gamma', 'vega', 'change_pct', 'ltp'
                    ];

                    ceFields.forEach(field => {
                        const td = document.createElement('td');
                        const className = `call-${field}`;
                        td.className = className;

                        if (isItmCe && isAtm) {
                            td.className += ' itm-ce';
                        }

                        if (ceContract) {
                            let value = ceContract[field];
                            td.textContent = this.formatCellValue(field, value);

                            if ((field === 'change_pct') && value !== null && value !== undefined) {
                                td.classList.add(value >= 0 ? 'positive' : 'negative');
                            }
                        } else {
                            td.textContent = '—';
                        }

                        row.appendChild(td);
                    });

                    // Strike Column
                    const strikeTd = document.createElement('td');
                    strikeTd.className = 'strike-cell';
                    if (isAtm) {
                        strikeTd.style.borderLeft = '1px solid #518EF8';
                        strikeTd.style.borderRight = '1px solid #518EF8';
                    }
                    if (isItmCe && isAtm) {
                        strikeTd.className += ' itm-ce';
                    } else if (isItmPe && isAtm) {
                        strikeTd.className += ' itm-pe';
                    }
                    strikeTd.textContent = strike.toLocaleString('en-IN', { minimumFractionDigits: 0 });
                    row.appendChild(strikeTd);

                    // PE Side
                    const peFields = [
                        'ltp', 'change_pct', 'vega', 'gamma', 'theta', 'delta', 'iv', 'volume', 'oi'
                    ];

                    peFields.forEach(field => {
                        const td = document.createElement('td');
                        const className = `put-${field}`;
                        td.className = className;

                        if (isItmPe && isAtm) {
                            td.className += ' itm-pe';
                        }

                        if (peContract) {
                            let value = peContract[field];
                            td.textContent = this.formatCellValue(field, value);

                            if ((field === 'change_pct') && value !== null && value !== undefined) {
                                td.classList.add(value >= 0 ? 'positive' : 'negative');
                            }
                        } else {
                            td.textContent = '—';
                        }

                        row.appendChild(td);
                    });

                    tbody.appendChild(row);
                });

                table.appendChild(tbody);

                const container = document.getElementById('tableContainer');
                container.innerHTML = '';
                container.appendChild(table);

                // Auto-scroll to ATM
                this.scrollToAtm();
            }

            scrollToAtm() {
                const atmRow = document.querySelector('.atm-row');
                if (atmRow) {
                    setTimeout(() => {
                        atmRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                }
            }

            formatCellValue(field, value) {
                if (value === null || value === undefined) return '—';

                switch (field) {
                    case 'oi':
                    case 'volume':
                        return this.formatOi(value);
                    case 'iv':
                        return (value * 100).toFixed(2) + '%';
                    case 'delta':
                    case 'gamma':
                    case 'vega':
                        return value.toFixed(3);
                    case 'theta':
                        return value.toFixed(2);
                    case 'change_pct':
                        return value.toFixed(2) + '%';
                    case 'ltp':
                        return value.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    default:
                        return value.toString();
                }
            }

            formatOi(value) {
                if (value >= 100000) {
                    return (value / 100000).toFixed(1) + 'L';
                } else if (value >= 1000) {
                    return (value / 1000).toFixed(1) + 'K';
                }
                return value.toString();
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                const options = { month: 'short', day: 'numeric', year: 'numeric' };
                return date.toLocaleDateString('en-IN', options);
            }

            showLoading() {
                document.getElementById('loadingMessage').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                document.getElementById('tableContainer').innerHTML = '';
            }

            hideLoading() {
                document.getElementById('loadingMessage').style.display = 'none';
            }

            showError(message) {
                document.getElementById('errorMessage').textContent = message;
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('tableContainer').innerHTML = '';
            }

            showNoData() {
                const noDataDiv = document.createElement('div');
                noDataDiv.className = 'no-data-message';
                noDataDiv.textContent = 'No option chain data available for the selected underlying and expiry.';
                document.getElementById('tableContainer').innerHTML = '';
                document.getElementById('tableContainer').appendChild(noDataDiv);
            }

            setupAutoRefresh() {
                if (this.refreshInterval) {
                    clearInterval(this.refreshInterval);
                    this.refreshInterval = null;
                }

                if (this.refreshRate > 0) {
                    this.refreshInterval = setInterval(() => {
                        this.fetchData();
                    }, this.refreshRate);
                }
            }

            updateStatus() {
                const underlying = document.getElementById('underlyingSelect').selectedOptions[0].textContent;
                const timeStr = this.lastUpdate ? this.lastUpdate.toLocaleTimeString() : '—';
                document.getElementById('statusBar').textContent = `${underlying} • Updated: ${timeStr}`;
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            new OptionsChain();
        });
    </script>
</body>
</html>
