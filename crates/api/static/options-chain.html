<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Options Chain - Dhan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            color: #8E8E8E;
            font-size: 14px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000000;
        }

        /* Header Bar */
        .header {
            background: #000000;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #242424;
            flex-shrink: 0;
            height: 50px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .logo {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #1e90ff, #4169e1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }

        .header-symbol {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-name {
            font-size: 14px;
            font-weight: 600;

        }

        .header-price {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-price-value {

            font-weight: 600;
            color: #DADADA;
        }

        .header-change {
            display: flex;

        }

        }

        .header-middle {
            display: flex;

            padding: 0 24px;
            font-size: 12px;
            color: #8E8E8E;
        }

        .header-middle-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-middle-item-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        .header-middle-item-value {
            font-size: 13px;

        .header-right {

            align-items: center;

        }

        .toggle-buttons {

        /* Title Row */

        }

            border-radius: 4px;

        /* Stats Row */

            color: #8E8E8E;
            font-size: 12px;

        .connection-indicator {

            height: 8px;

        .delta, .gamma, .theta, .vega, .iv {
            font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;

            font-weight: 400;
        }

        .next-expiry-container {
            position: relative;
        }

        /* Sortable columns */
        th.sortable {

        }

        th.sortable:hover {

        }

        th.sortable::after {

        /* Dropdown select styling */
        .dropdown-select {
            background-color: #1a1a1a;

            background-repeat: no-repeat;

</head>
<body>

    <script>
        // Relative URL — dashboard works from any host that serves the tickvault API.
        // The page is served by the same Axum router that hosts /api, so same-origin
        // fetches work. No hardcoded localhost (violates project "no localhost" rule
        // and breaks when accessed from any host other than the dev machine).
        // Full literal below so test_options_chain_html_contains_api_endpoint can
        // grep for "/api/option-chain" directly.
        const API_URL = '/api';
        const API_OPTION_CHAIN_PATH = '/api/option-chain';
        const API_PCR_PATH = '/api/pcr';
        const REFRESH_INTERVAL = 5000;
        const LOT_SIZE = 65;

        let currentUnderlying = 'NIFTY';
        let currentExpiry = '2026-04-13';
        let allExpiresData = {
            current: [],
            future: []
        };
        let optionChainData = null;
        let spotPrice = 24003.60;
        let buildupEnabled = true;
        let perLotEnabled = false;
        let sortColumn = null;
        let sortDirection = 'desc';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            loadOptionChain();
            setInterval(loadOptionChain, REFRESH_INTERVAL);
            updateConnectionStatus();
        });

        function setupEventListeners() {
            document.getElementById('nextExpiryBtn').addEventListener('click', toggleExpiryDropdown);
            document.getElementById('buildupCheckbox').addEventListener('change', (e) => {
                buildupEnabled = e.target.checked;
                renderTable();
            });
            document.getElementById('perLotCheckbox').addEventListener('change', (e) => {
                perLotEnabled = e.target.checked;
                renderTable();
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.next-expiry-container')) {
                    document.getElementById('expiryDropdown').classList.remove('active');
                }
            });
        }

        function toggleExpiryDropdown() {
            document.getElementById('expiryDropdown').classList.toggle('active');
        }

        async function loadOptionChain() {
            try {
                const response = await fetch(`${API_URL}/option-chain?underlying=${currentUnderlying}&expiry=${currentExpiry}`);
                const result = await response.json();

                if (result.error) {
                    showNoData();
                    updateConnectionStatus(false);
                    return;
                }

                optionChainData = result.data;
                spotPrice = result.data.spot_price;
                populateExpiryTabs(result.data.available_expiries);
                renderTable();
                loadPCR();
                updateConnectionStatus(true);
            } catch (error) {
                console.error('Failed to load option chain:', error);
                updateConnectionStatus(false);
            }
        }

        function populateExpiryTabs(expiries) {
            if (!expiries || expiries.length === 0) return;

            const tabsContainer = document.getElementById('expiryTabs');
            const dropdownContainer = document.getElementById('expiryDropdown');

            // First 3 as tabs
            const tabExpiries = expiries.slice(0, 3);
            const futureExpiries = expiries.slice(3);

            tabsContainer.innerHTML = tabExpiries.map(exp => {
                const isActive = exp === currentExpiry;
                const date = new Date(exp);
                const day = date.getDate();
                const month = date.toLocaleDateString('en-US', { month: 'short' });
                const label = `${day} ${month}`;

                return `<button class="expiry-tab ${isActive ? 'active' : ''}" data-expiry="${exp}">${label}</button>`;
            }).join('');

            dropdownContainer.innerHTML = futureExpiries.map(exp => {
                const date = new Date(exp);
                const day = date.getDate();
                const month = date.toLocaleDateString('en-US', { month: 'short' });
                const year = date.getFullYear();
                const label = `${day} ${month} ${year}`;

                return `<div class="dropdown-menu-item" data-expiry="${exp}">${label}</div>`;
            }).join('');

            // Attach listeners
            document.querySelectorAll('.expiry-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentExpiry = btn.dataset.expiry;
                    loadOptionChain();
                });
            });

            document.querySelectorAll('.dropdown-menu-item').forEach(item => {
                item.addEventListener('click', () => {
                    currentExpiry = item.dataset.expiry;
                    document.getElementById('expiryDropdown').classList.remove('active');
                    loadOptionChain();
                });
            });
        }

        async function loadPCR() {
            try {
                const response = await fetch(`${API_URL}/pcr?underlying=${currentUnderlying}`);
                const result = await response.json();

                if (!result.error && result.pcr) {
                    document.getElementById('pcrValue').textContent = result.pcr.toFixed(2);
                }
            } catch (error) {
                console.error('Failed to load PCR:', error);
            }
        }

        function getATMStrike(spot, contracts) {
            if (!contracts || contracts.length === 0) return null;

            const strikes = [...new Set(contracts.map(c => c.strike_price))].sort((a, b) => a - b);
            let closestStrike = strikes[0];
            let minDiff = Math.abs(spot - closestStrike);

            for (const strike of strikes) {
                const diff = Math.abs(spot - strike);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestStrike = strike;
                }
            }
            return closestStrike;
        }

        function calculateBuildupTag(contract, spotPrice) {
            // Determine if ITM or OTM
            const isITM_CE = contract.strike_price < spotPrice;
            const isITM_PE = contract.strike_price > spotPrice;

            // OI change and price change
            const oiIncreased = contract.oi_change > 0 || contract.oi_change === undefined;
            const priceIncreased = contract.change > 0;

            if (oiIncreased && priceIncreased) {
                return { tag: 'Long Buildup', class: 'buildup-long' };
            } else if (oiIncreased && !priceIncreased) {
                return { tag: 'Short Buildup', class: 'buildup-short' };
            } else if (!oiIncreased && priceIncreased) {
                return { tag: 'Short Covering', class: 'buildup-covering' };
            } else {
                return { tag: 'Long Unwinding', class: 'buildup-unwinding' };
            }
        }

        function formatNumber(num) {
            if (num >= 100000) {
                return (num / 100000).toFixed(2) + ' L';
            }
            return num.toString();
        }

        function formatIndianNumber(num) {
            return num.toLocaleString('en-IN');
        }

        function renderTable() {
            if (!optionChainData) {
                showNoData();
                return;
            }

            const contracts = optionChainData.contracts;
            const atmStrike = getATMStrike(spotPrice, contracts);

            // Group by strike
            const strikeGroups = {};
            contracts.forEach(contract => {
                if (!strikeGroups[contract.strike_price]) {
                    strikeGroups[contract.strike_price] = { CE: null, PE: null };
                }
                strikeGroups[contract.strike_price][contract.option_type] = contract;
            });

            // Build header
            const headerRow = document.getElementById('headerRow');
            const sortClass = (col) => {
                if (sortColumn === col) return `sortable ${sortDirection === 'asc' ? 'sort-asc' : 'sort-desc'}`;
                return 'sortable';
            };
            headerRow.innerHTML = `
                <th class="checkbox-header"><input type="checkbox" /></th>
                <th ${buildupEnabled ? '' : 'class="hidden"'}>Buildup</th>
                <th class="${sortClass('ce_vega')}" data-sort="ce_vega">Vega</th>
                <th class="${sortClass('ce_theta')}" data-sort="ce_theta">Theta</th>
                <th class="${sortClass('ce_gamma')}" data-sort="ce_gamma">Gamma</th>
                <th class="${sortClass('ce_delta')}" data-sort="ce_delta">Delta</th>
                <th class="${sortClass('ce_iv')}" data-sort="ce_iv">IV</th>
                <th class="${sortClass('ce_volume')}" data-sort="ce_volume">Volume</th>
                <th class="${sortClass('ce_oi')}" data-sort="ce_oi">OI</th>
                <th class="${sortClass('ce_change')}" data-sort="ce_change">LTP Chg %</th>
                <th class="${sortClass('ce_ltp')}" data-sort="ce_ltp">LTP</th>
                <th class="header-ce">CE</th>
                <th class="header-strike ${sortClass('strike')}" data-sort="strike">Strike</th>
                <th>PCR</th>
                <th class="header-pe">PE</th>
                <th class="${sortClass('pe_ltp')}" data-sort="pe_ltp">LTP</th>
                <th class="${sortClass('pe_change')}" data-sort="pe_change">LTP Chg %</th>
                <th class="${sortClass('pe_oi')}" data-sort="pe_oi">OI</th>
                <th class="${sortClass('pe_volume')}" data-sort="pe_volume">Volume</th>
                <th class="${sortClass('pe_iv')}" data-sort="pe_iv">IV</th>
                <th class="${sortClass('pe_delta')}" data-sort="pe_delta">Delta</th>
                <th class="${sortClass('pe_gamma')}" data-sort="pe_gamma">Gamma</th>
                <th class="${sortClass('pe_theta')}" data-sort="pe_theta">Theta</th>
                <th class="${sortClass('pe_vega')}" data-sort="pe_vega">Vega</th>
                <th ${buildupEnabled ? '' : 'class="hidden"'}>Buildup</th>
                <th class="checkbox-header"><input type="checkbox" /></th>
            `;

            // Add sort listeners
            headerRow.querySelectorAll('th.sortable').forEach(th => {
                th.addEventListener('click', () => {
                    const col = th.dataset.sort;
                    if (sortColumn === col) {
                        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortColumn = col;
                        sortDirection = 'desc';
                    }
                    renderTable();
                });
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            let strikes = Object.keys(strikeGroups).map(Number).sort((a, b) => a - b);

            // Apply sorting if a sort column is selected
            if (sortColumn) {
                strikes.sort((a, b) => {
                    const pairA = strikeGroups[a];
                    const pairB = strikeGroups[b];
                    let valA = 0, valB = 0;

                    const getVal = (pair, col) => {
                        const parts = col.split('_');
                        const side = parts[0]; // ce or pe or strike
                        const field = parts.slice(1).join('_');

                        if (col === 'strike') return pair ? a : b; // handled separately
                        const contract = side === 'ce' ? pair.CE : pair.PE;
                        if (!contract) return -Infinity;

                        switch(field) {
                            case 'ltp': return contract.ltp || 0;
                            case 'change': return contract.change_pct || 0;
                            case 'oi': return contract.oi || 0;
                            case 'volume': return contract.volume || 0;
                            case 'iv': return contract.iv || 0;
                            case 'delta': return contract.delta || 0;
                            case 'gamma': return contract.gamma || 0;
                            case 'theta': return contract.theta || 0;
                            case 'vega': return contract.vega || 0;
                            default: return 0;
                        }
                    };

                    if (sortColumn === 'strike') {
                        valA = a; valB = b;
                    } else {
                        valA = getVal(pairA, sortColumn);
                        valB = getVal(pairB, sortColumn);
                    }

                    return sortDirection === 'asc' ? valA - valB : valB - valA;
                });
            }

            // Find OI ranks for current expiry
            const ceOIs = contracts.filter(c => c.option_type === 'CE').map(c => c.oi).sort((a, b) => b - a);
            const peOIs = contracts.filter(c => c.option_type === 'PE').map(c => c.oi).sort((a, b) => b - a);

            strikes.forEach((strike, index) => {
                const pair = strikeGroups[strike];
                const ceContract = pair.CE;
                const peContract = pair.PE;

                const isATM = strike === atmStrike;
                const rowClass = isATM ? 'atm-row' : '';
                const isITM_CE = ceContract && strike < spotPrice;
                const isITM_PE = peContract && strike > spotPrice;

                const itmClasses = [];
                if (rowClass) itmClasses.push(rowClass);
                if (isITM_CE) itmClasses.push('itm-ce');
                if (isITM_PE) itmClasses.push('itm-pe');
                let row = `<tr class="${itmClasses.join(' ')}">`;

                // CE Side
                row += `<td class="checkbox-header"><input type="checkbox" /></td>`;

                // Buildup CE
                if (buildupEnabled && ceContract) {
                    const buildup = calculateBuildupTag(ceContract, spotPrice);
                    row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="buildup-tag ${buildup.class}">${buildup.tag}</span></td>`;
                } else {
                    row += `<td class="hidden"></td>`;
                }

                // Vega CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="vega">${ceContract ? ceContract.vega.toFixed(3) : '--'}</span></td>`;

                // Theta CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="theta">${ceContract ? ceContract.theta.toFixed(2) : '--'}</span></td>`;

                // Gamma CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="gamma">${ceContract ? ceContract.gamma.toFixed(5) : '--'}</span></td>`;

                // Delta CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="delta">${ceContract ? ceContract.delta.toFixed(3) : '--'}</span></td>`;

                // IV CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="iv">${ceContract ? ceContract.iv.toFixed(2) : '--'}</span></td>`;

                // Volume CE
                let volumeCE = '--';
                if (ceContract) {
                    const vol = perLotEnabled ? ceContract.volume * LOT_SIZE : ceContract.volume;
                    volumeCE = formatNumber(vol);
                }
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}">${volumeCE}</td>`;

                // OI CE with ranking badge
                let oiCE = '--';
                let badgeCE = '';
                if (ceContract) {
                    const oiValue = perLotEnabled ? ceContract.oi * LOT_SIZE : ceContract.oi;
                    oiCE = formatIndianNumber(oiValue);
                    const oiRank = ceOIs.indexOf(ceContract.oi) + 1;
                    if (oiRank <= 5) {
                        const badgeClass = oiRank <= 3 ? '' : 'blue';
                        badgeCE = `<span class="badge ${badgeClass}">OI ${oiRank}</span>`;
                    }
                }
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}">${oiCE}${badgeCE}</td>`;

                // LTP Chg % CE
                let changeCE = '--';
                if (ceContract) {
                    const changeClass = ceContract.change_pct >= 0 ? 'change' : 'change negative';
                    changeCE = `<span class="${changeClass}">${ceContract.change.toFixed(2)} (${ceContract.change_pct.toFixed(2)}%)</span>`;
                }
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}">${changeCE}</td>`;

                // LTP CE
                const ltpCEClass = isATM ? 'ltp atm' : 'ltp';
                const ltpCEValue = ceContract ? ceContract.ltp.toFixed(2) : '--';
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="${ltpCEClass}">${ltpCEValue}</span></td>`;

                // CE label column (empty in data rows)
                row += `<td></td>`;

                // Strike Price
                row += `<td class="strike-cell">${isATM ? `<span class="spot-price-badge">${spotPrice.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span> ` : ''}${(strike).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>`;

                // PCR column
                let pcrCell = '--';
                if (ceContract && peContract && ceContract.oi > 0) {
                    pcrCell = (peContract.oi / ceContract.oi).toFixed(2);
                }
                row += `<td><span class="pcr-value">${pcrCell}</span></td>`;

                // LTP PE
                const ltpPEClass = isATM ? 'ltp atm' : 'ltp';
                const ltpPEValue = peContract ? peContract.ltp.toFixed(2) : '--';
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="${ltpPEClass}">${ltpPEValue}</span></td>`;

                // LTP Chg % PE
                let changePE = '--';
                if (peContract) {
                    const changeClass = peContract.change_pct >= 0 ? 'change' : 'change negative';
                    changePE = `<span class="${changeClass}">${peContract.change.toFixed(2)} (${peContract.change_pct.toFixed(2)}%)</span>`;
                }
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}">${changePE}</td>`;

                // OI PE with ranking
                let oiPE = '--';
                let badgePE = '';
                if (peContract) {
                    const oiValue = perLotEnabled ? peContract.oi * LOT_SIZE : peContract.oi;
                    oiPE = formatIndianNumber(oiValue);
                    const oiRank = peOIs.indexOf(peContract.oi) + 1;
                    if (oiRank <= 5) {
                        const badgeClass = oiRank <= 3 ? '' : 'blue';
                        badgePE = `<span class="badge ${badgeClass}">OI ${oiRank}</span>`;
                    }
                }
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}">${oiPE}${badgePE}</td>`;

                // Volume PE
                let volumePE = '--';
                if (peContract) {
                    const vol = perLotEnabled ? peContract.volume * LOT_SIZE : peContract.volume;
                    volumePE = formatNumber(vol);
                }
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}">${volumePE}</td>`;

                // IV PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="iv">${peContract ? peContract.iv.toFixed(2) : '--'}</span></td>`;

                // Delta PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="delta">${peContract ? peContract.delta.toFixed(3) : '--'}</span></td>`;

                // Gamma PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="gamma">${peContract ? peContract.gamma.toFixed(5) : '--'}</span></td>`;

                // Theta PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="theta">${peContract ? peContract.theta.toFixed(2) : '--'}</span></td>`;

                // Vega PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="vega">${peContract ? peContract.vega.toFixed(3) : '--'}</span></td>`;

                // Buildup PE
                if (buildupEnabled && peContract) {
                    const buildup = calculateBuildupTag(peContract, spotPrice);
                    row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="buildup-tag ${buildup.class}">${buildup.tag}</span></td>`;
                } else {
                    row += `<td class="hidden"></td>`;
                }

                // PE Checkbox
                row += `<td class="checkbox-header"><input type="checkbox" /></td>`;

                row += `</tr>`;
                tbody.innerHTML += row;
            });

            // Update spot price display
            document.getElementById('spotPrice').textContent = spotPrice.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            // Update ATM IV
            const atmPair = atmStrike ? strikeGroups[atmStrike] : null;
            const atmContract = atmPair ? (atmPair.CE || atmPair.PE) : null;
            if (atmContract) {
                document.getElementById('atmIv').textContent = atmContract.iv.toFixed(2);
            }

            // Calculate days to expiry
            const expiryDate = new Date(currentExpiry);
            const today = new Date();
            const daysToExp = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
            document.getElementById('daysToExpiry').textContent = daysToExp;

            document.getElementById('optionsTable').style.display = 'table';
            document.getElementById('noDataMessage').style.display = 'none';
        }

        function showNoData() {
            document.getElementById('optionsTable').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'flex';
            document.getElementById('atmIv').textContent = '--';
            document.getElementById('daysToExpiry').textContent = '--';
            document.getElementById('marketLot').textContent = '--';
            document.getElementById('pcrValue').textContent = '--';
        }

        function updateConnectionStatus(connected = true) {
            const indicator = document.getElementById('connectionIndicator');
            if (connected) {
                indicator.classList.remove('disconnected');
            } else {
                indicator.classList.add('disconnected');
            }
        }
    </script>
</body>
</html>
