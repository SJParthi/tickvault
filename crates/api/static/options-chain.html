<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Options Chain - Dhan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            font-size: 14px;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }

        /* Header Bar */
        .header {
            background: #121212;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: #1e90ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .header-symbol {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-name {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .header-price {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-price-value {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .header-change {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 500;
            color: #5CA81D;
        }

        .header-change .arrow {
            font-size: 12px;
        }

        .header-middle {
            display: flex;
            gap: 24px;
            padding: 0 24px;
            font-size: 12px;
            color: #8E8E8E;
        }

        .header-middle-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-middle-item-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        .header-middle-item-value {
            font-size: 13px;
            color: #e0e0e0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toggle-buttons {
            display: flex;
            gap: 8px;
            background: #1a1a1a;
            padding: 4px;
            border-radius: 4px;
        }

        .toggle-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: #8E8E8E;
            font-size: 13px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: #1e90ff;
            color: white;
        }

        /* Title Row */
        .title-row {
            padding: 16px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            background: #0a0a0a;
        }

        .title-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .title-text {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .expiry-tabs {
            display: flex;
            gap: 8px;
        }

        .expiry-tab {
            padding: 6px 12px;
            border: none;
            background: #2a2a2a;
            color: #8E8E8E;
            font-size: 12px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .expiry-tab.active {
            background: #E8590C;
            color: white;
        }

        .next-expiry-btn {
            padding: 6px 12px;
            border: 1px solid #2a2a2a;
            background: #121212;
            color: #8E8E8E;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .next-expiry-btn:hover {
            border-color: #1e90ff;
            color: #1e90ff;
        }

        .title-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: #1a1a1a;
            color: #8E8E8E;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #2a2a2a;
            color: #e0e0e0;
        }

        /* Stats Row */
        .stats-row {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            background: #121212;
        }

        .stats-left {
            display: flex;
            gap: 32px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .stats-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .show-label {
            font-size: 12px;
            color: #8E8E8E;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-container input {
            cursor: pointer;
        }

        .checkbox-container label {
            font-size: 12px;
            color: #8E8E8E;
            cursor: pointer;
        }

        /* Dropdown */
        .dropdown-menu {
            display: none;
            position: absolute;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 8px 0;
            z-index: 1000;
            top: 100%;
            margin-top: 4px;
            min-width: 120px;
        }

        .dropdown-menu.active {
            display: block;
        }

        .dropdown-menu-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #8E8E8E;
            transition: all 0.2s;
        }

        .dropdown-menu-item:hover {
            background: #2a2a2a;
            color: #e0e0e0;
        }

        /* Table Container */
        .table-wrapper {
            flex: 1;
            overflow: auto;
            background: #0a0a0a;

        }

        .table-container {

            align-items: center;
            justify-content: center;

            font-size: 14px;
            text-align: center;

        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #0a0a0a;
        }

        thead {
            position: sticky;
            top: 0;
            background: #121212;

        th {

            padding: 12px 8px;

        }

        th.header-pe {
            background: #8b4049;

        }

        th.header-strike {
            background: #121212;
            font-weight: 600;
        }

        td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
            color: #e0e0e0;
            height: 42px;
        }

        tr.atm-row td {
            border-top: 2px solid #518EF8;
            border-bottom: 2px solid #518EF8;
            background: #121212;
        }

        tr.itm-ce td.ce-cell {
            background: rgba(238, 162, 14, 0.08);
        }

        tr.itm-pe td.pe-cell {
            background: rgba(141, 125, 240, 0.06);
        }

        td.strike-cell {
            font-weight: 600;
            position: sticky;
            left: 0;
            background: inherit;
            z-index: 5;
            border-right: 1px solid #2a2a2a;
        }

        tr.atm-row td.strike-cell {
            background: #121212;
        }

        .ltp {
            font-weight: 500;
        }

        .ltp.atm {
            background: #5CA81D;
            color: white;
            border-radius: 4px;
        }

        .change {
            color: #5CA81D;
        }

        .change.negative {

        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
            background: #E8590C;
            color: white;
            margin-left: 4px;
        }

        .badge.blue {
            background: #518EF8;
        }

        .spot-price-badge {
            display: inline-block;
            background: #5CA81D;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 12px;
        }

        .buildup-tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }

        .buildup-long {
            background: rgba(92, 168, 29, 0.15);
            color: #5CA81D;
        }

        .buildup-short {
            background: rgba(221, 101, 101, 0.15);
            color: #DD6565;
        }

        .buildup-covering {
            background: rgba(232, 89, 12, 0.15);
            color: #E8590C;
        }

        .buildup-unwinding {
            background: rgba(80, 80, 80, 0.15);
            color: #888;
        }

        .checkbox-header {
            width: 24px;
            height: 24px;
            padding: 0;
        }

        .checkbox-header input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .pcr-value {
            color: #888;
        }

        .hidden {
            display: none !important;
        }

        tbody tr {
            transition: background 0.1s;
        }

        tbody tr:hover {
            background: #1a1a1a;
        }

        /* Bottom Bar */
        .bottom-bar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #2a2a2a;
            background: #121212;
            flex-shrink: 0;
        }

        .bottom-left {
            display: flex;
            gap: 12px;
        }

        .bottom-btn {
            padding: 8px 14px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #8E8E8E;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .bottom-btn:hover {
            border-color: #1e90ff;
            color: #1e90ff;
        }

        .bottom-right {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #8E8E8E;
        }

        .connection-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #5CA81D;
        }

        .connection-indicator.disconnected {
            background: #DD6565;
        }

        .delta, .gamma, .theta, .vega, .iv {
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .dim {
            color: #555;
        }

        .next-expiry-container {
            position: relative;
        }
    </style>
</head>
<body>

        <!-- Table -->

        <!-- Bottom Bar -->
        <div class="bottom-bar">

                <button class="bottom-btn">🧺 Add to Basket <span>[0]</span></button>

    <script>
        const API_URL = 'http://localhost:3001/api';
        const REFRESH_INTERVAL = 5000;
        const LOT_SIZE = 65;

        let currentUnderlying = 'NIFTY';
        let currentExpiry = '2026-04-13';
        let allExpiresData = {
            current: [],
            future: []
        };
        let optionChainData = null;
        let spotPrice = 24003.60;
        let buildupEnabled = true;
        let perLotEnabled = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            loadOptionChain();
            setInterval(loadOptionChain, REFRESH_INTERVAL);
            updateConnectionStatus();
        });

        function setupEventListeners() {
            document.getElementById('nextExpiryBtn').addEventListener('click', toggleExpiryDropdown);
            document.getElementById('buildupCheckbox').addEventListener('change', (e) => {
                buildupEnabled = e.target.checked;
                renderTable();
            });
            document.getElementById('perLotCheckbox').addEventListener('change', (e) => {
                perLotEnabled = e.target.checked;
                renderTable();
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.next-expiry-container')) {
                    document.getElementById('expiryDropdown').classList.remove('active');
                }
            });
        }

        function toggleExpiryDropdown() {
            document.getElementById('expiryDropdown').classList.toggle('active');
        }

        async function loadOptionChain() {
            try {
                const response = await fetch(`${API_URL}/option-chain?underlying=${currentUnderlying}&expiry=${currentExpiry}`);
                const result = await response.json();

                if (result.error) {
                    showNoData();
                    updateConnectionStatus(false);
                    return;
                }

                optionChainData = result.data;
                spotPrice = result.data.spot_price;
                populateExpiryTabs(result.data.available_expiries);
                renderTable();
                loadPCR();
                updateConnectionStatus(true);
            } catch (error) {
                console.error('Failed to load option chain:', error);
                updateConnectionStatus(false);
            }
        }

        function populateExpiryTabs(expiries) {
            if (!expiries || expiries.length === 0) return;

            const tabsContainer = document.getElementById('expiryTabs');
            const dropdownContainer = document.getElementById('expiryDropdown');

            // First 3 as tabs
            const tabExpiries = expiries.slice(0, 3);
            const futureExpiries = expiries.slice(3);

            tabsContainer.innerHTML = tabExpiries.map(exp => {
                const isActive = exp === currentExpiry;
                const date = new Date(exp);
                const day = date.getDate();
                const month = date.toLocaleDateString('en-US', { month: 'short' });
                const label = `${day} ${month}`;

                return `<button class="expiry-tab ${isActive ? 'active' : ''}" data-expiry="${exp}">${label}</button>`;
            }).join('');

            dropdownContainer.innerHTML = futureExpiries.map(exp => {
                const date = new Date(exp);
                const day = date.getDate();
                const month = date.toLocaleDateString('en-US', { month: 'short' });
                const year = date.getFullYear();
                const label = `${day} ${month} ${year}`;

                return `<div class="dropdown-menu-item" data-expiry="${exp}">${label}</div>`;
            }).join('');

            // Attach listeners
            document.querySelectorAll('.expiry-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentExpiry = btn.dataset.expiry;
                    loadOptionChain();
                });
            });

            document.querySelectorAll('.dropdown-menu-item').forEach(item => {
                item.addEventListener('click', () => {
                    currentExpiry = item.dataset.expiry;
                    document.getElementById('expiryDropdown').classList.remove('active');
                    loadOptionChain();
                });
            });
        }

        async function loadPCR() {
            try {
                const response = await fetch(`${API_URL}/pcr?underlying=${currentUnderlying}`);
                const result = await response.json();

                if (!result.error && result.pcr) {
                    document.getElementById('pcrValue').textContent = result.pcr.toFixed(2);
                }
            } catch (error) {
                console.error('Failed to load PCR:', error);
            }
        }

        function getATMStrike(spot, contracts) {
            if (!contracts || contracts.length === 0) return null;

            const strikes = [...new Set(contracts.map(c => c.strike_price))].sort((a, b) => a - b);
            let closestStrike = strikes[0];
            let minDiff = Math.abs(spot - closestStrike);

            for (const strike of strikes) {
                const diff = Math.abs(spot - strike);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestStrike = strike;
                }
            }
            return closestStrike;
        }

        function calculateBuildupTag(contract, spotPrice) {
            // Determine if ITM or OTM
            const isITM_CE = contract.strike_price < spotPrice;
            const isITM_PE = contract.strike_price > spotPrice;

            // OI change and price change
            const oiIncreased = contract.oi_change > 0 || contract.oi_change === undefined;
            const priceIncreased = contract.change > 0;

            if (oiIncreased && priceIncreased) {
                return { tag: 'Long Buildup', class: 'buildup-long' };
            } else if (oiIncreased && !priceIncreased) {
                return { tag: 'Short Buildup', class: 'buildup-short' };
            } else if (!oiIncreased && priceIncreased) {
                return { tag: 'Short Covering', class: 'buildup-covering' };
            } else {
                return { tag: 'Long Unwinding', class: 'buildup-unwinding' };
            }
        }

        function formatNumber(num) {
            if (num >= 100000) {
                return (num / 100000).toFixed(2) + ' L';
            }
            return num.toString();
        }

        function formatIndianNumber(num) {
            const str = Math.floor(num).toString();
            let result = '';
            let count = 0;

            for (let i = str.length - 1; i >= 0; i--) {
                if (count > 0 && count % 2 === 0) {
                    if (count === 2) {
                        result = ',' + result;
                    } else {
                        result = ',' + result;
                    }
                }
                result = str[i] + result;
                count++;
            }
            return result;
        }

        function renderTable() {
            if (!optionChainData) {
                showNoData();
                return;
            }

            const contracts = optionChainData.contracts;
            const atmStrike = getATMStrike(spotPrice, contracts);

            // Group by strike
            const strikeGroups = {};
            contracts.forEach(contract => {
                if (!strikeGroups[contract.strike_price]) {
                    strikeGroups[contract.strike_price] = { CE: null, PE: null };
                }
                strikeGroups[contract.strike_price][contract.option_type] = contract;
            });

            // Build header
            const headerRow = document.getElementById('headerRow');
            headerRow.innerHTML = `
                <th class="checkbox-header"><input type="checkbox" /></th>
                <th>Buildup</th>
                <th>Vega</th>
                <th>Theta</th>
                <th>Gamma</th>
                <th>Delta</th>
                <th>IV</th>
                <th>Volume</th>
                <th>OI</th>
                <th>LTP Chg %</th>
                <th>LTP</th>
                <th class="header-ce">CE</th>
                <th class="header-strike">Strike Price</th>
                <th class="header-pe">PE</th>
                <th>LTP</th>
                <th>LTP Chg %</th>
                <th>OI</th>
                <th>Volume</th>
                <th>IV</th>
                <th>Delta</th>
                <th>Gamma</th>
                <th>Theta</th>
                <th>Vega</th>
                <th>Buildup</th>
                <th class="checkbox-header"><input type="checkbox" /></th>
            `;

            // Hide buildup columns if not enabled
            if (!buildupEnabled) {
                headerRow.querySelectorAll('th:nth-child(2), th:nth-child(24)').forEach(th => {
                    th.classList.add('hidden');
                });
            }

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const strikes = Object.keys(strikeGroups).map(Number).sort((a, b) => a - b);

            // Find OI ranks for current expiry
            const ceOIs = contracts.filter(c => c.option_type === 'CE').map(c => c.oi).sort((a, b) => b - a);
            const peOIs = contracts.filter(c => c.option_type === 'PE').map(c => c.oi).sort((a, b) => b - a);

            strikes.forEach((strike, index) => {
                const pair = strikeGroups[strike];
                const ceContract = pair.CE;
                const peContract = pair.PE;

                const isATM = strike === atmStrike;
                const rowClass = isATM ? 'atm-row' : '';
                const isITM_CE = ceContract && strike < spotPrice;
                const isITM_PE = peContract && strike > spotPrice;

                let row = `<tr class="${rowClass}">`;

                // CE Side (right to left from headers)
                row += `<td class="checkbox-header"><input type="checkbox" /></td>`;

                // Buildup CE
                if (buildupEnabled && ceContract) {
                    const buildup = calculateBuildupTag(ceContract, spotPrice);
                    row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="buildup-tag ${buildup.class}">${buildup.tag}</span></td>`;
                } else {
                    row += `<td class="hidden"></td>`;
                }

                // Vega CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="vega">${ceContract ? ceContract.vega.toFixed(3) : '--'}</span></td>`;

                // Theta CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="theta">${ceContract ? ceContract.theta.toFixed(2) : '--'}</span></td>`;

                // Gamma CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="gamma">${ceContract ? ceContract.gamma.toFixed(5) : '--'}</span></td>`;

                // Delta CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="delta">${ceContract ? ceContract.delta.toFixed(3) : '--'}</span></td>`;

                // IV CE
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="iv">${ceContract ? ceContract.iv.toFixed(2) : '--'}</span></td>`;

                // Volume CE
                let volumeCE = '--';
                if (ceContract) {
                    const vol = perLotEnabled ? ceContract.volume * LOT_SIZE : ceContract.volume;
                    volumeCE = formatNumber(vol);
                }
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}">${volumeCE}</td>`;

                // OI CE with ranking badge
                let oiCE = '--';
                let badgeCE = '';
                if (ceContract) {
                    const oiValue = perLotEnabled ? ceContract.oi * LOT_SIZE : ceContract.oi;
                    oiCE = formatIndianNumber(oiValue);
                    const oiRank = ceOIs.indexOf(ceContract.oi) + 1;
                    if (oiRank <= 5) {
                        const badgeClass = oiRank <= 3 ? '' : 'blue';
                        badgeCE = `<span class="badge ${badgeClass}">OI ${oiRank}</span>`;
                    }
                }
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}">${oiCE}${badgeCE}</td>`;

                // LTP Chg % CE
                let changeCE = '--';
                if (ceContract) {
                    const changeClass = ceContract.change_pct >= 0 ? 'change' : 'change negative';
                    changeCE = `<span class="${changeClass}">${ceContract.change.toFixed(2)} (${ceContract.change_pct.toFixed(2)}%)</span>`;
                }
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}">${changeCE}</td>`;

                // LTP CE
                const ltpCEClass = isATM ? 'ltp atm' : 'ltp';
                const ltpCEValue = ceContract ? ceContract.ltp.toFixed(2) : '--';
                row += `<td class="${isITM_CE ? 'ce-cell' : ''}"><span class="${ltpCEClass}">${ltpCEValue}</span></td>`;

                // CE Checkbox
                row += `<td class="checkbox-header"><input type="checkbox" /></td>`;

                // Strike Price
                row += `<td class="strike-cell">${isATM ? `<span class="spot-price-badge">${spotPrice.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>` : ''}<br/>${(strike).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>`;

                // PE Checkbox
                row += `<td class="checkbox-header"><input type="checkbox" /></td>`;

                // LTP PE
                const ltpPEClass = isATM ? 'ltp atm' : 'ltp';
                const ltpPEValue = peContract ? peContract.ltp.toFixed(2) : '--';
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="${ltpPEClass}">${ltpPEValue}</span></td>`;

                // LTP Chg % PE
                let changePE = '--';
                if (peContract) {
                    const changeClass = peContract.change_pct >= 0 ? 'change' : 'change negative';
                    changePE = `<span class="${changeClass}">${peContract.change.toFixed(2)} (${peContract.change_pct.toFixed(2)}%)</span>`;
                }
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}">${changePE}</td>`;

                // OI PE with ranking
                let oiPE = '--';
                let badgePE = '';
                if (peContract) {
                    const oiValue = perLotEnabled ? peContract.oi * LOT_SIZE : peContract.oi;
                    oiPE = formatIndianNumber(oiValue);
                    const oiRank = peOIs.indexOf(peContract.oi) + 1;
                    if (oiRank <= 5) {
                        const badgeClass = oiRank <= 3 ? '' : 'blue';
                        badgePE = `<span class="badge ${badgeClass}">OI ${oiRank}</span>`;
                    }
                }
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}">${oiPE}${badgePE}</td>`;

                // Volume PE
                let volumePE = '--';
                if (peContract) {
                    const vol = perLotEnabled ? peContract.volume * LOT_SIZE : peContract.volume;
                    volumePE = formatNumber(vol);
                }
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}">${volumePE}</td>`;

                // IV PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="iv">${peContract ? peContract.iv.toFixed(2) : '--'}</span></td>`;

                // Delta PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="delta">${peContract ? peContract.delta.toFixed(3) : '--'}</span></td>`;

                // Gamma PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="gamma">${peContract ? peContract.gamma.toFixed(5) : '--'}</span></td>`;

                // Theta PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="theta">${peContract ? peContract.theta.toFixed(2) : '--'}</span></td>`;

                // Vega PE
                row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="vega">${peContract ? peContract.vega.toFixed(3) : '--'}</span></td>`;

                // Buildup PE
                if (buildupEnabled && peContract) {
                    const buildup = calculateBuildupTag(peContract, spotPrice);
                    row += `<td class="${isITM_PE ? 'pe-cell' : ''}"><span class="buildup-tag ${buildup.class}">${buildup.tag}</span></td>`;
                } else {
                    row += `<td class="hidden"></td>`;
                }

                // PE Checkbox
                row += `<td class="checkbox-header"><input type="checkbox" /></td>`;

                row += `</tr>`;

                // Add ITM classes
                if (isITM_CE) {
                    row = row.replace('<tr', '<tr class="itm-ce');
                }
                if (isITM_PE) {
                    row = row.replace('<tr', '<tr class="itm-pe');
                }

                tbody.innerHTML += row;
            });

            // Update spot price display
            document.getElementById('spotPrice').textContent = spotPrice.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            // Update ATM IV
            const atmContract = atmStrike ? (pair = strikeGroups[atmStrike], pair.CE || pair.PE) : null;
            if (atmContract) {
                document.getElementById('atmIv').textContent = atmContract.iv.toFixed(2);
            }

            // Calculate days to expiry
            const expiryDate = new Date(currentExpiry);
            const today = new Date();
            const daysToExp = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
            document.getElementById('daysToExpiry').textContent = daysToExp;

            document.getElementById('optionsTable').style.display = 'table';
            document.getElementById('noDataMessage').style.display = 'none';
        }

        function showNoData() {
            document.getElementById('optionsTable').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'flex';
            document.getElementById('atmIv').textContent = '--';
            document.getElementById('daysToExpiry').textContent = '--';
            document.getElementById('marketLot').textContent = '--';
            document.getElementById('pcrValue').textContent = '--';
        }

        function updateConnectionStatus(connected = true) {
            const indicator = document.getElementById('connectionIndicator');
            if (connected) {
                indicator.classList.remove('disconnected');
            } else {
                indicator.classList.add('disconnected');
            }
        }
    </script>
</body>
</html>
